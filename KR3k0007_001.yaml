body:
  text: 元和姓纂原序元和壬辰歲詔加邊將之封酬屯戍之績朔方之別帥天水閻者有司建苴茅之邑於太原列郡焉主者既行其制閻子上言曰特蒙渙汗恩沾爵土乃九族之榮也而封乖本郡恐非舊典翌日上謂相國趙公有司之誤不可再也宜召通儒碩士辨卿大夫之族姓者綜修姓纂署之省閣始使條其原系考其郡望子孫職位並宜總緝每加爵邑則令閲視庶無遺謬者矣寶末學淺識首膺相府之命因案據經籍窮究舊史諸家圖牒無不參詳凡二十旬纂成十卷自皇族之外各依四聲韻類集每韻之內則以大姓為首焉朝議郎行太常博士林寶撰元和中政平刑清聖作賢輔盡雍容揚揄之美成緝熙愷樂之化相國趙國公式是古訓毗于大君當八方之樞總萬物之會嘗以聖明臨照思盡物宜每與群公拱承顧問將謂經之於思慮不若著之以文辭著之以文辭不若驗之于圖牒昔漢祖所以知郡國豐耗山川險夷以蕭何得秦圖書可披而案之故也大凡邦國之會計可以備應對者著元和國計簿地形之遠近可以知要害者著元和郡邑圖洎百執事所涖之司士大夫所分之隸族無不究其本末申明其憲度今之姓纂即其一也趙公嘗創立綱紀區分異同得之于心假之于手以授博聞強識之士濟南林寶寶該覽六藝通知百家東漢有紬書之能太常當典禮之職其為述作也去華托實亡粗得精條貫稟大賢之規網羅盡天下之族雖范宣子稱其世祿司馬遷序其先業若揭日月備于縑緗昭昭然蔑以加此矣以涯嘗學舊史繆官綸閣授簡為序不敢固辭無能發揮承命而已矣元和七年壬辰十月中大夫行兵部員外郎知制誥王涯述
