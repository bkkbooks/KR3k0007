front:
  text: 校補元和姓纂輯本序唐林寶撰姓纂其佚文存在永樂大典散附千家姓之下宋鄭樵作氏族略王應麟作姓氏急就章謝枋得作祕笈新書俱引其文又多為永樂大典所遺今採輯諸書依林氏原書例先以當時皇族餘分四聲仍為十卷其非永樂大典而見他書者注明出處唐時氏姓書尚多隋經籍志雖稱鄧氏官譜及族姓昭穆記晉亂已亡自餘亦多遺失而譜系篇所載尚有四十一部三百六十卷唐顯慶中詔呂才等撰姓氏錄開元中柳沖又改修其書天寶中李林甫亦撰天下郡望姓氏族譜林氏作書時當得見之其體例亦如元和郡縣志不載出典惟僻姓一二引姓苑風俗通及新說閒引當時家狀耳其書宋時尚存據書錄解題云在莆田以數本參校後又得蜀本校之互有得失然粗完整是陳振孫見其完書鄭樵謝枋得等亦用之不知亡於何時蓋在元明之閒矣唐會要以姓纂為王涯撰因書有王涯序錄言之涯序稱相國趙國公創立綱紀區分異同以授博聞強識之士濟南林寶案書錄解題以為宰相李吉甫以命寶二十旬而成書則以吉甫本趙郡人唐書世系表趙郡李氏定著六房宰相十七人吉甫相憲宗又吉甫本傳元和二年杜黃裳罷相乃擢吉甫知平章事故亦得稱趙公也涯序又稱濟南林寶書錄解題以為三原林寶寶傳不見於史亦未知何以異至郡齋讀書志作十一卷則古人每兼序錄為卷數不足異也姓氏與郡望相屬乃知宗派所出樂史作太平寰宇記載人物著姓於郡縣之下亦有深意三代以上官有世祿各居其國都自漢時徙豪右入關而郡望非其土著晉室板蕩中原大族半皆南渡譜牒亡失北朝以三字二字複姓改為一字或與古姓相亂僅賴魏收官氏志以別之及宋南遷士夫復多喪其譜牒至明太祖不能舉曾高之名其後官無譜局私撰家狀者率皆未見古書不能遠考漢唐世數數典而忘其祖非族而神不歆實搢紳先生之所恥自有此書出而譜牒一家之學不至失守矣永樂大典引此書證之鄧名世古今姓氏書詳略互見當由輯錄人有所去取且所遺著姓其見於祕笈新書及世族略者甚多脫誤亦不少如洪姓監察御史洪察闕察字及避孝敬諱訛為避元宗諱之屬皆據祕笈新書訂正齊人孟軻字子展祕笈新書作子輿亦兩存之此外有宋謝維新合璧事類類姓門亦引古今姓纂按其詞有引通鑑云云則不盡林氏原書其廣韻所引氏姓亦有林氏之文但不云出於姓纂不敢濫補吾友尚書郎歙人洪瑩篤愛此書欲刊布傳遠與予增校條舉件繫日得數十事二旬而畢猶有漏略當俟來者云賜進士及第東方觀察使者署廉訪使舊史氏孫星衍撰
