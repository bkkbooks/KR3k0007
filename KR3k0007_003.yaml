seq: 3
body:
  text: 校補元和姓纂輯本後序右唐林寶元和姓纂十卷永樂大典作十八卷今仍釐為十卷從其朔也唐書無寶傳其名見於藝文志唐會要訛作王涯撰鄭樵通志作李林寶撰則以傳寫李吉甫林寶二名之誤樵譏寶不知林氏所自出然樵作氏族略實祖之他如鄧名世之姓氏辨證王應麟之姓氏急就章亦多引其文寶以二十旬而成書速於蕆事先容齋嘗議其書多妄然陷而入于博亦賢者之過也案班固古今人表有太師疵少師疆為殷末之樂官顏師古云即論語太師摯諸人今按本書亞飯一姓云亞飯干殷末賢人與漢書合又淮南王元覽改為兀氏説文元從一兀聲徐鍇以為兀非聲不知元之可讀冗而髡之從兀即近於元也今元改為兀元兀聲相近與説文合又其中引世本族姓記三輔決録以及百家譜英賢傳姓苑諸書多有不傳於今者賴其徵引尚可考見至其載列唐人世系元元本本尤為詳核唐藝文志譜牒類十七家三十九部一千六百一十七卷今均散佚漢晉以來譜系一家之學繫而不墜實賴此書之存黃伯思陳振孫雖稱無善本然全書未泯又散附千家姓之下錯見祕笈新書之中者甚夥毗陵淵如夫子以所藏鈔本見示因校而刊之蓋夫子以力學復古為己任即以此志勉瑩也刊既成而述其略於簡末歙洪瑩識
