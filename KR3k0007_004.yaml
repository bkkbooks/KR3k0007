body:
  text: 卷一李據序稱皇族之外各依四聲韻類集今仍以李置卷首如林氏舊例帝顓頊高陽之裔顓頊生大業大業生女莘女莘生咎繇為堯理官子孫因姓理氏云云裔孫理徵得罪于紂其子利貞逃難伊侯之墟食木子得全因變姓李氏利貞十一代孫老君名耳字伯陽居苦縣賴鄉曲仁里曾孫曇生二子崇璣崇子孫居隴西璣子孫居趙郡崇五代孫仲翔生伯考伯考生尚尚生李廣也廣以後生唐高祖李淵祕笈新書周文王第十五子畢公高之後畢萬封魏支孫食采於馮遂氏焉世本又云姬姓鄭大夫馮簡子後漢書秦末馮亭為上黨守入趙其宗族或留潞或在趙秦丞相馮去疾御史大夫馮劫漢博成侯馮毋擇並亭之後也至馮唐徙安陵為楚相弟騫自上黨徙杜陵孫奉世大將軍生談逡案馮奉世為左將軍此作大將軍誤又談逡下脫立參二字野王野王左馮翊立上郡太守參宜都侯漢功臣又有閼氏侯馮解散穀陽侯馮溪傳封六代後漢司空馮勤魏郡人馮衍杜陵人生豹尚書司空魴南陽人廷尉馮緄巴郡人案閼氏侯馮解散漢功臣表作閼氏節侯潁川後漢征西大將軍夏陽侯馮異上黨漢左將軍馮奉世本世居上黨也長樂信郡漢宜都侯參後晉有馮和孫跋僭號都龍城稱北燕弟弘為後魏所滅弘生朗生姬姬女弟魏文成皇后燕熙孫子琮北齊左僕射昌黎公案北史馮熙文明太后之兄父朗追贈燕宣王熙生誕誕生穆穆生問襲爵昌黎王又北齊書馮子琮馮跋之後父靈紹子慈正此文內姬字疑係熙字之誤熙孫子琮曰字亦誤疑燕字下有脫文生慈明慈信慈讓慈明生惇怦怦兵部郎中生騫汾州刺史慈明孫慶雅州刺史慈讓生總擲捷總監察御史生元常右丞兵部侍郎元常生光嗣齊州刺史孫令問侍御史思雍刑部郎中捷生淑祠部郎中京兆狀稱弘後隋有兵部尚書馮業生長命唐尚書左丞長命生義弘禮本義弘膳部郎中禮本司農少卿本足子昭泰刑部刺史安昌公案張説集括州刺史工部尚書馮昭泰碑曾祖兵部尚書世基此避唐諱作業又曰考仁高亮無祿故昭泰幼襲安昌公此作本足子當有訛又考昭泰嘗官邢州刺史此作刑部亦誤生紹正紹烈紹正少府監紹烈兵部郎中鴻臚卿又銀青光祿大夫直昭文館紹烈生敦直從祖弟師訓右領軍將軍師訓生嘉績蓬州刺史少師唐駙馬鴻臚卿青州刺史陝東行臺右僕射生文瓚河間監察御史馮師古孫著魯著左補闕魯兼監察御史魏郡國子祭酒伉生芫藥新平御史中丞馮嘉賓諸郡馮氏鴻臚少卿馮宗中書舍人馮大和並長安人萬年縣令馮用之洛陽人庫部員外馮嶷河東人虞部員外郎馮宿長樂人後徙東陽弟定審寬寬中書舍人大和中並舉進士高州高州都督耿公馮盎代為酋領岡州竇州刺史合浦公馮士翽代為酋領兄煜進士共工氏之後本姓共氏因避仇改洪氏宣城吳有廬江太守洪矩舒城唐清河丞洪孝昌代居舒州狀稱矩後生厚監察御史毗陵監察御史洪察原缺察字或疑上文名厚者據祕笈新書作察常州人本姓弘氏避孝敬諱改姓洪氏生子興起居舍人生經綸諫議大夫據祕笈新書改魯大夫叔弓之後以王父字為氏漢有光祿勳弓祉太原弓祉案弓祉之祉一作址之後後魏有博陵太守弓翊曾孫逸之逵之義德州刺史案弓翊曾孫逸唐陳倉令生羲之逵之羲之德州刺史此作義又作逸之疑訛離石公生志和志弘志元彭祖志弘陳州刺史生嗣宗祠部員外嗣業洛州司馬志元右金吾將軍相州刺史陽國公彭祖揚府長史蒲州刺史晉陽公生嗣初嗣説嗣初雍州司功楚鬻熊之後以王父字為氏熊克家譜曰鬻熊為文王師著書一卷號鬻熊子至成王時舉文武勤勞之後以子男之田封熊曾孫繹於楚是為楚子熊繹也三國時有徵士熊僧循尚書熊睦乂江陵志曰黃帝有熊氏之後自熊克家譜至此據祕笈新書增南昌晉侍中太常卿熊遠開元臨清尉熊躍又戶部郎中熊執易並洪州人鴈門顓頊生老童子孫以王父字為氏東莞姑幕後漢循吏童恢晉有童景宋有童厚民老童之後或為僮氏山陽後漢有吳郡太守僮和何承天纂要云漢少傅中云案應劭風俗通漢少府中京通志引何承天纂要同此作少傅中云誤戰國策秦有中期呂氏春秋中尚魏公子年之後魏得中山以邑與之遂以邑為氏史記有中旗夏殷時侯國也崇侯虎為文王所滅史記有嵩極元子見姓苑春秋有茙律案左傳晉靈公車右戎津此作茙律與通志同誤河南後魏官氏志茙眷氏改為茙氏案後魏官氏志乃茂眷氏改為茂氏此作茙疑有誤何承天纂要云人姓虞大夫之奇之後殿中御史志惲河東今河東有宮氏大曆中侍御史宮頊或云恆州人也舜七友雄陶之後廣陵今揚州有雄姓尚書肜伯周同姓為氏成王宗伯案周書彤伯非肜也通志肜氏本彤氏避仇改為肜氏疑為近之左傳魯昭公子公衍公為之後漢主爵都尉公儉文王第十七子酆侯之後風俗通東蒙主以蒙山為氏出自劉氏漢楚元王子紅侯富之後大鴻之後左傳衛有鴻聊魋比部郎中翁義恪巴大夫食采通川因氏焉古鬷夷氏之後左傳鄭有鬷蔑魯有鬷戾案齊有鬷聲姬本姓仲氏仲山甫之後後因避難改為種氏後漢有種皓洛陽後漢司徒種皓生拂拂生邵大鴻臚卿鄭大夫子産居東里因氏焉曹瞞有南陽太守東里昆何氏姓苑云東萊人太始先賢狀有東里冕魏志有東里袞風俗通云伏羲氏之後帝出于震以主東方子孫因氏焉平原厭次漢大中大夫東方朔字曼倩唐禮部員外郎東方虬云朔之後生皓左拾遺安德北齊南袞州刺史東方老夏禹後有杞東樓公支孫氏焉其後杞大夫有東樓羽齊公族桓公之後也齊大夫偃東郭書見左傳又大陸子方號東郭賈齊人莊子有東郭子魏文侯時東郭子惠見説苑齊郡漢有東郭先生拜都尉山陽神仙傳有東郭延祖氏家傳祖崇之娶東陽元旋女又宋員外郎東陽元疑撰齊諧記十卷郯縣晉龍驤將軍東邱進東宮棄疾隱嵩山年三百歲魯僖公生共叔堅堅生惠叔子叔為公石氏古爵也子孫氏焉魯公山不狃一作不擾見姓苑黃帝姓公孫子孫因以氏焉河南隋沙州刺史無終公公孫微孫彥藻唐通州刺史昌平公安生欽洋商等州刺史遼東後漢有公孫延生度為遼東太守子康生文懿三代處遼東後自立為燕王魏明帝遣司馬宣王平之三代五十年而滅後魏廣州刺史因安子公孫表稱度後孫睿尚書燕郡公曾孫遂青州刺史生長儒北齊涇州刺史孫正唐揚州司法櫟陽唐右衛大將軍征陽公公孫武孫達生雅靖安西都護災川薛縣漢有丞相平津侯公孫弘子度為山陽太守隋災川刺史公孫景茂代居信都狀云弘子度後生善政政生虞唐庫部郎中𠉌職方郎中北地義渠漢有西平太守公孫渾邪著書十五篇子賀丞相葛繹侯生敬聲太僕犯事父子俱死獄中遼西後漢前將軍易侯公孫瓚又春秋時諸侯亦為公孫氏上谷晉有隱者公孫風上昌黎九城山魯有公伯寮仲尼弟子魯季悼子紇生穆伯穆伯生文伯歜文伯歜生成伯成伯生頃頃為公父氏見世本衛公成之後以諡為氏東郡白馬縣晉有散騎常侍公成綏案晉書本傳乃成公綏非公成氏此有誤字子安有傳後魏有公成興學道仙去孔子弟子有公齊定衛穆公生公析黑臀其孫成子朱鉏以王父字為氏魯有公索氏將祭而亡其牲見家語見纂要魯郡仲尼弟子公祖句茲姓苑趙平陵太守公休勝衛襄公生公孟縶縶生丹為公孟氏衛大夫公明賈王莽校尉公賓就斬莽首傳于宛就北海人古官也其後氏焉建安中朝邑令公正範吳人季悼子生思伯鞅鞅生懿伯柎為公之氏古爵也子孫氏焉公乘不害傳封四代案此條疑有脫誤世本晉荀遊敖生桓子林父將中行為中行氏漢有諫議大夫中行説古帝少昊氏有六英之樂掌中英者以官為氏潛夫論微子之後楚文王御史中野彪風俗通劉向為漢中壘校尉支孫以官為氏尸子中黃伯漢御史中謁者桐里斤生儒為議郎宋人氏晉羊舌氏之後戎子駒支之後為氏嬴姓與秦同祖下邳漢有雍門侯終利恭後漢散騎都尉終利英風俗通桀內史終古後氏焉楚熊率且比後為氏楚左史熊相之後威王時有熊相季文為士官本姓肜氏避仇改姓彤今道士彤也案彤伯周同姓國為成王宗伯者是也又彤氏本肜氏避仇改為彤姓纂前既以彤為肜此又誤以肜改彤道士句亦有脫文周大夫宗伯之後以官命氏齊有宗樓南陽安衆河內太守宗均案豆盧詵嶺南節度判官宗義仲碑昔宋襄公之母弟仕于晉至伯宗為三卻所害州犂奔楚其子家于南陽以王父字為氏此較宗伯之説似為有據又曰遠祖均東漢為九江太守纍遷司徒此作河內太守亦異族曾孫宗俱司空均元孫慈慈十代孫躬躬孫瓊唐蘇州刺史晉趙衰冬日之日後因氏焉狀稱本劉氏楚元王交之孫劉德為宗正支孫氏焉裔孫宗正稱濟陰唐朝殿中少監宗正辨宋微子之後桓公曾孫伯宗仕晉生州犂仕楚食采鍾離因氏焉子孫或姓鍾氏楚有鍾儀鍾建又鍾子期與伯牙為友項羽將鍾離眛眛中子樓亦單姓鍾氏潁川接始居潁川長社魏太尉鍾繇生育侍中廷尉繇少子會司徒繇弟演演元孫雅過江為晉侍中五代孫韜韜生嶼嶸岏嶼撰華林編略梁山陰令嶸撰詩評三卷岏撰良吏傳十卷生寵梁臨海令侯景時避地南康南康唐洛邑府統軍鍾山操狀稱寵孫也代居虔州贛縣弟子威安福令生法遵不仕生紹京中書令戶部尚書越國公綿蜀彭州刺史生嘉群諤群嘉中書令晉州刺史諤典膳監也薑姓炎帝之後封巨為黃帝師胙土命氏夏封父侯國君也今封邱是也後有侍中封岌渤海蓨縣封岌始居蓨五代孫仁仁孫釋晉侍中釋生挫悛挫生奕燕太尉奕生蘄孫鑒後魏滄水太守案唐世系表鑒三子琳回滑此守字下疑脫去三子二字琳回回尚書僕射生隆之右僕射案隆之下疑脫興之一人隆之生子繪子繡孝琬案孝琬字當衍子繪北齊祠部尚書孫智贍子繡隋通州刺史生德潤德輿德如德彝德潤隋青城令生行賓行高梁客行賓生廣成雍州司法廣成生希彥中書舍人吏部侍郎行高禮部侍郎案唐世系表廣成作廣城希彥作希顏行高禮部侍郎作禮部郎中梁客中案梁客中書舍人此中字下脫三字德彝改名倫右僕射中書令密明公生言道駙馬司門郎中汝汴二州刺史生思敏思敏生守靜渠州刺史守靜生利建利建生夏時兼殿中侍御史興之生孝琬孝琰孝璋孝琰北齊散騎常侍孝璋生君誕君夷君誕孫叔廉光州刺史生悌愔君夷生道弘右司郎中虢州刺史道弘生踐一踐福踐一生無待刑部郎中無待生希奭希奭生亮司封員外杭州刺史亮生敖案唐世系表敖生望卿此脫踐福黃州刺史生無遺琳孫孝綽勸七代孫彥明生崇正崇真崇正刑部郎中生若愚若水崇真生若虛若沖悛生放案唐世系表悛生放奕奕燕太尉奕二子蘄勸與此不合燕吏部尚書令勗君明懿弟孚攸燕太尉攸孫軌後魏廷尉卿生君義詢君義聘梁副使五兵尚書生淑詢北齊左丞生道嗣孫子都生全福全禎全福生謀全禎刑部侍郎生豎纂五代孫道瑜道瑜生綽孫思業戶部郎中綽弟士泰生松年孫廷弼京兆尹士曹生綱案唐世系表廷弼京兆府士曹參軍生洄與此不合京兆安西節度攝御史大夫封常清河南官氏志賁氏改為封氏案魏書作是賁氏此脫是字尚書舜臣龍為納言子孫以王父字為氏又董父已姓賜氏豢龍為龍氏龍且楚人為項羽將急就章龍未央亦楚人也本於龍反今俗呼去聲文王十二子雍伯受封於雍在河內山陽子孫以國為姓又宋有雍氏本子姓也鄭有雍糾齊有雍廩楚有雍子漢有雍齒沛人封什邡侯案今本漢書作汁防唐主客郎中雍惟良信都棗強人檢校郎中兼朝邑令雍寧河陽三城使懷州刺史兼御史大夫雍希顒帝王世紀黃帝臣容成造曆帝舜舉八凱有仲容或云其後以王父字為氏見姓苑庸蜀殷時侯國周武王時來助伐紂子孫以國為氏漢有庸光又有膠東庸生風俗通重黎之後少昊時南正重司天以官為氏殷末侯國周文王侵阮徂恭見毛詩左傳晉大夫龔堅後漢蠻氏首有龔氏漢有光祿大夫龔勝案龔勝應在前後漢蠻氏應在後又巴中渠帥七姓羅朴督鄂度夕龔以龔為蠻氏首亦非也東苑從氏漢有將軍從成公共工氏之後或云鄭共叔段後今河內共城是其地也世本云與秦同祖嬴姓也戰國策齊賢人鍾離子漢有鍾離眛楚人鍾離岫撰會稽後賢傳後漢尚書僕射鍾離意會稽山陰人鍾離意曾孫緒樓船都尉生駰英賢傳秦大夫逢孫之後有隴西北部都尉逢孫依漢古今人表有逢門子豹藝文志有逢門子著兵法徐偃王子食邑封貝因氏焉今臨川有此姓夏殷國名也鄭有封父彌真為大夫古封畿之職為氏風俗通吳郡漢時博士龍邱長周禮雍人以官為氏魯有雍人高檀見左傳鄭武公子共叔段之後嬴姓顓頊元孫伯益之後爵封於江後為楚所滅以國為氏濟陽考城後漢有太常轑陽德其先居陳留圉縣漢分陳留為濟陽因居考城為著姓德十代孫蕤晉譙郡太守亢父男生湛侍中吏部尚書湛生恁恁生斆齊都尚書斆生蒨葺蒨梁光祿大夫生經案陳書江總傳總父紑此作經誤經生總陳尚書令總生溢溥漼溢陳太子中庶子唐瀘州合江令溥陳太子舍人唐弘農丞漼唐隋州司馬葺梁吏部侍郎孫伯琳西城令齊左僕射伯琳生祏弟案江祏濟陽考城人祖遵寧朔參軍父德麟司徒右長史祏弟祀晉安王鎮北長史祀弟禧祏子廞皆見南史與此不合弟字下疑有脫文齊侍中戶部尚書謐梁吏部尚書左僕射衛將軍臨沮伯江淹度支尚書江革子孫並無聞案江淹父康之南沙令江革祖齊之宋都水使者尚書金部郎父柔之齊尚書倉部郎革子德藻陳祕書監德藻子椿尚書右丞德藻弟從簡司徒從事中郎從簡子兼以孝行聞皆濟陽考城人趙國邯鄲漢有水衡都尉江充齊郡臨淄後漢諫議大夫江革鄠縣唐起居郎江融撰九州設險圖汝陰唐萬州刺史子建世居潁川周文王子畢公高之後封於龐鄉因氏焉魏有龐涓趙有龐煥南安今潁州後魏有將軍龐樹戰死夏侯道遷傳狀稱又居鄴郡生景亮以父功封襄邑男六代孫茂隋王記室生仲惲唐左武侯大將軍濮國肅公生同善同福同本同善右金吾大將軍生敬嗣都水使者同福饒州刺史生承宗承訓承宗右金吾大將軍宗正卿南安侯生景昭景喬景劄景良景高景高生察範察湖州刺史景劄口州刺史生説今蓬州刺史同本洛州刺史左千牛衛將軍景昭生嚴中書舍人京兆狀云本望南安漢太尉龐參後今居京兆後魏直閣將軍龐伯元孫玉唐左武侯將軍越州都督生廊職方郎中玉弟琳隴州刺史代郡狀云本南安人後魏定州刺史比陽公龐雅生風風生晃隋原州總管比陽公生相壽右監門將軍安宜公孫貞素易州刺史右屯田將軍河東狀云龐涓之後漢龐儉掘井得錢者北海燕慕容以北海龐美為股肱出何承天纂要若江女江二反顓頊之後封於蒙城案通志作雙蒙城因以命氏天水狀云後魏有梁州刺史疊水公雙上洛因家天水生彌周河州刺史平梁公彌周生陽唐右武衛大將軍定相二州總管杭州刺史陽生萬弘萬壽東郡白馬縣唐瀛莒二州刺史雙子符夏殷諸侯有逢公伯陵封齊土其後子孫氏焉左傳齊大夫有逢丑父北海漢有大僕射逢信後趙秦州刺史碧唐中書舍人逢弘敏狀云其後也
