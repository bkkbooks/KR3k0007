body:
  text: 五支支姓苑云人姓琅琊姓苑云今琅琊有支氏西城石趙司空支雄傳云其先月支人也晉有高僧支遁字道林天竺人隨周同姓國也又杜伯曾孫晉大夫食采于隨邑亦曰隨會漢有博士隨何又有扶風隨蕃枝楚大夫枝如子躬之後或姓枝如氏案通志謂晉欒枝或秦公孫枝之後以名為氏者若枝如子躬其後自為枝如氏趙郡邯鄲為郡著姓漢有符節令弘字盂十一代孫固邁生逸燕易州刺史昌黎公生鎮後魏七兵尚書曾孫燮生仲讓北齊國子祭酒仲讓生彥通滑州別駕義安後魏有枝雅濮陽唐考功郎中支逸文馬邑後魏有枝夸皮風俗通周卿士樊仲皮之後皮氏漢有諫議大夫皮究下邳後漢上計掾秦嘉集敘皮仲固撰晉有尚書郎皮諶宋武康令皮延年並下邳人王僧儒百家譜云茍昭娶下邳皮仁之女後魏有皮豹子隋書旭州刺史皮子信今大理司直遐叔南昌人媯世本帝舜之後舜生媯汭子孫氏焉漢有媯皓後改為姚氏文士傳有媯覽奇見姓苑云伯奇之後以王父字為氏一曰魯昭公子奇之後漢書南郡太守奇琨河南後魏官氏志奇斤氏改為奇羲羲和堯掌天地之官子孫氏焉戲伏羲之後子孫氏焉儀衛大夫儀封人見論語大夫儀楚西河漢有儀長孺驪左傳驪戎國之後在昭應縣案昭應舊本作應昭古新豐縣唐改名昭應宋大中祥符中改臨潼縣東有驪戎故城卑卑耳國人之後或云鮮卑衆類漢有北平太守卑躬河間人雁門後漢太尉掾卑釐又魏志公孫度將有卑術訾風俗通帝嚳妃訾娵氏女姓苑云今齊人漢書漢功臣表有樓虛侯訾順斯姓苑云吳人吳志郯縣吏斯從也東陽南齊書東陽郡有斯氏彌史記衛公孫彌子瑕以王父字為氏三輔決録云王莽時彌強新豐漢末新豐人中叔見決録猗史記猗頓魯國富人河東猗氏猗頓自魯居之馳見姓苑馳湛馳竈宣城姓苑云今宣城有馳氏池以所居為姓漢有中牟令池瑗魏有城門候池仲魚眭趙大夫食采眭邑因以為氏案眭弘見漢書眭固見魏志眭夸見北史蕃其先出自魯大夫食采於蕃因以為氏後漢黨錮傳有蕃嚮案廣韻蕃無皮音惟集韻音皮考左傳疏引魯國地理志曰蕃讀如藩屏之藩言魯國南藩也汝南陳子斿為魯相子斿者藩之子也國人避諱遂改皮音又白襄魯國記同今附入支韻彌且後秦冠軍大將軍彌且婆獨遼東侯彌且高地立節將軍彌且成後魏末都督彌且元進夏州酋望也唐右領軍將軍延州刺史戲陽英賢傳曰秦穆公時有戲陽伯樂善相馬漢有侍御史戲陽放差師世本魏公族有差師氏伊帝堯伊祁氏之允裔孫伊尹名摯相湯生陟奮風俗通漢有議郎伊推又伊喜嘉為雁門都尉石顯黨也山陽蜀志伊籍山陽人今右僕射安廣節度伊慎廣州人河南官氏志伊婁氏改為伊氏後魏有伊婁馛代人郗出自己姓青陽氏之後蘇忿支孫封郗邑因氏焉趙有郗疵高平金鄉秦末郗氏自晉陽徙高平蜀有郗正偃師人漢魏之際司徒郗慮慮元孫晉太宰南昌公鑒生超超生愔鑒五代孫曄女為梁武皇后唐庶子昂蓋其後也生士美澤潞節度也祁帝堯伊祁氏之後左傳晉大夫祁奚生午午生盈生勝姓苑云今扶風有此姓唐刑部員外郎祁順樂陵祁順之後居滄州師風俗通師樂人瞽者稱晉有師曠魯有師乙晉師悝師觸師蠲琅琊東武漢丞相高樂侯師丹後漢師宜官案師宜官別為師宜氏工書晉石勒為師歡奴案晉書載記師歡茬平人歡作歡資黃帝之後食采益州資中因以為氏陳留風俗通資成陳留人飢左傳殷人七族有飢氏案左傳飢氏作飢尸漢書尸佼晉人為商君師著尸子風俗通云其先封于尸鄉故為尸氏齊相有尸臣案廣韻注晉人作秦人嫘出自西陵氏女嫘祖為黃帝妃後世以嫘為氏蜀有刁達之後避難改焉案廣韻注作刁逵非刁達麋楚大夫受封南郡麋亭因以為姓東海朐山漢有麋敬蜀志有麋竺生芳案蜀志作竺弟芳宋有麋勗之又麋信撰説要注榖梁案麋姓之麋一作糜字邳左傳晉大夫邳鄭邳豹案左傳邳鄭邳豹俱不從邑信都風俗通云奚仲為夏車正自薛封邳其後為氏後漢二十八將有衛尉信都邳彤丕左傳魯桓公丕之後以王父名為姓其後有丕無還案魯桓公名允此作丕誤且亦不得為丕氏所自出通志及急就篇俱作晉大夫丕鄭父子豹之後丕亦作丕又徐廣曰桓公名軌伊婁後魏獻帝與䣚第六弟為伊婁氏為十姓因官氏焉河南後魏徐州刺史濟南公伊婁信生伊婁公公生彥恭隋武侯大將軍濟陽公生明傑唐鄆州長史九真男生大辨大昌祁夜鄭公子且食采開封因氏焉鄭大夫祁夜狐師子世本鄭有師子濮漢有北平太守師子將師祈左傳楚有師祈犂漢有郎中師祈光師宜後漢有南陽人師宜官夷鼓英賢傳黃帝子夷鼓之後見國語秦大夫有夷鼓德宜夷門史記魏隱士侯嬴為夷門監者因氏焉尸遂姓氏英賢傳云南胸奴尸逐鞮裔孫尸遂降漢以國為氏葵仲蔡叔子葵仲胡之後趙時有葵仲其時齊有賢人時子著書見孟子新論有時農巨鹿魏有壽春令時苗後趙有謁者僕射時軌姓苑云並巨鹿人也陳留唐登州刺史時德睿世居汴州尉氏曾孫元佐潁州刺史怡本姓墨臺孤竹君之後因避事改焉後魏有怡寬遼西人生峰後周樂陵公生昂鄀公光清河公旗風俗通楚大夫居旗思城因以為氏蘄漢有弘農太守蘄良姓苑云蘄春侯之後貍左傳八元季貍之後災見姓苑北海孔融集災壯青州人治出何氏纂要文音遲蚩蚩尤之後以國為姓慈高陽氏才子之後美其宣慈惠和因以為姓司馬重黎之後唐虞夏商代掌天地周宣王時裔孫程伯休父為司馬克平徐方錫以官族在趙者曰凱以傳劍知名蒯聵其後也在秦者司馬錯孫靳孫昌生無懌無懌生喜喜生談太史公生遷漢中書令據祕笈新書改河內溫縣蒯聵元孫邛為趙將封武信君案司馬邛為趙武臣將武臣封武信君此作邛封武信君誤項羽封邛為殷王漢以其地為河內郡子孫家焉孫楷漢武都太守孫鈞後漢征西將軍曾孫防京兆尹生郎懿孚馗七代孫楚之後魏封琅琊王馗六代孫叔璠後魏冠軍將軍汝南王亮五代孫景之後魏蒼梧公琅琊冠軍蒼梧號三祖司馬氏琅琊王楚之即彭城王歡六代孫也楚之曾孫裔裔曾孫元祚唐庫部郎中生希奭希象希奭明堂尉生鍠銓鐵鍠吏部黃門中書三侍郎京兆尹生蒼錘益錘魏郡太守銓庫部郎中生望希象生爵郎中元祚再從子承禎字子益天白道士有高行元祚四從子仁節大理評事生晧曜曜曹州刺史蒼梧公景之七代孫思溫唐左衛長史冠軍房子孫無聞亮生南頓王宋過江令號江南司馬氏宗八代孫宅相太子洗馬生遜晉譙剛王七代孫筠賢筠梁尚書左丞賢孫待徵唐撫州刺史兄子利賓雲中北齊司空司馬子如稱晉南陽王模七代孫也兄子瑞吏部尚書幼之大理卿瑞生同遊侍中又刑部侍郎司馬逸容稱琅琊王馗後魏都官員外郎喬鄉鄠縣人也司徒帝王世紀曰舜為堯司徒支孫氏焉衛文公生公子其許之後案衛有司徒瞞成此公子其許未詳為司徒氏宋邊卭為其司徒後氏焉陳成公子亦司徒氏漢有安平相司徒肅中謁者司徒發禹為堯司徒支孫氏焉帝堯後有隰叔案凡下疑有脫誤孫司徒發仕為晉司徒因氏焉晉大夫號司徒季子京兆上元潤州刺史司徒襲成云河內入署虞部郎中孫圖司城世本云宋戴公生東鄉克孫樂喜為司城氏陳哀公子邾勝之後亦為司城氏司寇世本云衛靈公子郢子孫為司寇亥之後風俗通蘇忿生為司寇其後氏焉禮記惠子魯大夫司功世本晉大夫司功景子其先士丐也因官氏焉周有太史司功騎司揭古今人表有司揭拘又司揭扶楚靈王大夫見韓非子司工周宣王時司工錡因官氏焉綦毋左傳晉大夫綦毋張風俗通漢有廷尉綦毋參戰國策綦毋子與公孫龍爭辨會稽後漢綦毋俊為會稽主簿因居焉後漢交趾刺史綦毋誾與荀爽事陳太邱魏有綦毋廣明與管寧為友晉有綦毋倪江左有綦毋遂為邵陽太守前趙有綦毋達為特進呂都公綦毋珍之為中書舍人南康開元右拾遺綦毋潛虔州人又北齊有信州刺史綦毋懷文入藝術傳綦連代北人號綦連部因氏焉期引西秦録記乞伏氏與期引氏自漢北出陰山案晉載記乞伏之先與如弗斯出連叱盧三部自漢北出陰山無期引氏又國仁以斯引烏堡為佐輔將軍當以斯引為正此期引誤也熙氏英賢傳帝佶使元冥為水正熙氏佐之為氏焉釐子偃姓之後僖公二年徐滅釐子子孫氏焉茲毋左傳齊大夫茲毋還漢有侍御史茲毋恆韋顓頊氏之後大彭為夏諸侯彭子受封豕韋周赧王滅之以國為氏因家彭城至孟又遷魯京兆杜陵孟元孫賢漢丞相扶陽侯徙京兆杜陵生元成七代孫胄魏安城侯生二子潛號西眷穆號東眷西眷潛八代孫周平齊公瑱生師師孫弘敏太府卿平章事從父仁爽鳳州刺史素立主爵員外案唐世系表弘敏仁爽素仁立皆兄弟與此不合爽兄子容成卭州刺史素立兄孫瑤果州刺史弘敏從祖兄懷質光祿卿懹敬右領將軍生知藝儀州刺史案唐世系表儀州作襄州懷質孫皓陰平太守曾孫漸陵州刺史生宗禮審規懷質堂弟匡素和州刺史孫洽考功郎中洽生收瑤再從姪屺宋州刺史瑱三從兄法保周安國公孫繪唐倉部員外保兄子武威邵州刺史東眷穆八代孫旭長子逍遙公敻生康洸恭案恭字下脫頤仁基二人又恭唐世系表作瓘藝沖約康隋吏部尚書生福嗣福獎嗣生悰憬悰御史中丞憬吏部郎中元孫啓肇班啓左補闕生𩇕肇吏部侍郎生綬貫之纏綬左常侍致仕貫之中書舍人案唐書貫之相穆宗纏吏部員外衢州刺史生汭肇三從弟乾度豪州刺史福獎生寡尤洋州刺史寡尤生璋珍璋湖州刺史案唐世系表璋生籯金籯金生黃裳孫黃裳升州刺史兼中丞採訪使洸隋廣州總管襄陽公生協協生仲鋭金部郎中鋭孫良嗣案唐世系表仲鋭弟叔鋭生良嗣良嗣生文彥與此不合給事中生禎給事中京兆少尹知府事恭隋安州總管生萬頃仁基萬頃生元整曹州刺史頤孫晤元戶部郎中仁基龍州刺史生元祚哲元祚司門郎中曾孫霸吏部郎中汝州牧祚元孫儹案唐世系表祚元孫儹作五世孫駕部郎中哲元孫輔元生厚叔案唐世系表輔元作元輔厚叔作原叔藝周齊州刺史魏興懷公生彤或晏宣敏彤生彥師彥方師撫州牧生承徽忠州刺史彥方生徵同徵生衡衍衢衡原州都督生寂左司郎太府少卿寂生峴嶴案嶴唐世系表作嶼岵嵫衍孫萬案唐世系表衍孫作衍子兼監察御史萬生處厚拾遺案唐書處厚相文宗衍少子京富平令衢殿中監間廄使同密州刺史生衎右驍衛將軍衎生少華太府卿或生元方禮部郎中晏孫希仲刑部郎中宗正太常卿扶陽公希仲生景先揚先曾先案唐世系表曾先作胄先象先景先湖州刺史揚先拾遺曾先殿中侍御史象先生珣將作少監通事舍人宣敏生嶠秋官侍郎嶠生友直友諒友清友直司門郎中友清生郯坊州刺史沖隋戶部尚書義豐公聘陳生挺德運挺御史大夫生待價履冰興宗萬石待價左僕射扶陽公生令儀案唐世系表此下尚有烈一人司門郎中梁州都督令儀生鑒鑾錡鎔鎰鑾生應物蘇州刺史應物生慶復鎔生擊嶽州刺史鎰監察御史生武兵部侍郎生京京兆尹案唐世系表武為京兆尹後無人此作生京或因京兆字誤未詳烈曾孫弘景司門員外郎翰林學士興宗生令望令悌令裕令望生叔卿丹州刺史叔卿生浣滌浣昭應令滌饒州刺史令悌孫泛江州刺史令裕屯田員外萬石吏部郎中太常少卿知吏部選德運生山甫吉甫山甫屯田郎中吉甫司門郎中生案生字疑衍約隋儀同觀城公生克己後已克己生遙光萬年