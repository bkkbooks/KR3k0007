body:
  text: 二十一欣殷子姓成湯國號也二十四代三十四王六百二十九年為周所滅子孫以國為姓秦末居河內野王漢初遷汝南陳郡長平縣漢北地太守殷續始居長平魏有褒生昱昱生敞過江六代孫高明生不害不占不佞不害孫開山唐吏部尚書鄖節公開山姪元嗣文州刺史開山堂姪祚部尚書堂姪日用宣歙州觀察御史中丞不占孫聞禮太子中書舍人生令名令德令言令威令名金部郎中國子司業生容冬官郎中容生丞業宗正少卿令德曾孫嘉紹工書嘉紹再從弟佐明倉部郎中令言孫踐猷生寅永寧尉寅生亮給事中杭州刺史駕部郎中不佞生芉唐東宮學士孫躋融生浩師師生仲堪堪元孫鈞梁五兵尚書有傳曾孫藹唐蜀文學元左傳衛大夫元咺之後其先食采於元因氏焉今元城是也其後子孫無聞河南洛陽縣後魏書官氏志曰拓拔氏改為元氏自云黃帝子昌意之後居北土代為鮮卑君長宋書云李陵之後昌意三十九代至昭成帝什翼犍始號代王都雲中道武改號魏即尊號孝文帝都洛陽改為元氏十一代十五帝一百六十一年為後周所滅獻明帝生實壽鳩紇根翰力真閼婆常山王壽鳩生遵遵生素達素達生羽鄰忠倍斤尉貨敦菩薩淑羽鄰曾孫文遙北齊左僕射生行恭行恕行恭隋主爵侍郎行恕隋毛州司馬生務整務真務整唐兵部郎中生知敬知默知敬吏部郎中知默主客員外務真工部侍郎生知讓虞部郎中太府少卿讓生昭晊暕曉曖晊侍御史暕尚書右丞右常侍生宰寬實曖生寓忠寓忠生盛壽興盛生懋左僕射北地王孫煥隋工部侍郎煥生公姬公姬生大士唐吏部中書二侍郎大士生逖邃逵遜遜司門郎中生季良比部郎中仙州刺史季良生縯縯生撥兼殿中御史逵生子恭潭州司倉恭生澥全柔澥生敦義潮州刺史全柔御史中丞黔中觀察兼御史大夫曾孫虛受朗州刺史生野順濮陽王野順生雄雄生胄右衛大將軍朗陵公胄生仁惠懷簡懷節懷景懷簡吏部員外懷節孫煒懷景尚書右丞武陵公生彥將軍令暉令生子柔子求彥將給事中陳留太守採訪使生子上子哲子長子長壽興公孫詮生祐禮臣祐曾孫孝綽梓州刺史禮臣汾州刺史懷節孫待聘生琇戶部侍郎右丞生佑工部員外郎壽興少子勗司徒樂平王生亶亶生文豪太僕少卿生思齊思哲思元思齊鄭州刺史思哲舒州刺史思元右領軍思元生直南州刺史倍斤生昭昭生元綱元曾孫雍江州刺史無汦榮州刺史綱生經經生弘嗣弘則弘嗣隋黃門侍郎生仁人觀觀易州刺史右武衛將軍生博古述古述古孫晧弘嗣姪孫希古都官員外孫祥生子端子建子端生善慶師獎善慶孫慈不仕生行沖兵部郎中國子祭酒左常侍中山獻公生允殖允修允殖和州刺史生軾貨敦元孫德整生寶藏寶林寶藏魏州總管武陽公生神霽青州刺史寶林生威洛州總管生守真守真生澄湛澄遂州刺史湛生誼饒州刺史誼生申右武衛將軍申生諸兵部員外諸生從質質生谷菩薩趙郡王孫裕生武榮武幹武榮唐汾州刺史蘄春公曾孫湛試太府卿兼河南尹衡州刺史武幹生大簡陝州長史女為讓帝妃贈少師淑生季海振季海馮翊王司空振六代孫光嫌考功郎中給事中紇根生虔陳留王孫建生琛永壽琛孫暉隋兵部尚書暉生仁器永壽生景安北齊太保賜姓高周復本姓孫慈政唐邛州刺史生善應司賓卿同州刺史翰秦王生儀觚儀七代孫公瞻駕部員外郎觚十一代孫撝謙兼御史三從兄杭少府少監力真生意烈勃意烈生伏千廣川王元孫公濟濟孫福果福果生江乘江乘生攸勃元孫植生巖成巖隋兵部尚書平昌公生琳琳生義恭義端義恭生孝節工部員外黃州刺史生通理希聲通理給事中生從備右司員外郎壽州刺史從修生至河南少尹希聲中書舍人吏部侍郎生寄壽州刺史義端魏州刺史生延壽延福延景延祚延壽睦州刺史生愷通州刺史延福生怡怡生偕伾偉偕歸州刺史偉三原尉延景生俳南頓丞俳生寬霄寬比部郎中生拒楨監察御史霄侍御史延祚司議郎生平叔綿州長史生挹撝持挹吏部員外生注洪錫錫生繇銑洪饒州刺史生晦撝太常博士持都官郎中太武帝生景穆帝嗣王生天賜子推新成雲休楨胡兒天賜汝陰王殿侍中生尚書循義案魏書循義作修義右僕射安昌王均孝則孝矩孝方孝整孝則周少師生案此處脫名隋太府卿孝矩隋洛州總管洵陽公生端竭孝方順陽公生韶震韶唐沙州刺史震鄭州刺史京兆王子推生恆芝中書監生升暹升江夏王孫孝直渝州刺史暹生澤唐梁州都督新安王生禮誠大智誠生懷式撫州刺史大智生萬頃光賓觀賓萬頃鳳閣侍郎光賓生詢倩倩生正兼監察御史正生義方季方義方鄜坊觀察兼御史中丞季方兵部侍郎觀賓少府少監陽平王新成生衍安匡衍廬陵王生叔暢祠部尚書元孫仁虔疊州刺史仁虔生思忠思忠生權廬州刺史權生涉潮泚液液懷州刺史生銅銛銛生宗簡叔暢六代孫邱比部員外任城王雲生淑紀淑左僕射紀黃門侍郎曾孫旻左武衛大將軍安定王休生燮孫景山唐安州總管宋安公生成壽青州刺史南安王楨孫聘東海王梁武帝立之號建安王曾孫武壽左武衛將軍樂陵王胡兒以天賜子永全繼永全曾孫斌生文儼文俊文儼生利貞鄜州刺史文俊辰州刺史道武帝生淮南王熙熙曾孫繼江陽王生乂羅乂侍中尚書郎羅曾孫靈遵通州別駕明元帝晃案魏書明元帝名嗣晃乃太武帝之太子景穆帝此作明元帝晃與魏書不合生範樂安王生良良生法益滕欣法益梁侍中生願達梁州刺史願達生神力神儼案此下疑脫善微一人神威律師神力蒲州總管神儼右衛郎將善微右領軍將軍神威杭州刺史律師左驍衛大將軍滕安樂王吏部尚書生榮榮生康慎慎生端端生欽志儉欽荊州刺史元孫彥英藇志儉蘇州刺史成安公慎生禕均禕六代孫時中均曾孫思溫鄜州刺史平陰公生若拙德秀若拙江夏令生亙宣楚等州刺史將作監德秀魯山令均少子爽隴州刺史欣孫通隋魏州刺史生雄純雄生元敬襄州刺史純邛州刺史太武帝燾生臨淮王太尉談談生提建提生祐孚祐孫義遐光祿少卿生仁昉工部員外孚生子端仲仁子端周納言元孫將茂主客郎中仲仁生將旦莒州刺史建七代孫思莊侍御史獻文帝弘生禧幹雍羽協咸陽王禧趙郡王幹元孫元景左衛率高陽王雍生斌端廣陵王羽生欣周上柱國孫巖隋龍涸公羽少子恭憫帝彭城王協生懿七代孫鼎思州刺史攸孝莊帝生安樂王長樂長樂生銓五代孫師獎鄯州刺史孝文帝弘生廣平王懷五代孫寶綝綏州刺史韓公生顧道明堂令文帝鬱律生烏孤平陽王樂真五代孫孝政隋衡州刺史生仲文季梁仲文唐右領軍將軍河南公季良隋雍州司馬生懷唐恆州別駕懷生令表令本令表工部侍郎司賓卿生欽俗匡欽俗都官郎中京兆少尹令本生欽微樂真次子陵孫案此處脫名莘山王贄大司馬孫德瑜生千祿鍾離縣令太原唐都官郎中元善禕稱昭成帝後南宮故事云代居太原著姓禕曾孫谷神扶州刺史堂姪俯宋州刺史元孫結容府經略兼中丞生友直為京兆少府紇骨元後魏獻帝與淑長元匹麟為紇骨氏十七代孫紹右司員外天授中詔改姓元氏是云元隋內史令元壽狀稱景帝後任城王澄子孫避爾朱榮亂投匿是云家因從其姓至隋改姓元氏壽孫元哲開州刺史元質水部郎中生兆殷暢暢生韶河陽節度中丞扶風大曆中書侍郎平章事潁川公元載自云景穆後父景升同敬同案唐書載本寒微母攜載適景升冒姓元氏此脫並不仕代居扶風岐山本姓景氏或云孫姐氏垂拱初曹王明妃元氏粉田在扶風令畀董其農植著勞遂改姓元氏生伯和祕書丞仲武祠部員外季能校書郎袁媯姓舜後陳胡公滿之後胡公生申公申公生靖伯庚庚生季子惛惛生仲牛甫甫七代孫莊伯生諸字伯爰孫宣仲濤塗以王父字為氏代為上卿據祕笈新書及唐世系表增字或作爰轅其實一也轅頗十一代孫袁生陳郡夏陽縣袁生元孫幹封貴鄉侯居陳郡為著姓八代孫良生昌昌生安安生京敞京生陽案唐世系表良二子昌璋此脫璋京生陽陽字作湯陽生逢隗四代五公盛於東漢璋生滂司徒滂生渙渙生侃侃六代孫弘準曾孫質生弘豹弘元孫翻翻生叔德豹生洵濯淑濯生棨洵生顓顓生昂昂生君政敬君政生樞憲樞生朗唐給事中憲曾孫續駕部郎中敬孫利貞員外郎袁氏自後漢魏晉至梁陳正傳世二十八人三公令僕一十七人汝南安後又居汝南至紹術絶矣彭城袁生之後今無聞樂陵東光縣狀稱紹中子熙之後裔孫令喜唐同州治中生異弘異式異弘瀘府參軍生恕己中書令南陽王誨己潞州刺史恕己生建康淮陽太守生高給事中高生德御度支職方郎中太府少卿異式戶部郎中異式姪曾孫倜稱案唐世系表倜稱皆異式孫無姪曾字倜工部員外郎生師儉京兆狀云渙之後唐舒州刺史處弘生公瑜公玘玘生暉中書舍人公瑜刑部侍郎生忠臣仲將忠臣左羽林將軍潁州刺史公瑜孫守一監察御史華陰隋左衛將軍袁溫案唐世系表袁溫稱作袁子溫渙之後因官居華陰生士政唐南州刺史曾孫曄丹州咸寧令生滋中書侍郎鄭滑節度生都郊河東唐秋官尚書同三品太原侯袁智弘狀云本陳郡人孫浣兼御史中丞襄陽狀云袁術敗後子孫分散因居襄陽唐尚書左丞袁仁敬又祕書少監致仕袁歆膳部郎中同直左拾遺袁瓘宋州樊周太王子虞仲支孫為周卿士食采於樊因命氏今河內陽樊是也周有樊穆仲字山甫樊仲皮樊齊並其後又殷人七族有樊氏仲尼弟子遲魯人蓋其後南陽湖陽縣樊齊之後漢有舞陽侯樊噲曾孫嘉為南陽太守因家焉後漢有樊重子弘封壽張侯重乃光武外祖也一宗五侯晉永嘉南遷樊氏居淮南裔孫南齊廣平太守道理生方興梁同州刺史魚復侯方興生文熾新蔡侯文熾生靖猛毅毅陳護軍逍遙公猛陳荊州刺史富川侯生逵邃迪邃生慶德唐左司郎中千牛將軍逵孫文司衛少卿文孫晃兵部員外潤州刺史弘裔孫詠制舉及弟今止河東生澤檢校右僕射襄陽節度生宗師宗易左監門中郎樊思賢稱逵後今止江陵生沈沇遂州別駕生紬左補闕廬江樊弘之後晉有樊僧遠始居廬江裔孫道則梁越州刺史生儒北齊仁州刺史儒生子車隋戶部尚書齊國公孫思孝唐亳州刺史生忱憛忱戶部尚書生稟萬年丞憛蜀州刺史沛國樊噲之後今無聞諸郡諫議大夫樊系潤州人吏部員外樊元表監察御史樊衡並相州安陽人屯田郎中樊朏洛陽人原周文王第十六子原伯之後封在河內子孫氏焉周有原莊公原伯魯畿內諸侯也魯人原壤陳有原仲晉原軫亦為原氏魯郡兗州今有原氏仲尼弟子憲之後南陽漢有漢陽太守原陽南陽太守原季自陽翟徙茂陵生涉天水太守葬父南陽子孫因居之源後魏同出代北其先聖武帝誥汾長子匹孤七代孫禿髮傉檀生賀歸後魏至太尉隴西王魏太武帝曰卿與朕同源因賜姓源氏賀生懷尚書令隴西王生子雍西平樂都官縣案北史源子雍官樂平縣公北討都督此脫誤周隋之際居鄴郡安陽懷後子雍子恭生師並有傳師生崑玉直心誠心崑玉比部郎中生翁歸翁歸生循業少府少監生光裕光垂光賓光譽光裕左丞刑戶二侍郎光垂同州刺史光譽戶部侍郎京兆尹光裕生洧給事中江陵節度採訪留後使譽生休直心尚書左丞司刑太常伯生乾珍乾曜乾曜侍中左丞相安陽公自師三代左丞四子復弼潔清復兵部郎中華州刺史弼工部郎中潔河南令清駙馬誠心洛州司馬生禕匡贊乾珍生匡度黃州刺史臨漳公匡度生安都太原少尹禕吏部