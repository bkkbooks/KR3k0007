南六姓案後漢書盤瓠作槃瓠莞姓苑云吳人音宮關風俗通云關令尹喜之後一云出自夏大夫關龍逢之後漢長水校尉關陽蜀前將軍漢壽亭侯關羽字雲長河東關羽代居解縣羽子興侍中河東狀稱關羽之後唐中書侍郎平章事右僕射致仕關播顏顓頊之後陸終第五子曰安為曹姓裔孫挾周武王封邾至武公字顏公羊謂之顏公子孫因以為氏出圈稱陳留風俗傳及葛洪要字又王儉譜云出自魯侯伯禽支庶食采顏邑因氏焉真卿尚書譜云未驗何所憑案真卿語作未知儉何所憑此誤今依圈葛二家及舊譜為定仲尼弟子達者八人路回僕噲何祖辛也案朱彝尊孔子弟子考顏氏弟子達者八人路回之僕子何噲幸子相高八人也缺高一人又幸或作辛通典作柳咸淳臨安志作韋子相史記作祖見書傳顏叔子顏丁顏雛顏高顏息譜魯人顏子涿聚齊大夫子晉顏芝河間人生貞秦末藏孝經者也漢大司農顏異濟南人也顏駟江都人後漢袁紹將顏良琅琊江都後漢臨沂人魏徐州刺史顏盛始自魯琅琊曾孫含西平靖侯晉永嘉過江居丹陽生髦約髦生綝暢暢孫師伯宋侍中左僕射約孫延年光祿勳延年生竣測奐竣吏部尚書奐五兵尚書綝五代孫協生之儀之推之善之儀後周御史大夫平陽公五代孫溫之司門郎中之推北齊黃門侍郎生思魯愍楚遊秦思魯記室生師古相時勤禮為侍郎祕書監案此處脫名生趨庭職方郎中曾孫迢元孫庶相時秦府學士禮部侍郎生益期期曾孫交勤禮生顯甫顯甫生元孫惟貞元孫滁州刺史生杲卿常山太守贈太保司徒忠節公孫證右庶子生縱覽惟貞生允南真卿允臧允南司封郎中真卿工部尚書太保贈司徒魯文忠公允臧生熲楚州刺史育德元孫防同州刺史遊秦鄆州刺史生元勝右補闕之善孫有意沔州刺史真卿生䪻頵南昌狀云與師古同承綝唐虞部員外謨有生昭粹班𦍋姓楚若敖生鬭伯比伯比生令尹子文為獸所乳謂獸有文班因氏焉秦有班一避地樓煩生孺孺生長長生回回生況況生稚稚生彪扶風平陵況女為成帝婕妤徙平陵彪生固固生顓顓生澄陳祠部郎中班投始居汲郡狀稱十三代孫也挺元孫思簡唐春官員外生景倩吏部侍郎祕書監生鈞杭懸渙弘映榮弘戶部尚書生肅肅生震震夔州刺史環楚有環列之尹子孫氏焉楚有環泉案環泉本環淵避唐諱作泉漢有大守環饒晉環濟撰要略菅魯大夫食采於菅因氏焉趙郡趙州菅襲趙郡李氏譜云李睿娶晉郎中令同郡菅襲女唐乾元河東節度使菅崇嗣案唐書作管崇嗣此作菅字與史不合馯漢書馯臂吳人治易關龍夏桀時忠臣關龍逢之後顏成莊子有顏成子遊山周山師之官掌山林以官為氏風俗通云烈山氏之後漢武都太守山昱河南懷縣山昱之後漢宣元時臨潁侯山君真生儒始自潁川徙陳留五代孫若公後漢巨鹿太守徙河內八代孫輝魏宛句令生濤字巨源晉吏部尚書司徒新杏侯案晉書濤贈新杏伯此誤生簡左僕射生遐東陽太守河南官氏志吐難氏改為山氏後魏中書令河東伯山偉生子深子渾渾生顆唐左武衛將軍間見姓苑
