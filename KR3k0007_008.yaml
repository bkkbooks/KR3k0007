body:
  text: 一先燕弘農燕氏廣念燕氏皆漢以來自范陽徙居者天莊子有天根注云人姓名縣風俗通云縣成父孔子門人見史記案孔子弟子縣子成字子祺今家語作子橫又有縣亶父字子象見廣韻注又亶史記索隱作豐家語無父字此作縣成父誤漢甘陵相縣芝吳中書令縣點先穀晉先穀之後氏焉肩吾莊子肩吾古賢者也晉袁弘集有東海太守肩吾氏涓濁呂氏春秋夏首人涓濁梁善畏明失氣而卒案涓濁又作羌憲填潰莊子有赤張滿案此條誤移于此詳二十二昔赤張姓下錢顓頊曾孫陸終生彭祖孫孚周錢上氏因官命氏焉戰國時有隱士錢丹秦有御史大夫錢産子孫居下邳祕笈新書宣魯叔孫宣伯之後案宣氏應劭風俗通為宋宣公之後鮮鮮于氏之後或單姓權楚鬭緡之後為權氏連齊大夫連稱後綿晉大夫食采綿上子孫氏焉偏古有偏軍案下有脫誤鮮于箕子封于朝鮮支子仲食采於于子孫因合鮮于為氏漁陽後漢有京光尹鮮于裒魏志有太尉從事鮮于案劉虞從事有鮮于輔後事漢為度遼將軍此脫名當即輔也後拜度遼將軍北齊有鮮于榮案齊書鮮于世榮此避唐諱闕世字領軍將軍封夷陽王判右僕射後周懷州刺史鮮于緒生明唐蒲州刺史定襄公生匡濟匡紹匡濟左騎將軍匡紹閬同河利四州刺史生建業建宗閬中京兆尹劍南節度鮮于仲通云匡紹曾孫也居閬中鮮于偃鮮于惠子鮮于且于延陵吳王子季札居延陵因氏焉趙襄子有謀臣延陵正是其後也案韓非子趙襄子時有延陵生延州吳季札封延州來氏焉連尹楚大夫連尹襄老大之後蕭宋微子之後支孫封於蕭蕭叔大心子孫有功因邑命氏焉代居豐沛至不疑為楚申君之客祕笈新書廖風俗通古有廖叔安左傳作飂蓋其後也祕笈新書姚虞舜生於姚墟子孫以姚為氏左傳鄭大夫姚句耳漢有諫議大夫姚平舜後胡公封陳至敬仲仕齊又為田氏至田豐王莽封為代睦侯奉舜後子恢避王莽亂過江居吳郡改媯氏五代孫敷又立姚氏祕笈新書條今冤句有此姓冤句曹州也氏族志椒楚大夫越椒之後銚潁川郯陽後漢衛尉安陽侯銚期朝臣日本國使臣朝臣真人長安中拜司膳卿同正朝臣大父拜率更令同正朝臣姓也包楚大夫申包胥之後以王父字因氏之祕笈新書匏盤匏之後案高辛氏時有槃瓠此作盤匏未詳所自廣韻此字下亦不云姓茅夷邾大夫茅夷鴻之後見左傳高齊太公六代孫文公子高孫傒以王父字為氏祕笈新書毛周文王第九子毛伯受封毛國因以為氏支孫為周卿士毛伯過毛伯得並毛公之後也趙有毛遂漢有毛公治詩趙人也為河間王博士毛萇亦治詩為詁訓祕笈新書曹顓頊元孫陸終第五子安為曹氏至曹挾周武王封之於邾為楚所滅遂復曹氏周文王第十三子振鐸封曹亦為曹氏因宋所滅子孫以為氏祕笈新書皋望出廣陵高陵秦昭王弟封高陵因氏焉漢有陳大夫高陵顯高堂風俗通齊卿高敬仲食采于堂因氏焉高車即九姓回鶻種類也入中國者號高車氏後魏有高車解如陶叔周司徒陶叔之後晉有陶叔真為原大夫文公時陶叔孤漢有陶叔卷為青州主簿氏族略作青州刺史平原今平原有此姓陶邱帝堯子居陶邱因氏焉皋落漢武帝時皋落閔通天文地理及曆數案此疑即因落下閎訛以落下為皋落巴郡閬中神仙傳有皋落案此下脫名曹邱漢季布傳有曹邱生毛渾祝融子毛渾之後羅祝融之後妘姓國初封宣城徙岷江周末居長沙漢有梁相羅懷襄陽記有羅象據祕笈新書增羅氏有齊郡襄陽河東三族官氏志叱羅氏改為羅氏祕笈新書何周成王弟唐叔虞裔孫韓王安為秦所滅子孫分散江淮間音以韓為何遂為何氏祕笈新書哥舒突騎施本號西突厥首領有哥舒部氏焉唐有清道率哥舒沮代居安西生道元安西副都尉生翰天寶右僕射平章事西平王東討先鋒兵馬副元帥生曜晃曄曄尚書東郡汝州節度使案唐書曜官尚書汝州節度使此作曄誤曄官慶州刺史御史大夫峘大理主簿峘生皓試案唐書皓試太常卿兼御史中丞蓋皓初試為此官試非名也阿蹊九姓阿蹊部為雞田州都督今單于都護振武節度兼御史大夫阿蹊光進元和二年詔賜姓李氏名光顏陳許節度弟光嗣洛州刺史案阿蹊唐書及通志皆作阿跌亦曰訶嘻或為𫏅跌此疑誤阿單改為單氏阿邱楚有阿邱子後魏殿中將軍阿邱及敦又列威將軍阿邱寄阿史那夏后氏後居涓兜牟山北人呼為突厥窟歷魏晉十代為君長後屬蠕蠕阿史那最為首領後周末遂滅蠕蠕霸強北土蓋百餘年至處羅蘇尼失等歸化號阿史那開元改為史並具史注長安右衛大將軍寅國阿史那忠節左驍騎大將軍阿史那大節上貞元神策將軍兼御史大夫阿史那思暕並其支族阿史德突厥如善可汗之裔別號阿史德通天司賓卿浣海侯阿史德元𤪙右武衛大將軍阿史德多覽並其後也阿伏干改為阿氏波斯西域國人婆衍見姓苑沙今東莞有沙氏風俗通晉有沙廣又百濟八族其一曰沙族氏族略諸越大夫諸稽郢之後佘今洪州有佘氏沙吒北蕃酋帥舍利部大人因氏焉龍朔中右威衛大將軍沙吒阿博曾孫葛旃兼御史大夫賜姓李氏名奉國從兄弟澄武衛大將軍沙陀北蕃酋帥也神龍驍衛大將軍郕國公沙陀忠儀案通志作沙陀義蛇邱見英賢傳濟北河漢河內太守蛇邱惑生重濟北太守女適羊續迦葉西域天竺人貞元涇原大將試太常卿迦葉濟瓜田王莽時臨淮瓜田儀為盜賊楊周武王第三子唐叔虞之後至晉出公遜於齊生伯僑歸周天子封為楊侯子孫以國為氏一云周宣王曾孫封楊為晉所滅其後為氏焉或曰周景王之後楊雄自敘云伯僑不知周何別也祕笈新書梁嬴姓伯益之後秦仲有功周平王封其少子康於夏陽是為梁伯後為秦所滅子孫以國為氏晉有梁益耳梁弘梁由靡並其後也安定烏氏漢初以豪族自河東徙烏氏祕笈新書章薑姓齊太公支孫封鄣左傳齊人降鄣子孫改為章氏章子齊威王將祕笈新書薑炎帝生於薑水因氏焉生太公封齊為田和所滅子孫分散後為薑氏祕笈新書天水上邽漢初以豪族徙關中遂居天水祕笈新書張黃帝第五子青陽生揮為弓正觀弧星始制弓矢主祀弧星因姓張氏祕笈新書常衛康叔支孫封常邑因氏之一云黃帝常先後祕笈新書王王姓出太原琅邪周靈王太子晉之後北海陳留齊王田和之後東海出姬姓畢公高之後高平京兆魏信陵君之後天水新平新蔡新野山陽中山章武東萊河東者殷王子比干子孫號王氏唐王宗隋末改王氏祕笈新書強苻秦録強永強帛姚秦強起斌西陽侯強景並略陽人也扶風唐兵部郎中強寶質孫修御史中丞戶部侍郎其先略陽人也商衛鞅封商君子孫氏焉陽邱楚大夫食邑陽邱以為氏王孫周有王孫滿衛有王孫賈楚有王孫由于漢貨殖王孫大卿陳留耆舊有王孫骨治三禮為博士秦有夏大夫王孫氏始皇時王孫謀王子周大夫王子狐王子城父之後漢有王子中同治尚書王叔周有王叔陳生楚恭王時大夫王叔學鄭穆公時王叔明王官晉有王官無地楚有王官子羽為沄邑大夫將匠風俗通漢官有將匠少府因為氏吳中散大夫將匠或曲陽令將匠熙晉侍御史將匠進梁太史令將匠道秀將閭漢書藝文志云將閭子名菟著書見莊子將巨漢藝文志云六國時將巨彰著子書五篇漢章帝時謁者將巨彌相里咎繇之後為理氏殷末理微案理氏之先有理徵此作微孫仲師遭難去王姓里至晉大夫里克惠公所滅克妻司成氏攜少子李連逃居相城因為相里氏李連元孫相里勤見莊子韓子云相里子古賢也著書七篇漢有河隄謁者相里斥案漢有河隄謁者相里平此恐誤侍書御史相里武案唐志本名虎此避唐諱作武濟陰太守相里祉始居河西前趙録將軍相里覽梁有相里係孫元本仕索虜東平王侍郎大通二年歸化西河隰城相里祉始居焉今汾州相里城是也魏郡冠氏縣祉十一代孫後魏清河太守洛干侯相里僧伽因封始居冠氏縣五代孫諶唐梁卿令潞城公生元亮元將唐棣州刺史曾孫造唐河南少尹生友弘友諒友諒廣陵博士造弟迥太子中允生友略試校書卿梁邱齊大夫食采梁邱因氏焉景公時有梁邱據琅琊諸縣梁于晉下軍御梁餘子養之後衛人也亦作梁于氏梁成漢昭帝時梁成恢善天文梁其魯大夫梁其脛之後英賢傳云魯公伯禽庶子梁其之裔梁由晉有梁由靡漢有將軍梁由先安帝時人梁可後魏上谷公梁可頭又代郡太守梁可浪強梁世本衛將軍文子生慎子會生強梁因氏焉秦有左庶長校尉強梁皋強牟衛大夫王孫強牟之後見史記商邱衛大夫食邑商邱因氏焉漢有御史大夫秺商邱成高邑列仙傳有商邱子胥商密楚大夫以地為氏方叔鼓方叔之後見世本漢功臣新壽侯方叔無咎羌憲呂氏春秋夏首南人羌憲梁善畏明失氣而卒常壽英賢傳有熊氏之後世本宋大夫景公時有常壽邦長仲見纂要山陽後漢尚書郎仲長統著昌言案仲長統不姓長仲誤代居高平晉太宰參軍長仲穀著山陽先賢傳長盧列子楚賢者長盧子著書九篇𣄸長狄鄋瞞長狄之後復姓長梧莊子有長梧子唐帝堯陶唐氏之後裔封唐侯又周成王封弟叔虞於唐子孫以國為姓又左傳唐成公國于比陽今唐唐州是也祕笈新書康衛康叔之孫以諡為姓也祕笈新書黃陸終之後受封守黃為楚所滅以國為氏祕笈新書杭後漢有杭徐丹陽太山都尉杭徐代居丹陽琅齋有琅過喪無定望唐相帝堯之允在周為唐相氏因以為姓焉皇甫子姓宋戴公之子充石字皇父子孫以王父字為氏漢興改父為甫後漢安定都尉皇甫攜生稜始居安定稜子彪有八子號八祖皇甫氏為著姓安定朝那縣彪七代孫軌五代孫璠生誕誕生無逸唐戶部尚書滑國公生吝吝溈州刺史生忠殿中監逸三從弟彬郎中祕書少監軌子少弘弘元孫和北齊海陵太守生聿道代居滎陽號鄭州皇甫道生萬齡屏度吏部郎中稜七代孫真真元孫椿齡居滎陽號山東皇甫椿齡生瑒瑒五代孫思義思智瑒考功員外生銛工部郎中又軌三從弟況生益興益五代孫元凱商州刺史生德驥蔡州刺史興六代孫公義工部侍郎四從姪思忠卭州刺史壽春稱與無逸同承晉廣魏太守固固子柴徙襄陽後又徙壽春唐黃門侍郎皇甫文房兄子鏡幾鄰幾知常希莊鏡幾生間案唐世系表間作恂間生嶽鄰幾洗馬生憬悰惜愈洛州長史案唐世系表洛州長史下有知常二字此脫生懌悟希莊生翼尚書左丞翼生準鎛宰相生煥案鎛乃愈子此系于希莊下誤又鎛子圭字德卿此作生煥誤中書舍人福建觀察使樂陵狀云晉徵士謐後安定徙滄州唐監察御史皇甫德參生宣過宣生伯瓊仲玉主爵郎中玉生侁尚書左丞生政浙東觀察使生教敏徹教工部員外郎徹蜀州刺史皇子莊子有皇子告教臧孫魯孝公子彄食采于臧因氏焉僖伯彄彄生哀伯達達生文仲辰辰生宣叔達達生武仲紇為臧孫氏案世本孝公生僖伯彄彄生哀伯達達生伯氏瓶瓶生文仲辰辰生宣叔許許生武仲紇此脫誤臧文魯大夫臧文仲後氏焉臧會魯大夫臧須伯會之後別為臧會氏案左傳臧為生昭伯昭伯從弟臧會會生賓如賓如生臧疇又臧石臧紇之昆弟臧堅紇之族皆見杜預注此須伯誤蒼頡論語楚隱者也其後為氏白象風俗通先生古隱者案此有脫誤蒼頡氏當是黃帝史官之後今馮翊縣人也風俗通曰頡衛古之賢人棠溪左傳吳王闔閭弟夫概王奔楚為棠溪氏漢書棠溪惠治公羊又五官中郎將棠溪典桑邱下邳有桑邱氏彭大彭為商諸侯以國為姓蓋陸終第三子彭祖即大彭也祕笈新書京相史記曰殷後