body:
  text: 一董董黃帝之後己姓國有飂叔安生董父舜賜姓董氏晉有董狐董安于據祕笈新書補漢有董仲舒清和廣川人後漢有犍為人案通志後漢有董宣董鈞宣陳留人鈞犍為人此蓋脫名晉為董京董養隴西漢江都相董仲舒少子安子孫自廣川徙隴西裔孫繇生昭昭七代孫德林北齊匡城令又居匡城曾孫寶亮安西都護隴州刺史天水公生元質元珍元質右監門將軍生憬忱慎恆惲憬軍器監生珣琬瑜琬度支郎中晉陵太守江南東道採訪使慎右常侍生璿恆通州刺史隋驍騎將軍順政公董純純孫恭訓唐海陵縣令弘農隋有隨州司馬董泚生慶慶生感感生敬元倉部郎中幽州刺史生庭琰河東狀云仲舒之後唐右僕射平章事董晉生全道溪全素澥全道殿中少監溪倉部郎中全素太子中書舍人案唐世系表澥太常寺太祝范陽京兆尹董叔經右史董思恭范陽人檢校司空平章事秦亦范陽人大曆賜姓李氏改名忠臣從朱泚反伏誅孔孔姓殷王帝乙長子微子啓受封于宋弟微仲衍曾孫愍公生弗父何何生宋父周周生世父勝勝生正考父正考父生孔父嘉子孫以王父字為氏孔父生子木金父木金父生睪夷父睪夷父生防叔仕魯為大夫生相夏夏生鄒叔梁紇紇生丘仲尼三歲父卒十九歲娶宋年官氏一歲生鯉字伯魚孔子為魯司寇攝相事居鄒昌平鄉闕里魯哀公十六年卒年七十二伯魚年五十先仲尼卒伯魚生伋字子思子思為魯穆公師作中庸及子思子四十七篇以祖業授弟子孟軻等伋生子上白白生子家求求元孫允為魏相生鮒為陳涉博士五代孫吉封宋公吉八代孫潛潛生竺吳南昌太守允次子騰騰生襄襄生忠忠生武安國案唐世系表武生延季大將軍太傅延季生霸武孫霸生漢丞相博山侯光會稽山陰後漢末潛避地會稽遂為郡人潛子竺生恬愈晉僕射餘不亭侯生誾安國誾生晉尚書令靖靖五代孫奐陳吏部尚書生紹安唐中書舍人生構構生若思禮部侍郎仲思給事中若思生至著作郎構弟楨禮部員外安國晉左僕射五代孫範陳都官尚書範從祖弟德仁仁孫唐端州刺史竺次子沖七代孫梁都官尚書休源源曾孫德紹德紹生唐膳部郎中昌太子賓客述睿述睿生敏行魯國武孫霸霸曾孫均漢封褒聖侯晉封奉聖侯魏封崇聖侯隋汴侯唐朝褒聖侯並奉孔子祀武德時均十六代孫褒聖侯德倫德倫曾孫褒聖侯齊卿仲尼三十八代孫下博狀云本出魯國十七祖漢下博侯陽因居冀州下博裔孫唐國子祭酒曲阜子穎達生志元志約志亮志元國子司業生惠元國子司業後拜春官侍郎生立言眘言立言祠部郎中眘言黃州刺史志約禮部郎中生琮洪州都督志亮中書舍人生圭穎達族元孫巢父給事中御史大夫兄子戣戡戢戣給事中戡殿中御史戢庫部員外常山處州刺史孔令斌代居恆州生垂寶河內尉南陽本梁人云仲尼之後孔愈從弟群官至御史中丞生沈沈孫琳春秋衛卿孔圉生悝鄭穆公公子嘉字子孔子孫亦為孔氏孫張並不詳其後孔父微子之後宋大司馬孔父嘉亦為孔氏鞏左傳周卿士鞏簡公晉鞏朔漢侍中鞏攸陽翟唐戶部郎中鞏弘武陽翟人項左傳云滅項公羊傳曰為齊桓公所滅子孫以國為氏項橐八歲服孔子項燕下相人為楚將子梁梁兄子籍號西楚霸王項他項伯項襄並籍之族也漢初並封侯賜姓劉氏隴西金城後周有項亶周武帝賜姓辛氏孫義周唐屯田郎中紙楚左紙相之後是吳志云是儀本姓氏孔融嘲儀曰氏字民無上乃改為是因姓是焉仕吳官侍中都亭侯天寶祕書少監是光又改姓齊氏錡左傳殷人六族有錡氏漢書藝文志洛陽錡華後漢荊州刺史錡嵩倚漢四皓隱商山號倚里先生倚相後氏案漢書顏師古注作綺里季此作倚里先生未詳所本骫纂要文云人姓史記夏后氏姓蒍晉士蒍之後以王父字為氏䦱國語有䦱大夫薳左傳楚大夫薳章之後有薳子馮薳掩芉楚姓祝融子季連之後漢初楚懷王孫心項羽封為楚懷王後為義帝南郡隋右衛將軍芉雄曾孫端唐金吾將軍技也西部大人代為酋帥後魏初各依舊號為技也氏後魏護軍將軍臨江伯技也鍮石生説詖內部尚書孫爾歸生平右衛將軍生恭長文義北齊侍中隋信州總管新寧公文義生旻唐鳴水令恭隋丹州別駕生寶倫唐興國別將爾朱其先契胡部落大人代為酋帥居爾朱川因以為氏後魏有羽健秀容三百里封之以為世業爾綿魏蠕蠕渠帥綿他拔爾綿來降改為綿氏是婁南燕有徐州刺史是婁盧是賁改為兒氏是云改為高氏是奴改為封氏芉尹楚大夫芉尹申無宇之後履見姓苑娝方幾反見纂要文云人姓壘後趙録有壘澄本姓裴改焉水邱吳興人史周太史史佚之後以女弟為戾太子良娣生史皇孫進進生宣帝恭子高元建康史氏今隸酒泉郡史丹裔孫後漢歸義侯苞之後至晉永嘉亂避地河西因居建康苞裔孫寧後周安政公生祥隋城陽公祥弟雲期雲生令卿唐祠部郎中杭州刺史宣城丹孫均均子崇自杜陵受封溧陽侯遂為郡人崇裔孫宋樂鄉令瓌瓌九代孫務滋唐納言溧陽子孫翽御史大夫又江州刺史史元道亦云崇之後也高密史丹之後有史曇曇曾孫節唐禮部侍郎京兆丹裔孫㼅留長安隋左領大將軍萬歲狀稱㼅十二代孫寶唐鄜州都督原國公陳留考城今隸曹州後漢京兆尹敞生弼今無聞河南本姓阿史那突厥科羅次汗子生蘇尼失入隋封康國公懷德郡王生大奈子仁表駙馬生忠左驍衛大將軍薛國公忠生晡宋州刺史晡生思元右金吾大將軍思元生震晉巽泰震右監門將軍生弘寧寂容寧寂生備容冀王傅巽光祿少卿泰蜀州刺史生寅審審吉州刺史姒官氏志渴侯氏改為姒氏紀薑姓炎帝之後封紀為齊所滅以國為姓漢有紀信弟成子通封襄平侯丹陽秣陵吳有紀騭生瞻晉侍中驃騎大將軍天水上邽隋司農少卿紀和整生士騰隋翼州刺史士騰生儼及儼唐雍州司倉參軍生先知先知生逡吏部郎中給事中判御史中丞生黃石黃石生經戶部郎中經生謙咸及荊州刺史生處訥地官侍郎太府卿平章事侍中千乘伯士帝堯之裔杜柏之子隰叔為晉士師至士蒍生伯成缺缺生會會子孫氏焉後漢末交址太守士燮河南隋刑部侍郎案此下脫名士燮後生義總唐戶部郎中𣏌姒姓夏禹之後周武王封東樓公于𣏌後為楚所滅子孫氏焉齊郡齊有𣏌殖字梁今齊州有𣏌氏俟風俗通俟子著書六國時人河南後魏獻帝以次子為俟亥後改為俟氏官氏志俟奴氏改為俟氏子帝嚳之後殷湯姓子風俗通云左傳有子鉏商案左傳叔孫氏之車子鉏商杜注車子微者鉏商名此文附會不合鄭大夫子人九里本理氏春秋時改焉晉有里克魯有里華鄭有里析後居襄城者又為里相理咎繇為堯理官子孫遂為理氏殷宋有理徵恃齊有恃乙管仲誅之子玉衛大夫子玉霄之後秦穆公時大夫有子玉房子桑魯大夫子桑伯子之後見論語秦公孫枝字子桑其後氏焉莊子有子桑樗子我曹叔孫成子生申為子我氏衛大夫有子我羽人子叔世本魯文公生惠伯叔肸叔肸生聲伯嬰齊嬰齊生叔老子叔子叔生叔弓叔弓生仲南文楚及伯張穆伯定伯為子叔氏子夏陳宣公生子夏其娣生御叔己師己師生子南徵舒徵舒生惠子晉晉生定子御寇為子夏氏子有魯有若字子有之後見禮記宋有子有恭叔子雅齊惠公孫子雅之後見英賢傳又魯季桓子生武叔竈亦為子雅氏霄為齊上卿子囊左傳齊大夫子囊帶之後子家魯公族子家氏魯大夫子家霸懿伯子革世本宋司城子革之後又曰季平子支孫為子革氏子州莊子堯以天下讓子州支父舜以天下讓子州支伯子孟魯公子孟之後見英賢傳齊簡公時子孟卿為大夫子建楚平王太子建之後頃襄王時有子建叔子為大夫子伯左傳衛大夫子伯季之後魏有子伯先子夏門人居西河子庭芉姓楚公子午字子庭後又子庭氏魯大夫以字為氏子尚世本陳僖子生廩邱子尚意茲因氏焉國語鄭大夫子尚伯父子強衛公族昭子郢之後案此疑亦採自世本子郢世本衛公族昭子郢之後子寤陳僖子生宣子其後為子寤氏子輿陳桓子生子石難為子輿氏子干魯季平子干叔彭便之後案古今姓氏辨證云此條姓纂有氏無解此句係後子成氏之文誤擊於此今子成氏條亦遺失子季楚公族也子羽晉公族子羽後為楚邑大夫子陽魯公有子陽者其後以王父字為氏子尾齊惠公生子高祁祁生子尾蠆因氏焉子重楚公子重字嬰齊子重之後子午世本楚公子午之後齊大夫子午明子旗齊惠公孫欒施字子旗子孫以王父字為氏子獻世本陳桓公孫子獻之後風俗通云齊大夫子獻之後楚文王時子獻遼為大夫子乘楚屈蕩生子乘因氏焉子華莊子韓有子華子因氏焉子言季平子生昭伯寤之後也子齊衛公族子齊氏子蕩世本宋威公生子蕩因氏焉子枋陳僖子生穆子安為子枋氏子宋陳宣公生子楚其後為子宋氏子扁莊子有子扁子子工世本齊頃公子子工之後子鞅陳僖子子生簡子齒為子鞅氏子揚世本季桓子生穆叔其後為子揚氏子芒世本陳僖子生子芒盈因氏焉士孫漢書平陵士孫張為博士揚州牧明梁邱易生仲徹長安令左馮翊生苞苞生充曾孫奮為郡五官掾六代孫眭後漢弘農太守生瑞尚書令瑞生萌字文始儀郎灌津侯生賢穎士蒍隰叔生士蒍為晉士官案士官當是司空字誤支孫因為氏士思古今人表晉有士思癸鄭有士思卜秦將軍士思穆士丐晉大夫士丐之後士吉晉大夫士蒍生吉為士吉氏士成莊子有士成綺也士弱晉士莊子弱為獄官晉人謂之士弱氏士華齊隱者士華太公誅之史葉韓例云衛頃侯之後公子史食采于葉因氏焉左傳作史華案韓例未詳史朝世本衛史朝之後似和貞觀左屯衛穀州刺史似和泥熟亦北蕃歸化也案通志泥熟乃蘇農氏此作似和誤又開元中有左威衛大將軍赤水軍副使武威公似和舒市南楚有市南熊宜僚後以為氏巳氏宋大夫司馬巳氏之後俟呂鄰改為呂氏尾曾尾生或云即微生高也尾勺後漢尚書郎尾勺攜吳志云尾勺子張昭師也許薑姓炎帝四嶽祕笈新書四嶽作炎帝之後周武王封其裔孫文叔於許後為楚所滅子孫分散以國為氏晉有許偃楚有許伯鄭有許瑕高陽北新城縣今入博陵郡漢大司農許據生允魏中領軍允孫式式長子皈案唐世系表皈作販生晉徵君詢詢元孫懋有傳懋孫善心隋黃門侍郎生唐中書令高陽公敬宗敬宗生昂升昱杲景昂皮化令生彥伯韶伯彥伯太子舍人生望右羽林將軍望生遠侍御史睢陽太守遠生峴袁州刺史韶伯左屯衛將軍蘇州刺史平思公升明堂令景工部郎中判羽林大將軍式次子邁晉東海太守號北祖曾孫彥後魏侍中相州刺史孫安中書侍郎生恂惇恂曾孫本行唐給事中遜生文宗案遜字上有脫文文宗下應有智玉文通文宗生正言唐監察御史智玉生知禮殿中御史文通生向蔥監察御史惇字季良北齊左右僕射生文紀汝南平輿縣後漢功曹許邵居召陵縣漢太尉祭酒許慎今並無聞安陸狀稱詢五代孫君明梁楚州刺史入周徵不起法光案唐世系表君明生弘周宏周生法光與此不符嶽州刺史生紹唐陝州刺史譙公生善伯裔智仁圉師善隋宣城郡主簿生力士洛州長史案唐世系表長史作刺史生欽寂欽明欽淡欽寂夔州長史生輔德輔乾輔乾右金吾大將軍光祿卿生諫論詵諷諫河南丞論監察御史詵歸州刺史諷監察御史輔德宕州刺史欽明涼州都督安西大都護生戒言戒非戒惑都官郎中鴻臚少卿生子房季常子端季常萬年丞子端嶽州刺史戒言太僕卿右武衛大將軍生子餘壽州刺史欽淡深州刺史