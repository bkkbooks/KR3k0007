利代人後封孟都公案倍俟利即斛律金之高祖蓋後又分為斛律氏軫左傅軫國在楚之東南楚屈瑕將盟二軫注云二國也尹少昊之子封于尹城因氏焉風俗通云師尹三公官也以官為姓漢尹咸尹賞尹齊後漢尹敏晉尹奉天水姚秦謨謀主尹緯又西海太守尹玖生猛晉昌太守又居京兆六代孫惠唐寧州司馬生恩貞刑戶二部侍郎御史大夫戶部尚書天水公生中和中庸中言中和庫部郎中國子司業中庸平原安定等三郡太守信王傅司正中言京兆府司録後魏燕郡太守尹思曾孫景同浙州刺史生徹隋梓州長史生元備左武侯郎將河間稱尹敏之後魏趙州刺史尹虛曾孫軌隋貝州刺史上蒙公生勢唐嘉州刺史生仁弘仁德仁弘潞州司馬長樂公生元叔元貞元凱元貞生日升鄭州刺史光祿少卿元凱左史鳳閣舍人仁德吳王戶曹生元繹元超元徽子羽子産子羽洛陽丞宣州別駕子産灃州刺史元徽比部郎中楚州刺史後魏太子洗馬尹翼六代孫朗生正理左拾遺商州司馬正義度支郎中宋州刺史樂城後魏太學博士尹珍孫式隋長寧王長史生文憲中書舍人給事中生奭祠部郎中給事中又禮部員外尹知章絳州翼城人尹格之後又有古尹姓之戎居瓜州案古今人表有堯師尹壽又左傅作允姓之戎允允格之後尹午楚大夫囂尹午之後又楚大夫尹午子叔阮殷有阮國在汧渭之間周文王侵阮徂恭見毛詩子孫以國為姓後漢有巴吾令阮敦據祕笈新書增偃少昊孫咎繇生于曲阜是為偃姓國語云舒庸舒鳩並偃姓也圈風俗通云楚鬻熊之後一本云姓卷氏鄭穆公之後秦末為博士避難改為圈氏陳留後漢末有圈稱字幼舉撰陳留風俗傅又有圈宣明郭林宗傅有陳人圈文卷琅琊陳留風俗傅云陳留太守琅琊卷焉本姓圈氏因避仇改去口娩古萬字人姓見纂要文湛師出自媯姓陳悼太子偃師為公子招所殺裔孫以王父字為氏
