body:
  text: 一送仲高辛氏才子八元仲堪仲熊之後以王父字為氏一云魯桓公子慶父子孫號仲氏又虺為湯左相子孫氏焉漢有廷尉仲定少景唐司門員外郎仲子陵成都人貢仲尼弟子端木賜子貢之後以王父字為氏漢有御史大夫貢禹仲孫慶父子孫號仲孫氏左傳齊有仲孫湫韓子有仲孫章仲行左傳秦三良仲行之後世本宋有仲行寅晉大夫有仲行氏仲梁魯大夫仲梁懷見左傳後魯有仲梁閔仲顏魯有大夫仲顏莊叔齊有大夫仲顏據仲熊楚公族有仲熊氏洞沐漢有洞沐孟陽治易宋子姓殷王帝乙長子微子啟周武王封於宋傳國三十六世至君偃為楚所滅子孫以國為氏楚有宋玉據祕笈新書增宋義宋昌廣平昌為漢中尉始居西河介休十二代孫晃生恭徙廣平利人侯孫藥師生毓恭弟畿給案唐世系表給作洽恭前燕河南太守毓生良北齊東郡太守良生乾子皓乾生大辯唐邛州司馬大辯生守恭守慎守儉守恭遂安令生楚璧兵部郎中杭州刺史守慎襄陽尉生庭璬庭瑜庭璘庭璬庫部員外庭瑜度支郎中司農少卿庭瑜生顒常州刺史庭璘兵部郎中深州刺史守儉洛州刺史生鼎兵部侍郎案唐世系表鼎兵部郎中荊州長史鼎生悅工部員外郢州刺史悅生稷子皓孫陽元洛陽尉景孫孝玉北平王文學撰關東風俗生俠畿後燕衛將軍司馬生榮國曾孫丹案唐世系表丹作弁後魏吏部尚書生紀紀生欽道欽仁曾孫務本唐藍田令生元撫襄州司戶元撫生璟侍郎左丞相廣平文貞公生昇尚渾恕延華復衡昇祠部員外太僕少卿隨州刺史生實渾駕部郎中御史中丞恕都官郎中生袞太常丞延太原少尹華大理評事生儼佶倚儼蘇州刺史佶河南尉倚虢州刺史衡檢校左常侍生倓榮國七代孫慶孫慶孫大理正給後魏七兵尚書孫謨生欽瓊欽曾孫正文唐祕書郎瓊生仲羨燕渤海太守曾孫延慶生長威季緒長威北齊御史中丞孫正言洛州司馬季緒生本立立生卓然比部員外益州長史燉煌漢有宋諒諒裔孫後漢清水公繇曾孫遊道繇六代孫壽唐同州郃陽縣令弘農狀云昌後自西河徙弘農唐太常丞宋仁囘生果毅生之問之望之悌之問戶考二員外生昌藻之望改名之遜荊州刺史之悌太原尹益州長史河南劍南節度生若水若恩御史中丞若水丹徒令樂陵狀云本望出廣平唐巂州都督宋君明生捷弼捷固安令生宣遠弼生考玉比部員外君明堂兄渭河陽令生思敬思敬生詢吏部郎中左常侍詢生晦諫議大夫同州刺史晦生泛泫泛汝州刺史扶風唐秦州長史生元爽元獎爽尚書左丞秋官侍郎揚洛二州長史生述監察御史元獎晉原尉生遙適遙禮戶吏侍郎左丞魏汴州刺史適左補闕遙生東里東里生華河南周廣化令宋道狀云本廣平人曾孫義桐柏令生溫璡溫瑗溫瑾溫璩溫瑾戶部侍郎鄭州刺史溫璡太原少尹生寂溫瑗侍郎御史生蹇溫璩梓州刺史京兆後漢侍中宋弘之後今無聞晉宋甄宋琨唐都官郎中宋質給事中生樽虢州人殿中御史宋務先洛陽人司農少卿宋遵貴中書舍人宋則並京兆人工部郎中宋元昉江夏安陸人生之順戶部員外殿中侍御史貝州刺史宋慶禮邯鄲人殿中御史虔微邯鄲人統見姓苑用風俗通古有用國見毛詩漢有高唐令用蚪名士錄有高唐用案毛詩有用國未詳高唐用下亦有脫字雍風俗通周文王第十三子雍伯之後以國為姓今或音雍州之雍漢雍齒沛人絳絳縣老人之後巷毛詩周巷伯之後賜仲尼弟子端木賜之後以王父名為氏㓨左傳鄭大夫㓨張姓苑云其先封㓨鄉因氏焉案左傳鄭大夫郟張郟古洽切今作㓨誤也㓨俗刺字義風俗通云義伯陽卿也漢有南陽太守義縱河東義縱代居河東封岸頭侯晉有上庸都尉義欽智今有河東智氏漢有零陵太守智嗣戲潁川見姓苑又音僖魏志有戲才譬歷辰代人改為辰氏季陸終氏之子季連之後一云魯桓公子季友之後亦為季氏漢功臣表戚圉侯季必傳封四代壽春姓苑云今壽春有季氏漢河東太守季布弟心宋有季高大曆右常侍季廣琛摯風俗通摯疇古諸侯國毛詩周有摯荒案摯荒未見毛詩義疏京兆長安魏太僕少卿摯模代居京兆生虞晉太常卿光祿勳晉書有傳駟左傳鄭穆公子騑字子駟之後以王父字為姓漢恩澤侯表鄔侯駟鈞齊哀王舅稚商後見史記氏族略冀左傳冀國今晉州冀氏又晉大夫卻芮食采冀邑亦為冀氏芮生缺唐侍御史冀元珪太原人子仲輔職方郎中案姓氏急就篇仲輔作仲甫祕漢功臣表戴侯祕彭祖傳七代孫西秦錄有僕射祕宜案西秦錄宜作宣肆風俗通宋大夫肆臣之後漁陽漢有漁陽太守肆敏子孫居之利漢有利幾又仙人利真元漢陽人風俗通云漢有利乾為中山相河南官氏志吒利氏改為利氏遂左傳有遂國齊人殲于遂因氏焉其後並以遂為姓貳左傳楚屈瑕將盟貳軫並小國也今在隨州之南漢東今隋州有二氏翠急就章有翠鴛鴦其先楚景之後避難以其祖名氏焉案顏師古注作景萃之後改翠氏匱見姓苑廬江今廬州有此姓備見姓苑季孫魯桓公子友之後子孫號季孫氏生行父文子文子生宿武子武子生紇悼子公若公鳥紇生平子意如平子生斯桓子季魴侯季寤斯生肥康子季連晉有唐邑大夫季連齊出自陸終第六子季連之後季融世本楚鬭廉生季融子孫氏焉季隨世本周八士季隨之後宋有季隨逢見左傳季騧周八士季騧之後季夙潛夫論晉靖公孫季夙之後季嬰世本晉樓季嬰之後季尹楚有季尹然齊有季尹平四飯四飯缺之後紂賢人地駱枝改為駱氏案官氏志作他駱拔異今溫州白水有此姓氏族略意見姓苑侍其漢廣野君酈食其元孫賜以食為氏曾孫武平帝時為侍中改為侍其氏焉北海侍其武先元案漢有侍其元矩疑即此人避王莽亂家北海七代孫裔魏尚書左丞生邕邕生仁實晉廬江太守孫曼宋武昌太守寺人宋寺人惠牆之後事父宋事父氏子姓也意如魯季孫意如之後魏周文王第十五子畢公高受封于畢裔孫萬仕晉封於魏至犨絳舒代為晉卿後分晉為諸侯稱王至王假為秦所滅子孫以國為氏昭王生公子無忌忌孫無知無知五代孫歆鉅鹿曲陽侯漢鉅鹿太守歆居鉅鹿五代孫慶案唐世系表慶作宣漢封北海公宣孫紞紞長子儔為東祖次子植為西祖也東祖儔孫藪生儵意暨儵曾孫蘭根後魏僕射生少政政生孝機孝該孝液孝機唐水部員外生嵩德刑部侍郎嵩德生濬溫洵洵祠部郎中睦州刺史孝該元孫瓊京兆功曹孝液孫愨京兆功曹意七代孫宗敏刑部郎中生恆歸州刺史洵堂孫皋改名懿文邵州刺史生中庸暨生荀臺六代孫求已吏部員外郎中書舍人生嗣萬金部郎中嗣萬生羔羔生鸞景北齊司農卿鸞景生彥卿彥深彥理彥元彥卿元孫承休壽州刺史彥深隋著作郎孫歸仁一名克己吏部侍郎同州刺史彥理孫寶言生智本光本智本生亮虔州刺史光本生靖庫部郎中秦州都督靖生少賓少游少游刑部尚書京兆尹生友讓友順友直友恭友信友讓京兆司錄友順太常博士友直京兆兵曹彥元生浦刑戶二侍郎生正見正動正見庫部郎中生杳太常博士正動生傳弓監察御史西祖植晉御史中丞生虔虔生綏攀綏六代孫惇生彬文將彬生之逷皇州錄事參軍生全恕全恕生禮禮生綽緄緘綽生孟馴叔敖仲犀叔虬季龍孟馴左武將軍叔敖生正臣兼監察御史仲犀比部員外華州刺史江陵長史荊南節度生正雅殿中御史叔虬京兆戶曹生弘簡弘遠弘簡戶部郎中緄萬年尉生叔驥萬成萬成檢校員外全恕姪欽構監察御史文將曾孫連城左拾遺攀元孫子建後魏益州刺史生收北齊僕射生人表收姪曾孫保家監察御史生行元長安尉地官尚書兼納言鉅鹿公魏元同稱東祖意之後生廓案唐世系表廓作士廓隋禮部侍郎御史生乂唐濮陽令元同生愔憻恬協愔著作郎生長裕季隋季邁長裕河南法曹生充霓尤季隋膳部郎中季邁長安尉憻御史主簿生方囘方進廣業方囘淄州刺史方進左御史大夫生允修案唐世系表允作元修作循允生叔正兼監察御史修郴州刺史廣業生安昇荊州刺史案唐世系表廣業昇州刺史生甫此生安二字疑衍生甫恬給事中鄭州刺史生嶠嶠生黃裳開州刺史元同堂姪確案唐世系表元同五子其五為確此作堂姪與唐表異唐司議郎清河無知元孫諶漢清河太守因家焉裔孫充西魏開府儀同三司孫進唐右二府統軍進堂弟文博觀州刺史宜陽本居濟陽今已絕任城無知曾孫不害生漢任城太守案此下有脫名因家焉不害孫相漢丞相高平侯裔孫舒晉司徒族詠之宋荊州刺史今絕宋城唐中書令右僕射齊公魏元忠生昇晃昇太僕少卿晃泗州刺史費史記紂幸臣費仲夏禹之後楚有費無極漢有費直江夏蜀丞相費禕巴郡太守費觀禕孫晉巴東令穆之生恬晉江夏相魚復侯恬七代孫弘規唐主客郎中合肥男又居盧費愔晉西中郎將五代孫唐辰州刺史允斌晉費試成都人汝南後漢費長房之後瑯琊費直之後河南官氏志費連氏改為費氏尉鄭有尉止尉翩先賢尉繚著書號尉繚子河南官氏志北方尉遲部如中華諸侯也魏孝文改為尉氏尉托奇枝為汗莫賀弗案魏書無可考疑有脫誤六代孫後周長公侯兜案周書長樂郡公俟兜生迥及綱此長字下脫樂字俟誤作侯生迥綱迥太師相州總管蜀國公生寬誼綱後周大司空吳國公生運安允安允安生耆福唐庫部員外貴風俗通云陸終之後漢廬江太守貴遷常山晉武帝才人常山貴氏生東海越王石趙錄有司空中郎將貴霸既風俗通云吳夫㮣王之後子孫因避仇改為既氏漢有安南長史既涼緯見姓苑魏強魏武子支孫莊子快生強為魏強氏蜚廉史記秦嬴姓有蜚廉氏御周禮有御人職因官氏焉左傳有御叔漢有御長倩者丞相公孫弘故人恕楚大夫恕金據見姓苑云人姓鑢見姓苑云人姓茹河南官氏志普陋茹氏改為茹氏又蠕蠕入中國亦為茹氏音去聲御龍劉累之後漢有侍御史御龍君庶其邾大夫庶其之後今沛人庶長秦爵也因氏焉左傳庶長無地遇風俗通漢有東安太守遇沖東莞姓苑云東莞有遇氏樹河南姓苑云今河東有此姓河南官氏志千氏改為樹案魏書樹洛千氏後改為樹氏此脫二字附後漢段熲將附都唐監察御史附德意絮姓去聲漢書張敞傳有京兆捕賊掾絮舜謂敞為五日京兆敞殺之氏族略鑄風俗通鑄國也堯後也在濟北虵邱縣左傳臧宣叔娶于鑄後世以國為氏務堯有務成子見易傳列仙傳務光夏時人喻見姓苑亦音樹南昌姓苑云南昌有喻氏東晉有喻歸撰西河記三卷具左傳晉有具丙魏郡後漢宦者中常侍具瑗住見姓苑云人姓傅殷相說之後築於傅巖因以為姓北地人漢末傅氏居南陽祕笈新書樹機西河鮮卑種魏詰汾長子疋孤部落徙河西傳六世樹機能有涼州樹黎後魏有蠕蠕別帥樹黎勿地來降務成呂氏春秋務成子堯師也又新序子夏曰舜學于務成附趣馬英賢傳楚趣馬厥之後後漢有南陽郡功曹趣馬思具封鄭公子具食采開封因氏焉鄭大夫具封狐人路炎帝之後黃帝封其支子於路春秋時路子嬰兒是也案春秋路子嬰兒之路作潞今上黨路縣漢大中大夫路溫舒平陽漢扶離侯路博德始居平陽今隸貝州裔孫嘉晉安東太守孫藻生纂纂生濤後魏青州刺史生綽神龜綽後魏陽平太守生寄奴侍愛案唐世系表濤生寄奴侍慶據此則寄奴乃濤孫也愛作慶思令侍愛安州刺史思令生君儒北齊員外君儒生德準案唐世系表德準作德淮唐相州刺史生勵言勵節勵言兵部員外曹州刺史生欽正欽古勵節刑部郎中華州刺史生欽訓鞏令案唐世系表德淮子勵行鞏令神龜後魏恆州刺史五代孫文逸案唐世系表當作六代唐中司馬案唐中司馬唐世系表作中州生敬淳敬澄敬渾敬湛敬潛敬湛雍州倉曹生暢敬潛中書舍人生廣心大理司直廣心生常兼監察御史隋青州別駕路元伯構案此疑有脫誤藻次子纂六代孫也生操唐棗陽令操生邃元寂元真元隱元隱元萬年主簿生恆恂憕愉恆戶部郎中太僕少卿恂左補闕生鈞銛鍠鈞河南功曹生惟衡兼殿中御史惟明監察御史銛生寰江西觀察兼中丞京兆三原稱與勵行同承藻藻子建建六代孫兗隋兵部侍郎案唐世系表兗作克生文昇唐平愛秦三州刺史生元濬案唐世系表元濬作元叡元哲元濬司勳吏部二郎中廣州都督生幼玉監察御史案唐世系表幼玉生齊暉齊暉生畿季登此作幼玉生季登幾中缺一代畿作幾生季登幾幾監察御史生長興季登諫議大夫生群群生巖嶽叡少子晚金果州刺史元哲生太一太原令太一生梁客劍客梁客岳州刺史生黃中案唐世系表梁客生怤怤生黃中此缺一代劍客改名嗣恭戶部尚書廣州都督生應恕憑應宣歙觀察恕太子詹事鄜坊節度使生異化州刺史異生楷司農卿憑侍御史潁川石趙有揚州刺史路水襄城陳留安定並舊望云溫舒之後東陽梁天監十八州譜路氏一卷東陽鉅鹿譜舊望河南後魏官氏志設真氏改為路露露伯夏殷侯國也子孫以國為氏焉露氏譜越王句踐七代孫閩君搖漢封東甌王搖別封其子為露余侯因氏焉初居會稽吳郡涉分會稽為吳郡遂為郡人吳丞相露雍弟徽侍中又居鹽官徽十代孫越陳黃門侍郎生允唐著作郎撰國史餘杭公生琮尚書左丞天官侍郎平章事生潤俊潤祕書監俊齊安太守宋倉部郎中露訓稱與琮皆周丞相徽後六代孫纘鄆州刺史又吏部尚書露少連著作郎露沈並吳人案唐書無露琮又吳志無露雍或因上路氏家譜牽連及之步左傳晉大夫步揚之先食采於步因氏焉又有步昭步毅本郤氏仲尼弟子步叔乘齊人臨淮吳丞相臨淮侯步騭生闡丞相吳志有傳河南官氏志步鹿氏改為步氏庫風俗通古守庫大夫因官命氏漢文景時有倉氏庫氏後漢竇融傳有庫輔庫義庫侯河南官氏志庫傉後改為庫氏顧顧伯夏殷侯國也子孫以國氏焉顧氏譜云越王句踐七代孫閩君搖漢封東甌搖別封其子為顧余侯因氏焉漢初居會稽祕笈新書風俗通有上黨都尉顧平度古掌度支之官因以命氏潞國語潞泉潞備皆赤狄隗姓也慕容高辛少子居東北夷後徙遼西號鮮卑國于昌黎棘城至涉歸為鮮卑單于自云慕二儀之德繼三光之容或云以冠步搖步搖冠音訛改為慕容氏昌黎涉歸生廆廆生皝皝生雋號前燕初都棘城弟垂號後燕都中山弟德號南燕都廣固徙東郡三燕七主共五十餘年郢子恪前燕太原王生楷騰瑾曾孫恃德北齊義安王孫孝幹唐易州刺史郁孫紹宗北齊僕射武威公生三藏隋金紫光祿大夫孫知廉侍御史知晦兵部郎中汾州刺史知晦生珣吏部侍郎珣生損渝州刺史三藏再從孫善行萬年丞條史琚生白𦡱榮案此疑有脫文慕容五代孫沖仲慕利後魏有吐谷渾主慕利賢與慕容氏同祖也慕輿鮮卑慕容氏音訛為慕輿氏庫狄鮮卑段疋磾之後避難改姓庫狄居代北後遷中夏河南後魏上洛太守庫狄陵生保真保真生峙周宣州刺史生嶷徽崧徽生璠益州總管樂成公崧生仁志千牛郎中仁志生益利益利生履溫庫部郎中庫成風俗通云本亦苦城也方言音變為庫城燉煌實錄廣平太守庫成防從孫馗素和鮮卑檀石槐之支裔後魏有尚書素和跋弟毗右將軍素和突後魏書云以本白部故號素和孝文改為和氏河南大曆太子左學士素和顏路洛伯益支孫又以路洛為氏晉路洛賈見史記步大汗出自塞北遷中土河南周南夏州刺史新興侯步大汗提生勢勢生威唐蔚州刺史安邑男案北齊書步大汗薩隨尒朱入洛齊受禪改封義陽郡公庫傉管改為庫氏前燕錄有岐山公庫傉管泥生律後燕太師安定王又有西河公庫傉管樂大司農庫傉管紇庫六斤改為斤氏大洛稽改為稽氏破六韓其先代人隨魏南徙河南後魏金紫光祿大夫破六韓祥生常北齊司徒平陽導昇北齊儀同林松王生金藏唐岐州別駕後魏又有莫駕侯利嚴破六韓渾生枝枝生景隋東武公景生蕃唐宋州刺史始興男匡矩案呼廚貌後為潘六奚後又訛為破六韓破六韓常乃孔雀之子此云祥誤破也頭與費也頭同破落那大宛之後改為那氏惠周惠王支孫以諡為姓戰國惠施為梁相交趾太守惠乘太僕惠根瑯琊惠根孫嚚為北海太守子孫因居瑯琊後漢有揚州刺史惠整吳人吳侍中惠謙晉陵太守惠松宋步兵校尉惠纂昋或作炅漢衛尉昋橫彭城漢上計掾昋景雲見姓苑城陽後漢陳球碑城陽炅橫被誅有四子守墳墓改姓炅氏一子居徐州郡雲之先也姓昋氏一子居幽州姓桂氏一子居華陰姓炔氏字皆九畫以避難也魏志呂虔傳胡陸有炅母計國語計然為越大夫范蠡師云本夔邱濮上人姓辛字文子其先晉國公子也風俗通漢計子勳為司空掾薊神仙傳薊子訓不知何許人勵風俗通後漢魏郡太守義陽侯勵溫見功臣表吳志以孫秀奔魏改姓勵氏稅盛弘之荊州記云建平信陵縣有稅氏昔君王巴蜀案荊州記作蜀王欒君此脫蜀王見廩君兵強結好飲宴以稅氏五十人遺廩君羿左傳有窮后羿篡夏后相之位𣏹王莽大司馬𣏹並見姓苑第五出自齊諸田之後田氏漢初徙奉園陵者故多以次第為氏京兆長陵後漢司空第五倫字伯魚生頡將作大監匠倫曾孫穜兗州刺史又護羌校尉第五訪亦京兆人上元黃門侍郎平章事第五琦生峰平申峰臺州刺史平京兆兵曹申兼御史中丞第八陳留風俗通亦齊諸田之後田廣弟英為第八門因氏焉王莽時講學大夫第八矯荔菲西羌種類也隋有荔菲雄涇州人唐彭州刺史荔菲案此下脫名通志亦闕名曰某生寶應節度荔菲元禮寧州人衛周文王第八子康叔封于衛傳國四十餘代秦末國滅子孫以國為氏漢丞相建侯衛綰河東安邑縣狀云晉太保衛瓘生恆恆生玠裔孫隋虞州刺史神泉公盛盛生孝節唐左武衛大將軍安邑後魏步兵校尉衛臥龍亦稱玠後五代孫知敏唐給事中吏部郎中汝州刺史生固損弘敏三從第元經蘄州刺史戶部郎中衛畿道徙京兆水部員外衛惟良亦安邑人虞部員外巴今陝虢觀察衛次公御史中丞循王傅衛晏子中行今禮部員外國子司業衛密子開元衛偡弟倚生象侍御史並河東安邑人大曆檢校戶部尚書荊南節度使衛伯玉三原人芮左傳周司徒芮伯周姓國也芮伯萬之後為晉所滅漢鉅鹿太守芮強吳郡太守芮珍丹陽人今望扶風彘左傳士會支子士魴食采於彘邑在平陽北故號恭子裔見姓苑祭北國名也女為舜妃黃帝史官子孫因氏焉馮翊衙縣人案姓氏辯證引作癸北蔡周文王第十四子蔡叔度生蔡仲胡受封蔡後為趙所滅子孫以國為氏晉有蔡墨秦相蔡澤漢功臣表肥如侯蔡演演元孫義義元孫勳後漢為長安邳長後徵不起勳曾孫攜濟陽考城縣攜生稜質稜生邕質始居陳留分為濟陽因為郡人質元孫克從祖謨晉永嘉同過江克六代孫點梁司空安豐公孫秦客唐金部郎中客姪真清蘄州刺史大業後梁左案此下有脫文戶部尚書生克恭秦府學士太子洗馬質元孫克生晉司徒謨謨元孫興宗吏部尚書生樽樽孫凝凝子曷和南陽魏有蔡睦晉有蔡秀秀八代孫麗梁瑯琊太守元孫杭唐左武侯長史朔方漢末丕為五原太守因居之裔孫招元孫澄唐左衛郎將丹陽狀云質後唐司勳郎中希寂艾晏子春秋齊大夫艾孔之後即左傳裔款也風俗通龐儉母艾氏南燕有牙門艾江又東平太守艾詮北平唐御史大夫艾敬直河南官氏志俟斤去斤並改艾案魏志俟伏斤氏改伏侯伏斤改斤賴左傳賴國為楚所滅以國為氏漢有交趾太守賴先蜀零陵太守賴文唐光祿少卿賴文雅南康唐祕書郎棐本汀州人後魏虔州案此下有脫文大風俗通大庭氏之後又大填大山稽黃帝師大穎為顓頊師案古今人表穎作款禮記曰大連東夷之子會鄶仲之後避難去邑為會氏風俗通云陵終之子乙之後漢武陽令會相太尚書文王四友太顛之後今咸陽有太氏帶六國時有帶他見姓苑兌見姓苑太傅漢有太子太傅疏廣曾孫彥則避王莽亂於太原因氏焉太陽風俗通衛大夫太陽速晉有太陽狀為卿案左傳為戲陽速太士太士氏永嘉人建安太守太士靈秀今松陽有此氏太師商有太師摯周有太師疪案玉篇無疪字疑即疵字太伯周古公之子吳太伯之後大羅周禮大羅氏掌鳥獸其後以官為氏秦有將軍大羅洪大季世本鄭穆公生大季子孔志父之後案杜預世譜士子孔生大季士子孔穆公子也此誤大臨衛大夫大臨蔡仲蔡仲胡之後趙將有蔡仲其會庌氏衛靈公子虺生竈為會庌氏氏族略解北改為解後魏別帥解北莫弗憣豆建祭左傳周公第五子祭伯子孫以國為氏鄭有祭仲足周有祭公謀父蒯風俗通云晉大夫蒯得之後見左傳禮記漢有蒯徹涿郡范陽縣漢書齊辯士蒯通本名徹與漢武帝同名遂改又有上庸長蒯躬後漢末有蒯越字異度官至光祿勳生宗蘭陵丞宗生恩介左傳有介之推琴操作介子綏神仙傳吳有介琰介象快漢書齊人快欽治尚書
