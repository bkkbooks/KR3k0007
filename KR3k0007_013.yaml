body:
  text: 一屋陸齊宣王田氏之後宣王封少子通於平原陸鄉因氏焉漢大中大夫陸賈子孫過江居吳郡吳縣陸賈裔孫吳丞相遜生丞相抗抗生晏景機雲耽遜弟吳選曹尚書案陸遜弟名瑁此脫生英英生玩玩元孫惠曉惠徹自玩至惠曉父子歷晉宋五代侍中惠徹生閑閑生厥完絳襄厥會孫搢完生邱公雲公令公邱公生瑾琛瑾生遜之逖之逖之都官員外琛生仁公仁公生柬之元之案唐世系表琛生柬之元之中閒無仁公一世柬之司諫郎中崇文侍書學士生彥遠元之生元方天官鸞臺二侍郎平章事元方生象先景倩景融景獻景裔象先中書工部侍郎平章事生刑部尚書少保袞元貞公袞生泛潀廣偃泛祕書少監潀比部郎中廣沂州刺史偃工部員外景倩監察御史生溥天水太守少府監生康序應庶康檢校郎中庶福建觀察中丞景融吏部侍郎左丞工部尚書父兄三人繼處銓衡左右丞生沛渭沛屯田郎中景獻屯田員外生包易包工部員外易司門員外景裔兵部員外生滌元方弟彥恭曹州刺史雲公生瓊瓊生從典從典孫鑑有集令公曾孫餘慶尚書左丞太子詹事生珙璪璪汾州刺史兵部郎中生海長源海司門員外長源檢校尚書汴宋節度生行檢陸氏自漢魏至梁陳正傳十五人惠曉生任倕倕字佐公任六代孫去泰去泰起居集賢學士梁給事中陸鎮之續長子椆後惠曉七從子也生晉晉生雍陳豫章王諮議雍生元朗字德明秦府學士國子博士兼太子中允吳郡男撰經典釋文德明生敬信敬義敬義蓬州刺史生宣悊遵楷遵楷祕書郎敬信兵部東臺二侍郎左侍御同三品檢校左相嘉興子生郢客邠卿越賓慶葉郢客生大鯤慶州都督邠卿生大訓大盈大均大訓右金吾將軍越賓陝州刺史慶葉屯田郎中雍州司馬鈞生湯後周大司馬陸通云玩後晉侍中萬戴為劉義真長史從宋武帝入關沒赫連生僑僑生政即通父也通生長義讓讓隋光祿少卿生善宋駕部郎中德州刺史通弟逞周太子少保中都元都公陳廬陵太守陸之禮稱後漢潁川太守閎後生寶仁先元士元士虞部員外濟州刺史生貴愛陳永王記室陸慶稱襃後生士秀唐太子博士生謀道周文王學士生元感元感生南金庫部員外齊度支郎中陸匡丞晉太常卿始後元孫敬唐蘇州刺史陸孜兄元孫善敬國子司業生鼎右補闕嘉興開元有陸齊望官至試祕書少監生渭灃澗瀍淮渭侍御史灃殿中御史澗祠部員外瀍侍御史望族弟齊政富平令生侃如溧水令侃如生贄賞賡贄中書侍郎惠陵令陸侍詮並吳人詮生亙太常博士越宣二觀察生𡐓勳𡐓陝府觀察生鉅勳吏部郎中又歙州刺史陸參司封員外陸震大理司直陸羽並吳人元和初進士陸暢生懷姪孫肱湖州刺史長城人河南洛陽出自代北代為郡長大人號步六孤氏後魏孝文遷洛改為陸氏與穆奚于賀劉婁為北人八族征西大將軍東平王陸俟生麗頹歸騏驥麗司徒平原王生定國叡定國殿中尚書東平郡王生昕之叡尚書令東平郡王生希道希靜希質希道生士懋子彰案此下疑脫士佩一人士懋元孫寶積屯田郎中冀州刺史生昭逵子彰中書監生印駿沓騫彥師兄弟五人相繼為黃門侍郎士佩五代孫伯玉中書舍人晉州刺史希靜元孫乾迪巂州刺史都督希質生瓘悉達歸歸太僕卿曾孫騰周大司空生庸定公庸生逸融冰逸孫徹郢州刺史生欽嗣左監門將軍鄆州刺史欽義忠州刺史融隋洛州刺史生立素右庶子立素生爽兵部郎中爽生瞻瞻生景祥雒尉景祥生據司勳員外據生士佳士修士佳三原令士修殿中御史冰生義方營州司法義方生頌改名愨國子監祭酒右常侍鄭公生璟正卿同正騏孫隋中書舍人生法言正言法言隋承奉郎撰切韻正言孫大同遂州刺史馥後魏太保建安王七代孫堅左右丞相刑部侍郎祕書監生綰綜縯綰贊善大夫生酇綜生邳縯檢校郎中生復禮復禮部尚書禮膳部員外穆宋穆公之後支孫氏焉楚元王友有穆生或作繆音同河南代人本姓邱穆陵氏代為部落大人為北人八族之首後魏以穆陸奚于比漢金張許史孝文遷洛陽改為陸氏以位盡王公勳著當代下司州一同四姓侍中太尉宜都王崇生遂留觀遂留生忸頭比部尚書忸頭生蒲坂虞曹尚書蒲坂生韶冀州刺史韶生遵季北齊東郡太守遵季生伽唐殷州刺史伽生弘遠隋侍御史弘遠生固禮固信固禮綽州刺史生思恭稷州錄事參軍思恭生元休安陽令元休生寧審寧祕書監致仕生贊質員賞贊御史中丞宣歙州觀察質給事中撫州刺史員御史生栖梧泗州刺史兼丞賞太常少卿審監察御史生贄口部員外贄生詳諶諶改名仁裕宣武節度檢校兵部尚書生延業諫議大夫固信蘭州刺史生思順思泰思順生子元子元生準殿中御史汾州司馬思泰生昊周昇昌昌生寂著作佐郎麴漢有麴潭生閟避難湟中因居西平改姓麴氏西平閟居西平十一代孫嘉仕沮渠氏後為土人所歸立為高昌王後魏授瓜州刺史金城公五代公主案有脫文其孫麴伯雅附隋唐宇文泰叛貞觀中侯君集平之其主麴智茂歸降拜右金吾大將軍金城公敕改名智勇其弟天山公智諶生崇裕右監門大將軍交河郡王崇裕弟瞻司農卿常樂公後漢未又有麴演麴義金城晉有左僕射麴允祝黃帝祝融之後周武王封黃帝之允于祝因氏焉鄭有祝聃衛有祝鮀或以祝史之後以官為姓案世本祝任姓禮記封帝堯之後于祝惟唐世系表謂出自姬姓黃帝之後若祝聃祝鮀則俱以官為姓非姬姓也中山後漢司徒祝恬中山人長沙祝恬孫廣魏始平太守又家焉始平祝廣居始平九代孫綝唐陝州司馬綝生欽明刑部尚書同三品魯公子茝兄子駰河南官氏志比廬氏改為祝氏伏伏羲之後子孫氏焉與任宿須句顓頊同祖濟南漢有伏生名勝治尚書平昌安邱勝七代孫理高密太守生鳳湛湛後漢大司徒鳳五代孫儀生大鴻臚策策曾孫滔晉遊擊將軍曾孫曼容齊率更令河南太守伏虔注漢書案伏虔今作服虔宓風俗通宓康公之後以國為氏史記仲尼弟子宓不齊字子賤魯人鞠后稷生不窋生而有文在手曰鞠支孫氏焉裔孫鞠武為燕太子丹傅風俗通漢尚書令譚或為鞠氏音訛轉改平原鞠譚代居平原南燕有司空鞠仲中書侍郎鞠注東萊漢尚書令鞠譚後支孫又居東萊唐有冀州刺史鞠稜女鄭繇祖母也或亦姓鞠氏鹿趙大夫食采五鹿因氏焉漢有巴郡太守鹿旗巴郡鹿旗子孫因家焉濟陰後梁有樂郡太守鹿蘊見十六國春秋元孫悆西魏光祿大夫河內公自西平徙濟陰孫善隋長春宮監河內公生願裕注願唐司農少卿定陶公注巂州司功河南後魏官氏志鹿桓阿氏改為鹿氏叔八凱叔達之後或云晉大夫叔向之後東觀漢記將軍叔壽叔于之後孫叔仲彭生亥案通志公孫茲生得臣彭生得臣為叔孫氏彭生為叔仲氏亥生帶帶生仲叔仲職及寅代為魯大夫木端木賜之後因避仇改姓木氏晉文章志木華字元虛作海賦嘗為太傅楊駿主簿又有木概著戰國策春秋三十卷見七錄肅周文王子郕叔之後成肅公以諡為姓案通志曰郕叔武未聞諡此當是周卿士成肅公之後梁吳郡太守西豐侯肅正德一云古肅慎氏之後歸化中國改為肅氏卜周禮卜人以官為姓仲尼弟子商字子夏魯人河南漢卜式商之後也以田畜為事官至御史大夫開元中卜長福獻續文選三十卷杭州富陽縣尉宿伏羲氏風姓之後左傳云任宿須句顓臾風姓也又有宿南國在東平無鹽縣以國為姓後漢宿仲談又有宿祥雁門宿祥一作禕為雁門太守因家之前趙有宿察河南官氏志有宿氏大姓宿六斤氏為宿氏谷漢衛司馬谷吉世居長安生永大司農後魏谷楷昌黎人魏郡唐晉陽尉谷倚狀云谷永之後詩入正聲集與吳少微富嘉謨為友沐漢沐寵為東平太守狀云端木賜之後避難改為沐氏東平沐寵之後因官居焉河閒魏略沐並河閒人孫文流為護軍石趙僕射沐堅竹孤竹君姜姓殷湯封之遼西至伯夷叔齊子孫以竹為氏東莞後漢竹曾為下邳相又擬陽侯竹晏並東莞人服服義之後仲尼弟子服不齊字子賤魯人今轉為宓氏亦作伏祿風俗通云殷紂遠裔悉西魏光祿大夫河內公自西平徙濟陰孫善隋長春宮監河內公生願裕注裕唐司農少卿定陶公注祿州案注巂州司功此誤風俗通云殷紂子武庚子祿父後以王父字為氏今涇陽有此姓又吐番酋長有祿東贊竺本天竺胡人後漢入中國而稱竺氏竺因為漢侍中瑯琊莒縣侍中西平侯固之後代居瑯琊有竺俊恢銓覽宋竺夔並云莒人鬻祝融之後周文王師鬻熊受封于楚著書子鬻拳其後建平見姓苑禿國語祝融後八姓已董彭禿妘斟曹羋周滅之矣賈逵云禿彭姓別族郁見姓苑國語魯相郁貢子孫氏焉玉黃帝時公玉帶造合宮明堂見尸子後改為玉氏漢司徒玉光府字文伯夙古夙沙氏之後夙沙衛閹寺之屬潚漢雁門太守潚河牧黃帝臣力牧之後漢有越巂太守牧根郹於六反見姓苑屋廬晉賢人著書言彭耼之法案此脫名屋南代北複姓屋引代人隨魏南徙河南後魏行臺右僕射屋引業生通通生容容生浴浴生永達唐梁王府統軍叔孫魯桓公子叔牙生茲號叔孫亦為氏生得臣得臣生豹豹生婼婼生不敢不敢生舒漢有叔孫通為太子太傅生稷嗣君魯國薛縣叔孫通代居開元大理司直叔孫通元孫觀生興案此有脫誤河南後魏獻帝命叔父之後為乙旃氏後改為叔孫氏道武時有壽光侯叔孫建生俊將軍安城公元孫金毗隋太府少卿曾孫文懷唐瀛州刺史叔夜周八士叔夜之後楚康王時大夫有叔夜子莊見國語叔帶英賢傳趙叔帶之後齊大夫有帶子莊為莊公御叔向世本晉羊舌肸字叔向因氏焉叔敖八凱之後公羊有叔敖段為景王大夫叔達八凱之後公羊有叔達段為景王大夫叔服英賢傳云周太史叔服之後晉武公大夫有叔服之要叔夙世本羊舌職生叔夙為叔夙氏叔魚晉大夫羊舌鮒字叔魚因氏焉獨孤其先本姓劉氏後魏代北三十六部有伏留屯為部大人居雲中和平中以貴人子弟鎮武川因家焉伏留屯之後有俟尼生庫者後魏司空生信大宗伯衛國公第二女唐元貞皇后生高祖祝其風俗通宋戴公子祝其為司寇因氏焉見世本漢有清河都尉祝其承先祝固左傳晉有祝固氏漢功臣祝其侯祝固舒祝史衛有祝史揮因官姓焉下邳今有此姓穀梁魯有穀梁赤治春秋傳子夏門人也尸子云穀梁俶傳春秋十五卷案顏師古說穀梁名喜今下邳有穀梁氏據氏族略增濮陽陳留後漢外黃令牛述以濮陽潛為主簿吳長沙太守濮陽逸生興孫休時為衛將軍平章軍國事丞相外黃侯吳書張紘從外黃濮陽闓受詩禮春秋大曆嶺南判官檢校刑部員外濮陽灌大曆進士濮陽守斛律代人代為部落統帥號斛律部因為氏焉河南後魏武川公斛律千孫舉滑州刺史下邳公孝卿隋戶部尚書武陽子生弘義禮本禮備禮文禮備唐吏部員外生觀國禮文蔡州司馬生貽慶庫部郎中少府監後魏又有斛律倍利侯案北齊書作倍俟利朔州刺史敕勒部人率眾內附生那瓌案北齊書倍俟利生幡地斤幡地斤生那瓌此闕一代為第一領人酋長生金北齊大司馬右丞相咸陽王生光羨武都案武都乃光之子詳下文此二字衍光字明月左太尉左丞相咸陽王長子武都太保羨生豐洛州刺史荊王案本傳羨字豐樂荊山郡王五子世達世遷世辨世酋伏護此作羨生豐誤斛斯其先居廣漢代襲莫弗大人號斛斯部因氏焉河南後魏比部尚書斛斯延生郭郭生樁尚書令太傅常山文宣公生徵徵生周齊州刺史岐國公孫成生道仲道濟道仲唐蘄州刺史禿髮河西鮮卑也與後魏同出聖武帝詰汾長子疋孤神元時率其部眾徙河西六代孫樹機能立盡有涼州之地子思復鞬生烏孤僭號西平王稱南涼都廣武弟利鹿孤傉檀三主十八年為乞伏熾盤所滅傉檀生賀歸後魏太武賜姓源氏夙沙英賢傳炎帝時侯國也因氏焉左傳齊宦者夙沙衛甪裡漢商山四皓綺里季之後案四皓有甪里先生疑里季乃甪里先生之誤陸終祝融子陸終之後福子齊大夫福子丹見國語牧師漢禮依周禮令主養馬後世因以為氏宿勤後魏帥宿勤名達木蘭姓苑木蘭氏任城人改為宿氏獨孤渾改為杜氏沃風俗通殷太甲子沃丁之後吳郡神仙傳沃焦吳人督宋大夫之後以王父字為氏漢督瓚見風俗通巴郡後漢巴郡蠻酋有督氏同羅樸鄂度夕龔為七姓僕周禮僕人後匈奴降者僕多封渾梁侯河南官氏志僕蘭氏改為僕褥廣信郡多此姓云本姓陸避事改姓褥鵠後漢巴郡蠻酋羅樸都鄂度夕襲凡七姓案後漢書巴蠻七姓都作督襲作龔無鵠氏惟姓氏急就篇及通志俱作姓出姓苑東海人續晉大夫狐鞠居食采於續又姓續氏是為續簡一云舜七友續牙之後漢初功臣表續相如封丞文侯上黨石趙有太子少保續咸又河東襄陽並有此姓束晉書云疎廣之後孫孟達避王莽亂自東海徙沙鹿山南田因去為束氏陽平元城漢隴西太守束混子龕為馮翊太守生晳字廣微晉尚書郎兄璆亦知名曲晉穆公封少子成師為曲沃支孫氏焉漢代郡太守曲澄陝郡貞元中陳許節度曲環陳許人粟漢治粟都尉因官為姓魏志袁紹魏郡太守粟舉蓐風俗通蓐收之後頊風俗通顓頊之後續祁晉祁奚舉子自代父子相續因為氏焉漢有續祁孟陽善易樂宋微子之後戴公生子衎字樂父子孫以王父字為氏曾孫樂呂呂孫喜字子罕燕有樂毅毅孫臣叔高祖封為華成君裔孫恢南陽淯陽恢子乾自趙徙南陽五代孫方方生廣字彥輔晉尚書令信陵公生凱益州刺史六代孫運隋咸陽令撰諫苑生質禮部戶部二尚書京兆狀云廣後唐御史大夫同三品樂彥瑋子思晦中書侍郎卓史記蜀郡卓氏本趙人以鐵冶致富徙臨邛即鐵山鼓鑄至僮千人田池射獵之樂擬于人君據祕笈新書增後漢太傅卓茂南陽宛人角後漢角善叔梁將軍角念姓氏急就章學見姓苑朔姓苑云南陽人樸見姓苑云東海人樂正周禮樂正因官氏焉孟子魯有樂正子春曾子弟子案樂正子春曾子弟子見禮記孟子弟子乃樂正子克此脫樂王左傳晉大夫樂王鮒之後漢有郎中樂王幾樂尹楚昭王以鍾建為樂尹樂利齊胡公支子為樂利氏畢周文王第十五子畢公高之後以國為氏晉有畢萬漢繆侯畢案漢書繆侯作膫侯東平後漢末袞州別駕畢諶見魏志元孫眾慶宋兗案唐世系表宋兗下有州大中正四字脫東征將軍五代孫憬唐衛尉少卿許州刺史生構栩椅構戶部吏部二尚書生抗兵部員外吳郡太守江南採訪使栩大理正工部郎中生曜御史眾慶弟敬魏兗州刺史六代孫君威唐遊擊將軍太原狀稱畢諶之後唐滁州刺史畢諴生操操生正表正則正義正表生重華緜州刺史生彥雄正義大理正新蔡晉吏部郎中畢卓漁陽大曆右庶子畢弘狀云畢諶之後洛陽畢萬之後河南官氏志云出連氏改為畢吉黃帝之允伯儵之後一云尹吉甫之後以王父字為氏漢有太守恪魏志吉茂晉魏興太守吉挹宋將軍吉幹馮翊漢同州刺史吉瞻瞻元孫琰唐絳華二州刺史洛陽唐易州刺史吉哲生頊天官侍郎平章事司勳郎中頊弟琚鄠縣令溫武部侍郎淮陰狀云挹後貞元戶部侍郎吉中孚乙殷王帝乙支孫以王父字為氏襄陽今襄陽有乙氏又燕鴻臚乙歸揚威將軍乙愛皆代北種類也河南官氏志乙弗氏改為乙氏或云望出平原案北魏乙瓌傳其先代人世統部落瓌父匹知遣瓌入貢遂仕魏為都督贈太尉進爵為王子乾歸孫海曾孫瑗皆襲爵位通顯帥狀云本姓師氏避晉景王諱改為帥氏南陽涅陽宋有帥覺授一云名昺著孝子傳臨川王義慶辟為州祭酒不就入宋書孝義傳案南史作師覺授宋書不載范陽開元中幽州人帥夜光上三元異義三十卷集賢院試三元策十道及第詔直國子監郅風俗通云有時國也子孫氏焉見毛詩漢有濟南太守郅惲案毛詩郅國未詳河東郅都之後汝南西平後漢長沙太守郅惲著書八篇子壽尚書令栗栗陸氏之後漢有高士栗融字客卿長安漢有富民栗氏長安人漢景帝栗夫人生臨江王漆魯相漆雕之後單姓漆氏實沈之後帙纂要云人姓漆雕漢功臣昔侯漆雕胡害魯人昭帝時將軍室中漢書藝文志有室中周著書十篇王莽時室中公避地漢中漢功臣表清簡侯室中同室孫氏今棣州有室孫氏氏族略乙弗前燕有高麗王乙弗利後魏書云代統部落太武時乙弗疋隨魏南遷遂為河南人孝文改為乙氏又有乙弗相周有乙弗鳳河南疋之子瓌定州刺史西平王生乾歸秦州刺史孫瑗西兗州刺史生子文文生遺恩隋右庶子遺恩生武唐金州刺史義昌令後魏又有屯騎校尉乙弗朗西魏車騎大將軍中書令乙弗繪女弟為文帝皇后乙千代人後魏獻帝弟姓為乙千氏居武川河南隋儀同乙千慶生定貴郭王府統軍又後魏靈州刺史乙千若生暉暉生達宗達生法通宗生端威乙千赤沙代別將疋婁改為婁氏後魏疋婁內千為齊神武王高歡武明皇后生文宣孝昭具婁氏叱奴改為狼氏西魏開府叱奴興周文帝叱奴后生武帝又有光祿大夫叱奴祐悉君古西掖國人密革見姓苑叱伏列周書云代郡西部人其先第一領酋長周侍中恆州刺史長安龜生椿大將軍案叱伏列龜周封長樂縣公此長安字脫誤一斗眷改為明氏乙速孤代人隨魏南徙河南後魏儀同乙速孤明生臺梁郡太守生貴北齊和仁公隋左庶子貴生安晟安晟生神慶唐衛率左領將軍神慶生行均行儼行方行儼唐廣州都督右武侯大將軍行均岐陽折衝生令從萬年令行方桂州司馬術見姓苑䏘古聿字見纂要文云人姓案今廣韻無此字屈楚公族芉姓之後楚武王子瑕食采于屈因氏焉屈重屈建屈到三閭大夫屈平字原屈正並其後也漢有屈燕汝南先賢傳有屈霸苻秦有屈伯產河南人吳尚書僕射屈晃大曆中職方郎中屈無易晉州刺史櫟陽尉屈同僊洛陽人河南官氏志屈六友氏改為屈氏案魏志屈六友氏作屈突氏茀左傳有茀翰胡禮記恤由之喪哀公使孺悲之孔子學士喪禮案恤由哀公子此人茀姓下當有脫誤𨚓漢有九江太守𨚓修鬱見姓苑尉遲與後魏同起號尉遲部如中華之諸侯至孝文時改為尉遲氏河南洛陽後有託哥拔五代孫乙紇豆生侯兜祐兜樂生迥綱案北周書尉遲侯兜生迥綱北史亦無尉遲兜樂名安允迥周太師大司馬蜀公生寬順安隋鴻臚卿生耆壽綱大司空吳案綱爵吳國公此脫生運運盧國公允生壽庫部員外案尉遲迥傳有從孫耆福官庫部員外當即允子安子名壽重出疑誤又司空長樂公尉遲長命生破侯相貴破侯北齊尚書令周汴州刺史黃源公相貴左僕射海昌王又後魏平東將軍尉遲說六代孫孟都生羅迦羅隋代州西鎮將軍生運運生紹宗左屯田將軍油江伯孫瓌卭州刺史迦隋烏程鎮將軍生敬德唐右武侯大將軍同州刺史鄂州忠公生寶林司衛卿右衛將軍生修寂修儼屈突本居元朔徙昌黎孝文改為屈氏西魏復本姓昌黎後魏中書令下蔡子屈突遵生須右僕射須生恆右僕射濟北公曾孫長卿卭州刺史生通唐兵吏二尚書蔣公生壽韓幹詮倫延壽駕部員外夏州都督生仲翔叔齊季將仲翔豳州都督生漪浩淑潾漪生藏用淑生鄂準潾生郇郾郾生鉉錡季將婺相二州刺史倫工部侍郎生琦俊右監門郎中俊生紹先虢州刺史延曾孫陝監察御史通弟蓋隋長安令生達操屈侯風俗通魏賢人屈侯史記漢有郎中屈侯豫屈南屈原裔孫仕後魏魏重複姓以自南來乃加南字或作屈男不更英賢傳秦公子不更之後或云秦大夫爵為不更因氏焉齊簡公時不更苗為執法也潛夫論宋大夫不更氏子姓之氏不蒙音夢西羌人後漢書不蒙娥使內附不夷世本宋不夷甫須之後佛圖晉書佛圖澄天竺高僧也本姓白氏永嘉中至洛弗忌晉大夫欒弗忌之後勿忸于官氏志云改于氏疑與勿紐于同乞扶改為扶氏越夏少康之後姒姓越王句踐裔孫王無疆為楚所滅子孫以國為姓氏河南官氏志越勒氏越彊氏並改姓越闕風俗通云古闕者官為姓王僧孺語云蕭遠娶下邳闕氏之女越椒楚令尹公子嬰齊子重之後越勒後魏有越勒部因氏焉越質詰後秦錄有北梁州刺史平襄公越質詰歸兀後魏改安樂王元鑒曰兀氏杌左傳檮杌之後紇干代人孝文帝改為干氏河南貞觀有紇干承基貞元僕寺丞紇干遂其後也生俞渭南縣尉紇骨後魏獻帝兄為紇骨氏居代北河南後魏太府卿義山公紇骨容生預邱公靜靜生貴紇骨大威唐利州侍中紇單改為紇氏今有日者紇單珤紇奚改為奚氏沒鹿回紇豆陵氏本沒鹿氏代人為沒鹿氏孝文帝改為竇氏骨咄祿改為祿氏突黎人西域人氏紇豆陵代人孝文改為竇氏吐谷渾吐谷渾歸化因氏焉河南唐右將軍吐谷渾景順葛風俗通葛天氏之允子孫氏焉夏時葛伯嬴姓國也亦為葛氏漢有潁川太守葛興後漢有汾葛令襲梁國葛興之後丹陽句容吳有葛奚為鴻臚神仙傳有葛元元從孫洪字稚川晉散騎常侍領大著作抱樸子一百一十六篇又晉有葛由河南官氏志賀葛氏改為葛達八凱叔達之後以王父字為氏葛伯夏時諸侯為殷所滅以葛伯為氏達奚後魏獻帝第五弟之後為十姓遠祖長寧公革生司空斤亦單姓奚氏與穆于陸婁賀劉尉為北人八族案魏宮氏志八姓中有稽氏非奚氏達奚以獻帝弟始改為氏八姓乃太祖舊勳在達奚得氏先當以史為正惟穆陵奚于四姓有之斤元孫武後周太保大冢宰鄭公也達步周文帝妃達步氏生齊王憲茹茹人達勃改為裒鶡冠風俗通楚賢人以鶡為冠因氏焉鶡冠子著書褐餘潛夫論云曲沃桓叔之後渴單改為單氏末本姓秣氏避仇改焉今秣陵是其後脫姓苑云人姓拔略後魏官氏志拔略改為蘇氏賀拔勝傳有都督拔略昶末那樓後燕錄有襄城公末那樓富滑滑伯周同姓國也為晉所滅以國氏焉案僖公十三年經書秦人入滑傳稱滅滑而還成公十三年呂相絕秦云殄滅我費滑則滑為秦所滅甚明此云晉滅疑有誤矣左傳鄭大夫滑羅京兆大曆有萬年尉滑廣察見姓苑滑伯英賢傳曰姬姓因氏焉陳留漢有滑伯堪為齊悼王中尉齧莊子齧缺堯時賢人學于王倪既通許由師之節周禮掌節上士子孫以官為氏鐵伐赫連勃勃以其本宗支庶非正統者並為鐵伐氏鐵弗改為弗氏薛黃帝二十五子一為任姓裔孫奚仲居薛至仲虺為湯左相代為侯伯歷三代凡六十四世周末為楚所滅公子登仕楚懷王賜師邑為大夫以國為氏曾孫卭生薛公鑒案唐世系表卭生倪倪生翁翁生鑒與此世數不合漢初獻滅黥布策受封千戶孫廣德御史大夫元孫永漢千乘太守案唐世系表卭元孫漢字公子官千乘太守此作永字不合八代子蘭徐州別駕為曹公所害生永遂歸于蜀先主官至蜀郡太守齊歸晉為光祿大夫齊生懿晉光祿河東太守懿生三子恢一名開號薛苞河東汾陰河東太守懿生三子一名開號北祖雕號南祖興號西祖元孫謹五子又號為五房西祖大房洪祚絕列風俗通古帝王列山氏之後子孫氏焉鄭有隱者列御寇著書八篇號列子悅後燕錄云左僕射悅真生壽南燕尚書昌黎悅綰鮮卑人清泉侯悅真亦其族也說姓苑云傅說之後以王父字為氏舌左傳越大夫舌庸別姓苑云京兆人薛孤代人隨魏南徙河南北齊恆農王薛孤康生買開府儀同三司新平王孫吳仁唐右金吾將軍朔方公生知素知檢知