弘為從兄季龍所殺自立子鑒遵並為冉閔所殺後趙六王三十四年案石趙起晉太興元年終永和七年凡七主共三十三年河南後魏官氏志烏石蘭氏改姓石魏司徒蘭陵公石猛猛生銓銓生真素初平素生萇萇生儁遠詢石儁生士濟唐原州總管詢生金剛左司衛率初平元孫抱忠天官侍郎今居虢州席本姓籍晉大夫籍談之後也談十三代孫瓌避項羽名改為席氏漢初徙關東豪族席氏後徙安定臨涇安定臨涇瓌十代孫廣後漢光祿勳元孫允魏酒泉郡守允元孫保苻秦尚書左丞生衡晉建威將軍寓居襄陽仕南朝四代衡孫固歸後魏湖州刺史靖安公元孫君懿唐侍御史懿曾孫建渙異晉建禮部尚書襄陽文公孫咎夔夔中書舍人生鴻又席法與裴叔業自南歸後魏拜并州缺昔風俗通周大夫封昔因氏焉漢昔登為烏傷令開元昔安仁生豐大理評事汝州人易左傳齊大夫易牙之後魏雍州刺史易愷魏郡人晉舂陵令易雄長沙人前涼將軍易挺籍晉文侯仇弟陽叔生伯黶司晉典籍為籍氏元孫籍談代為晉大夫晉為趙魏所滅籍氏播遷宋漢有倖臣籍端又諫議大夫籍禋石趙侍中籍罷唐太常博士籍知微云其後也射晉大夫虢射之後見左傳漢大鴻臚射咸吳中書侍郎射慈善禮喪服又音社奭召公奭之後以王父字為氏赤風俗通帝佶帝亦松子之後見神仙傳夕後漢巴中渠帥夕氏蜀志尚書令夕斌適見姓苑釋內典云悉達太子成道姓釋氏辟閭衛文公支孫以居楚邱營辟閭里因為辟閭氏漢書儒林傳太子少傅辟閭曾孫失名為昌邑王太傅石駘駘仲之後亦作石駘氏石之左傳齊有石之紛如石伯左傳伯名伯奐之後案左傳有召伯奐此疑誤赤張史記赤張徒父赤張開赤張哆並孔子弟子案莊子有赤張滿稽若孔子弟子史記家語俱無赤張氏惟漆雕徒父漆雕哆三人名同開漆雕疑因此誤赤章韓子赤章蔓枝智伯臣也錫吳志漢末交趾太守錫光仙人錫壽之後梁錫休儒為益州刺史狄周成王封少子於狄城因氏焉魯大夫狄虒彌古賢人狄儀仲尼弟子狄黑衛人裔孫漢博士狄山天水狄山子孫代居天水姚秦錄狄伯文官至中書令樂平侯將軍狄廣狄建義狄柴狄雄齊伯文裔孫又居太原曾孫孝緒唐尚書左丞右常侍臨潁男生知遜夔州刺史案知遜官越州刺史此作夔不合生仁傑納言內史令梁國公文惠公生光嗣光遠景昭光嗣戶部郎中孫博通博濟博通生元範光遠袁州司馬景昭職方員外酈黃帝之後支孫食采于酈因氏焉漢有廣野君酈食其沛人弟商為賈後為丞相生寄一名況其子疥封高梁侯傳封三代孫魏酈道元字善長注水經官至御史中尉戚衛大夫食采於戚因氏焉先賢戚子著書漢高祖戚夫人生趙王如意功臣表臨堅侯戚鰓傳封八代㲻古溺字見纂要糴左傳晉大夫糴茷析左傳齊大夫析歸父衛大夫析朱鉏公子黑其後也後漢析像通京氏易廣漢雒縣人析國為鬱林太守生像入後漢方術傳案後漢書析像乃折字從手此訛為析未詳析成齊大夫析成鮒職周禮職方氏因官為姓山陽令職洪因官居焉開元有職南金蔡州人民史記稷稷氏后稷之後子孫氏焉見姓苑漢稷嗣君叔孫通支孫亦為稷氏魯郡今兗州有稷氏力黃帝臣力牧之後魯郡漢有魯郡相力題因居焉棘衛大夫棘子成之後見論語文士傳曰棗祇本姓棘避仇改為棗潁州長社人息媯姓侯國為楚所滅子孫以國為氏今新息縣即其故地也息襄陽今襄州案此下似有脫文南越有此姓氏族略翼見姓苑河東今蒲州有翼氏晉翼侯居翼城因以氏焉東海下邳漢諫議大夫翼奉弋今蒲州有弋氏望出河南氏族略食見姓苑河南風俗通漢有博士食子公遼東後燕合浦公食勃東夷人嗇風俗通云古嗇夫子孫因氏焉即風俗通漢單父令即費其先食采即墨因以命氏即利韓子宋戴公時大夫即利渠彌稷邱英賢傳曰漢稷邱子得仙弋門姓苑云漁陽人國左傳齊卿族國氏代為上卿國共伯元孫歸父生綽綽生夏夏生聿及書並其族又鄭穆公子發字子國生輒字子耳生僑字子產以王父字為氏生參樂安漢魏郡太守國泉字子尼晉鎮南將軍王歆騎督國滿討張昌於隋郡案晉書新野王歆遣騎督靳滿討張昌非國氏也國滿未詳墨孤竹君之後本墨臺氏後改為墨氏望出梁郡戰國時宋人墨翟著書號墨子氏族略塞姓苑云人姓或天竺胡人之釋後即釋種也勒南越有此姓北人英賢傳古有劉河北人因氏焉莊子吳大夫有北人子高案通志引英賢傳古有劉河者處于北海其後以為氏又云周有吳大夫北海子高此云莊子誤北人又誤北宮衛公族頃子生去疾孫括生遺遺生貞子喜喜生結及肱左傳有北宮奢漢書有北宮伯子晉有西河太守北宮協前涼有護軍北宮萌北鄉左傳齊大夫北鄉啟北鄉子車說苑齊人有北鄉駱與晏子為友案左傳北郭啟北郭子車齊人北郭駱與晏子為友此俱誤北郭莊子舜友北郭亡擇晏子云古有北郭無擇清身潔己疾世之濁自投清泠之淵也案莊子有北人無擇此條當採入北人之下又誤為北郭北唐英賢傳曰晉有高人越者隱於北唐因氏焉漢有北唐子真治京氏易者北門左傳有北門駟尸子有北門子莊子有北門成北髮漢書燕遣北髮長賂遺公主北殷世本云子姓也北野見姓苑萬俟後魏獻帝季弟之後為十姓官氏志稱萬俟氏中閒失譜河南後魏夏州刺史樂寧公萬俟禮生雅周安城公孫元道唐秦府軍騎將車靈公生肅殿中監虢州刺史靈公生齊莊庭玉肅曾孫著元元生遜造案北史有萬俟普子洛字受洛干普封河西郡公洛太師大司馬太尉錄尚書尒朱時有萬俟醜奴黑齒百濟西郡人也唐右衛大將軍燕國公黑齒常之黑肱楚申公黑肱之後習風俗通云習國名也漢習響為陳相襄陽晉衡陽太守習鑿齒著漢晉春秋五十四卷左傳齊大夫習明史記齊習虛田成子時人汲風俗通衛宣公太子伋之後居汲因為氏焉濮陽漢淮昜太守汲黯其先七代為衛卿大夫弟汲仁亦至九卿偃諸侯相邑裘衛大夫柳莊卒公與之邑裘氏與縣潘氏故衛有邑裘氏見禮記合左傳宋大夫合左師之後向戌也蓋漢蓋公又司隸校尉蓋寬饒後漢二十八將左馮翊安平侯蓋延漁陽蓋延代居漁陽唐國子博士蓋文懿宋州人云其後也秦府學士諫議大夫蓋文達冀州人洛陽後漢蓋勳河南官氏志云蓋樓氏改為蓋氏葉風俗通楚沈尹戌生諸梁字子高食采于葉因氏焉吳志有都郡葉雄據祕笈新書增聶衛大夫食采于聶因氏焉史記軹人聶政殺韓相俠累漢潁川太守聶良護羌校尉聶尚又有聶壹吳志將軍聶友石趙梁閔中書舍人聶熊清河人輒風俗通衛出公輒之後以王父字為氏漢有輒終古錢塘史記錢塘輒終古封禦兒侯案史記作轅終古捷漢書藝文志有捷子三篇云齊人案漢書藝文志作二卷風俗通云邾公子捷菑之後以王父字為氏接三輔決錄接子昕著書十篇葉陽秦太后弟葉陽君子孫氏焉漢有諫議大夫葉陽通案史記秦太后弟華陽君通志亦有華陽通此俱誤接輿論語楚狂接輿隱者也其後為氏𨁂跌開元左威衛大將軍赤水軍副使武威公𨁂跌舒莢音夾韓相俠累之後急就章莢卻敵案急就章作俠卻敵若莢氏見世本晉有大夫莢成僖子牒云北齊營州刺史漢中山令牒云樂甲風俗通太甲之後一云鄭大夫石甲父之後以王父字為氏甲父古諸侯以國為姓周甲父氏見釋例漢有侍御史甲父沮法本媯姓田氏之裔齊襄王子法章支孫以名為姓扶風郿縣後漢南郡太守法雄雄子真順帝四徵不起號元德先生真生衍司徒掾衍生正字孝直蜀尚書令郡太守生邈漢陽太守
