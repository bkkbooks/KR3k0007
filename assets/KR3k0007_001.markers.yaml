千牛衛将軍景昭生嚴中書舎人京兆状云本望南安漢太尉龎参後今居京兆後魏直閣将軍龎伯元孫玉唐左武候将軍越州都督生廊職方郎中玉弟琳隴州刺史代郡状云本南安人後魏定州刺史比陽公龐雅生風風生晃隋原州總管比陽公生相夀右監門将軍安宜公孫貞素易州刺史右屯田将軍河東状云龐涓之後漢龐儉掘井得錢者北海燕慕容以北海龐美為股肱涳出何承天纂要苦江女江二反雙顓頊之後封於蒙城案通志作雙蒙城因以命氏天水状云後魏有梁州刺史疊水公雙上洛因家天水生彌周河州刺史平梁公彌周生陽唐右武衛大将軍定相二州總管杭州刺史陽生萬宏萬夀東都白馬縣唐瀛莒二州刺史雙子符逄夏殷諸侯有逄公伯陵封齊土其後子孫氏焉左傳齊大夫有逄丑父北海漢有大僕射逄信後趙秦州刺史碧唐中書舎人逄宏敏状云其後也元和姓纂卷一}
