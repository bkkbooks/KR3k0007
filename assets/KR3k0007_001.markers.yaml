  - {type: variant, offset: 569, length: 2, content: 涯述, WYG: 父字為氏漢有光禄勲弓祉太原弓祉案弓祉之祉一作阯之後後魏有博陵太守弓翊曾孫逸之逵之義徳州刺史案弓翊曾孫逸唐陳倉令生羲之逵之羲之徳州刺史此作義又作逸之疑有訛離石公生志和志宏志元彭祖志宏陳州刺史生嗣宗祠部員外嗣業洛州司馬志元右金吾將軍相州刺史陽國公彭祖揚府長史蒲州刺史晉陽公生嗣初嗣説嗣初雍州司功熊楚鬻熊之後以王父字為氏南昌晋侍中太常卿熊逺開元臨清尉熊曜又户部郎中熊執易並洪州人童顓頊生老童子孫以王父字為氏東莞姑幕後漢循吏童恢晉有童景宋有童厚民僮老童之後或為僮氏山陽後漢有吴郡太守僮和中何承天纂要云漢少傅中云案應劭風俗通漢少府中京通志引何承天纂要同此作少傅中云誤戰國䇿秦有中期吕氏春秋中尚魏公子牟之後魏得中山以邑與之遂以邑為氏史記有中旗崇夏殷時侯國也崇侯虎為文王所滅嵩史記有嵩極元子茙見姓苑春秋有茙律案左傳晉靈公車右戎津此作茙律與通志同誤河南後魏官氏志茙眷氏改為茙氏案後魏官氏志乃茂眷氏改為茂氏此作茙疑有誤躬何承天纂要云人姓宫虞大夫之竒之後殿中御史志惲河東今河東有宫氏大厯中侍御史宫頊或云恒州人也雄舜七友雄陶之後廣陵今揚州有雄姓肜尚書肜伯周同姓為氏成王宗伯案周書彤伯非肜也通志肜氏本彤氏避仇改為肜氏疑為近之公左傳魯昭公子公衍公為之後漢主爵都尉公儉酆文王第十七子酆侯之後蒙風俗通東蒙主以蒙山為氏紅出自劉氏漢楚元王子紅侯富之後鴻大鴻之後左傳衛有鴻聊魋翁比部郎中翁義恪通巴大夫食采通川因氏焉鬷古鬷夷氏之後左傳鄭有鬷蔑魯有鬷戾按齊有鬷聲姬种本姓仲氏仲山甫之後魏因避難改為种氏後漢有种暠洛陽後漢司徒种暠生拂拂生邵大鴻臚卿東里鄭大夫子産居東里因氏焉曹瞞有南陽太守東里昆何氏姓苑云東萊人太始先賢狀有東里冕魏志有東里衮東方風俗通云伏羲氏之後帝出於震以主東方子孫因氏焉平原厭次漢太中大夫東方朔字㬅倩唐禮部員外郎東方虬云朔之後生顥左拾遺安徳北齊南兖州刺史東方老東樓夏禹後有把東樓公支孫氏焉其後把大夫有東樓羽東郭齊公族桓公之後也齊大夫偃東郭書見左傳又大陸子方號東郭賈齊人荘子有東郭子魏文侯時東郭子恵見説苑齊郡漢有東郭先生拜都尉山陽神仙傳有東郭延東陽祖氏家傳祖崇之娶東陽元旋女又宋貟外郎東陽无疑撰齊諧記十卷東邱郯縣晉龍驤將軍東邱進東宫東宫棄疾隠嵩山年三百嵗公石魯僖公生共叔堅堅生恵叔子孫為公石氏公士古爵也子孫氏焉公山魯公山不狃一作不擾公沙見姓苑公孫黄帝姓公孫子孫因以氏焉河南隋沙州刺史無終公公孫微孫彦藻唐通州刺史昌平公安生欽洋啇等州刺史遼東後漢有公孫延生度為遼東太守子康生文懿三代處遼東後自立為燕王魏明帝遣司馬宣王平之三代五十年而滅後魏廣州刺史固安子公孫表稱度後孫叡尚書燕郡公曾孫遂青州刺史生長儒北齊涇州刺史孫正唐揚州司法櫟陽唐右衛大将軍征陽公公孫武孫逹生雅靖安西都䕶菑川薛縣漢有丞相平津侯公孫宏子度山陽太守隋菑州刺史公孫景茂代居信都狀云宏子度後生善政政生虞唐庫部郎中􅀈職方郎中北地義渠漢有西平太守公孫渾邪著書十五篇子賀丞相葛繹侯生敬聲太僕犯事父子俱死獄中遼西後漢前将軍易侯公孫瓚又春秋時諸侯亦為公孫氏上谷晉有隠者公孫風上昌黎九城山公伯魯有公伯寮仲尼弟子公父魯季悼子紇生穆伯穆伯生文伯歜文伯歜生成伯成伯生頃頃為公文氏見世本公成衛公成之後以謚為氏東郡白馬縣晉有散騎常侍公成綏案晉書夲傳乃成公綏非公成氏此有誤字子安有傳後魏有公成興學道仙公齊孔子弟子有公齊定公析衛穆公生公析黒臀其孫成子朱鉏以王父字為氏公索魯有公索氏将祭而亡其牲見家語公祖見纂要魯郡仲尼弟子公祖句兹公休姓苑趙平陵太守公休勝公孟衛襄公生公孟縶縶生丹為公孟氏公明衛大夫公明賈公賔王莽校尉公賔就斬莽首傳於宛就北海人公正古官也其後氏焉建安中朝邑令公正範吴人公之季悼子生思伯鞅鞅生懿伯柎為公之氏公乘古爵也子孫氏焉公乘不害傳封四代按此條疑有脫誤中行世本晉荀逝敖生桓子林父將中行為中行氏漢有諫議大夫中行説中英古帝少昊氏有六英之樂掌中英者以官為氏中野濳夫論微子之後楚文王御史中野彪中壘風俗通劉向為漢中壘校尉支孫以官為氏中黄尸子中黄伯桐里漢御史中謁者桐里斥生儒為議郎桐門宋人氏銅鞮晉羊舌氏之後戎子戎子駒支之後為氏終利嬴姓與秦同祖下邳漢有雍門侯終利恭後漢散騎都尉終利英終古風俗通桀内史終古後氏焉熊率楚熊率且比後為氏熊相楚左史熊相之後威王時有熊相季文為士官二冬彤本姓肜氏避仇改姓彤今道士彤也案彤伯周同姓國為成王宗伯者是也又肜氏夲彤氏避仇改為肜姓纂前既以彤為肜此又誤以肜改彤道士句亦有脱文宗周大夫宗伯之後以官命氏齊有宗樓南陽安衆河内太守宗均案豆盧詵嶺南節度判官宗羲仲碑昔宋襄公之母弟仕於晉至伯宗為三郤所害州犂奔楚其子家於南陽以王父字為氏此較宗伯之説似為有㩀又曰逺祖均東漢為九江太守累遷司徒此作河内太守亦異族曾孫宗俱司空均元孫慈慈十代孫躬躬孫瓊唐蘇州刺史冬日晉趙衰冬日之日