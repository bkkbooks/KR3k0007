  - {type: variant, offset: 4, length: 3, content: 原序元, WYG: 卷一上平聲東韻至江韻唐林寳撰一東馮周文王第十五子畢公髙之後畢萬封魏支孫食采於馮遂氏焉世本又云姬姓鄭大夫馮簡子後漢書云秦末馮亭為上黨守入趙其宗族或留潞或在趙秦丞相馮去疾御史大夫馮劫漢博成侯馮毋擇並亭之後也至馮唐徙安陵為楚相弟騫自上黨徙杜陵孫奉世大將軍生譚逡按馮奉世為左將軍此作大将軍誤又譚逡下脱立参二字野王野王左馮翊立上郡太守參冝都侯漢功臣又有閼氏侯馮解散榖陽侯馮谿𫝊封六代後漢司空馮勤魏郡人馮衍杜陵人生豹尚書司空魴南陽人廷尉馮緄巴郡人按閼氏侯馮解散漢功臣表作閼氏節侯潁川後漢征西大將軍夏陽侯馮異上黨漢左將軍馮奉世本世居上黨也長樂信都漢冝都侯參後晋有馮}
