  - {type: variant, offset: 359, length: 1, content: 宰, WYG: 氏蘄漢有宏農太守蘄良姓苑云蘄春侯之後狸左傳八元季狸之後菑音緇見姓苑北海孔融集菑莊青州人治出何氏纂文要音遲蚩蚩尤之後以國為姓慈髙陽氏才子之後羙其宣慈恵和因以為姓司馬重黎之後唐虞夏商代掌天地周宣王時裔孫程伯休父為司馬克平徐方錫以官在趙者曰凱以傳劔知名蒯瞶其後也在秦者司馬錯元孫昌生懌懌生善案史記太史公自序及漢書本傳俱作昌生毋懌毋懌生喜此悞善生談太史公生遷漢中書令河内溫縣蒯瞶元孫卭為趙將封武信君案司馬卭為趙武臣將武臣封武信君此作卭封武信君悞項羽封卭為殷王漢以其地為河内郡子孫家焉孫楷漢武都太守孫鈞後漢征西將軍曾孫防京兆尹生郎懿孚馗七代孫楚之後魏封琅邪王馗六代孫叔璠後魏冠軍將軍汝南王亮五代孫景之後魏蒼梧公琅邪冠軍蒼梧號三祖司馬氏琅邪王楚之即彭城王懽六代孫也楚之曾孫裔裔曾孫元祚唐庫部郎中生希奭希象希奭明堂尉生鍠銓鈇鍠吏部黄門中書三侍郎京兆尹生蒼錘益錘魏郡太守銓庫部郎中生望希象生爵郎中元祚再從子承禎字子益天台道士有髙行元祚四從子仁節大理評事生晧曜曜曹州刺史蒼梧公景之七代孫思溫唐左衞長史冠軍房子孫無聞亮生南頓王宋過江今號江南司馬氏宗八代孫宅}
