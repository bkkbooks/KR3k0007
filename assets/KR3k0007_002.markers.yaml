  - {type: variant, offset: 359, length: 1, content: 宰, krp: 氏蘄漢有宏農太守蘄良姓苑云蘄春侯之後狸左傳八元季狸之後菑音緇見姓苑北海孔融集菑莊青州人治出何氏纂文要音遲蚩蚩尤之後以國為姓慈髙陽氏才子之後羙其宣慈恵和因以為姓司馬重黎之後唐虞夏商代掌天地周宣王時裔孫程伯休父為司馬克平徐方錫以官在趙者曰凱以傳劔知名蒯瞶其後也在秦者司馬錯元孫昌生懌懌生善案史記太史公自序及漢書本傳俱作昌生毋懌毋懌生喜此悞善生談太史公生遷漢中書令河内溫縣蒯瞶元孫卭為趙將封武信君案司馬卭為趙武臣將武臣封武信君此作卭封武信君悞項羽封卭為殷王漢以其地為河内郡子孫家焉孫楷漢武都太守孫鈞後漢征西將軍曾孫防京兆尹生郎懿孚馗七代孫楚之後魏封琅邪王馗六代孫叔璠後魏冠軍將軍汝南王亮五代孫景之後魏蒼梧公琅邪冠軍蒼梧號三祖司馬氏琅邪王楚之即彭城王懽六代孫也楚之曾孫裔裔曾孫元祚唐庫部郎中生希奭希象希奭明堂尉生鍠銓鈇鍠吏部黄門中書三侍郎京兆尹生蒼錘益錘魏郡太守銓庫部郎中生望希象生爵郎中元祚再從子承禎字子益天台道士有髙行元祚四從子仁節大理評事生晧曜曜曹州刺史蒼梧公景之七代孫思溫唐左衞長史冠軍房子孫無聞亮生南頓王宋過江今號江南司馬氏宗八代孫宅}
  - {type: variant, offset: 361, length: 3, content: 李吉甫, WYG: 太子洗馬生遜晉譙剛王七代孫筠賢筠梁尚書左丞賢孫待微唐撫州刺史兄子利賔雲中北齊司空司馬子如稱晉南陽王模七代孫也兄子瑞吏部尚書㓜之大理卿瑞生同㳺侍中又刑部侍郎司馬逸客稱琅邪王馗後魏都官員外郎喬鄉鄠縣人也司徒帝王世記曰舜為堯司徒支孫氏焉衞文公生公子其許之後案衞有司徒暪成此公子其許未詳為司徒氏宋邉卭為其司徒後氏焉陳成公子亦司徒氏漢有安平相司徒肅中謁者司徒發禹為堯司徒支孫氏焉帝堯後有隰叔按此下疑有脱悞孫司徒發仕為晉司徒因氏焉晉大夫號司徒季子京兆上元潤州刺史司徒襲或云河内人署虞部郎中孫圖司城世本云宋戴公生東鄉克孫樂喜為司城氏陳哀公子邾勝之後亦為司城氏司㓂世本云衞靈公子郢子孫為司冦亥之後風俗通蘇忿生為司冦其後氏焉禮記恵子魯大夫司功世本晉大夫司功景子其先士匄也因官氏焉周有太史司功騎司揭古今人表有司揭拘又司揭扶楚靈王大夫見韓非子司工周宣王時司工錡因官氏焉綦母左傳晉大夫綦母張風俗通漢有廷尉綦母叅戰國策綦母子與公孫龍爭辯㑹稽後漢綦母俊為會稽主簿因居焉後漢交阯刺史綦母誾與荀爽事陳太邱魏有綦母廣明與管寧為友晉有綦母倪江左有綦母遂為邵陽太守前趙有綦母逹為特進吕都公綦母珍之為中書舍人南康開元右拾遺綦母潜䖍州人又北齊有信州刺史綦母懐文入藝術傳綦連代北人號綦連部因氏焉期引西秦録記乞伏氏與期引氏自漢北出隂山案晉載記乞伏之先與如弗斯出連叱盧三部自漠北出隂山無期引氏又國仁}
