  - {type: variant, offset: 907, length: 0, content: '', krp: 户部侍郎徐知世居桞城生抗揖抗醴泉令揖檢校員外生放屯田員外台州刺史范陽節度徐歸道居范陽生濟洛州刺史生復倰復祠部郎中倰比部郎中諫議大夫徐元之居南昌又生申嶺南節度兼御史大夫元弼中書侍郎徐安貞居衢州龍邱諫議大夫徐瑩刑部員外徐履道生蕃洛州刺史徐嶠之居㑹稽生浩浚漪浩吏部郎東海郡公有傳生璹現玫現泌州刺史浚生珽頊瑒珽都官郎中頊渭南領軍瑒閬州刺史閭齊大夫閭邱嬰之後或單姓閭氏頓邱鄴中記有閭澄王僧孺百家譜琅邪王緒娶頓邱閭澄女河内茍元安娶頓邱閭法興女唐朝左補闕閭知㣲三原唐蜀州司馬閭邱珣上元中准制改姓閭氏生曇曇倉部郎中代郡後魏征西將軍閭毗本蠕蠕來降舒風俗通云舒子之後以國為姓案即春秋羣舒舒鳩舒蓼之後居晉大夫先且居之後以王父字為氏漢來城侯居般渠周大夫渠伯之後衞有渠孔漢渠叅封贊侯蘧音渠衛大夫蘧瑗字伯玉之後漢大行令蘧正余見姓苑新安風俗通云余子之後以國為姓餘晉有餘頠著複姓録本出傅氏按世本韓宣子之後有韓餘氏又英賢傳云傅説子}
  - {type: variant, offset: 908, length: 3, content: 星衍撰, WYG: 㽞傅巖者為傅餘氏然則餘之所出傅與韓未可定也前燕有餘元餘和並鮮卑種類案北史百濟王姓餘氏輿自云周大夫伯輿之後以王父字為氏河南官氏志莫輿氏改為輿氏後魏有輿珍見賀㧞勝傳胥晉大夫胥臣之後有胥克胥梁胥帶胥午胥童瑯琊姓苑云瑯琊有胥氏䟽東海漢太子太傅䟽廣廣兄子受世為太傅樗史記秦國相樗里子之後名疾儲後漢儲太伯又富人儲姥王莽亂以五百人㨿大庾嶺開元汜水尉儲光羲潤州人生石石生燕客燕客生嗣宗校書郎生隐檢校郎中如桓譚新論有通人如子禮漢書長安富人如氏也馮翊魏陳郡如淳注漢書河南官氏志如羅氏改為如大歴有右羽林將軍如元擢沮音葅黄帝史官沮誦之後廣平魏志袁尚謀臣沮授前燕中常侍沮皓魚孫風俗通宋大夫魚石奔楚在國者因氏焉北海漢有魚孫登仕北海相孫静琅琊相生欽有孝行曽孫晦北海太守後漢宏農太守魚孫和生瑜魏雍州刺史瑜生瑋晉濟南太守下邳太守生平原太守生􅂒清河太守生邈之居京兆口東莞太守案此條有脱文諸葛諸葛氏夏殷侯國葛伯之後英賢傳云舊居琅琊諸縣後徙陽都先有詹葛時人謂之諸葛氏因氏焉風俗通云葛伯嬰為陳渉將軍有功非罪而誅漢文追封子孫為諸縣侯因以為氏世本云有熊氏之後為詹葛氏齊人語訛以詹葛為諸葛氏案孔平仲雜記諸葛氏以諸縣之葛徙陽都因加諸字以别於陽都葛氏琅邪陽都縣漢司𨽻校尉諸葛豐裔孫圭後漢太山郡丞生瑾亮瑾吳大將軍左都䕶宛陵侯生恪喬恪中書令揚州牧喬生攀翊武將軍生顥徙河東亮蜀丞相武鄉侯生瞻蜀尚書僕射瞻生京晉江州刺史與顥並徙河東亮族弟誕魏司空兖州刺史生靚奔吳為大司馬靚生恢東晉左僕射尚書令生甝梁有陵零太守諸葛銓居丹陽生頴北齊太子舍人隋著作郎頴生㑹唐有諸葛荗道諸梁楚文子食邑諸梁因氏焉閭邱世本齊閭邱産生嬰嬰生歐歐生莖莖生施齊郡左傳嬰明及閭邱息並齊宣王時閭邱卬閭邱光漢有廷尉閭邱􅈴漢太常閭邱遵有閭邱决著書十二篇晉有太常閭邱冲南陽太守閭邱羨土又家漢州沮渠本臨松盧水人先為匈奴官號沮渠因氏焉吳有沮渠萬為張掖王晉末沮渠蒙遜僣稱西河王號凉都張掖二主三十九年為後魏所滅渠邱風俗通莒有渠邱公因氏焉彭城英賢傳云彭城有渠邱氏焉渠複漢武時屬國酋師渠復累封昆侯傳子絶於陵風俗通云陳仲子齊世家也辭爵灌園於於陵子孫氏焉於邱其先家於邱因氏焉漢有宛句人於邱略舒鮑世本偃姓國也晉悼公子舒鮑無終舒堅濳夫論楚公族有舒堅文叔為大夫舒鳩左傳少昊氏官名國于濟北以國氏焉按舒鳩楚屬國左傳少皡五鳩氏無舒鳩悮余邱齊公族食采余邱因氏焉漢有侍御史余邱炳又隠士余邱靈居曲河茹茹其先蠕茹茹種類為突厥所破歸中國後魏蔚州刺史髙平公茹茹敦思周寧州刺史洋公生師寳海賔師寳隋騎大將軍安次公生盛夀海賔唐右屯衞大將軍樗里見英賢傳濟南晉有樗里璠著春秋土地記三卷徐吾左傳鄭大夫徐吾犯之後徐盧漢景帝時匈奴徐盧庸來降如嵇改為綾氏案魏官氏志作緩氏此悮十虞虞虞有天下號曰虞子商均因以為氏又武王封虞仲於河東亦為虞氏㑹稽餘姚人趙相虞卿秦有虞香香十四代孫意自東郡徙餘姚五代孫歆歆生翻翻曽孫驤驤七代孫荔荔子世南唐秦府學士秘書監永興公生昶工部侍郎生茂世孫遜郎中歴沔州刺史云荔之後濟陽狀云逸人虞仲之後靈武廻樂狀云本自㑹稽徙焉後周有沁源公虞詳生慶則隋右僕射魯公孫操唐長江令于周武王第二子邘叔子孫以國為氏後去邑為于案淳于氏唐避憲宗諱亦為于氏東海漢有于公生丞相西平公定國生永御史大夫魏有將軍于禁唐中書舍人于季子今居齊郡歴城姪儒卿河南洛陽後魏書官氏志勿紉按紉當作紐字于氏改姓于魏書新安公于栗磾生洛㧞尚書令生烈勁天恩烈勁殿中尚書中書令案北魏書洛㧞六子烈敦果勁洎天㤙烈殿中尚書勁定州刺史此以烈勁為一人悮天㤙生曾尚書生提按北魏書天㤙生仁仁生子安子安生子提子提生謹與此不合京兆提生謹從西魏孝武帝入闗周文帝下令應從入闗并為京兆長安人太師柱國燕文公生實翼義智紹弼簡按唐世系表燕文公九子實翼義智紹弼簡禮廣此闕二人實周司空固安公按唐世系表固安公當作燕安公號蘭陵院生顗仲文惲象賢顗隋黔州總管生䖍按唐世系表䖍作世䖍哲䖍生儉左屯衞將軍哲亳州刺史仲文隋右翊按翊下脱衞字大將軍延夀公生禮部侍郎敏直按唐世系表仲文生欽明欽明生敏同敏直敏同生經野敏直生光運此脱相州刺史生光運滁州刺史惲孫敬之復州刺史象賢隋黔昌公生德基德威按世系表德威作德成徳行徳方徳基生素倉部郎中徳威生元範敬同案唐世系表敬同乃仲文之孫欽明之子元範安州司功生汪汪生公胄庭順庭誨庭謂可封公胄生頵䪻庭誨生顒天興令顒生畛庭謂生頎頴按頴下疑脱頲字頎工部尚書太子少保生申廣翬申屯田員外頲生富平令按唐世系表頲生當吉州刺史瓊按瓊當係德基德威軰孫今姓篹脱其所自生䪹頔䪹户部郎中按唐世系表作户部侍郎頔左僕射司空平章事燕公生正方敏季友季友駙馬殿中少監可封國子司業敬同生安仁江州刺史德行恒州刺史生元徹思言元徹滄州刺史思言兵部郎中太府卿徳方越州刺史㑹昌男翼周常山公隋太尉生璽按唐世系表璽下脫銓一人筠璽江陵總管黎陽公孫元嗣右金吾將軍銓按銓吏部下大夫常山公原誤作詮今從世系表曾孫瑾駕部郎中筠太僕卿元孫抱誠成州刺史生邵郢邵禮部侍郎太子賔客生按唐世系表尚有汝鍚訢誠三人此脱允躬臯謩人聞按唐世系表允躬作尹躬人聞作人文允躬中書舍人洋州刺史臯謩户部侍郎人聞生德孫晦案唐世系表徳晦乃郢之孫寮師之子郢衛尉少卿生寮師雍來義隋潼州總管建平公生宜道按世系表作宣道宣敏無亮字宣敏生志寧又按唐書志寜傳父宣道隋内史舍人世系表悮以志寕為宣敏子今從本傳改宣此作宜亦異亮宜道生永寧志寧保寧永寧商州刺史生遂古隰州刺史志寧左僕射太子太師燕公生立政慎言立政吏部郎中太僕少卿生游藝辯機光遠大猷游藝生伯獻凉州都督辯機揚州長史左庶子常絳二州刺史光逺職方郎中大猷隨州刺史慎言生安貞吳興令安貞生仙鼎黙成仙鼎泌州刺史黙成沛令黙成生嘉祥休徴休烈烈太常卿工部尚書東海公生益肅益諫議大夫肅給事中肅生敖監察御史敖生球珪環按唐世系表環下尚有琄此脱琮保寧生丞範丞慶丞範平州刺史曽孫結諫議大夫生亮亮生貴寧按貴寧與六世祖同名寧似有悮主客員外郎平昌公生禮周趙州刺史安平公禮周生武乾倉部郎中禮少子按此處脱名周華陽公孫德秀彭州刺史提次子彪豐川公生寛隋右武將軍清河公孫仁表兵部員外江陵狀稱定國之後自東海徙焉唐延州刺史子俊生惟謙兵部侍郎平章事生光宰光弼光嗣光宰都官郎中姪光偉光業光進齊郡厯城唐屯田郎中于利貞状云夲出東海長安唐右武候大將軍于伯億狀云于禁之後居京兆長安知機太僕少卿懐徳公須風俗通太昊風姓須之後有須句國又殷有宻須國為氏魏有須賈平陸侯須無紹傳封四代愚愚公之後今無聞禺禺強之後出姓苑芻牛衰食芻按牛哀見淮南子此作衰恐悮改姓芻氏見姓苑毋音無毌邱氏或為毌氏開元右補闕毌煛洛陽人一云吳人案急就章毌煛作毌景巫風俗通云氏於事巫乙匠陶也殷有巫咸巫賢漢有冀州刺史巫㨗又有巫都著養性經瞿音渠晉東海王越參軍瞿莊博陵人殳尚書殳斨舜臣名咎繇所譲共六人南朝嘉興殳季真符魯頃公孫公雅為秦符璽令因為氏琅邪漢有陳留相符季真元孫表後漢齊郡太守光禄大夫符融苻前秦主苻健本以有扈氏之後為啓所滅奔西戎代為酋本姓蒲蒲洪以孫堅背上有草付文改為苻武都按蒲洪略陽臨渭氐人子苻健晉永和七年僣位都長安武都二字有脱文苻堅生丕堅孫登僣號長安自健至登五代為姚興所滅後周㐮州刺史龍居公苻猛臨渭人元孫遷敵唐金州刺史苻子珪弟太子舍人璋臾音俞顓臾風姓之後晉大夫臾駢俞又吐淄反前趙劉聦中常侍俞容天后時俞文俊江陵人按列子有俞氏以醫著扶漢有廷尉扶嘉河南官氏志云乞扶氏改為扶俱南凉有鎮北將軍俱延開元國學士俱匡辟朱顓頊之後周封曹挾於邾為楚所滅子孫去邑以為氏一云舜臣朱彪之後齊有朱毛漢中邑侯朱進鄢陵侯朱濞吳郡漢功臣有都昌侯朱軫至買臣㑹稽太守呉有將軍朱桓生異唐諫議大夫朱子奢云異之後錢塘漢槐里侯朱雲之後八代孫至賔後漢光禄勲始居錢塘為著姓十代孫遜之齊吳平令生梁領軍朱异异曽孫延慶唐倉部郎中也沛國相縣今有朱氏自云丹朱之後以王父名其後永城譙郡唐正議大夫平章事朱敬則工部侍郎義陽漢有朱穆晉有朱序序孫循之也丹陽後漢司空朱浮晉有朱齡右中書舍人朱巨川生宿右拾遺宿生賀大康後漢朱岑唐駕部郎中前疑其後也河南官氏志渇燭渾可朱渾氏並改為朱氏虞邱晉大夫虞邱書楚莊相虞邱子薦孫叔敖自代趙郡説苑云漢光禄大夫虞邱夀王漢書作吾邱巫馬史記巫馬施字子期魯人也仲尼弟子巫咸姬姓臯陶氏之後其國今舒州人案其國今舒州人六字當有脱誤巫臣晉大夫欒巫臣之後案申公巫臣奔晉巫臣楚屈蕩之子屈申也晉無欒巫臣無婁莒大夫無婁務胡之後又無婁先生著書琅邪今琅邪有此姓無圉公羊楚大夫無圉之後無鈎潜夫論楚蚠冐生薳章為王子無鈎氏無弋秦厲公時羌人無弋爰劔之後今隴西人毋將見姓苑東海蘭陵漢南郡太守毋將隆本京兆尹執金吾又毋將衣明易為豫章太守毋終左傳毋終子喜父翟國君也因氏焉案左傳作無終須遂左傳遂國在齊北有須遂氏須肑須肑楚賢人著書須卜改為卜氏厨人周禮厨人因官為氏案周禮無此官厨人濮見左傳邾婁公羊邾婁子曹姓也子孫以國為氏夫餘風俗通吳公子夫槩王奔楚餘子在吳者因以為氏焉百濟國王夫餘寛生璋號帶方郡王生義慈大唐拜帶方郡王金紫光禄大夫貞觀入朝生隆熊州都督隆生文宣司膳卿左衞大將軍樂浪郡公元和姓纂卷二}
