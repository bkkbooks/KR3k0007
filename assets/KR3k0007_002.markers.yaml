  - {type: variant, offset: 850, length: 0, content: '', WYG: 中梁州都督令儀生鑒鑾錡鎔鎰鑾生應物蘇州刺史應物生慶復鎔生繫岳州刺史鎰監察御史生武兵部侍郎生京京兆尹案唐世系表武為京兆尹後無人此作生京或因京兆字悞未詳烈曾孫宏景司門員外郎翰林學士興宗生令望令悌令裕令望生叔卿丹州刺史叔卿生澣滌澣昭應令滌饒州刺史令悌孫汎江州刺史令裕屯田員外萬石吏部郎中太常少卿知吏部選德運生山甫吉甫山甫屯田郎中吉甫司門郎中生按生字疑衍約隋儀同觀城公生克己後己克己生遥光萬年令後己曾孫誠奢殿中御史誠奢生晊兵部郎中晊生公輔公素公度公璵公肅旭次子鄖國公裕字孝寛周大司徒尚書令生緫夀霽津靜案鄖襄公六子唐世系表尚有諶一人此脱緫生匡伯圓照匡伯生思言思齊思仁思言生逞光禄卿思齊司稼卿生案唐世系表思齊生紀此脱衞尉卿懐寧公思仁尚衣奉御生巨源液巨源侍中生明剔華州刺史液孫寡悔圓照孫觀生潤案唐世系表圓照生觀觀生爽爽生潤與此不合鴻潤生昭信滄州長史中丞鴻案唐世系表鴻作湜生昭訓太僕昭訓生光宰太僕少卿光裔少府監光弼大理少卿光弼生廌庠庇元光胄太常少卿生慶光輔大理少卿夀隋恒州刺史滑國公生寧巒義節寧巒右衞副率孫知逹案唐世系表知逹作知逺監察御史義節刑部侍郎襄城公孫慎行慎名慎惑慎行生濳渙濳澧州刺史渙嘉州刺史慎名彭州刺史慎惑右驍騎將軍霽隋岐州刺史左常侍致仕津隋隴州刺史黄門侍郎吏部尚書唐諫議大夫太僕少卿夀光男生金璧案唐世系表金璧作全璧琬琨璲瑜金璧生悦忻季重憺悦給事中生勉幹勉復州刺史忻兵部郎中生希先夐案唐世系表夐作奐希一謇希先比部郎中夐虞部郎中杭州刺史季重生烈都官員外烈生邁迪憺生千里持盈千里生昻昻生宏琬職方員外成州刺史生令則叔夏季良才絢安石季弼叔夏禮部侍郎生縚太常卿太子少師縚生宏協義才絢溫王府司馬生求回由韶嬰最睦由鴻臚少卿生士炎堚址墀韶明州刺史生大冏嬰生士南萬州刺史士文秘書少監安石中書令郇文貞公生陟斌陟吏部尚書生士瞻允允吏部員外潁州刺史四代入省允生同元同訓斌中書舍人汝州刺史生衮曼渢襄旉凛况衮駕部郎中四代入省生同懿同休同憲渢洛陽令凛朗州刺史况諫議大夫季弼生亷考功員外亷生肅端端生縝紓琨户部侍郎太子詹事生暢展初平案唐世系表初平作㓜平調翼暢生抗楫拯抗刑部尚書生翹同州刺史拯户部郎中生演展孫澣閬州刺史初平生抱貞梓州刺史抱貞生綆政政生丹丹生宙調孫崟隴州刺史翼太府卿璲倉部郎中瑜}
