  - {type: variant, offset: 907, length: 0, content: '', WYG: 户部侍郎徐知世居桞城生抗揖抗醴泉令揖檢校員外生放屯田員外台州刺史范陽節度徐歸道居范陽生濟洛州刺史生復倰復祠部郎中倰比部郎中諫議大夫徐元之居南昌又生申嶺南節度兼御史大夫元弼中書侍郎徐安貞居衢州龍邱諫議大夫徐瑩刑部員外徐履道生蕃洛州刺史徐嶠之居㑹稽生浩浚漪浩吏部郎東海郡公有傳生璹現玫現泌州刺史浚生珽頊瑒珽都官郎中頊渭南領軍瑒閬州刺史閭齊大夫閭邱嬰之後或單姓閭氏頓邱鄴中記有閭澄王僧孺百家譜琅邪王緒娶頓邱閭澄女河内茍元安娶頓邱閭法興女唐朝左補闕閭知㣲三原唐蜀州司馬閭邱珣上元中准制改姓閭氏生曇曇倉部郎中代郡後魏征西將軍閭毗本蠕蠕來降舒風俗通云舒子之後以國為姓案即春秋羣舒舒鳩舒蓼之後居晉大夫先且居之後以王父字為氏漢來城侯居般渠周大夫渠伯之後衞有渠孔漢渠叅封贊侯蘧音渠衛大夫蘧瑗字伯玉之後漢大行令蘧正余見姓苑新安風俗通云余子之後以國為姓餘晉有餘頠著複姓録本出傅氏按世本韓宣子之後有韓餘氏又英賢傳云傅説子}
