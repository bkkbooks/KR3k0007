  - {type: variant, offset: 457, length: 183, content: 亦未知何以異至郡齋讀書志作十一卷則古人每兼序錄為卷數不足異也姓氏與郡望相屬乃知宗派所出樂史作太平寰宇記載人物著姓於郡縣之下亦有深意三代以上官有世祿各居其國都自漢時徙豪右入關而郡望非其土著晉室板蕩中原大族半皆南渡譜牒亡失北朝以三字二字複姓改為一字或與古姓相亂僅賴魏收官氏志以別之及宋南遷士夫復多喪其譜牒至明太祖不能舉曾高之名其後官無譜局私撰家狀者率皆未見古書不能遠考漢, WYG: 按}
