  - {type: variant, offset: 368, length: 3, content: 十旬而, WYG: 年徐滅釐子子孫氏焉茲母左傳齊大夫茲母還漢有侍御史茲母恒八㣲韋顓頊氏之後大彭為夏諸侯彭子受封豕韋周赧王㓕之以國為氏因家彭城至孟又遷魯京兆杜陵孟元孫賢漢丞相扶陽侯徙京兆杜陵生元}
