  - {type: variant, offset: 230, length: 0, content: '', WYG: 卿士樊仲皮之後皮氏漢有諫議大夫皮究下邳後漢上計掾秦嘉集叙皮仲固撰晉有尚書郎皮諶宋武康令皮􅂒年並下邳人王僧孺百家譜云茍昭娶下邳皮仁之女後魏有皮豹子隋書旭州刺史皮子信今大理司直遐叔南昌人媯音規世本帝舜之後舜生溈汭子孫氏焉漢有媯皓後改為姚氏文士傳有媯覽竒見姓苑云伯竒之後以王父字為氏一曰魯昭公子竒之後漢書南郡太守竒昆河南後魏官氏志竒斤氏改為竒羲羲和堯掌天地之官子孫氏焉戲伏羲之後子孫氏焉儀衞大夫儀封人見論語大夫儀楚西河漢有儀長孺驪左傳驪戎國之後在應昭縣案應昭唐志作昭應古新豐縣唐改名昭應宋大中祥符中改臨潼縣東有驪戎故城卑卑耳國人之後或云鮮卑衆類漢有北平太守卑躬河間人雁門後漢太尉掾卑釐又魏志公孫度將有卑術訾風俗通帝嚳妃訾娵氏女姓苑云今齊人漢書漢功臣表有樓虚侯訾順斯姓苑云呉人呉志郯縣吏斯從也東陽南齊書東陽郡有斯氏彌史記衞公孫彌子瑕以王父字為氏三輔决録云王莽時彌強新豐漢末新豐人中叔見决録猗音伊史記猗頓魯國富人河東猗氏猗頓自魯居之馳見姓苑馳湛馳竈宣城姓苑云今宣城有馳氏池以所居為姓漢有中牟令池瑗魏有城門侯池仲魚眭趙大夫食采眭邑因以為氏按眭宏見漢書眭固見魏志睦夸見北史蕃音皮其先出自魯大夫食邑於蕃因以為氏後漢黨錮傳有蕃嚮按廣韻蕃無皮音惟集韻音皮考左傳疏引魯國地理志曰番讀如藩屏之藩言魯國南藩也汝南陳子㳺為魯相子㳺者藩之子也國人避諱遂改皮音又白褒魯國記同今附入支韻彌且後秦冠軍大將軍彌且婆獨遼東侯彌且髙地立節將軍彌且成後魏末都督彌且元進夏州酋望也唐右領軍將軍延州刺史戲陽英賢傳曰秦穆公時有戲陽伯樂善相馬漢有侍御史戲陽放差師世本魏公族有差師氏六脂伊帝堯伊祁氏之允裔孫伊尹名摯相湯生陟奮風俗通漢有議郎伊推又伊喜嘉為雁門都尉石顯黨也山陽蜀志伊籍山陽人今右僕射安廣節度伊慎廣州人河南官氏志伊婁氏改為伊氏後魏有伊婁馛代人郗出自己姓青陽氏之後蘇忿支孫封郗邑因氏焉趙有郗疵髙平金鄉秦末郗氏自晉陽徙髙平蜀有郗正偃師人漢魏之際司徒郗慮慮元孫晉太宰南千宫鑒生超超生愔鑒五代孫曄女為梁武皇后唐庶子昂盖其後也生士羙澤潞節度也祁帝堯伊祁氏之後左傳晉大夫祁奚生午午生盈生勝姓苑云今扶風有此姓唐刑部員外郎祁順樂陵祁順之後居滄州師風俗通師樂人瞽者稱晉有師曠魯有師乙晉師悝師觸師蠲琅邪東武漢丞相髙樂侯師丹後漢師宜官案師宜官别為師宜氏工書晉石勒為師歡奴按晉書載記師懽茌平人歡作懽資黄帝之後食采益州資中因以為氏陳留風俗通資成陳留人飢左傳殷人七族有飢氏按左傳飢氏作饑尸漢書尸佼晉人為商君師著尸子風俗通云其先封於尸鄉故為尸氏齊相有尸臣按廣韻注晉人作秦人嫘出自西陵氏女嫘祖為黄帝妃後世以嫘為氏刕蜀有刁逹之後避難改焉按廣韻注作刀逵非刁逹麋楚大夫受封南郡麋亭因以為姓東海朐山漢有麋敬蜀志有麋竺生芳案蜀志作竺弟芳宋有麋朂之又麋信撰説要注榖梁案麋信之麋一作糜邳左傳晉大夫邳鄭邳豹案左傳邳鄭丕豹俱不从邑信都風俗通云奚仲為夏車正自薛封邳其後為氏後漢二十八將有衞尉信都邳彤㔻左傳魯桓公㔻之後以王父名為姓其後有㔻無還案魯桓公名允此作㔻悞且亦不得為㔻氏所自出通志}
