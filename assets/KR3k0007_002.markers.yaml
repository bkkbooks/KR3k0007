  - {type: variant, offset: 906, length: 0, content: '', WYG: 中丞向司勲員外陳宋荆州刺史謐孫摯昭虞部郎中生孟嘗越相二州刺史致仕昕萬年令生琇冀州刺史生縯兵部郎中諌議大夫生縝宏毅縝朗州刺史宏毅侍御史儉孫充充次子機生韜韜生逸監逸元孫超之生摛梁左衞將軍生陵孝克陵陳尚書僕射生儉份儉右軍將軍生徳言陳太子舍人隋蒲州司功份陳中書舍人生令言唐中書舍人生茂宏孝克陳都官尚書隋國子博士監元孫融南昌令生勉梁尚書僕射居相位二十年生􅉓倫式序生山松悱矩按矩下疑脱權字悱晉安内使矩度支尚書權後梁右僕射孫瑜生元度唐弋陽令東陽偃王之後漢徐衡徙髙平孫饒又徙東陽七代至融融五代孫之才之範並北齊有傳繼封西陽王之才官至尚書令孫師順唐勝州總管髙平公之範孫仲宗衞尉大卿任城公生慶祚慶右司郎中祚度支郎中東莞姑幕漢費封東莞侯因家焉晋有邈廣子孫無聞髙平山陽縣今𨽻兖州後漢徐範生仲長避難山陽居焉北齊徐逺仲長之後官至西兖州刺史新陽王生榮孫太元唐倉部郎中長城與有功同承寧寧曾孫廣之晋呉興太守因居長城八代孫孝徳唐水部郎中生齊􅅨西臺舍人生堅中書舍人刑禮黄門三侍郎左右常侍東海文公生峻嶠峻金部郎中生旻駕部員外嶠中書舍人河南少尹生曇暈自孝徳至旻五代入省自齊􅅨至嶠三代中書舍人琅琊晋僕射宣之後宋有徐爰濮陽偃王之後今無聞於濳偃王之後為杭州望族新豐本出髙平徐範之後西魏度支尚書金鄉男徐招有傳云父㣲自髙平從魏孝武入關始居新豐招生會實雲孫仁􅁤龔州刺史會生正則眉州刺史實生荘銀州刺史生元揮都官郎中瑖邱北齊徐州治中狀稱本髙平人世居瑖邱曾孫仁㑹髙郵令生彦伯給事中工部侍郎右常侍太子賔客生鐈鍔鍔洛陽令司封郎中諸郡徐}
