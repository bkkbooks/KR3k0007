  - {type: variant, offset: 354, length: 3, content: 錄解題, WYG: 見孟子新論有時農鉅鹿魏有夀春令時苗後趙有謁者僕射時軌姓苑云並鉅鹿人也陳留唐登州刺史時德叡世居汴州尉氏曾孫元佐潁州刺史怡本姓墨台孤竹君之後因避事改焉後魏有怡寛遼西人生峯後周樂陵公生昂鄀公光清河公旗風俗通楚大夫居旗思城因}
