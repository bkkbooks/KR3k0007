  - {type: variant, offset: 165, length: 291, content: 王第十五子畢公高之後畢萬封魏支孫食采於馮遂氏焉世本又云姬姓鄭大夫馮簡子後漢書秦末馮亭為上黨守入趙其宗族或留潞或在趙秦丞相馮去疾御史大夫馮劫漢博成侯馮毋擇並亭之後也至馮唐徙安陵為楚相弟騫自上黨徙杜陵孫奉世大將軍生譚逡案馮奉世為左將軍此作大將軍誤又譚逡下脫立參二字野王野王左馮翊立上郡太守參宜都侯漢功臣又有閼氏侯馮解散穀陽侯馮谿傳封六代後漢司空馮勤魏郡人馮衍杜陵人生豹尚書司空魴南陽人廷尉馮緄巴郡人案閼氏侯馮解散漢功臣表作閼氏節侯潁川後漢征西大將軍夏陽侯馮異上黨漢左將軍馮奉世本世居上黨也長樂信郡漢宜都侯參後晉有馮和孫跋僭號都龍城稱北燕弟弘為後魏所滅弘生朗生姬姬女弟魏文成皇后燕熙孫子琮, WYG: 遥}
