  - {type: variant, offset: 1214, length: 141, content: 嗣初嗣說嗣初雍州司功楚鬻熊之後以王父字為氏熊克家譜曰鬻熊為文王師著書一卷號鬻熊子至成王時舉文武勤勞之後以子男之田封熊曾孫繹於楚是為楚子熊繹也三國時有徵士熊僧循尚書熊睦乂江陵志曰黃帝有熊氏之後自熊克家譜至此據祕笈新書增南昌晉侍中太常卿熊遠開元臨清尉熊躍又戶部郎中熊執易並洪州人鴈門顓頊, WYG: 雄雄}
