  - {type: variant, offset: 1356, length: 867, content: 老童子孫以王父字為氏東莞姑幕後漢循吏童恢晉有童景宋有童厚民老童之後或為僮氏山陽後漢有吳郡太守僮和何承天纂要云漢少傅中云案應劭風俗通漢少府中京通志引何承天纂要同此作少傅中云誤戰國策秦有中期呂氏春秋中尚魏公子年之後魏得中山以邑與之遂以邑為氏史記有中旗夏殷時侯國也崇侯虎為文王所滅史記有嵩極元子見姓苑春秋有茙律案左傳晉靈公車右戎津此作茙律與通志同誤河南後魏官氏志茙眷氏改為茙氏案後魏官氏志乃茂眷氏改為茂氏此作茙疑有誤何承天纂要云人姓虞大夫之奇之後殿中御史志惲河東今河東有宮氏大曆中侍御史宮頊或云恆州人也舜七友雄陶之後廣陵今揚州有雄姓尚書肜伯周同姓為氏成王宗伯案周書彤伯非肜也通志肜氏本彤氏避仇改為肜氏疑為近之左傳魯昭公子公衍公為之後漢主爵都尉公儉文王第十七子酆侯之後風俗通東蒙主以蒙山為氏出自劉氏漢楚元王子紅侯富之後大鴻之後左傳衛有鴻聊魋比部郎中翁義恪巴大夫食采通川因氏焉古鬷夷氏之後左傳鄭有鬷蔑魯有鬷戾案齊有鬷聲姬本姓仲氏仲山甫之後後因避難改為種氏後漢有種暠洛陽後漢司徒種暠生拂拂生邵大鴻臚卿鄭大夫子產居東里因氏焉曹瞞有南陽太守東里昆何氏姓苑云東萊人太始先賢狀有東里冕魏志有東里袞風俗通云伏羲氏之後帝出于震以主東方子孫因氏焉平原厭次漢大中大夫東方朔字曼倩唐禮部員外郎東方虬云朔之後生顥左拾遺安德北齊南袞州刺史東方老夏禹後有杞東樓公支孫氏焉其後杞大夫有東樓羽齊公族桓公之後也齊大夫偃東郭書見左傳又大陸子方號東郭賈齊人莊子有東郭子魏文侯時東郭子惠見說苑齊郡漢有東郭先生拜都尉山陽神仙傳有東郭延祖氏家傳祖崇之娶東陽元旋女又宋員外郎東陽元疑撰齊諧記十卷郯縣晉龍驤將軍東邱進東宮棄疾隱嵩山年三百歲魯僖公生共叔堅堅生惠叔子叔為公石氏古爵也子孫氏焉魯公山不狃一作不擾見姓苑黃帝姓公孫子孫因以氏焉河南隋沙州刺史無終公公孫微孫彥藻唐通州刺史昌平公安生欽洋商等州刺史遼東後漢有公孫延生度為遼東太守子康生文懿三代處遼東後自立為燕王魏明帝遣司馬宣王平之三代五十年而滅後魏廣州刺史因安子公孫表稱度後孫叡尚書燕郡公曾孫遂青州刺史生長儒北齊涇州刺史孫正唐揚州司法櫟陽唐, WYG: 胄}
