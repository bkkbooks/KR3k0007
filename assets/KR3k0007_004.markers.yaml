  - {type: variant, offset: 2483, length: 755, content: 公析黑臀其孫成子朱鉏以王父字為氏魯有公索氏將祭而亡其牲見家語見纂要魯郡仲尼弟子公祖句茲姓苑趙平陵太守公休勝衛襄公生公孟縶縶生丹為公孟氏衛大夫公明賈王莽校尉公賓就斬莽首傳于宛就北海人古官也其後氏焉建安中朝邑令公正範吳人季悼子生思伯鞅鞅生懿伯柎為公之氏古爵也子孫氏焉公乘不害傳封四代案此條疑有脫誤世本晉荀游敖生桓子林父將中行為中行氏漢有諫議大夫中行說古帝少昊氏有六英之樂掌中英者以官為氏潛夫論微子之後楚文王御史中野彪風俗通劉向為漢中壘校尉支孫以官為氏尸子中黃伯漢御史中謁者桐里斤生儒為議郎宋人氏晉羊舌氏之後戎子駒支之後為氏嬴姓與秦同祖下邳漢有雍門侯終利恭後漢散騎都尉終利英風俗通桀內史終古後氏焉楚熊率且比後為氏楚左史熊相之後威王時有熊相季文為士官本姓肜氏避仇改姓彤今道士彤也案彤伯周同姓國為成王宗伯者是也又彤氏本肜氏避仇改為彤姓纂前既以彤為肜此又誤以肜改彤道士句亦有脫文周大夫宗伯之後以官命氏齊有宗樓南陽安眾河內太守宗均案豆盧詵嶺南節度判官宗義仲碑昔宋襄公之母弟仕于晉至伯宗為三卻所害州犂奔楚其子家于南陽以王父字為氏此較宗伯之說似為有據又曰遠祖均東漢為九江太守累遷司徒此作河內太守亦異族曾孫宗俱司空均元孫慈慈十代孫躬躬孫瓊唐蘇州刺史晉趙衰冬日之日後因氏焉狀稱本劉氏楚元王交之孫劉德為宗正支孫氏焉裔孫宗正稱濟陰唐朝殿中少監宗正辯宋微子之後桓公曾孫伯宗仕晉生州犂仕楚食采鍾離因氏焉子孫或姓鍾氏楚有鍾儀鍾建又鍾子期與伯牙為友項羽將鍾離眜眜中子樓亦單姓鍾氏潁川接始居潁川長社魏太尉鍾繇生毓侍中廷尉繇少子會司徒繇弟演演元孫雅過江為晉侍中五代孫韜韜生嶼嶸岏嶼撰華林編略梁山陰令嶸撰詩評三卷岏撰良吏傳十卷生寵梁臨海令侯景時避地南康南康唐洛邑府統軍鍾山操狀稱寵孫也代居虔州贛縣弟子威安福令生法遵不仕生紹京中書令戶部尚書越國公緜蜀彭, WYG: 允殖允脩允殖和}
