  - {type: variant, offset: 4937, length: 3, content: 景劄口, WYG: 盤盤瓠之後與舟譚巴李田為巴南六姓案後漢書盤瓠作槃瓠莞姓苑云吳人音官二十七删闗風俗通云闗令尹喜之後一云出自夏大夫闗龍逄之後漢長水校尉闗陽蜀前將軍漢夀亭侯闗羽字雲長河東闗羽代居觧縣羽子興侍中河東狀稱闗羽之後唐中書侍郎平章事右僕射致仕闗播顔顓頊之後陸終苐五子曰安為曺姓裔孫挾周武王封邾至武公字顔公羊謂之顔公子孫因以為氏出圏稱陳留風俗傳及葛洪要字又王儉譜云出自魯侯伯禽支庶食采顔邑因氏焉真卿尚書譜云未驗何所憑案真卿語作未知儉何所憑此誤今依圏葛二家及舊譜為定仲尼弟子達者八人路回僕噲何祖辛也案朱彛尊孔子弟子考顔氏弟子達者八人路回之僕子何噲幸子相髙八人也此缺髙一人又幸或作辛通典作栁咸淳臨安志作韋子相史記作祖見書傳顔叔子顔丁顔鶵顔髙顔息譜魯人顔子涿聚齊大夫子晋顔芝河間人生貞秦末藏孝經者也漢大司農顔異濟南人也顔駟江都人後漢袁紹将顔良琅邪江都後漢臨沂人魏徐州刺史顔盛始自魯瑯邪曾孫舍西平靖侯晋永嘉過江居丹陽生髦約髦生綝暢暢孫師伯宋侍中左僕射約孫延年光禄勲延年生竣測奐竣吏部尚書奐五兵尚書綝五代孫協生之儀之推之善之儀後周御史大夫平陽公五代孫温之司門郎中之推北齊黄門侍郎生思魯愍楚㳺秦思魯記室生師古相時勤禮為侍郎秘書監按此處脱名生趍庭職方郎中曾孫迢元孫庻相時秦府學士禮部侍郎生益期期曾孫交勤禮生顯甫顯甫生元孫惟貞元孫滁}
