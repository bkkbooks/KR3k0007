  - {type: variant, offset: 3655, length: 0, content: '', WYG: 黄門侍郎生思復稱昌黎潜後代居雲陽生朝宗京兆尹朝宗生賁賞質賁潤州刺史賞給事中質京兆少尹中書舍人生翃拾遺翃生倫佾佾果州刺史並云昌黎人延之族弟恬後焉陳留夲潁川人稜後徙陳留唐禮部郎中韓雲卿弟紳卿京兆司録兄子㑹愈㑹起居舍人愈職方員外侍御史韓彦亦陳留人生琬殿中御史生諲河東狀云夲自潁川徙焉唐給事中韓液右補闕韓昆並家蒲坂廣陵狀云夲潁川人禮部員外韓擇木生秀榮秀實弼弼國子司業秀實太子中允京兆邠寧節度檢校僕射韓游環東郡檢校司空平章事汴宋節度使韓宏弟權右金吾將軍范陽夏綏銀節度檢校尚書右僕射韓金義單周成王封少子臻于單邑為甸内侯因氏焉襄公穆公靖公二十餘代為周卿士漢功臣中牟侯單右將軍案漢書中牟共侯單右車}
