  - {type: variant, offset: 3953, length: 0, content: '', WYG: 為髙平因為郡人後檀喜元孫檀播六代孫道濟宋司空江州刺史武陵公兄袨西昌侯從祖父憲之晉書有傳宋有道鸞撰晉陽秋安風俗通漢有安成廬山記安髙安息王子入侍姑臧凉州出自安國漢代遣子朝國居凉土後魏安難陁至孫盤娑羅案唐世系表作盤婆羅代居凉州為薩寳生興貴執李軌送京師以功拜右武衛大將軍歸國公生恒安生成案唐世系表作文成成生忠敬右屯兵將軍忠敬生抱玉賜姓李氏兵部尚書平章事凉國公抱玉生自正兵部郎中自正生縱脩仁左驍衛大將軍郳國公生永夀永達永昌永夀右領軍將軍永達不仕生懐恪陳州司馬生齊管生抱真案唐世系表永夀生齊管懐洛生抱真與此不合檢校司空平章事生緘少府少監永昌生元暉殿中御史貝州刺史生羲穆羲仲羲穆生季明羲仲閤門府果毅干左傳宋大夫干犨之後陳干徴師漢蜀郡尉干獻吴軍師干吉晋將軍干瓉新蔡干犨之後晋丹陽丞干營生寳著晋紀及搜神記但姓苑云漢有濟南太守但巴丹堯子丹朱之後為氏姗古删字見纂要云人姓邗音寒河南官氏志馝邗氏改為邗氏邯鄲晋趙襄側室子趙穿武武案趙盾子武未嘗食采邯鄲攷通志邯鄲氏即穿後二武字當衍食采邯鄲因氏焉杜氏族譜曰穿生旃旃生勝勝生午午生稷漢朝衛尉邯鄲義後趙録有邯鄲悼陳留漢有陳留人綽魏有凉州刺史邯鄲商支孫邯鄲淳工書為平原侯植文學韓言世夲晋韓厥生無忌無忌生襄襄生魯為韓言氏韓籍晋韓起子籍字叔禽為韓籍氏韓嬰晋韓宣公}
