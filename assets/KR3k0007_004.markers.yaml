  - {type: variant, offset: 3553, length: 0, content: '', WYG: 賀歸後魏至太尉隴西王魏太武帝曰卿與朕同源因賜姓源氏賀生懐尚書令隴西王生子邕西平樂都官縣案北史源子邕官樂平縣公北討都督此脱悮周隋之際居鄴郡安陽懐後子邕子恭生師並有傳師生崑玉直心誠心崑玉比部郎中生翁歸翁歸生循業少府少監生光裕光垂光賔光譽光裕左丞刑户二侍郎光垂同州刺史光譽户部侍郎京兆尹光裕生洧給事中江陵節度採訪留後使譽生休直心尚書左丞司刑太常伯生乾珍乾曜乾曜侍中左丞相安陽公自師三代左丞四子復弼㓗清復兵部郎中華州刺史弼工部郎中潔河南令清駙馬誠心洛州司馬生禕匡賛乾珍生匡度黄州刺史臨漳公匡度生安都太原少尹禕吏部員外匡賛國子祭酒生伯良初良少良伯良生歇幹處州刺史少良司勲員外師從父弟惜益府司馬生壯兵部員外守户部郎中懐少子纂生雄隋徐州刺史垣漢西河太守垣恭之後洛陽南燕慕容徳吏部尚書垣敞石季龍略陽地徙之于鄴敞與子遵苗並降晉敞拜龍驤將軍遵散騎常侍苗屯騎校尉苗生護之詢下邳垣敞子孫歸晉居下邳䕶之宋徐州刺史益陽侯詢生崇祖齊五兵尚書詢兄子榮祖兖州刺史封樂安子爰陳胡公九代孫伯諸之後後漢侍中爰延陳留人魏郎中令爰節濮陽晋益州刺史爰邵唐郜國公子幹代居濮州狀云其後也溒何氏纂文要云人姓也園四皓園公之後風俗通云氏于所居城郭園池是也轅漢功臣禦兒侯轅終古案漢書禦作蓹轅或作榬軒風俗通軒轅之後漢有諫議大夫軒和言仲尼弟子言偃之後今蘓州多此姓原仲陳大夫原仲之後楚大夫有原仲蔑二十三魂孫周文王第八子衛康叔之後至武公生恵孫恵孫生耳耳生武仲以王父字為氏元孫良夫生林父林父生嘉又楚令尹孫叔敖及荀况並為孫氏吳有孫武孫臏漢有孫㑹有孫宗孫寳太原中都漢西河太守㑹十一代孫資生南陽太守宏宏生晋馮翊太守楚生纂生綽統從父弟盛晋尚書右侍㑹宗裔子福為太原太守遇赤眉難遂家焉樂安孫武之後漢有賔碩魏有清河太守孫煥晋有孫顗避地于魏故属樂安因家焉五代孫惠蔚案唐世系表顗四代孫士和二子苑蔚蔚字伯華魏祕書監此惠字疑衍魏光禄大夫五代孫希莊唐韓王典籖始居上黨涉縣生嘉之襄邑令宋州司馬致仕生逖遹遘迼逖中書舍人刑部侍郎生宿絳成視宿中書舍人華州刺史生公噐邕州經略使絳檢校郎中成桂府觀察兼中丞視生替否遹生㑹常州刺史遘右補闕河内司馬生公輔誠大理評事案唐世系表遘四子長公彦次客卿次公輔次起與此不合東宛孫臏之後漢有孫揚魏有孫躭晋有孫牧宋有孫奉伯梁有孫謙吴郡冨春吳孫武子世居冨春堅䇿權權為吳帝生亮休休子晧唐尚書左丞孫彦髙廣陵云權後冨陽孫武之後世居冨陽裔孫逺宋寕逺将軍元孫㻛陳祠部尚書定襄侯弟昕曾孫瑛唐雲州刺史義興公又齊有孫瑀明臨川王常侍曾孫案此下有脱名唐浙州刺史也清河孫武之後魏清河太守靈懐曾孫處約唐中書侍郎生侹俊儆佺侹延州刺史冨春男俊荆府長史樂安子儆濟州刺史佺幽州都督㑹稽公又户部侍郎孫伏伽清河人孫履中恒州刺史生匪驕河東夏官侍郎平章事孫元亨虞鄉人户部員外孫上客桑泉人華原唐處士孫思邈生行中書舍人子濟左司郎中潤州刺史洛陽御史中丞孫景狀云武之後温唐虞叔之後溫晉公族受封河内之温因以命氏又郤至食采子温亦􅃅温季漢功臣表温疥封栒順侯栒音荀疥孫何始居太原太原祁縣何六代孫序後漢護羌校尉七代孫嶠晉江州刺史嶠從子楷晉末從桓謐入後魏楷兄孫竒後魏馮翊太守元孫君攸北齊開府參軍見文林館記生大雅彦博彦將大雅禮部尚書黎孝公生無隠釋允無隠工部侍郎生克讓克明晉昌釋允坊州刺史彦博中書令左僕射虔恭公生振挺振太子舍人生翁歸翁念翁歸庫部郎中括州刺史生緬績纉紹緘絢績案唐世系表績作續為閬州刺史封虞公生皓皎􅀈􅀈駙馬太僕卿生同正西華西華駙馬祕書監同正生瑒紹生章道州刺史絢比部貟外郎翁念左司郎中太僕少卿挺駙馬延州刺史生常節常節生履言右羽林將軍履言生冬日光嗣彦將中書侍郎清源敬公生瓉瑜瑾璩瓉生焯煒炫瑜祠部郎中汴州刺史璩職方郎中鄭州刺史生道冲和州刺史道冲生任佐佚任生襄襄生初國子主簿渾左傳衛大夫渾良夫河南官氏志吐谷渾氏改為渾氏昆夏諸侯昆吾氏之後齊有昆辯見戰國策又見纂要文尊古尊盧氏之後罇見纂要文屯姓苑云渾沌氏之後去水為屯漢有常山太守屯英盆見姓苑齊郡漢盆門氏改為盆氏坤坤牟子六國時著書見風俗通温孤代人改温垂拱中有温孤元軌温伯莊子有温伯雪子昆吾世夲古已姓國}
