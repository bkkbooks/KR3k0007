  - {type: variant, offset: 3555, length: 1, content: 兼, WYG: 侯伯祝融氏之後孫陽風俗通景母封孫陽侯丹曾孫汾避亂隴西因封為氏盆成孟子有盆成括仕齊奔水英賢傳祁大夫之後奔漢水氏焉門尹宋門尹般之後宋又有門尹且渠屯渾太昊之佐屯渾氏其後為氏尊盧古太昊時諸侯氏也二十四痕根後蜀法部尚書根度根水神農納根水氏女為氏按世夲老童娶根水氏女又通志神農娶奔水氏女二十五寒寒周武王韓侯之後避難後為寒氏一云夏諸侯寒浞之後魯國薛縣後漢清河相寒朗韓晉穆侯子成師生萬食采于韓原因以命氏代為晋卿曾孫厥生起起生湏湏生不信元孫景侯分晋為諸侯八代至王安為秦所㓕㐮王孫漢韓王信信生襄城侯嬰弓髙侯頽當頽當孫龍額侯譊案道侯說說曾孫大司馬按此脱名裔孫後漢司空稜晉太常卿伯潁川長社縣漢御史大夫韓安國與稜並潁川人南陽堵縣頽當元孫騫避王莽亂因居之魏司徒甫陽恭侯案唐世系表甫陽作甫鄉暨六代孫延之晋末從司馬休之奔姚興又奔後魏封魯侯案唐世系表魯侯作魯陽侯元孫褒周少保三水正伯生仲良遜滂仲良唐户部尚書潁川公生瑗侍中孫澄汲郡太守生炅孫檢案唐世系表檢作儉生琦祐琦左監門大將軍生滑蜀州刺史祐生溱左補闕溱生憬協憬亳州刺史協駕部郎中協生泰祠部郎中滂生同慶司勲郎中褒再從姪憲之唐憲部郎中昌黎棘成縣晋貟外韓安之生潜恬後魏書云並延之族弟同隨州司馬休之自南入後魏恬子都為元莵太守因居昌黎潜元孫建業北齊司徒安南王曾孫孝城唐左金吾大將軍南康公生令英亳州刺史生止水都生普賢後魏昌黎王普賢生永興髙宻公髙宻公生長鸞劌東劌東環州刺史生處約主客員外後周有商州刺史洪雅公韓護狀稱潜後居京兆孫符巫州刺史生智休倩智洛州刺史司户參軍休黄門侍郎平章事少師生浩洽洪汯滉渾洄洽}
