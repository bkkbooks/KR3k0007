  - {type: variant, offset: 8232, length: 338, content: 太元唐倉部郎中長城與有功同承寧寧曾孫廣之晉吳興太守因居長城八代孫孝德唐水部郎中生齊聃西臺舍人生監中書舍人刑禮黃門三侍郎左右常侍東海文公生峻嶠峻金部郎中生旻駕部員外嶠中書舍人河南少尹生曇暈自孝德至旻五代入省自齊聃至嶠三代中書舍人瑯琊晉僕射宣之後宋有徐爰濮陽偃王之後今無聞於潛偃王之後為杭州望族新豐本出高平徐範之後西魏度支尚書金卿男徐招有傳云父微自高平從魏孝武入關始居新豐招生會寔雲孫仁軌龔州刺史會生正則眉州刺史寔生莊銀州刺史生元揮都官郎中瑕邱北齊徐州治中狀稱本高平人世居瑕邱曾孫仁會高郵令生彥伯給事中工部侍郎右常侍太子賓客生鐈鍔鍔洛陽令司封郎中諸郡徐氏戶部侍郎徐知世居柳城生抗揖抗醴泉令揖檢校員外生放屯田員外臺州刺史范陽節度徐歸道居范陽生濟洛州刺史生復倰復祠部郎中倰比部郎中諫議, WYG: ''}
