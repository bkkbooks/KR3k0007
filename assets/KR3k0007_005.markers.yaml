  - {type: variant, offset: 8021, length: 202, content: 博士監元孫融南昌令生勉梁尚書僕射居相位二十年生彝倫式序生山松悱矩案矩下疑脫權字悱晉安內使矩度支尚書權後梁右僕射孫瑜生元度唐弋陽令東陽偃王之後漢徐衡徙高平孫饒又徙東陽七代至融融五代孫之才之範並北齊有傳繼封西陽王之才官至尚書令孫師順唐勝州總管高平公之範孫仲宗衛尉大卿任城公生慶祚慶右司郎中祚度支郎中東莞姑幕漢費封東莞侯因家焉晉有邈廣子孫無聞高平山陽縣令隸兗州後漢徐範生仲長避難山陽居焉北齊徐遠仲長之後官至西兗, WYG: 同}
