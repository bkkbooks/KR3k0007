  - {type: variant, offset: 7711, length: 0, content: '', WYG: 左丞翼生准鎛宰相生煥案鎛乃愉子此係于希莊下悮又鎛子珪字徳卿此作生煥悮中書舍人福建觀察使樂陵狀云晉徴士謐後安定徙滄州唐監察御史皇甫德參生宣過宣生伯瓊仲玉主爵郎中玉生侁侁尚書左丞生政浙東觀察使生教敏徹教工部員外郎徹蜀州刺史皇子莊子有皇子告敖臧孫魯孝公子彄食采於臧因氏焉僖伯彄彄生哀伯達達生文仲辰辰生宣叔達達生武仲紇為臧孫氏案世本孝公生僖伯彄彄生哀伯達達生伯氏瓶瓶生文仲辰辰生宣叔許許生武仲紇此脱悮臧文魯大夫臧文仲後氏焉臧㑹魯大夫臧須伯㑹之後别為臧㑹氏案左傳臧為生昭伯昭伯從弟臧㑹㑹生賔如賔如生臧石又臧疇臧紇之昆弟臧堅紇之族皆見杜預註此湏伯誤蒼頡論語楚隠者也其後為氏白象風俗通先生古隠者案此有脱悮蒼頡氏當是黄帝史官之後風俗通曰頡衛古之賢人棠谿左傳吳王闔閭弟夫槩王奔楚為棠谿氏漢書棠谿惠治公羊又五官中郎將棠谿典桑邱下邳有桑邱氏十二庚京相史記曰殷後京相氏晉惠帝時有京相機榮叔周大夫榮叔之後漢有大夫榮叔遥平陵史記平陵老之後十四清精縱英賢傳周平王子精别封縱邑因以為氏案此條原本載於屠住氏下今㨿通志改為精縱氏以通志屠住氏之説别録為屠住氏晉有平陽從事精縱宣邪嬰齊出芊姓楚}
