  - {type: variant, offset: 10270, length: 262, content: 洛陽後魏書官氏志勿紉案紉當作紐字于字改姓于魏書新安公于栗磾生洛拔尚書令生烈勁天恩烈勁殿中尚書中書令案北魏書洛拔六子烈敦果勁泊天恩烈殿中尚書勁定州刺史此以烈勁為一人誤天恩生曾尚書生提案北魏書天恩生仁仁生子安子安生子提子提生謹與此不合京兆提生謹從西魏孝武帝入關周文帝下令應從入關并為京兆長安人太師柱國燕文公生寔翼義智弼簡案唐世系表燕文公九子寔翼義智紹弼簡禮廣此闕二人寔周司空固安公案唐世系表固安公當作燕安公號為蘭陵院生顗仲文惲象賢顗隋黔州總管生虔案唐世系表虔作世虔哲虔生儉左屯衛將軍哲亳州刺史仲文隋左翊案翊下脫衛字大將軍延壽公生, WYG: 丞}
