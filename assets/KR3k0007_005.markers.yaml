  - {type: variant, offset: 7915, length: 1, content: 縯, WYG: 仲達季略仲達右僕射廣安王季略太子少保衡陽王孫武徹唐崇道府統軍武安公樓夏少康之後周封把東樓公支孫以樓為氏漢有大尚書樓瑝齊郡漢樓䕶字君卿王莽時為前煇光譙郡漢太常樓望吳志樓元東陽後漢樓秦自譙徙㑹稽之西部因居東陽烏程縣唐新州治中樓仲興其後也僂齊勇士僂堙亦作婁歐歐冶子吳人善鑄劔按鄧名世古今姓氏辨證引元和姓纂曰東歐王之後亦作歐此條脱補入甌東甌王之後緱見姓苑陳留孝子傳陳留緱氏女名玉河南官氏志渇侯氏改為緱氏句句芒氏之後史記有句強歐陽越王勾踐之後支孫封烏程歐陽亭因氏焉漢有歐陽和伯授尚書曽孫髙博士孫也餘少府按釋文也餘作地餘樂安千乘歐陽生曽孫髙氏代居千乘元孫歙大司徒渤海晉有歐陽建字堅石石崇外甥也官至馮翊太守為趙王倫所殺兄子質奔長沙長沙臨湘歐陽建兄子質避難居長沙九代孫頠陳陽山公生紇陳廣州刺史反誅生詢為江總所收養博士唐給事中率更令生通}
