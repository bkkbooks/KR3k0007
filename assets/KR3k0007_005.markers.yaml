  - {type: variant, offset: 1512, length: 2249, content: 濟南公伊婁信生伊婁公公生彥恭隋武侯大將軍濟陽公生明傑唐鄆州長史九真男生大辯大昌祁夜鄭公子且食采開封因氏焉鄭大夫祁夜狐師子世本鄭有師子濮漢有北平太守師子將師祈左傳楚有師祈犂漢有郎中師祈光師宜後漢有南陽人師宜官夷鼓英賢傳黃帝子夷鼓之後見國語秦大夫有夷鼓德宜夷門史記魏隱士侯嬴為夷門監者因氏焉尸遂姓氏英賢傳云南匈奴尸逐鞮裔孫尸遂降漢以國為氏葵仲蔡叔子葵仲胡之後趙時有葵仲其時齊有賢人時子著書見孟子新論有時農鉅鹿魏有壽春令時苗後趙有謁者僕射時軌姓苑云並鉅鹿人也陳留唐登州刺史時德叡世居汴州尉氏曾孫元佐潁州刺史怡本姓墨臺孤竹君之後因避事改焉後魏有怡寬遼西人生峰後周樂陵公生昂鄀公光清河公旗風俗通楚大夫居旗思城因以為氏蘄漢有弘農太守蘄良姓苑云蘄春侯之後貍左傳八元季貍之後菑見姓苑北海孔融集菑壯青州人治出何氏纂要文音遲蚩蚩尤之後以國為姓慈高陽氏才子之後美其宣慈惠和因以為姓司馬重黎之後唐虞夏商代掌天地周宣王時裔孫程伯休父為司馬克平徐方錫以官族在趙者曰凱以傳劍知名蒯聵其後也在秦者司馬錯孫靳孫昌生無懌無懌生喜喜生談太史公生遷漢中書令據祕笈新書改河內溫縣蒯聵元孫邛為趙將封武信君案司馬邛為趙武臣將武臣封武信君此作邛封武信君誤項羽封邛為殷王漢以其地為河內郡子孫家焉孫楷漢武都太守孫鈞後漢征西將軍曾孫防京兆尹生郎懿孚馗七代孫楚之後魏封瑯琊王馗六代孫叔璠後魏冠軍將軍汝南王亮五代孫景之後魏蒼梧公瑯琊冠軍蒼梧號三祖司馬氏瑯琊王楚之即彭城王懽六代孫也楚之曾孫裔裔曾孫元祚唐庫部郎中生希奭希象希奭明堂尉生鍠銓鐵鍠吏部黃門中書三侍郎京兆尹生蒼錘益錘魏郡太守銓庫部郎中生望希象生爵郎中元祚再從子承禎字子益天白道士有高行元祚四從子仁節大理評事生晧曜曜曹州刺史蒼梧公景之七代孫思溫唐左衛長史冠軍房子孫無聞亮生南頓王宋過江令號江南司馬氏宗八代孫宅相太子洗馬生遜晉譙剛王七代孫筠賢筠梁尚書左丞賢孫待徵唐撫州刺史兄子利賓雲中北齊司空司馬子如稱晉南陽王模七代孫也兄子瑞吏部尚書幼之大理卿瑞生同游侍中又刑部侍郎司馬逸容稱瑯琊王馗後魏都官員外郎喬鄉鄠縣人也司徒帝王世紀曰舜為堯司徒支孫氏焉衛文公生公子其許之後案衛有司徒瞞成此公子其許未詳為司徒氏宋邊卭為其司徒後氏焉陳成公子亦司徒氏漢有安平相司徒肅中謁者司徒發禹為堯司徒支孫氏焉帝堯後有隰叔案凡下疑有脫誤孫司徒發仕為晉司徒因氏焉晉大夫號司徒季子京兆上元潤州刺史司徒襲成云河內入署虞部郎中孫圖司城世本云宋戴公生東鄉克孫樂喜為司城氏陳哀公子邾勝之後亦為司城氏司寇世本云衛靈公子郢子孫為司寇亥之後風俗通蘇忿生為司寇其後氏焉禮記惠子魯大夫司功世本晉大夫司功景子其先士匄也因官氏焉周有太史司功騎司揭古今人表有司揭拘又司揭扶楚靈王大夫見韓非子司工周宣王時司工錡因官氏焉綦毋左傳晉大夫綦毋張風俗通漢有廷尉綦毋參戰國策綦毋子與公孫龍爭辯會稽後漢綦毋俊為會稽主簿因居焉後漢交趾刺史綦毋誾與荀爽事陳太邱魏有綦毋廣明與管寧為友晉有綦毋倪江左有綦毋遂為邵陽太守前趙有綦毋達為特進呂都公綦毋珍之為中書舍人南康開元右拾遺綦毋潛虔州人又北齊有信州刺史綦毋懷文入藝術傳綦連代北人號綦連部因氏焉期引西秦錄記乞伏氏與期引氏自漢北出陰山案晉載記乞伏之先與如弗斯出連叱盧三部自漢北出陰山無期引氏又國仁以斯引烏堡為佐輔將軍當以斯引為正此期引誤也熙氏英賢傳帝佶使元冥為水正熙氏佐之為氏焉釐子偃姓之後僖公二年徐滅釐子子孫氏焉茲毋左傳齊大夫茲毋還漢有侍御史茲毋恆韋顓頊氏之後大彭為夏諸侯彭子受封豕韋周赧王滅之以國為氏因家彭城至孟又遷魯京兆杜陵孟元孫賢漢丞相扶陽侯徙京兆杜陵生元成七代孫胄魏安城侯生二子潛號西眷穆號東眷西眷潛八代孫周平齊公瑱生師師孫弘敏太府卿平章事從父仁爽鳳州刺史素立主爵員外案唐世系表弘敏仁爽素仁立皆兄弟與此不合爽兄子容成卭州刺史素立兄孫瑤果州刺史弘敏從祖兄懷質光祿卿懹敬右領將軍生知藝儀州刺史案唐世系表儀州作襄州懷質孫顥陰平太守曾孫漸陵州刺史生宗禮審規懷質堂弟匡素和州刺史孫洽考功郎中洽生收瑤再從姪屺宋州刺史瑱三從兄法保周安國公孫繪唐倉部員外保兄子武威邵州刺史東眷穆八代孫旭長子逍遙公敻生康洸恭案恭字下脫頤仁基二人又恭唐世系表作瓘藝沖約康隋吏部尚書生福嗣福獎嗣生悰憬悰御史中丞憬吏部郎中元孫啟肇班啟左補闕生𩇕肇吏部侍郎生綬貫之纏綬左常侍致仕貫之中書舍人案唐書貫之相穆宗纏吏部員外衢州刺史生汭肇三從弟乾度豪州刺史福獎生寡尤洋州刺史寡尤生璋珍璋湖州刺史案唐世系表璋生籯金籯金生黃裳孫黃裳昇州刺史兼中丞採訪使洸隋廣州總管襄陽公生協協生仲銳金部郎中銳孫良嗣案唐世系表仲銳弟叔銳生良嗣良嗣生文彥與此不合給事中生禎給事中京兆少尹知府事恭隋安州總管生萬頃仁基萬頃生元整曹州刺史頤孫晤元戶部郎中仁基龍州刺史生元祚哲元祚司門郎中曾孫霸吏