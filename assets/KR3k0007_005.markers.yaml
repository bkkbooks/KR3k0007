  - {type: variant, offset: 1102, length: 336, content: 師風俗通師樂人瞽者稱晉有師曠魯有師乙晉師悝師觸師蠲瑯琊東武漢丞相高樂侯師丹後漢師宜官案師宜官別為師宜氏工書晉石勒為師歡奴案晉書載記師歡茬平人歡作懽資黃帝之後食采益州資中因以為氏陳留風俗通資成陳留人飢左傳殷人七族有飢氏案左傳飢氏作饑尸漢書尸佼晉人為商君師著尸子風俗通云其先封于尸鄉故為尸氏齊相有尸臣案廣韻注晉人作秦人嫘出自西陵氏女嫘祖為黃帝妃後世以嫘為氏蜀有刁達之後避難改焉案廣韻注作刁逵非刁達麋楚大夫受封南郡麋亭因以為姓東海朐山漢有麋敬蜀志有麋竺生芳案蜀志作竺弟芳宋有麋勖之又麋信撰說要注榖梁案麋姓之麋一作糜字邳左傳晉大夫邳鄭邳豹案左傳邳鄭邳豹俱不從邑信都風俗通云奚仲為夏車正自薛封邳其後為氏後漢二十八將有衛尉信都邳彤㔻左傳魯桓公㔻之後以王父名為姓其後有㔻無還案魯桓公名允, WYG: 節度使}
