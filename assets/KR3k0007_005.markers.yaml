  - {type: variant, offset: 7723, length: 1, content: 緄, WYG: 修己生伯陽又後周河州刺史纂狀稱馨後孫文䡄生思撫思撫唐地官郎中鄭州刺史思挹萬年令又後周晋昌太守令狐儒狀稱云本燉煌人曽孫智通左羽林將軍生俊左將軍開元有丹陽郡司馬令狐滔云熙後生峴峘􅦾峴刑部員外峘禮部侍郎􅦾和州刺史天寳有鄧州録事叅軍令狐章檢校左僕射滑亳莭度霍國公生建運通十六蒸凌衛康叔支子為周凌人子孫以官為姓吳志有都督凌統晉有凌嵩餘杭凌統世居餘杭二子烈封八代孫嵩晉廣陵太守貞元都官員外凌準杭州人云其後也管城唐魏王文學凌敬云統後世居鄭州乘風俗通楚大夫子乘之後以王父字為姓又乘睢古賢人見世本漢煑􅀥侯乘昌案漢表煑棗侯革朱孫昌嗣侯則昌為革氏無乘昌名鄫曽子支庶亦為鄫氏案鄫當出姒姓鄫子之後此悮勝本勝屠氏後世避仇改為勝氏稱漢元帝功臣新山侯稱忠陵陽捜神記陵陽子明上宣城陵陽山得仙其後因山為氏陵尹楚大夫陵尹喜陵尹招之後陵終王莽曽孫翁孺與東平陵終氏有惡案莽曽祖翁孺此作孫悮十七登曽夏少康封少子曲烈于鄫春秋時為莒所滅鄫太子巫仕魯去邑為曽氏見世本巫生阜阜生參字子輿案曽子父㸃字子晳晳生參通志作巫生阜阜生晳父子并為仲尼弟子生元申裔孫偉後漢尚書令廬陵唐亳州治中曽恭狀云曽子後又庫部郎中晉州刺史曽崇頴河東人生叔政隴州刺史滕周文王第十四子滕侯之後滕失國子孫以國為氏吳有滕允晉交州刺史滕含北海吳大司馬滕允世居劇縣晉有黎陽太守滕恪河東開元進士滕雲翼今太學博士滕珦婺州人生邁恒風俗通楚大夫恒思公之後見世本東安漢有東安長恒裴子孫因居之騰本滕氏因避難改為騰氏後漢相騰撫案後漢書勝撫北海劇人傳作滕从水不从馬查廣韻於騰下亦不載人姓萬姓統譜有騰姓亦作滕氏改焉惟}
