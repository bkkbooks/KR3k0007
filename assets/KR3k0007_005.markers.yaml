  - {type: variant, offset: 7712, length: 0, content: '', WYG: 尹子重曰公子嬰齊後氏焉成陽周有成陽子修黄老術見釋例成王楚成王之後漢中郎成王弼十五青泠音零泠淪氏之後音訛為冷氏江都姓苑云江都人有泠夀光前趙録有徐州刺史冷道字安義貞元兼監察御史冷朝陽吳人陘魯大夫有陘氏之後缻後趙有缻刪青尹楚大夫青尹弗忌宋司城司馬青尹渠青牛魏略初平有青牛先生東山人泠淪黄官樂官泠淪氏之後氏焉按此與前泠淪氏俱非本字蓋出附㑹泠州左傳周泠州鳩之後丁若晉遂興令丁若賢字宏固案風俗通齊丁公子懿伯食采於若因氏焉原本作子苦當是丁若之訛令狐周文王子畢公髙之後有畢萬仕晉孫魏犨武子生顆别封令狐因氏焉生頡漢有令狐邁辟王莽亂居燉煌生稱燉煌效穀縣稱曽孫溥後漢蒼梧}
