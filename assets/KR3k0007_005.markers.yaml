  - {type: variant, offset: 4473, length: 740, content: 太子少師縚生弘協義才絢溫王府司馬生求回由韶嬰最睦由鴻臚少卿生士炎𡍦址墀韶明州刺史生大冏嬰生士南萬州刺史士文秘書少監安石中書令郇文貞公生陟斌陟吏部尚書生士瞻允允吏部員外潁州刺史四代入省允生同元同訓斌中書舍人汝州刺史生袞曼渢襄旉凜況袞駕部郎中四代入省生同懿同休同憲渢洛陽令朗州刺史況諫議大夫季弼生廉考功員外廉生肅端端生縝紓琨戶部侍郎太子詹事生暢展初平案唐世系表初平作幼平調翼暢生抗揖拯抗刑部尚書生翹同州刺史拯戶部郎中生演展孫澣閬州刺史初平生抱貞梓州刺史抱貞生綆政政生丹丹生宙調孫崟隴州刺史翼太府卿璲倉部郎中瑜歙州刺史穆五代孫關案唐世系表關作閬後魏殿中尚書生範範生法儁顥祖歡法儁生子粲榮亮道諧子粲生孝謇集州刺史榮亮生綱綱生文宗文傑文宗生德敏德基德敏考功司郎中太府少卿生璆瑛玢璆宗正卿生元誠元濟元賁元曾元誠生彤灃州刺史元曾吏部郎中珙光祿卿生元方元志玢尚書右丞生元甫元懌元甫尚書右丞楊府長史生悅長安令元懌生愃巴州刺史德基金部郎中生延安球延安鄂州刺史球生之晉之晉湖南觀察使生祐文傑孫玠榮州刺史玠生𢻥金部員外道入山東類例顥孫謨普安公謨生士讓雍州別駕祖歡曾孫世師唐博州刺史生太真戶部侍郎太真生瓊之修業瓊之考功郎中修業水部員外世師少子崇操生月將晶忠晶眉州刺史忠普州刺史逍遙公從父義弟遠周雍州刺史弟暉業繼為雍州號大雍州房小雍州房大雍州房義遠生祖寅祖霽霽生儹傑倫傑生思敬思正思安思敬孫利器諫議大夫利賓戶部郎中生向工部員外向生彭壽右司員外明州刺史三代入省利涉主爵郎中思正生璉深州刺史思安駙馬嵐州刺史曾孫騰同州刺史倫生惲度支郎中小雍州房暉業曾孫敦禮監察御史穆九代孫南皮公瓚隋尚書右丞生叔諧季武叔謙叔諧庫部郎中生元福元獎元福判兵部員外生湊河南尹湊生見素左相左僕射豳忠貞公見素生倜諤益哲案唐世系表哲作晳倜給事中, WYG: 兼}
