  - {type: variant, offset: 394, length: 269, content: 孫氏焉戲伏羲之後子孫氏焉儀衛大夫儀封人見論語大夫儀楚西河漢有儀長孺驪左傳驪戎國之後在昭應縣案昭應舊本作應昭古新豐縣唐改名昭應宋大中祥符中改臨潼縣東有驪戎故城卑卑耳國人之後或云鮮卑眾類漢有北平太守卑躬河閒人雁門後漢太尉掾卑釐又魏志公孫度將有卑術訾風俗通帝嚳妃訾娵氏女姓苑云今齊人漢書漢功臣表有樓虛侯訾順斯姓苑云吳人吳志郯縣吏斯從也東陽南齊書東陽郡有斯氏彌史記衛公孫彌子瑕以王父字為氏三輔決錄云王莽時彌強新豐漢末新豐人中叔見決錄猗史記猗頓魯國富人河東猗氏猗頓自魯居之馳見姓苑馳湛馳竈宣城姓苑云今宣城有馳氏池以所居為姓漢有中牟令池瑗魏有城門候池, WYG: ''}
