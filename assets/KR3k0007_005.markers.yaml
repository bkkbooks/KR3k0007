  - {type: variant, offset: 6924, length: 354, content: 宗卿出繼堂伯建戶部員外叔將蔡州刺史弼兄會生仲昌叔昂伯詳度支郎中京兆尹生漸莓案唐世系表仲昌京兆尹生漸莓此度支郎上脫仲昌二字莓巴州刺史生執中執誼執中泉州刺史執誼尚書左丞平章事叔昂右司郎中生汎汎生萬伯詳考功郎中蓬州刺史韋志檢稱閬後兄子趙賓秦州都督監察御史韋務靖稱東眷今占韋城五代祖或高祖珍後魏附傳靖兄子光業光州刺史生南金兗州都督金孫說賀州刺史職方員外韋密占積泉唐南寍州都督韋仁肅稱西眷照平齊公同承策壽堂兄案此下有脫文曾孫光朝萬年令生曾舒州刺史職方員外弘仁稱東眷郿城公同承頤弘仁兄弘道五代孫昌著作郎生競京兆府法曹著作郎韋安仁祖翽陳書有傳稱東眷居襄州代仕今江左今無延陵元成九代孫昭吳侍中裔孫齊中書侍郎遵唐蘭陵令生元靜其延陵諸韋並云承侍中昭奜左傳有奜豹漢有奜禹案姓纂引左傳斐豹正與廣韻注同知今本作斐字誤也非風俗通云秦非子, WYG: 強牟}
