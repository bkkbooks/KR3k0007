  - {type: variant, offset: 7837, length: 0, content: '', WYG: 植生孺之京兆少尹孺之生從一户部尚書平章事祥道從孫元朂曽孫廼兵部侍郎生伯芻給事中生允章案唐世系表作伯芻生寛夫寛夫生允章此少一代中書舍人又宣伯恭伯咸陽令東菀姑幕齊悼惠王肥生城陽景王章傳國九代至王津光武封為平萊侯徙居東菀裔孫晉尚書南康公穆之髙唐平原髙唐縣髙帝子淮南厲王長生濟北貞王勃勃生崇始居髙唐十一代孫實字子真晉太常循陽侯東平景帝子魯恭王餘生允東平侯因居之六代孫義後漢河南尹廣陵漢武帝子廣陵思王子胥六代孫貺後漢司徒今無聞臨淮漢光武子廣陵思王荆子孫居臨淮唐著作佐郎子翼代居晉陵云本自臨淮徙焉生懿之給事中禕之鳯閣侍郎平章事生揚名琅琊城陽景王章之後子孫居焉東海光武長子東海恭王強之後南郡漢武帝子代王參曽孫義封曲陽侯子孫居南陽髙宻城陽景王章傳國八代後分城陽置髙宻遂為郡人竟陵魯恭王餘裔孫章帝封為竟陵侯因家焉後漢末益州牧生璋其後無聞范陽漢景帝子長沙定王發傳國七代支庶居本郡後漢有司徒劉夀東萊城陽景王章七代孫文王悝支子别封掖侯因為郡人唐吏部侍郎彤云其後也丹陽蘭陵杼秋沛國屬縣宣城陳留自丹陽已下檢未獲已上劉氏二十六郡並舊望武功唐納言魯公劉文靖濮陽唐濮州刺史頴考尉氏唐左僕射樂城公劉仁軌狀稱本望河間後魏南陽太守樂城公通始居尉氏通即仁軌髙祖軌生滔濬濬工部員外生晃昻晃給事中太常少卿昻考功郎中京兆少尹晃孫文鼎侍御史祠部員外濟隂左僕射彭城公劉晏生執經吏部郎中宗經國子祭酒京兆武功隋通州刺史劉猛孫宏基唐右驍衛大將軍太僕卿䕫襄公生仁行仁景仁行生彦貞彦方彦貞左金吾將軍彦方邠王長史仁景左金吾將軍司農卿沛公廬陵漢長沙定王後生安成侯倉子孫徙焉梁安成内史劉元偃代居吉州云其後也曽孫紹榮吉州刺史孫行昌左司員外孫淑殿中御史淑生禹錫屯田員外郎南康楚元王交六代孫延夀裔孫璠居南康六代孫惠騫梁同州刺史孫悔陵唐少府監譙郡狀云宋文帝子義陽王昶後貞觀志云勘非實諸郡劉氏唐司農卿武陵公劉瞻今居京兆西魏有東雍州刺史劉亮稱中山人曽孫順鴻臚卿彭國公秋官侍郎劉知璿上邽人弟如玉右司郎中同州刺史劉同昇洛陽人稱本自沛國徙焉考功郎中劉慶約宣州人孫長卿隋州刺史膳部員外郎劉瓘京兆人生全白湖州刺史户部郎中劉安都宋州虞城人祠部郎中劉穆之部州沙河人駕部郎中劉師禮陳留封邱人兵部郎中劉孝約洛陽人劉仲邱京兆人虞部郎中劉志遠長安人禮部侍郎劉單岐山人兄平生契舒州刺史刑部侍郎劉太真潤州上元人水部員外郎劉復工部員外劉澄瀾刑部員外劉頴訪未獲監察御史劉遵古云東平人平廬節度劉正臣范陽人生溢淮平原節度劉瑁汴州人生涇駙馬光禄少卿陳許節度右僕射劉昌裔東都其先匃奴貴族漢以公主妻之北俗重漢生因取母姓後漢末右賢王劉去卑即其後也代為部落大人魏有庫仁弟眷生羅辰與穆陸賀婁于奚尉為北人八族羅辰征東將軍永安公七代孫政㑹生竒吏部侍郎竒生超㣲同循超河南少尹生全誠㣲吳郡太守江南採訪生方平同萬年令循金吾將軍㑹次子元象主客郎元育易州刺史河南代為部落大人魏有河間公提生豐以司徒封為河間劉氏孫感唐涇州總管平原公感生孝則孝則曽孫公濟工部尚書豐生孫龍按此有脱悮將作大匠豐曽孫法琮唐右金吾將軍琮從弟尚嶷偉尚嶷右金吾將軍隋梁州總管洛陽公偉曽孫貞眘涇州刺史並代人雕隂唐左武大將軍綏州總管義成公大俱晉右賢王豹之後綏州代為酋望東陽贊後並居婺州為郡豪族又宋文帝子竟陵王誕搆逆誅貶姓劉氏吳有東海太守劉略姚秦有揚威將軍劉松牛宋㣲子之後司冦牛父子孫以王父字為氏戰國時趙有牛翦秦有牛缺隴西漢牛邯為䕶羌校尉居隴西又有牛崇牛嘉魏有牛金漢牛覇覇生真姚秦時牛雙案晉書姚萇參軍牛雙通志作牛犨石季龍以韋杜牛辛皇甫胡梁七姓衣冠華胄不在戍役限涇陽狀云牛邯之後裔孫興西魏太常丞始居涇陽曽孫遵唐原州長史生元亮元璋元亮户部郎中生容容生上士上士生肅聳肅岳州刺史聳太常博士元璋興州刺史安定狀云牛金之後逃難改牢氏又改為遼氏裔孫後周工部尚書臨涇公遼允復姓牛氏允生宏隋吏部尚書竒章公案隋書牛宏傳本姓尞氏父允仕周賜姓牛氏生方大方裕方智方大隋内史舍人方裕唐金部郎中富平案唐世系表鳯及僧孺皆出自漢主簿牛崇之後當是安定牛氏此於安定下另標富平作牛金之後春官侍郎牛鳯及狀云牛金之後靈臺侍中豳國公牛仙客邱齊太公封於營邱支孫以地為姓世居扶風左傳邾大夫邱弱扶風漢平帝時邱俊持節安撫江淮屬王莽簒位後俊遂留江左居吳興吳興邱俊居吳興烏程松江太守邱靈鞠生遲梁永嘉太守五代孫仲昇唐武臨尉宋西卿侯丘道讓亦俊後七代孫悦岐王傅昭文學}
