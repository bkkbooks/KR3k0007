  - {type: variant, offset: 11609, length: 127, content: 邘叔子孫以國為氏其後去邑單為于氏東海漢有于公生丞相西平公定國生永御史大夫祕笈新書瞿晉東海王越參軍瞿莊博陵人殳尚書殳斨舜臣名咎繇所讓共六人南朝嘉興殳季真符魯頃公孫公雅為秦符璽令因為氏瑯琊漢有陳留相符季真元孫表後漢齊郡太守又光祿大夫符融苻前秦主苻健本以有扈氏, WYG: 凡伯}
