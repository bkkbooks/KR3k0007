  - {type: variant, offset: 7940, length: 0, content: '', WYG: 寳昱泉州刺史今領判官監察林藻江州判官兼監察林藴皆其後也成都漢有林閭善古學揚雄師之見雄集河南官氏志邱林氏改為林氏岑吕氏春秋云周文王封異母弟耀子渠為岑子其地今梁國岑亭是也南陽棘陽後漢征南大將軍岑彭後有岑晊字公孝晊孫軻吳鄱陽太守徙鹽官十代孫善方梁起居尚書長寧公又居江陵生曼倩景倩案唐世系表善方生之象邯鄲令之象生文本文叔文本相太宗生曼倩景倩此作善方生曼倩中缺二代曼倩雍州刺史生獻義仲翔仲休獻國子司業孫定義侍中汝南公仲翔陜州刺史仲休駕部郎中生炅炅生賛司門郎中景倩孫參嘉州刺史文叔生長倩中書令鄧公生虛源廣成任黄帝卄五子十二人各以德為姓一為任氏六代至奚仲封薛魏有任座秦任鄙漢御史大夫廣阿侯任敖武帝時任安樂安博昌任敖之後晉尚書任愷梁新安太守任昉生東里南陽宛縣後漢河内太守任延廬江任敖十一代孫課晉安東將軍始居廬江八代孫忠小名蠻奴陳鎮東大將軍梁信侯按南史鎮東作鎮南郡侯作郡公弟定逺將軍寳生懐唐陜州都督管國公生公廕衡州刺史西河任敖之後徙西河晉東平太守任誕裔孫幹唐司農丞生元植昭理元植殿中御史曽孫肅侗侗京兆少尹昭理汴州刺史幹從父弟惠孫正名唐右司郎中又居成都渭南狀云任敖之後唐兵部尚書同三品任雅相曽孫鵬陵州刺史生迪簡真定節度使按唐書迪簡終工部侍郎以不能朝謝改太子賔客䘚贈刑部尚書新舊書無真定莭度使之文迪簡生憲宇河東鳯閣侍郎平章事任知吉陳留浚儀唐并州長史樂安公懐玉生照隣改名輝夏官侍郎生進鄱陽太守生抨浰興平尉隂周文王弟三子管叔鮮之後管夷吾七代孫脩適楚為隂大夫因氏焉風俗通又云康氏之後周有隂不侫隂里人也南陽新野漢末居焉隂子方子公有祠竈之祥至衛尉隂典孫鄰女為光武皇后按後漢書注引東觀記隂子公生子方方生㓜公公生君孟名睦即后之父也世本睦作陸今此作鄰女誤生明帝隣子識執金吾孫綱女為和帝皇后武威隂後漢衛尉隂綱孫常徙武威姑臧八代孫襲家荆州作塘曽孫子春梁侍中生鈞鑑鈞度支尚書鑑晉安太守鈞孫宏道唐禮部員外孫行光國子司業即張燕公妺壻也廣樂後周光禄大夫隂嵩狀稱本武威人賜姓邱目陵氏隋復姓孫夀隋幽州緫管趙國公生師按隋書夀子世師此脱一字避唐諱左翊將軍留守京師義師至就戮師孫崇唐蘇州刺史金少昊金天氏之後見風俗通京兆漢秺侯金日磾匈奴休屠王之子也生賞弟倫生安上為侍中後漢末有武林太守金族族生穉見魏志琴家語仲尼弟子琴牢字子開一字子張衛人也亦見左傳趙郡列仙傳琴髙趙人得水仙恒於漢水乘赤鯉湛後漢大司農湛重新淦晉荆州刺史陶侃母湛氏新淦人有湛氏方生案漢有湛方官司農晋有湛方生内軍諮議梁有司州刺史僧智今進士湛賁袁州人郴其先楚懐王孫心號義帝都郴子孫氏焉晉有郴寳江夏陶侃别傳郴寳代居江夏箴楚大夫箴尹鬬克黄之後子孫以官為氏尋古斟尋氏之後晉有尋曽河内晉東海王屬按此條文有脱悮鐔音尋又音滛後漢有鐔顯廣漢蜀志有太常鐔丞漢有廷尉鐔政鄩斟尋氏之後亦作鄩左傳周有鄩肹斟夏諸侯斟灌斟尋氏之後以國為氏焉案史記夏本紀斟灌斟尋氏之外又單為斟氏亦夏同姓國也霠纂要文云人姓林閭嬴姓之後也後漢蜀郡林閭翁孺博學善著書見文字志箴尹楚箴尹克黄子以官為姓箴尹宜咎故陳大夫沈猶家語魯沈猶氏奢侈踰法斟戈夏諸侯國姒姓二十二覃叅陸終二子日胡之後見世本南宫文王四友南宫适之後周有南宫極南宫嚚魯孟獻子生閲案左傳昭公七年孟僖子屬説與何忌於夫子使事之敬叔乃孟僖子之子説即閱也此為獻子之子悮號南宫敬叔生路路生㑹㑹生虔為南宫氏見世本仲尼弟子南宫縚字子容魯國人魯國今兖州有南宫氏開元太史令南宫説京兆人孫傳監察御史南公戰國時有南公著書三十卷言五行隂陽事蓋衛南公子之後也南郭莊子有南郭子綦左傳有案左傳有南郭偃南郭鉏此脫文光禄大夫南郭昶文隨伯道遷入北案此有脫悮曽孫嗣本嗣本遂州刺史生南郭翁慶魏郡狀云本譙人後魏有興皇生雄唐刑部郎中生處信處讓處節處信都官郎中荆州長史孫銛給事中生綏締維紳紳庫部員外處譲都官郎中生澧收南伯莊子南伯之葵出古賢人傳南史左傳齊有南史氏後因為姓南門見姓苑甘士世本宋司徒華定甘士氏周卿士甘平公為王卿士後氏焉藍尹楚大夫藍尹亹之後二十三談三伉宋子姓㣲子之後風俗通云衛邑也晉公子重耳封舅犯於三伉支孫氏焉漢有少府三伉}
