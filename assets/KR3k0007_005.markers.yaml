  - {type: variant, offset: 7904, length: 3, content: 昕萬年, WYG: 吳子孫入越因號由吾氏琅琊北齊諫議大夫沭陽公由吾道榮浮邱列仙傳周太子晉學道浮邱伯控鶴上嵩山漢書楚元王與申公學詩浮邱伯浮邱伯荀卿門人修氏元明之後又有修氏因以為姓修魚秦嬴姓之後有修魚氏邱敦後魏獻帝弟為邱敦氏為十姓孝文改為邱氏今姓邱氏已具前卷邱氏注鳩摩晉書西域天竺人鳩摩炎代為國相生羅什為僧入中國仇尼後燕録有營州刺史洛陽公仇尼倪昌黎燕將軍仇尼歸衛尉河東公仇尼遂並鮮卑人周史周史之後其後氏焉舟相魯舟相氏見家語取慮音秋廬徐偃王子食邑取慮因氏焉今臨淮有此姓十九侯侯晉侯緡之後適他國以侯為氏鄭有侯宣多生羽魯有侯叔夏侯犯齊侯朝魏侯嬴上谷漢末侯氏徙上谷唐刑部侍郎侯喜業生知一兵部侍郎知一生}
