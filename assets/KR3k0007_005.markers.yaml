  - {type: variant, offset: 11750, length: 455, content: 蒲蒲洪以孫堅背上有草付文改苻為武都案蒲洪略陽臨渭氏人子苻健晉永和七年僭位都長安武都二字有脫文苻堅生丕堅孫登僭號長安自健至登五代為姚興所滅後周襄州刺史龍居公苻猛臨渭人元孫遷敵唐金州刺史苻子珪弟太子舍人璋臾顓臾風姓之後晉大夫臾駢俞又吐淄反前趙劉聰中常侍俞容天后時俞文俊江陵人案列子有俞氏以醫著扶漢有廷尉扶嘉河南官氏志云乞扶氏改為扶俱南涼有鎮北將軍俱延開元國學士俱匡辟朱顓頊之後周封曹挾于邾為楚所滅子孫去邑以為氏一云舜臣朱彪之後齊有朱毛漢中邑侯朱進鄢陵侯朱濞吳郡漢功臣有都昌侯朱畛至買臣會稽太守吳有將軍朱桓生異唐諫議大夫朱子奢云異之後錢塘漢槐里侯朱雲之後八代孫至賓後漢光祿勳始居錢塘為著姓十代孫遜之齊吳平令生梁領軍朱異異曾孫延慶唐倉部郎中也沛國相縣今有朱氏自云丹朱之後以王父名其後永城譙郡唐正議大夫平章事朱敬則工部侍郎義陽漢有朱穆晉有朱序序孫循之也丹陽後漢司空朱浮晉有朱齡石中書舍人朱巨川生宿右拾遺宿生賀大康後漢朱岑唐駕部郎中前疑其後也河南官氏志渴燭渾可朱渾氏並改為朱氏虞邱晉大夫虞邱書楚莊相虞邱子薦孫叔敖自代趙郡說, WYG: ''}
