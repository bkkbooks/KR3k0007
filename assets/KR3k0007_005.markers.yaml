  - {type: variant, offset: 8571, length: 220, content: 夫徐元之居南昌又生申嶺南節度兼御史大夫元弼中書侍郎徐安貞居衢州龍邱諫議大夫徐瑩刑部員外徐履道生蕃洛州刺史徐嶠之居會稽生浩浚漪浩吏部郎東海郡公有傳生璹現玫現泌州刺史浚生珽頊瑒珽都官郎中頊渭南領軍瑒閬州刺史閭齊大夫閭邱嬰之後或單姓閭氏頓邱鄴中記有閭澄王僧孺百家譜瑯琊王緒娶頓邱閭澄女河內茍元安娶頓邱閭法興女唐朝左補闕閭知微三原唐蜀州司馬閭邱珣上元中準制改姓閭氏生雲曇倉部郎中代郡後魏征西將軍閭毗本蠕蠕來降舒風俗通云舒子之後以國為姓居晉大夫先且居, WYG: 廉}
