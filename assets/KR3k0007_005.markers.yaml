  - {type: variant, offset: 5664, length: 0, content: '', WYG: 案阿蹊唐書及通志皆作阿跌亦曰訶咥或為􅎤跌此疑悞阿單改為單氏何邱楚有何邱子後魏殿中將軍何邱及敦又列威將軍何邱寄阿史那夏后氏後居㳙兠牟山北人呼為突厥窟歴魏晉十代為君長後屬蠕蠕阿史那最為首領後周末遂滅蠕蠕霸強北土蓋百餘年至處羅蘇尼失等歸化號阿史那開元改為史並具史注長安右衛大將軍寅國阿史那忠節左驍騎大將軍阿史那大節上貞元神策將軍兼御史大夫阿史那思暕並其支族阿史徳突厥如善可汗之裔别號阿史德通天司賔卿澣海侯阿史德元珎右武衛大將軍阿史德多覧並其後也阿伏干改為阿氏八戈波斯西域國人婆衍見姓苑九麻諸越大夫諸稽郢之後余今洪州有余氏沙吒北蕃酋帥舍利部大人因氏焉龍朔中右威衛大將軍沙吒阿傳曾孫葛旃兼御史大夫賜姓李氏名奉國從兄弟澄武衛大將軍沙陀北蕃酋帥也神龍驍衛大將軍郕國公沙陀忠儀案通志作沙吒義蛇邱見英賢傳濟北後漢河内太守蛇邱惑}
