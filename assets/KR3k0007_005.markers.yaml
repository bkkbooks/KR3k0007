  - {type: variant, offset: 7748, length: 0, content: '', WYG: 捨捨生宏正宏讓宏直宏正為陳左僕射生墳墳生若水宏直陳太常卿有傳生礭陳都官尚書孫翼唐江王友孫納言岷州刺史沛國赧王之後漢汾隂侯周昌從父兄苛御史大夫子武髙景侯按漢書髙景侯周成武字誤又剻城侯周緤與昌並沛人陳留汝南同祖晉周震潯陽晉梁州刺史周訪生建城公撫生楚益州刺史生虓按晋書楚子瓊瓊子虓此言楚生虓中有脱字五代孫羅睺右武大將軍生仲隠唐平州刺史臨川狀云本汝南人徙臨川宋臨海太守周毅元孫寳唐中州刺史生子褒永州刺史陳西豐侯周敷孫宏毅唐集州刺史江陵公生處静處冲廬江狀稱仁之後陳周士衡桂陽王諮議孫績唐司刑丞生利渉比部郎中利貞御史大夫太山周燕子忠為太山太守因家焉淮南周仁之後已上周氏八郡並舊望永安狀稱仁之後代居廣州按永安周氏亦出自决曹掾燕九世孫防防十三世孫靈超避晉亂徙居永安黄岡此言代居廣州與唐世系表不合梁褒城侯周靈超生法僧法尚法明法僧生孝節唐嘉州刺史生鳯鴻鳯元孫應生克構構房州刺史克構生儉鴻生譒給事中法尚隋永州刺史生紹範嗣孫沛右拾遺紹範左屯衛大將軍譙公生道務駙馬右衛將軍道務生伯瑜勵言瑜楚州刺史生擇從宣州刺史擇從生厲按唐世系表擇從子萬厲字誤勵言少府監生先義左金吾將軍法明黄州總管河間}
