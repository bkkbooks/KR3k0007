  - {type: variant, offset: 7918, length: 0, content: '', krp: 尚書納言紇弟約生允始州刺史南海公元孫何價下邳令侯史風俗通董狐為晉侯史因官氏焉東萊漢御史大夫桑宏羊故侯史吳匿宏羊子遷後漢侯史乾為東萊太守因家氏焉晉少府侯史光有傳鈎弋英賢傳漢昭帝母鈎弋夫人趙氏居河間又為鈎弋氏神仙傳鈎弋君得仙道羺羊左傳石碏宰羺羊肩之後侯莫陳其先後魏别郡居庫斛真水周書云代武川人代為渠帥隨魏南遷為侯莫氏河南後魏有侯莫陳白生延京兆公延生提相州刺史提生元武川鎮將北平王元生興羽林監清河公興生順崇瓊凱崇八上柱國尚書令司徒太保梁國公生芮頻芮周司空生奕頻桂州總管生肅文騫肅字虔㑹按北史崇子頴此頻字誤頴子名虔㑹此肅字二字衍唐考功郎中相州刺史昇平縣男生璀瑋嗣忠嗣丹州刺史生知莭知道知莭汝州刺史生澄渙渉澄生起超越起唐州刺史生暠昌超都官郎中生遥曇昇晏遥生愿愻恁愻醴泉令同州長史曇生怤恕協應昇壁州刺史渙都官郎中生逌懔渉渉相州刺史生進字按字字衍知道生濟濟生傑俊崇兄順順孫詮右率衛二十一侵侵見姓苑林殷太丁之子比干之後比干為紂所滅其子堅逃難長林之山遂姓林氏案通志林氏出自姬姓周平王庶子林開之後開生林英英生林茂林慶世系甚明因長林山得氏説自林寳始夾漈稱其偏狥有以也魯有林放仲尼弟子左傳林雍林不狃林楚代仕季氏左傳云林楚之先皆林氏之良也齊有林阮見説苑林類見列子林回見莊子濟南鄒縣風俗通云林放之後至林玉為相有九子十德之門見戚菀子孫秦末居齊郡鄒縣漢分齊郡置濟南遂為郡人玉元孫摯仕漢封平棘侯傳封四代見功臣表曽孫林遵字長賔受尚書於同郡歐陽髙官至少府太子太傅見漢書儒林傳遵六代孫邈後漢徐州刺史清泉侯五代孫喬字伯升與釋道安為友見髙僧傳伯升元孫道明後魏清河太守生勝北齊散騎侍郎魏分清泉為臨清今兖州臨清人也勝生曇曇生通通生登唐清苑博野二令以二子官居髙陸入闗居三源縣生游楚游藝游道游真游楚自萬泉令應爕理隂陽科第二等擢夏官郎中出鳯陳鄜三州刺史生希邱希望希禮希邱定平丞生肅琨肅延安主簿生少良伯成季隨賈伯成偃師尉琨司駕員外知制誥生禮膳部左司}
