  - {type: variant, offset: 6139, length: 656, content: 世系表慶祚生潁潁生行詳等此作慶祚生行詳中缺一代行詳孫幹太子詹事行誠曾孫公右昭應令公右生及三原令行佺尚書右丞生良宰利見利見廣府節度生明扆案唐世系表明扆作明宸劍州刺史慶暕戶部員外生昇澤州刺史澄弟淹不仕生雲起雲表雲平雲起益州行臺兵部尚書司農卿生師寶虞部郎中師寶生方質方直方質地官尚書平章事孫岷蓬州刺史方直兵部郎中雲表工部郎中雲平度支郎中生師貞師貞生元晟元珪元晟縣州刺史生汪岷州刺史元珪宗正卿生堅蘭芝堅刑部尚書生誕果州刺史蘭將作少監芝兵部員外穆八代孫延賓生璋福議璋孫岌生元郁案唐世系表郁作都元諤元誕郁生璿職方郎中諤生嬰顗嬰左金吾將軍顗太子僕元誕生瑗瑅瑗司勳郎中瑅宗正少卿福孫昌左騎衛大將軍普安公議生弘慶弘度弘表弘素弘慶生元希元瑾元希生灌濯案唐世系表灌作淮灌光祿少卿曹國公濯駙馬太僕生會贊善大夫會生鷫鵰鶚元瑾生涉太僕少卿弘度孫淑衛尉少卿淑生藏鋒弘表生元儼元貞元儼工部郎中生灌溫湑灌生搆播搆太僕少卿魯公播吏部郎中宋公溫禮部尚書平章事太子少保曹公湑太僕卿生捷秘書少監駙馬都尉元貞蔡州刺史女為中宗皇后廢為庶人生洵浩洞沘弘素生元昭元昭生濬衛尉少卿襄陽東眷穆元孫華隨宋武過江居襄陽縣祖歸生纂闡叡叡生放政放生粲政生鼎載前史並有傳纂曾孫弘瑗生德倫知止德倫任邱令生仁慎仁約納言博昌男生承慶案唐世系表德倫生思謙思謙生承慶嗣立淑承慶鳳閣侍郎平章事扶陽子生晉長裕晉常州刺史長裕祠部員外嗣立中書令逍遙孝公生子恆濟孚孚右司員外恆給事中陳留採訪使濟戶部侍郎生逢士模案唐世系表士模作士樸士勛奧函逢虞部員外生貞伯成季貞伯給事中成季兵部郎中士模彭州刺史士勛, WYG: ''}
