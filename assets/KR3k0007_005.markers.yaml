  - {type: variant, offset: 6067, length: 2, content: 錫臺, WYG: 楚恭王時大夫王叔學鄭穆公時王叔明王官晉有王官無地楚有王官子羽為沄邑大夫將匠風俗通漢官有將匠少府因為氏吳中散大夫將匠或曲陽令將匠熈晉侍御史將匠進梁太史令將匠道秀將閭漢書藝文志云將閭子名莬著書見莊子將鉅漢藝文志云六國時將鉅彰著子書五篇漢章帝時謁者將鉅彌相里咎繇之後為理氏殷末理㣲案里氏之先有理徴此作㣲孫仲師遭難去王姓里至晉大夫里克惠公所㓕克妻司成氏携少子季連逃居相城因為相里氏季連元孫相里勤見莊子韓子云相里子古賢也著書七篇漢有河隄謁者相里斥案漢有河隄謁者相里平此恐悮侍書御史相里武案通志本名虎此避唐諱作武濟隂太守相里祉始居河西前趙録將軍相里覧梁有相里係孫元本仕索虜東平王侍郎大通二年歸化西河隰城相里祉始居焉今汾州相里城是也魏郡冠氏縣祉十一代孫後魏清河太守洛干侯相里僧伽因封始居冠氏縣五代孫諶唐梁卿令潞城公生元亮元將唐逮}
