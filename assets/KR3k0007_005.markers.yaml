  - {type: variant, offset: 12373, length: 215, content: 苑東海蘭陵漢南郡太守毋將隆本京兆尹執金吾又毋將衣明易為豫章太守毋終左傳毋終子嘉父翟國君也因氏焉案左傳作無終須遂左傳遂國在齊北有須遂氏須肑楚賢人著書須卜改為卜氏廚人周禮廚人因官為氏案周禮無此官廚人濮見左傳邾婁公羊邾婁子曹姓也子孫以國為氏夫餘風俗通吳公子夫㮣慨王奔楚餘子在吳者因以為氏焉百濟國王夫餘寬生璋號帶方郡王生義慈大唐拜帶方郡王金紫光祿大夫貞觀入朝生隆熊州都督隆生文宣司膳卿左衛大將軍樂浪郡公夫蒙今同蒲二州多此姓或改姓為憑氏族略, WYG: 纂卷五}
