  - {type: variant, offset: 7909, length: 2, content: 琇冀, WYG: 昇潤州刺史丹徒狀云漢司徒侯霸之後陳司空清遠公侯安都生鳯唐通川令今富平令侯遵世居鄼縣云安都之後陳太尉零陵郡公侯瑱亦丹徒人孫則唐江州録事叅軍三水代居邠州後魏肥成公侯植賜姓賀屯氏植孫君集唐吏部尚書陳國公絳郡狀云本上谷人唐户部郎中侯師夏官郎中侯昧虛或云安都後國子祭酒侯嶠著作郎侯璥節並河東人節生劉監察御史劉生雲長雲章金部員外侯嶠京兆人河南官氏志古引氏改為侯氏婁風俗通邾婁國之後子孫以婁為姓左傳齊大夫婁堙齊國漢太常奉春君婁敬改封建信君賜姓劉氏南陽後漢末婁圭居南陽原武唐納言師徳相武后生思頴介休令思頴生志學千乘令志學生圗南河南官氏志匹婁氏改為婁氏後魏平逺將軍婁内干女為北齊神武皇后生澄洋演湛内干子昭并}
