  - {type: variant, offset: 6066, length: 0, content: '', WYG: 強寳質孫脩御史中丞户部侍郎其先略陽人也商衛鞅封商君子孫氏焉陽邱楚大夫食邑陽邱以為氏王孫周有王孫滿衛有王孫賈楚有王孫由于漢貨殖王孫大卿陳留耆舊有王孫骨治三禮為博士秦有夏大夫王孫氏始皇時王孫謀王子周大夫王子狐王子城父之後漢有王子中同治尚書王叔周有王叔陳}
