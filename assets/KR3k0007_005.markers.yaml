  - {type: variant, offset: 7902, length: 1, content: 致, krp: 六代孫子騫駕部郎中鄒子姓宋愍公之後正考父食邑於鄒生叔良紇遂為鄒氏齊有鄒衍鄒忌南陽新野魏鄒軌生琪按晉書鄒軌南陽新野人為魏左將軍生湛湛生㨗此琪乃湛字之悮晉侍中少府開元中有象先紹先彦先象先生儒立衡州刺史彦先生頴漳州刺史云湛後世居衡州裘衛大夫食采裘氏因姓裘或云本仇氏改為裘㑹稽姓苑云㑹稽有裘氏急就章有裘男弟案顔師古注求氏本居衛國裘氏之地故稱裘焉後又轉為求氏漢末有求仲即此族也裘急就作求男弟非人名又禮記衛獻公與大夫栁莊邑裘氏莊子鄭人緩呻吟裘氏之地考工記有裘氏又複姓為邑裘氏仇宋大夫仇牧之後王莽孫有仇延案漢書王莽時有仇延此作孫悮陳留考城後漢仇香一名覧考城主簿遼西後燕尚書仇儒開元左衛將軍仇克義滄州刺史謀風俗通云周卿士祭公謀父之後以王父字為氏州風俗通晉州綽其先食采於州因氏焉衛有公子州吁漢州輔魏州泰郵見姓苑優史記優孟樂人也子孫氏焉留衛大夫留封人之後攸北燕有尚書攸邁犨晉大夫郤犨之後儔見姓苑疇風俗通摯疇氏之後求本裘氏改焉􅀢纂要文云人姓由吾由余之後}
