  - {type: variant, offset: 9276, length: 634, content: 諸葛諸葛氏夏殷侯國葛伯之後英賢傳云舊居瑯琊諸縣後徙陽都先有詹葛時人謂之諸葛氏因氏焉風俗通云葛嬰為陳涉將軍有功非罪而誅漢文追封子孫為諸縣侯因以為氏世本云有熊氏之後為詹葛氏齊人語訛以詹葛為諸葛氏案孔平仲雜記諸葛氏以諸縣之葛徙陽都因加諸字以別於陽都葛氏瑯琊陽都縣漢司隸校尉諸葛豐裔孫圭後漢太山郡丞生瑾亮瑾吳大將軍左都護宛陵侯生恪喬恪中書令揚州牧喬生攀翊武將軍生顥徙河東亮蜀丞相武鄉侯生瞻蜀尚書僕射瞻生京晉江州刺史與顥並徙河東亮族弟誕魏司空兗州刺史生靚奔吳為大司馬靚生恢東晉左僕射尚書令生甝梁有零陵太守諸葛銓居丹陽生潁北齊太子舍人隋著作郎潁生會唐有諸葛茂道諸梁楚文子食邑諸梁因氏焉閭邱世本齊閭邱產生嬰嬰生歐歐生莖莖生施齊郡左傳嬰明及閭邱息並齊宣王時閭邱邛閭邱光漢有廷尉閭邱勳漢太常閭邱遵有閭邱決著書十二篇晉有太常閭邱沖南陽太守閭邱羨土又家漢州沮渠本臨松盧水人先為匈奴官號沮渠因氏焉吳有沮渠萬為張掖王晉末沮渠蒙遜僭稱西河王號涼都張掖二主三十九年為後魏所滅渠邱風俗通莒有渠邱公因氏焉彭城英賢傳云彭城有渠邱氏焉渠複漢武時屬國酋帥渠複累封昆侯傳子絕於陵風俗通云陳仲子齊世家也辭爵灌園於於陵子孫氏焉於邱其先家於邱因氏焉漢有宛句人於邱略舒鮑世本云偃姓國也晉悼公子舒鮑無終舒堅潛夫論楚公族有舒堅文叔為大夫舒鳩左傳少昊氏官名國於濟北以國氏焉案舒鳩楚屬國左傳少皞五鳩氏無舒鳩誤余邱齊公族食采余邱因氏焉漢有侍御史余邱炳又隱士余邱靈居曲河茹茹其生蠕茹茹種類為突厥所破歸中國後魏蔚州刺史高平公茹茹敦思, WYG: 舉}
