  - {type: variant, offset: 6890, length: 1, content: 唐, WYG: 攸寧春冬夏尚書納言建昌王江公岐州刺史生文瑛荀瑛攸暨駙馬司禮卿定王司徒楚公生崇敏崇行崇敏宗正卿上黨王崇行國子祭酒懐運淄州刺史生攸歸攸止攸望攸歸九江王宗正卿孫良臣商州刺史攸止恒安王司賔卿女元宗恵妃追封貞順皇后攸止子昕忠信忠鴻臚卿信秘書監攸望㑹稽王少府監察公孫徹洋州刺史士逸韶州刺史六安縣公生志元仁範安業志元倉部郎中生懿宗嗣宗懿宗河内王殿中監汴魏州刺史神兵道大總管生瑾瓌仁範雲陽令生尚賔重規載徳尚賔河間王益府長史重規髙平王司禮卿神龍朔方大總管禮部尚書生成節成藝載徳潁川王殿中監右千牛大將軍生平一敬一平一}
