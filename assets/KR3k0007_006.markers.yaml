  - {type: variant, offset: 4018, length: 246, content: 女為黃帝妃生元囂蓋古諸侯國也後漢有雷義蜀有將軍雷同吳陸抗傳有宜都太守雷譚晉有豐城令雷煥祕笈新書崔姜姓齊太公生丁公伋生叔乙讓國居崔邑因氏焉自穆伯至沃杼成良代為卿大夫良十五代孫意如秦東萊侯生二子伯基仲牟伯基居清河東武城仲牟居博陵安平並為著姓見姓氏英賢傳祕笈新書裴嬴姓伯益之後秦非子支孫封𨛬鄉侯因氏焉今聞喜𨛬城是也六代孫陵周僖王封𨛬邑君及除邑從衣河東聞喜陵裔孫蓋漢侍中九代孫遵始自雲中從漢光武平隴蜀徒居河東安邑安順之際又徙聞喜元孫茂侍中尚書生三子輯號東眷徽號子明子孫又號中眷徽與子遐號八裴祕笈新書真, WYG: ''}
