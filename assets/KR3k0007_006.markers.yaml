  - {type: variant, offset: 8015, length: 0, content: '', krp: 元昌倉部貟外五本伍氏避仇去人氏焉蜀五梁晉始興太守五允堵左傳鄭有堵㓂堵叔堵俞彌堵汝父又音者魏志張燕本姓堵普官氏志後魏獻帝次兄為普氏改為周氏苦晉郤犨亦號苦成叔子孫氏焉風俗通苦成越大夫漢苦均為㑹稽太守苦音庫鼓左傳鼓子鳶鞮之後以國為姓又見姓苑浦晉起居注有尚書令浦選補見姓苑五鳩世本云楚鳩氏國語楚昭王時有五鳩蹇五里其先齊諸田漢武帝徙之諸田以門秩次第為族田廣田孫田登為第二代人案此下疑有脱誤五鹿左傳云少昊氏}
  - {type: variant, offset: 8016, length: 0, content: '', WYG: 官氏焉案左傳無其文五鹿衛地趙有將軍五鹿盧吐萬代人代為部落酋帥河南周郢州刺史通生緒永夀公弟纉右武候將軍已見萬氏注吐奚後魏古弼代人本姓吐奚名華後為司徒賜姓古名弼吐賀後魏吐賀氏吐突代人今中官右監大將軍吐突承璀吐難改為難氏古成風俗通即古咸之後隨音改焉漢有廣漢都尉古成雲姚興給事中黄門侍郎古成説右將軍古成知晉袁宏集有南海太守古成彣開元中雲陽尉古成古野山東古野氏赤秋别種其後氏焉古孫賈孫氏後譌為古孫氏苦成晉卿郤犨食采苦成因氏焉潜夫論苦成城名在鹽池東北苦久後燕歩兵校尉苦久和案後燕録作若久和此作苦久和仵城晉州稽胡晉初賜姓呼延居西州後魏正始年呼延勒為定州刺史於定陽賜姓仵城因住南汾州仵城縣音訛轉又為賀恱魯陽妘姓國也在魯陽為魯所滅子孫氏焉潜夫論􅇗姓楚公族有魯陽氏祖南風俗通與社南皆齊倡也漢髙惕娶扶風祖南氏補禄英賢傳補禄子著書一篇言法家事吐谷渾魏晉之際鮮卑慕容廆兄吐谷渾率部落止青海之西國號吐谷渾或歸中國因氏焉古口引改為侯氏普六茹周書楊忠姓普六茹疑與普陋茹同十一薺禮左傳衛大夫禮孔禮至漢新市長禮賢平原後漢禮震受尚書於歐陽歙啟夏后啓之後以王父字為氏後燕有將軍啓崙按啓崙急就章作啓籥十二蟹解晉大夫解狐之後其先食采於解因氏焉漢有御史大夫解延年司𨽻校尉解光濟南晉雍州刺史解系系弟結結孫斾唐御史大夫濟南男解琬鴈門人徙家魏州職方員外郎解忠順魏州貴鄉人河南後魏官氏志解毗氏改為解氏解瑟羅改為羅氏可足渾前燕録慕容雋皇后可足渾氏又有散騎常侍可足渾恒後燕城陽太守新汲侯可足渾健生譚新平公渴燭渾可足渾疑並與可朱渾同隨音轉耳可朱渾出自代北又居懐朔隨魏南徙河南後魏都官尚書樂陵公可朱渾昌生道元北齊太傅太師扶風忠烈王生孝裕長威孝裕北齊大將軍生貴公貴公生君招長威生定逺唐右領軍右常侍懐州刺史生懐儼懐敏案北史道元子名長舉襲父爵此誤道元魏臣云北齊亦誤十四賄隗春秋時翟國隗姓子孫因氏焉天水成紀漢末隗義弟崔崔兄子囂更始御史大夫鄧禹承制}
