  - {type: variant, offset: 8031, length: 0, content: '', WYG: 師尹三公官也以官為姓漢尹咸尹賞尹齊後漢尹敏晉尹奉天水姚秦謨謀主尹緯又西海太守尹玖生猛晉昌太守又居京兆六代孫恵唐寧州司馬生恩貞刑戶二部侍郎御史大夫戶部尚書天水公生中和中庸中言中和庫部郎中國子司業中庸平原安定等三郡太守信王傅司正中言京兆府司録後魏燕郡太守尹思曽孫景同浙州刺史生徹隋梓州長史生元備左武候郎將河間稱尹敏之後魏趙州刺史尹虛曽孫䡄隋貝州刺史上蒙公生勢唐嘉州刺史生仁宏仁徳仁宏潞州司馬長樂公生元叔元貞元凱元貞生日昇鄭州刺史光禄}
