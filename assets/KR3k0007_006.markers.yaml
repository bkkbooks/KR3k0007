  - {type: variant, offset: 802, length: 0, content: '', WYG: 錡嵩倚漢四皓隱商山號倚里先生倚相氏後案漢書顔師古注作綺里季此作倚里先生未詳所本骫纂要文云人姓史記夏后氏姓蔿晉士蔿之後以王父字為氏䦱國語有䦱大夫薳左傳楚大夫薳章之後有薳子馮薳掩􅇗楚姓祝融子季連之後漢初楚懐王孫心項羽封為楚懐王後為義帝南郡隋右衛將軍芊雄曽孫端唐金吾將軍技也西部大人代為酋帥後魏初各依舊號為技也氏後魏䕶軍將軍臨江伯技也鍮石生說詖内部尚書孫爾歸生平右衛將軍生恭長文義北齊侍中隋信州捴管新寧公文義生旻唐鳴水令恭隋丹州别駕生寳倫唐興國别將尒朱}
