  - {type: variant, offset: 2113, length: 257, content: 非後子孫為胡非氏戰國有胡非子著書胡掖禿髮思復鞬娶胡掖氏生烏孤呼延匈奴四族有呼衍氏入中國改為呼延氏河南前趙大司空雁門公呼延冀女為劉元海后七代孫叔歸上谷太守孫族潞州刺史曾孫呼延黃河內令生昉昭曦晧呼毋漢武帝時匈奴王呼毋盧降封容城傳封三代呼衍後漢書匈奴四族有呼衍氏見匈奴傳蘇農西蕃突騎施酋也神龍右驍衛大將軍金滿州都督張掖公蘇農金山開元左羽衛大將軍永壽郡王蘇農輔國左金吾大將軍酒泉公蘇農盡忠案此皆沙陀氏之人此俱改為蘇農氏考貞觀中有蘇農泥熱左屯衛大將軍穀州刺史亦北番歸化者蒲盧姜姓有蒲盧胥齊人善弋射蒲姑左傳蒲姑殷諸侯居齊也蒲圃, WYG: 桑}
