  - {type: variant, offset: 8015, length: 0, content: '', WYG: 元昌倉部貟外五本伍氏避仇去人氏焉蜀五梁晉始興太守五允堵左傳鄭有堵㓂堵叔堵俞彌堵汝父又音者魏志張燕本姓堵普官氏志後魏獻帝次兄為普氏改為周氏苦晉郤犨亦號苦成叔子孫氏焉風俗通苦成越大夫漢苦均為㑹稽太守苦音庫鼓左傳鼓子鳶鞮之後以國為姓又見姓苑浦晉起居注有尚書令浦選補見姓苑五鳩世本云楚鳩氏國語楚昭王時有五鳩蹇五里其先齊諸田漢武帝徙之諸田以門秩次第為族田廣田孫田登為第二代人案此下疑有脱誤五鹿左傳云少昊氏}
