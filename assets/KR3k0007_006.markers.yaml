  - {type: variant, offset: 6889, length: 0, content: '', WYG: 廷訓廷詢廷誨廷詢駕部郎中廷誨給事中無量五從姪思光虞部郎中生鉟長孺司勲員外吕炎帝姜姓之後虞夏之際封吕今南陽宛縣西吕亭是也至周失國子孫氏焉太公號吕望周有吕侯秦吕不韋單父人吕公女為漢祖皇后封臨淄侯東平吕侯之後魏吕處居任城官至徐州刺史七代孫述後燕尚書左丞皇安承慶述七代孫也生烱焯烱膳部郎中諫議大夫左庶子焯左補闕後魏東平太守吕行均亦云虔之後六代孫雄黄左十四監生崇粹粹兵部郎中諫議大夫生詔進士按唐世系表詔作詒京兆後魏定州刺史范陽公吕祥狀云本出東平生真周趙州刺史房子公曽孫武生整右衞將軍滿州刺史生懐人馮翊狀云本望東平後居馮翊蒲城北齊虞州刺史東平公吕晟生和岐州刺史和生紹宗唐領軍大將軍凉州都督紹宗生休璟休琳休璟左領軍將軍北庭都䕶休琳生廣太子舎人廣生洞太常博士河東黄門侍郎平章事吕諲生仁本春卿冬卿春卿尚書奉御諲兄子季重歙州刺史中書舎人吕太一趙州刺史吕延之生謂勣謂潭州刺史湖南觀察生温宗禮温户部郎中衡州刺史侍御史吕守素監察御史吕霈生長輕右衛兵曹長輕生亢膺右司郎中諫議大夫新豐尉吕令問丕監察御史吕暕生崇質崇賁崇質殿中少監生逵建建防州刺史崇賁劍南河南嶺南成都河中節度鄆國公生遐超暕弟賜右武衛將軍諸郡吕氏右翊郎將吕元播臨汝人又家緱氏生彬渭輔弼彬生牧庫部郎中澤州刺史牧生吳頴鎛榮渭輔生敞監察御史起居郎司更大夫吕才博州清平人著隋紀二十􅃃刪陰陽書五十三卷一子方毅右拾遺吕因汝州人生皆著作佐郎虢州司馬侍御史吕元嗣陜州人清池令吕處真綘郡人又家京兆生元晤元智元㻮元晤陳王傅光禄卿生同正鄆鄜州刺史同正生逖造崇訓女適將軍髙力士崇訓太子家令生回京兆倉曹櫟陽令生遥元㻮博州刺史生遇元智恒王傅生進旅漢髙帝功臣有昌平侯旅卿案漢表作昌圉侯𫝊封六代又共侯旅罷師𫝊封四代又共通云周大夫子旅之後汝尚書有汝鳩汝方左傳晉大夫汝寛汝齊漢長水校尉汝隨潁川後漢書孝子傳有汝郁處漢書云藝文志趙有辯士處子著書風俗通漢處興為北郡太守潁川晉書處枉又陳留相處就並潁川人沛國晉有周馥母沛國處氏所風俗通宋大夫華所事之後漢有諫議大夫所忠武帝時人平原後漢有所輔平原人小史父奉郎中楚風俗通芊姓鬻熊封楚以國為姓左傳魯有楚尹楚邱趙襄子家臣楚隆莒伯益之後封莒為楚所滅以國為姓吕管英賢傳漢吕管都尉吕管次祖中山人吕相秦相吕不韋本陽翟賈人子孫因以氏焉楚季世本楚若敖生楚季因氏焉陳大夫有楚季融楚邱新序楚邱先生孟嘗君時人也莒子春秋時莒子失國子孫氏焉九虞武周平王少子生而有文在手曰武遂以為氏漢初武臣為趙王又有武渉功臣表梁鄒侯武彪傳封六代後居沛國沛國武彪裔孫周魏南昌侯生陔晉左僕射薛侯五代孫洽魏晉陽公始封居太原永水或號太原武氏洽曽孫居常北齊鎮逺將軍生儉永昌王諮議儉生華隋東都丞華生士稜士讓士逸士彠士稜唐司農少卿宣城公生君雅君雅生敬真崇真崇真太子洗馬士讓唐太廟令路公生惟良懐道惟良衛尉卿生攸宜攸緒攸宜雍州刺史都官尚書攸緒揚州長史隱嵩山神龍中拜太子賔客巢公徴不起景雲中封安平王亦不拜生君訥懐道左監門長史生攸暨攸}
