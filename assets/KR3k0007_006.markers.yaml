  - {type: variant, offset: 3100, length: 771, content: 舍人嵇蕃子茂齊生含廣州刺史武昌生康魏中散大夫生紹晉侍中案晉書嵇康本傳其先姓奚會稽上虞人以避怨徙譙有嵇山家於其側因而命氏又嵇含傳祖喜徐州刺史父蕃太子舍人又文選註嵇紹集曰從兄太子舍人蕃字茂齊然則蕃於康乃其群從非祖孫也又嵇康詩母兄鞠育有慈無威則康乃少孤為其兄公穆所育文選註引嵇氏譜亦不詳康公武昌生康疑有脫誤亦不知何據河南後魏官氏志紇奚氏改為嵇氏奚夏車正奚仲之後漢功臣表魯侯奚涓北海奚涓之後吳有臨海太守奚熙廣陵奚涓之後唐滁州刺史奚淩澤生千柏柏生陟吏部侍郎鞮風俗通云晉銅鞮伯華之後氏焉遆今同州澄城縣多此姓自云銅鞮氏避仇改焉亦單姓蹄案廣韻無此字惟字典音提註云姓也今附入齊韻兒郳郳犂來之後亦為兒氏兒良六國時人見呂氏春秋千乘漢有御史大夫兒寬倪邾武公封次子於郳是為小邾後失國子孫為邾氏避仇改為倪案世本云邾顏居邾肥徙郳宋仲子注云邾顏別封小子肥於郳為小邾子則顏是邾君肥始封郳杜譜云小邾邾俠之後也夷父顏有功於周其子友別封為附庸居郳曾孫犂來始見春秋附從齊桓以尊周室命為小邾子穆公之孫惠公以下春秋後六世而楚滅之世本言肥杜譜言友當是一人姓纂前以郳犂來為兒氏之祖而以邾武公之卿為郳氏之祖同一卿也強為分別武公之號於傳無徵疑即公羊傳所稱顏公者郳城在東海據祕笈新書增漢有揚州刺史倪彥中山唐刑部侍郎倪若水中山藁城人也西姓苑云西門豹之後改為西氏犀史記秦有犀首鮭中山後漢有鮭陽鴻為少府傳孟氏易南陽淯陽後漢大鴻臚鮭丹𦋅見纂要毒見纂要𡸔見纂要云人姓案集韻生姓也一曰蜀闖梁四公子名或作𡸔毒齊季齊襄公子季奔楚因氏焉魯有大夫齊季窺見世本西方見姓苑云少昊金天氏位主西方今因氏焉北平前燕慕容廆以西方武為股肱又西方罔以文章知名西門鄭大夫居西門因氏焉列子有西門子魏文侯時西門豹為鄴令漢王莽時有道士西門思洞仙傳有西門惠案漢書王莽傳道士西門君惠無名思者此又分思惠為兩人唐宦官有西門思恭西乞秦將軍百里術字西乞其, WYG: ''}
