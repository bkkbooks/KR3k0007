  - {type: variant, offset: 6926, length: 2, content: 稷仁, WYG: 集備就登集梓州刺史備殿中御史生元衡門下侍郎平章事成都尹登生儒衡殿中御史思元一名安業零陵令追封渤海王生求已太僕少卿士彠唐工部尚書利荆二都督應國公卒贈司徒周國公又贈太師太王太后追崇魏王云女為則天皇后生中宗睿宗彠子元慶元爽元慶宗正少卿生審思再思三思審思追封申王再思宫門郎追封蔡王三思梁王夏春天三尚書内史神龍司空同三品降徳靜為節愍太子所殺生崇訓崇謙崇烈崇撝崇操崇訓駙馬太常卿太子賔客生繼植左衛將軍崇謙光禄卿梁公崇烈尚乘奉御元爽虞部郎中少府少監生承嗣魏王春天二尚書納言文昌左相實封一千三百一户生延基駙馬右羽林將軍郯公延安光禄卿邢公延壽衛尉少卿燕公延秀駙馬太常少卿桓公案唐世系表作恒公承業陳王左驍衛大將軍生延暉駙馬陳公羽林衛將軍孫惲斌承業次子延祚光禄少卿鄶公延嘉秘書少監莒公庾堯時掌庾大夫以官命氏至春秋時周有大夫庾皮皮子過邑於緱氏衛有庾公差潁川後漢始居潁川魏襄城令庾乘生太子中大夫遁按鄧名世辯證亦作遁晉書作道並見晉書遁孫琛晉㑹稽内史生亮氷翼亮東晉司空永昌公氷中書監都鄉公生穆之五代孫衆陳長沙内史孫抱唐太子舍人新野漢末居南陽後分赭防為新野遂為郡人後漢司空孟五代孫淄晉遂昌太守長子㑹為新野太守百}
