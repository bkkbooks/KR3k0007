  - {type: variant, offset: 7387, length: 1, content: 羨, WYG: 士峻士琳士峻孫瓌之比部郎中楚州刺史士琳孫延福生元􅙝元道元逞元􅙝房州刺史生行成有鄰行成生春宋昌春吉州刺史右庻子有隣侍御史賛善大夫元道將作少匠生昆吾仲連昆吾防州刺史仲連太原令元逞左庶子須王傅攅弟勝孫周則周夏官上士生利仁超利仁兵部郎中超左司郎中義興公果隋兵部尚書兄曄隋懐州刺史生吒淹吒隋昌州司馬生如晦楚客案唐書如晦𫝊祖果此作果兄曄之後與史不合如晦吏部尚書左僕射侍中蔡成公生構荷構慈州刺史荷駙馬尚衣奉御襄陽公楚客工部尚書蒲州刺史淹御史大夫知政事吏部尚書吉襄公生敬同愛同敬同中書舎人東陽公生從則工部侍郎從則生自逺昌逺志逺自逺生佐大理正案唐世系表自逺生繁繁生佐與此不合佐生元穎元絳元穎恊律郎平章事西川都督案唐書元穎傳元穎以學士承㫖同平章事此恊律郎三字疑有脱誤生審禮京兆少尹元絳生審權平章事浙江節度生讓能彦林宏徽讓能太尉宏徽吏部尚書彦林中書舎人生用礪昌逺生倚左衛將軍志逺生倬儋愛同兵部貟外易州刺史安平公顒雍州刺史贈太尉生景秀景仲景恭景仲生孝彛孝奬孝弇按唐世系表景仲生整整生孝彛等與此不合孝彛曾孫惟慎按唐世系表曽孫作孫監察御史孝奬撫州刺史孝弇生元琰左金吾將軍景秀後周渭州刺史生懿隋禮部侍郎殿内監甘棠公懿生乾福乾祐乾祚乾福生崇允嗣及崇允成州刺史生正儀正心正儀生望之溱州刺史正心生昇南榮案唐世系表正心生齊之齊之生南昇南榮與此不合昇京兆功曹南榮長安主簿嗣及青州刺史乾祐生續主客郎中續生知讓知謙知讓生慮恵慮生隋果州刺史恵生濟給事中京兆尹知謙天官貟外邢州刺史乾祚曽孫操案唐世系表曽孫作孫殿中御史生隒隒生行敏常州刺史荆益二長史南陽襄公生崇懿恒崇懿宫尹承判左司貟外生希望太僕卿隴右節度恒分判刺史生位佋佑任供巨卿位考功郎中湖州刺史生液佋詹事司直任河南兵曹參軍佑左僕射平章事司徒岐公太保致仕生師損式方從郁師損工部郎中司農少卿式方昭應令生悰駙馬平章事須公案唐書悰傳悰封邠國公此須字悞淮南西川節度悰生裔休儒休從郁駕部貟外生牧顗牧中書舎人生承澤晦辭徳祥晦辭左補闕徳祥御史中丞禮部侍郎顗淮南節度判官供洪州長史巨卿兼監察御史顒少子景恭廓州刺史康成公生徳祐按唐世系表顒少子景恭生徳裕與此不合殿中少監安衆公生敬則敬則生元同元志元振元同萬年尉生彦先率更令元志考功郎中杭州刺史生逢時緯孝輔叅謨嶠逢時生伯卿緯殿中御史生繼信刑部貟外杭州刺史孝輔大理丞生虔興賢應鸞清虔大理司直清檢校貟外生師仁師義師禮師仁吉州刺史生湘参謨陜州司倉生寅倫寅京兆法曹倫水部郎中澧州刺史嶠監察御史元振生諒誠長廣公整承漢文學生篤篤十二代孫闢渭州刺史整隋左衛將軍生揩揩生元義元逸元景元義侍御史元逸司門郎中元景宻州刺史整姪徳致眉州刺史漢陽公敦延年之後至後魏耒陽太守登孫良周熊州刺史生敦隋鄭州刺史敦生宏宏生爽駕部郎中爽生進思陽侯少子躋新平太守曹苻秦太尉生嶷秦秘書監嶷生詮後魏中書侍郎襄陽當陽侯元凱少子耽晉凉州刺史生頋西海太守生遜過江隨元帝南遷居襄陽遜官至魏興太守生靈啓乾元靈啓生懐瑀懐瑶懐瑀六代孫文範唐中書舎人御史中丞懐瑶蔡州刺史生岑嶷巖嵸岸崱㓜定嵸梁西荆州刺史岸梁州刺史崱江州刺史崱生中規孝友友孫行紀行繹行紀曽孫某河南尉荆州刺史巖梁州刺史兄弟父伯並梁州有𫝊孫懿宗唐吏部貟外乾元孫叔毗周峽州刺史生亷卿憑石安石魚石黄石憑石生依徳蓬州咸安令生易簡考功貟外安石生賢倉部郎中魚石生依藝鞏縣令依藝生審言膳部貟外審言生閑武功尉奉天令閑生甫檢校工部貟外甫生宗武宗武生嗣業貧無以給葬收拾乞丐云甫没四十年啓子美柩祔於偃師惇六代孫恒隋水部郎中生安期唐亳州刺史安期生利賔雍州司法中山與京兆同承魏僕射杜畿後家中山裔孫弼北齊}
