  - {type: variant, offset: 804, length: 1, content: 祖, WYG: 契胡部落大人代為酋帥居尒朱川因以為氏後魏有羽健秀容三百里封之以為世業尒綿魏蠕蠕渠帥綿他㧞尒綿來降改為綿氏是婁南燕有徐州刺史是婁盧是賁改為兒氏是云改為髙氏是奴改為封氏芉尹楚大夫芈尹申無宇之後五旨履見姓苑娝方几反見纂要文云人姓壘後趙録有壘澄本姓裴改焉水邱吳興人六止史周太史史佚之後以女弟為戾太子良娣生史皇孫進進生宣帝恭子髙元建康史氏今𨽻酒泉郡史丹裔孫後漢歸義侯苞之後至晉永嘉亂避地河西因居建康苞裔孫寧後周安政公生祥隋城陽公祥弟雲期雲生令卿唐祠部郎中杭州刺史宣城丹孫均均子崇}
