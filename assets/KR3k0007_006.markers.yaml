  - {type: variant, offset: 6814, length: 1, content: 王, WYG: 城郡主簿生力士洛州長史案唐世系表長史作刺史生欽寂欽明欽淡欽寂䕫州長史生輔徳輔乾輔乾右金吾大將軍光禄卿生諫論詵諷諫河南丞論監察御史詵歸州刺史諷監察御史輔徳宕州刺史欽明凉州都督安西大都䕶生戒言戒非戒惑都官郎中鴻臚少卿生子房季常子端季常萬年丞子端岳州刺史戒言太僕卿右武衛大將軍生子餘壽州刺史欽淡深州刺史生叔冀淄青陳留節度兼御史大夫生孝常亳州刺史淡姪孫仲容鄧州刺史生志倫志雍志雍兼監察御史智仁右屯田將軍懐州刺史許昌公圉師黄門侍郎同三品平恩公左丞户部尚書生自持案唐世系表自持作自牧自遂自正自正澤州刺史㑹稽陽羡稱髙陽同祖後漢諫議大夫許武武孫馘太尉今無聞晉陵漢徐州刺史聖卿皇太子洗馬許叔牙其後也生子儒唐天官侍郎生臨謙鳴謙臨謙右卿相將軍曹州刺史撫州刺史鳴謙本髙陽人也詢之後又家陳留生孟容仲輿季同孟容兵部侍郎京兆河南尹仲輿國子司業季同金部郎中中山狀云許兆之後居中山北齊武川鎮將許彪生康康生緒洛仁緒太府少卿蔡州刺史左常侍孫義均生景先中書舍人工部侍郎景林司講郎洛仁左監門將軍太原狀云許邵之後因官居太原唐太僕少卿貝州刺史太寳生謨刑部郎中許自新祠部貟外許偉禇子姓殷後宋共公子石為禇師因氏焉漢相禇大案通志禇大漢梁相此有脱字}
