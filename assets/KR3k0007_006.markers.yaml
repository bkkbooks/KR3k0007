  - {type: variant, offset: 6810, length: 1, content: 申, WYG: 北祖曽孫彥後魏侍中相州刺史孫安中書侍郎生恂惇恂曽孫本行唐給事中遜生文宗按遜字上有脱文文宗下應有智玉文通文宗生正言唐監察御史智玉生知禮殿中御史文通生向葱監察御史惇字季良北齊左僕射生文紀汝南平輿縣後漢功曹許邵居邵陵縣漢太尉祭酒許慎今並無聞安陸狀稱詢五代孫君明梁楚州刺史入周徴不起法光案唐世系表君明生宏周宏周生法光與此不符岳州刺史生紹唐陜州刺史譙公生善}
