  - {type: variant, offset: 1207, length: 280, content: 國子司業案唐世系表冰無所生震乃虔之子此句疑衍生震吏部侍郎河南尹震生敦發教徹皦政儼詵給事中徐州刺史又京兆尹生復妙妙泉州刺史穎生盈炎盈嘉王傅顏淮安太守左武衛將軍生寬琛廣州刺史生炯韙韙瑯琊太守又驍騎將軍季生澄沁州刺史澄生綰䋔綰工部郎中荊南府司馬則長子愉愉七代孫彤生雅振振生世長唐秦府學士諫議大夫生良嗣右僕射溫公生踐言踐竣踐義踐節踐言生務寂務昇竣生彥伯駙馬案脫都尉二字下駙馬亦脫都尉二字兄子震駙馬義孫廉節曾孫坦太府卿長從弟宣司農少卿襄陽則曾孫佐晉末自扶風徙焉十二代孫權唐左驍衛將軍藍田稱自武功徙焉刑部尚書蘇洵生晉瞻瞻駕部郎中生端平寧昶端比部郎中四代入省生弘趙郡狀稱蘇章, WYG: 杞姒姓夏禹}
