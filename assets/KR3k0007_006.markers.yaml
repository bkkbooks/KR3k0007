  - {type: variant, offset: 4515, length: 461, content: 履華州夔州刺史不合徽生元凱申州刺史建安王叔卿孫正循王傅宜都王叔明孫繹弘繹侍御史弘荊州案唐世系表荊州作邢州刺史義陽王叔達唐侍郎禮部尚書江忠公生政德元德賢德紹德政德曾孫義少府少監元德生仲方潁州刺史賢德水部郎中汾州刺史紹德曾孫盩厔縣令案唐世系表紹德孫復盩厔令此作紹德曾孫盩厔令而無名曾字衍孫字下脫復字叔武光祿少卿廣陵胡公之後漢末魯相失名無子以外孫劉矯為嗣魏司徒東鄉侯生騫晉太尉汝南胡公之後漢太傅尚書令陳蕃下邳淮浦人後漢太尉陳球球弟子珪沛國相生登東海胡公之後晉有衛武貞侯陳壽京兆胡公之後唐揚州長史陳敬之狀稱大邱長仲弓裔孫默徙長安即敬之高祖也生思齊主客員外婺州刺史敬之從父弟騫之湖州刺史生崇禮九言崇禮水部員外嘉州刺史九言右司員外河東桑泉後魏征南將軍許昌公琬元孫述生元盛毓藝元盛孫正觀潞襄二州刺史藝生義方禮部侍郎知吏部選毓字大德職方郎中荔州刺史新安後周熊州刺史許昌公琬之後曾孫義感唐右司郎中虢州刺史馮翊狀稱陳宣帝子沅陵王叔興之後唐倉部郎中惠滿生伾刑部郎中廬江襄安人隋廣陵太守陳稜孫崇業唐御史大夫生琨琨生熊熊生審明州刺史武當狀云太邱之後, WYG: 似和悮又}
