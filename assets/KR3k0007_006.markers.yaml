  - {type: variant, offset: 4979, length: 1362, content: 太子太師希烈世居均州右司郎中鴻臚大卿汭少府少監潤戶部郎中洳祕書少監希烈兄振鷺司封郎中國子司業生泉明州刺史廣漢射洪左拾遺子昂生光祠部員外臨淮右補闕陳兼生當萇京歸當贊善大夫萇京兆法曹京給事中歸考功員外會稽太常博士陳齊卿堂弟景津生允叔允眾允初允叔侍御史允初殿中侍御史趙郡檢校司徒平章事陳少游稱宣帝後生正儀廣宗後魏瀛州刺史陳肅六代孫處政唐岳州刺史洛陽夏官郎中冀州刺史璲生鉞鍵萬年隋利州總管陳永貴本姓白隋初改姓陳氏叡隋驃騎將軍生貴貴次子諧諧孫令哲令英令哲唐洮州刺史令英右衛將軍岐州刺史諸郡陳氏司農卿陳思門左豹韜將軍陳集原右鷹揚將軍陳元光河中少尹兼御史中丞陳雄河東人鳳州司馬陳懷古安陽人尚藥奉御陳行修江陵人禮部員外郎陳讜言京兆人太常博士陳章甫江陵人殿中侍御史陳憎河內人京兆功曹陳仲雍河內人河南官氏志侯莫陳氏改為陳後魏汾州刺史長蛇公陳紹生弘唐泉州刺史龍川公陳賀略端州首領也秦顓頊嬴姓秦後伯益裔孫非子周孝王封之秦隴西秦亭是也至始皇滅六國子嬰降漢子孫以國為氏又魯有秦堇父生丕茲及秦並秦祖人秦商楚人據祕笈新書增疑有脫誤秦冉秦非並仲尼弟子漢有潁川太守秦彭太原狀稱晉太常博士秦秀之後裔孫生行其行師行其渭川刺史曾孫守庫部郎中同州刺史生昌舜行師右監門大將軍生無害桂州都督安南公也齊郡狀稱秦彭之後裔孫瑤之曾孫景通通子曄並太子洗馬崇賢學士鄜州洛川縣唐瓜州刺史秦孝言狀云彭後生懷洛相如懷洛兵部郎中相如吏部郎中河內武德狀云彭後唐金部郎中叔恂生善丕都官員外郎辛姒姓夏后啟別封支子於莘莘辛相近祕笈新書引作子孫去艸為辛遂為辛氏左傳周太史辛甲案劉向別錄云辛甲故殷之臣事紂去至周文王以為公卿而封其長子漢藝文志道家有辛甲二十九篇又左傳有辛甲為太史命百官箴王闕者是也辛伯辛俞美為昭王友秦有將軍辛騰家中山苦陘曾孫蒲漢有辛武賢隴西狄道辛蒲以名家漢初徙隴西至破羌將軍武賢生慶忌左將軍光祿大夫常樂公五代縣孟興二子恩殷恩生子焉子焉生寅裕元孫顏生猷懿猷孫巨明後魏侍中生顯崇雍州刺史顯崇生元忠慶之元忠青州刺史平陽伯生迪隋隴州刺史迪生德本唐黃州刺史平桑公慶之周度支尚書祕書監曾孫源案唐世系表源作道源監察御史生思禮邵州刺史風元孫義感駕部郎中懿生宗宗生安國季超安國曾孫愨北齊都官尚書生文粲鳳州刺史季超孫豁生昂政寬昂周潼州總管繁昌公政生肇肇生茂將右丞侍中茂將生希業駕部郎中寬生諝中書舍人寅孫晏次子遷六代孫彥隋禮部尚書任城公孫處儉處仁處元處儉中允處仁生曜卿侍御史處元屯田郎中裕五代孫晁生敬宗闡季恭敬宗曾孫術北齊吏部尚書生衡虞案唐世系表衡虞作衡卿唐太常丞衡虞生郁禮部尚書敬宗次子靈寶曾孫公義隋司隸大夫生亮融亮唐侍御史融戶部員外郎闡元孫寶剛生興暠興生澄良澄生元慶元同元慶生怡諫職方員外郎壽州刺史元同戶部員外郎良禮部侍郎生元道比部郎中元道生廣嗣長儒廣嗣禮部侍郎生恆晉長儒都官郎中生咸暠曾孫利涉度支員外郎季恭曾孫塋生懸君昌懸生崇階施州刺史君昌魏州刺史生崇禮工部郎中崇敏兵部郎中崇禮生道瓘度支郎中殷十代孫子馥生德源北齊中書舍人聘陳使隋蜀王諮議孫元馭刑部郎中孫烈庫部員外郎子焉少子胥十四代孫義元唐洛州司兵曾孫如璿遂昌令生祕汝州刺史殷孫普後晉有侍郎勉七代孫西魏五原公元孫瑜唐將作丞胥十代孫纂後魏西荊州刺史弟蕃生子璣工部侍郎子璣生德璉唐隰州溫泉丞天寶進士辛平生惲殿中侍御史大曆都官郎中辛昇之訪未獲周河中總管宿國公辛, WYG: ''}
