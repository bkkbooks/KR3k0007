  - {type: variant, offset: 6808, length: 1, content: 申, WYG: 許後為楚所滅子孫分散以國為氏晉許偃楚許伯鄭許瑕髙陽北新城縣今入博陵郡漢大司農許據生允魏中領軍允孫式式長子皈按唐世系表皈作販生晉徴君詢詢元孫懋有傳懋孫善心隋黄門侍郎生唐中書令髙陽公敬宗敬宗生昻昇昱杲景昻虔化令生彦伯韶伯彦伯太子舎人生望右羽林將軍望生逺侍御史睢陽太守逺生峴袁州刺史韶伯左屯衛將軍蘇州刺史平思公昇明堂令景工部郎中判羽林大將軍式次子邁晉東海太守}
