  - {type: variant, offset: 8545, length: 242, content: 庶子生縱覽惟貞生允南真卿允臧允南司封郎中真卿工部尚書太保贈司徒魯文忠公允臧生熲楚州刺史育德元孫防同州刺史游秦鄆州刺史生元勝右補闕之善孫有意沔州刺史真卿生䪻頵南昌狀云與師古同承綝唐虞部員外謨有生昭粹班𦍋姓楚若敖生鬭伯比伯比生令尹子文為獸所乳謂獸有文班因氏焉秦有班壹避地樓煩生孺孺生長長生囘囘生況況生稚稚生彪扶風平陵況女為成帝婕妤徙平陵彪生固固生顓顓生澄陳祠部郎中班投始居汲郡狀稱十三代孫也挺元孫思簡唐春官員外生景倩吏部侍郎祕書監生鈞杭懸渙弘映榮弘戶部尚書生肅肅生震震夔州刺史環楚有環列之, WYG: ''}
