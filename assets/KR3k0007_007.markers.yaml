  - {type: variant, offset: 5371, length: 121, content: 有溫孤元軌溫伯莊子有溫伯雪子昆吾世本古己姓國夏時侯伯祝融氏之後孫陽風俗通景母封孫陽侯丹曾孫汾避亂隴西因封為氏盆成孟子有盆成括仕齊奔水英賢傳祁大夫之後奔漢水氏焉門尹宋門尹般之後宋又有門尹且渠屯渾太昊之佐屯渾氏其後為氏尊盧古太昊時諸侯氏也根後蜀法, WYG: 平章事刑}
