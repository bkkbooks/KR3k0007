  - {type: variant, offset: 8198, length: 346, content: 定仲尼弟子達者八人路囘僕噲何祖辛也案朱彝尊孔子弟子考顏氏弟子達者八人路囘之僕子何噲幸子相高八人也缺高一人又幸或作辛通典作柳咸淳臨安志作韋子相史記作祖見書傳顏叔子顏丁顏鶵顏高顏息譜魯人顏子涿聚齊大夫子晉顏芝河閒人生貞秦末藏孝經者也漢大司農顏異濟南人也顏駟江都人後漢袁紹將顏良瑯琊江都後漢臨沂人魏徐州刺史顏盛始自魯瑯琊曾孫含西平靖侯晉永嘉過江居丹陽生髦約髦生綝暢暢孫師伯宋侍中左僕射約孫延年光祿勳延年生竣測奐竣吏部尚書奐五兵尚書綝五代孫協生之儀之推之善之儀後周御史大夫平陽公五代孫溫之司門郎中之推北齊黃門侍郎生思魯愍楚游秦思魯記室生師古相時勤禮為侍郎祕書監案此處脫名生趨庭職方郎中曾孫迢元孫庶相時秦府學士禮部侍郎生益期期曾孫交勤禮生顯甫顯甫生元孫惟貞元孫滁州刺史生杲卿常山太守贈太保司徒忠節公孫証, WYG: ''}
