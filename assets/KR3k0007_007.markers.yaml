  - {type: variant, offset: 6053, length: 8, content: 浩洽洪汯滉渾洄洽, WYG: 翼伯翼伯生義同義同生宗素宗素生式東郡上官先元孫迴後周定襄太守孫宏隋比部郎中江都總監因居揚州生儀西臺侍中平章事二子庭芝庭璋庭芝周王府屬生怡容庭璋太子僕射生經野經國經緯經緯生詔侍御史壤駟風俗通息公子邉為大夫氏焉案此有脫誤漢有光禄大夫宜陵侯壤駟射案家語孔子弟子有壤駟赤秦人爽鳩左傳爽鳩附庸國伏羲後風姓也養由楚養由基之後三十七蕩党本出西羌姚秦將軍党耐虎自云夏后氏之後代居羌豪又吴平男党娥子孫居同州馮翊後魏寧州刺史北地公党宏六代孫党仁宏唐陜嬴等州刺史廣都公生敬元濮州刺史監門將軍婺州都督党孝安職方郎中党曄並同州人華隂姚秦羽林監党成後徙華隂汻音晃呼浪反姓苑云人姓廣風俗通云廣成子之後廣成神仙傳廣成子古仙人居崆峒山黄帝造焉三十八梗丙齊大夫丙歜之後漢功臣表有高苑侯丙猜𫝊封八代魯國漢丞相博陽侯丙吉代居於魯晋大夫丙豫食采於丙因氏焉齊有丙意兹漢士丙丹北海朱虚縣魏有丞相徴士丙原字根矩孫後周信州總管丙明丙明生粲唐監門大將軍應國公高祖與之有舊以姓犯諱賜姓李氏粲生寛太常卿寛生孝旻案唐書李元紘傳元紘父道廣祖寛此於寛下止載生孝旻脫道廣一人紀王戸曹孝旻生承業承嘉承業絳州刺史承嘉御史大夫戸部尚書道廣殿中監平章事益州長史金城侯生元綜元繹元紘元緘元綜屯田郎中荆州長史生舒工部郎中舒生莒元紘戸吏中書三侍郎平章事戸部尚書致仕生有孚有容有功元緘鄆州刺史景芊姓楚公族也漢初徙山東豪族於闗中今好畤華隂諸景是也楚有景風吴志有西湖人景養廣陵後漢景彎善詩易辟不起見儒林傳平陽後漢燕録有平陽人景安河東唐河南少尹景延廣案此與五代之景延廣非一人生彬邴晋邴豫食采於邴因氏焉秉漢有秉寛猛左傳猛足案左傳作猛獲永見姓苑梗陽秦宣太后弟封梗陽君因氏焉漢有駙馬都尉梗陽犫晋有梗陽巫臯漢有侍御史謁者梗陽貞邴意齊大夫邴意兹之後三十九耿耿殷時侯國晋所滅因氏焉四十靜靖風俗通單靖公之後以謚為姓一云齊田氏之族靖郎君之後中山著姓略云河東裴公續娶散騎常侍章公中山靖延康之女陳留隋有靖德立與格處仁等為八俊井穆天子傳周有大夫井利又天子為井公博左傳虞大夫井伯漢司徒掾井宗四十四有有風俗通有巢氏之後仲尼弟子有若魯人漢有禄案姓氏急就篇云風俗通漢光禄勲有光今本風俗通無此句亦無有禄之名柳周公孫魯孝公子展展孫無駭以王父字為展氏生禽食采柳下遂姓柳氏魯滅楚狂案唐世系表作楚滅魯仕楚原本脫誤秦并天下柳氏遂遷於河東河東觧縣秦末有栁安惠裔孫也始居觧縣安曽孫隗漢齊相六代孫豐後案豐後漢人此脫漢字光禄勲六代孫僧習案唐世系表豐六世孫軌晉吏部尚書生景猷晋侍中二子耆純耆太守號西眷二子恭璩恭後魏河東郡守南徙汝潁遂仕江表曽孫緝宋州别駕宋安郡守生僧習據此則僧習乃豐十二世孫也此本作六代孫僧習與唐書不合後魏尚書右丞生鸑慶虬檜鷟生𢃄韋周黄門侍郎𢃄韋生祚續祚生震範幹震郢州刺史生俊棣州刺史範尚書右丞生齊物案唐世系表祚生齊物齊物生範範生喜此以範為祚子齊物為範子與世系表不合睦州刺史生喜喜生賁并案唐世系表并下有淡字中行宷并}
