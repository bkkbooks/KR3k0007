  - {type: variant, offset: 8861, length: 0, content: '', WYG: 生仁衛進士既濟次子宏師進士不禄述師長子許十一代案梁沈約乃景後此十一代孫上應有景字脫孫林子田子林生暎暎生約梁左僕射特進隠侯約生旋旋生衆戎案梁書約祖林子生璞璞生約約生旋旋生寔此以璞作暎以寔作衆戎與本𫝊不合次子齊十五代孫恪陳侍中曽孫賁唐大理評事給事中薛王傅沈務本稱寂孫挺生利賔大理評事利賔生忌忌生建迴逵逵閬州刺史國子祭酒修文學士沈伯儀稱彦後孫浩僊浩源浩僊殿中丞浩源武功尉生廙庠廙生周明琚珂珂京兆功曹庠監察御史生瑱比部郎中灃州刺史沈萬石稱彦後生客卿陳刑部尚書生孝澄隋婺州别駕授徒五百人三徴不起孫虬之樂平令生迪番陽令迪生竦大厯六年進士左庶子生宗本師言師黄中黄左黄宗本蘇州司倉師言沂州録事參軍師黄廣州度支}
