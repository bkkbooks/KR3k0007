  - {type: variant, offset: 8923, length: 0, content: '', WYG: 四十八感昝何氏姓苑云昝氏蜀人也晋中興書云桓温將昝堅唐有昝愼盈昝盧改為沓坎氏英賢傳云宋附庸有坎氏四十九敢啖前秦録將軍啖鐵河東大厯水部郎中啖彦珍㑹昌中進士啖鱗避武帝廟諱改澹五十琰冉高辛氏之後一云大夫叔山冉之後魯國仲尼弟子冉耕字伯牛冉雍字仲弓冉求字有子又冉孺並魯人未詳所出雲安冉氏盤瓠後冉髦之種類也代為巴東蠻夷酋帥陳有南康太守巴東王冉伽軫軫孫安昌唐潭州都督安昌孫寔河州刺史娶江夏王宗女生祖雍刑部侍郎祖雍生太華華子愔染石趙録云石季龍將染閔魏郡内黄人或作冉氏簒石趙號魏三年為慕容雋所滅奄}
