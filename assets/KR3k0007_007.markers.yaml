  - {type: variant, offset: 5226, length: 1, content: 璩, WYG: 煚生信丞正臣正臣生德皆唐殿中丞超宗弟令勝後魏河北太守孫懷訥廣州刺史總管懷化公生慈景慈皓慈景駙馬兵部侍郎華州刺史生節裳奉御慈皓巴州刺史生持滿左衛郎將下邳漢丞相趙周之後十二代孫廞魏廣陵太守元孫裔晋平原太守以宋武外祖贈金紫光禄大夫生正倫宋領軍正倫生伯符丹陽尹七代孫綽唐左領軍將軍生璡屯田郎中魏州刺史瓌駙馬右千牛衛將軍夀州刺史女為中宗妃追冊和思皇后子欽仁金城與天水同前凉有趙頵扶風漢太常大夫趙禹今無聞平原後漢太𫝊趙喜之後本南陽宛人徙平原裔孫奉伯後魏洛陽令生彦琛北齊尚書司徒太傅宜陽文獻王生元將仲將叔將公方仲將隋吏部尚書生義綱唐戸部侍郎叔將卭州刺史生尹平秘書郎公方隋大理正生仁溥義髙河間蠡吾縣本名潁川亦趙王遷後漢京兆尹廣漢之後徙河間裔孫全榖本名鍾唐金部員外洪州都督中山稱本自天水徙中山曲陽今定州鼓城縣後周信州長史趙逹孫恊生寳符寳符生不器不器生夏日和璧冬曦安貞居貞彚貞顗貞兄弟七人舉進士自寳符至冬曦安貞孫鄼又五代進士冬曦中書舍人國子祭酒生湛屯田郎中國子祭酒生鄼安貞給事中居貞比部員外吳郡太守採訪使生昌工部尚書華州刺史顗貞員外}
