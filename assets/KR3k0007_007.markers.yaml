  - {type: variant, offset: 6216, length: 350, content: 賞給事中質京兆少尹中書舍人生翃拾遺翃生倫佾佾果州刺史並云昌黎人延之族弟恬後焉陳留本潁川人稜後徙陳留唐禮部郎中韓雲卿弟紳卿京兆司錄兄子會愈會起居舍人愈職方員外侍御史韓彥亦陳留人生琬殿中御史生諲河東狀云本自潁川徙焉唐給事中韓液右補闕韓昆並家蒲坂廣陵狀云本潁川人禮部員外韓擇木生秀榮秀實弼弼國子司業秀實太子中允京兆邠寧節度檢校僕射韓游瓌東郡檢校司空平章事汴宋節度使韓弘弟權右金吾將軍范陽夏綏銀節度檢校尚書右僕射韓全義單周成王封少子臻於單邑為甸內侯因氏焉襄公穆公靖公二十餘代為周卿士漢功臣中牟侯單右將軍案漢書中牟共侯單右車此作右將軍誤傳封六代昌武侯單究封七代濟陰後漢單匡為濟陰太守因家焉隋有單雄信仕李密生道真唐梁州司馬生思敬思禮思遠思敬安東都護生光業思遠河南尹岐州刺史生有鄰不先東陽山陽公單顧生颺居山陽熙六代, WYG: 曽}
