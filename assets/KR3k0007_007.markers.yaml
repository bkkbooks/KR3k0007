  - {type: variant, offset: 6567, length: 238, content: 海藏唐晉陵令生頃頃生南容西游蘭鄭穆公支孫以王父字為氏漢武陵太守蘭廣後漢匈奴四姓有蘭氏遼東蘭河勃後燕北平王蘭審慕容垂舅子也鮮卑種類河南官氏志烏桓氏改為蘭唐右武衛將軍長基真州刺史蘭火逵房子令興並其後檀姜姓齊公族有食瑕邱檀因以為氏檀伯達為周卿士禮記魯有檀弓六國時齊有檀子高平南山縣晉改山陽為高平因為郡人後檀喜元孫檀播六代孫道濟宋司空江州刺史武陵公兄𥙆西昌侯從祖父憲之晉書有傳宋有道鸞撰晉陽秋安風俗通漢有安成盧山記安高安息王子入侍姑臧涼州出自安國漢代遣子朝國居涼土後魏安難陁至孫盤娑羅, WYG: 叔瑞端}
