  - {type: 'tls:seg', offset: 30, content: '', id: KR3k0007_CHANT_007-1a.7}
  - {type: variant, offset: 31, length: 236, content: 孫以國為姓秦末居河內野王漢初遷汝南陳郡長平縣漢北地太守殷續始居長平魏有襃生昱昱生敞過江六代孫高明生不害不占不佞不害孫開山唐吏部尚書鄖節公開山姪元嗣文州刺史開山堂姪祚部尚書堂姪日用宣歙州觀察御史中丞不占孫聞禮太子中書舍人生令名令德令言令威令名金部郎中國子司業生容冬官郎中容生丞業宗正少卿令德曾孫嘉紹工書嘉紹再從弟佐明倉部郎中令言孫踐猷生寅永寧尉寅生亮給事中杭州刺史駕部郎中不佞生芉唐東宮學士孫躋融生浩師師生仲堪堪元孫鈞梁五兵尚書有傳曾孫藹唐蜀文學元左傳衛大夫元咺之後其先食采, WYG: 叔鮮封}
