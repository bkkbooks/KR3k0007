  - {type: variant, offset: 3169, length: 0, content: '', WYG: 易州刺史郁孫紹宗北齊僕射武威公生三蔵隋金紫光禄大夫孫知亷侍御史知晦兵部郎中汾州刺史知晦生珣吏部侍郎珣生損渝州刺史三蔵再從孫善行萬年丞條史琚生白􅋯榮案此有脱文慕容五代孫冲仲慕利後魏有吐谷渾主慕利延與慕容氏同祖也慕輿鮮卑慕容氏音訛為慕輿氏庫狄鮮卑段疋磾之後避難改姓庫狄居代北後遷中夏河南後魏上洛太守庫狄陵生保真保真生峙周宣州刺史生嶷徽崧徽生璠益州總管樂}
  - {type: page-break, offset: 3169, content: '', id: KR3k0007_WYG_008-25a, image: WYG0890/WYG0890-0699c.png}
