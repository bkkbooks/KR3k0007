  - {type: variant, offset: 3207, length: 0, content: '', WYG: 蔡後為趙所滅子孫以國為氏晉有蔡墨秦相蔡澤漢功臣表肥如侯蔡演演元孫義義元孫勲後漢為長安邳長後徴不起勲曾孫擕濟陽考城縣擕生稜質稜生邕質始居陳留分為濟陽因為郡人質元孫克從祖謨晉永嘉同過江克六代孫㸃梁司空安豐公孫秦客唐金部郎中客姪真清鄿州刺史大業後梁左案此下有脱文户尚書生克恭秦府學士太子洗馬質元孫克生晉司徒謨謨元孫興宗吏部尚書生樽樽孫凝凝子君和南陽魏有蔡睦晉有蔡秀秀八代孫麗梁琅琊太}
