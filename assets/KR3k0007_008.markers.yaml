  - {type: variant, offset: 3172, length: 2, content: 于比, WYG: 惠施為梁相交趾太守惠乘太僕惠根琅邪惠根孫嚚為北海太守子孫因居琅邪後漢有揚州刺史惠整吴人吴侍中惠謙晉陵太守惠松宋歩兵校尉惠纂昋音桂或作炅漢衛尉昋横彭城漢上計掾昋景雲見姓苑城}
