  - {type: variant, offset: 13881, length: 429, content: 案漢有湛方官司農晉有湛方生內軍諮議梁有司州刺史僧智今進士湛賁袁州人郴其先楚懷王孫心號義帝都郴子孫氏焉晉有郴寶江夏陶侃別傳郴寶代居江夏箴楚大夫箴尹鬭克黃之後子孫以官為氏尋古斟尋氏之後晉有尋曾河內晉東海王屬案此條文有脫誤鐔後漢有鐔顯廣漢蜀志有太常鐔丞漢有廷尉鐔政鄩斟尋氏之後亦作鄩左傳周有鄩肸斟夏諸侯斟灌斟尋氏之後以國為氏焉案史記夏本紀斟灌斟尋氏之外又單為斟氏亦夏同姓國也霠纂要文云人姓林閭嬴姓之後也後漢蜀郡林閭翁孺博學善著書見文字志箴尹楚箴尹克黃子以官為姓箴尹宜咎故陳大夫沈猶家語魯沈猶氏奢侈踰法斟戈夏諸侯國姒姓參陸終二字日胡之後見世本南宮文王四友南宮適之後周有南宮極南宮囂魯孟獻子生閱案左傳昭公七年孟僖子屬說與何忌于夫子使事之則敬叔乃孟僖子之子說即閱也此為獻子之子誤號南宮敬叔叔生路路生會會生虔為南宮氏見世本仲尼弟子南宮縚字子容魯國人魯國今兗州有南宮氏開元太史令南宮說京兆人孫傳監察御史南公戰國時有南公著書三十卷言五行陰陽事蓋衛南公子之後也南郭莊子有南郭子綦, WYG: 恩介}
