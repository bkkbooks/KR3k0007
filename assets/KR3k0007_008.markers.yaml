  - {type: variant, offset: 14646, length: 1195, content: 閻章生暢侍中宜春侯女為安帝皇后子顯晏景顯長社侯裔孫嵩後魏戶牖侯居武陽七代孫爽止眘止唐左司郎中生敬言敬受敬仲敬受生涉鄧州刺史敬仲生濟美國子祭酒天水西城侯蜀巴郡太守閻竺今無聞常山狀云閻章後唐監察御史文逸生朝隱仙丹朝隱給事中仙丹洛州司兵廣平狀云本常山人唐安固令閻春生處逸處節處逸生交禮長安尉交禮生至言至為至言生寬至為太常博士生訪評事處節生自厚自厚生懿道懿道生伯璵刑部侍郎璵生昂璵從父弟伯均河南代人本居雲陽魏有閻滿孫善善曾孫慶周少司空太安公賜姓大野氏生毗隋將作少監石保公毗生立德立行立本立德唐工部尚書大安公生邃司農少卿邃生知微巨源知微春官尚書巨源生用之左金吾將軍用之生寀吉州刺史立行少府監生元秀岐州刺史立本中書舍人生克儉嘉賓克儉生叔子同州刺史嘉賓司農卿廉顓頊曾孫大廉之後以王父字為氏漢有廉丹趙郡又顓帝之後京兆杜陵漢右將軍廉襃生丹大司馬丹孫昭為後漢廣漢太守蜀郡太守廉范字叔度丹後河東狀云廉范之後唐瀛州刺史方實刑部員外郎廉瓘海州人詹詹大卿體仁家譜曰詹姓始于周宣王支子賜姓曰詹封為詹侯其後有詹父為周大夫詹嘉處瑕以守桃林之塞據祕笈新書增又曰楚詹尹之後有詹何善釣昭公九年有詹桓伯辭于晉並據增占陳子占之後以王父字為氏潛見姓苑臨川姓苑云今臨川有潛氏黔禮記齊有黔敖又黔婁先生隱者鍼左傳魯大夫鍼巫鍼季箝耳西羌人狀云周王季之後為虔仁氏音訛為箝耳氏姓氏英賢譜本胡姓天監初有箝耳期淩自河南歸化父同祖光并仕魏為三品也馮翊後魏馮翊太守箝耳靜孫康買周御伯大夫聘梁使生文舉周寧州刺史生宗幹宗唐兵部侍郎幹湯陰侯大業中以王侯兄弟并改姓王氏已附王氏注文舉弟文固生愉駕部員外後魏伏波將軍箝耳進進生通同周南兗州刺史賜大理稽遂氏隋初復本姓孫恪唐右衛郎中翟道男後魏又有華山太守箝耳德曾孫文衡河州刺史邯鄲男生茂實唐庫部員外生靈丹靈心瞻葛漢張騫使西域從百餘人唯瞻葛氏人得還占尹齊有占尹德又有占尹應堅兼風俗通衛太子兼之後咸邱齊有隱士咸邱蒙見孟子函輿晉范皋夷食采函輿因氏焉嚴𦍋姓楚莊王支孫以諡為姓楚有莊周漢武強侯莊不識孫青翟為丞相會稽莊忌夫子生助後漢莊光避明帝諱并改為嚴氏馮翊稱青翟之後代居馮翊魏郃陽侯嚴校又徙華陰五代孫君協唐洮州都督生方約方嶷方約利州司功生挹之損之挺之挹之生丹江陵令生紳綬紳光祿少卿生簡綬檢校司空右僕射挺之中書侍郎生武吏部尚書鄭公武生楚卿越卿鄭卿損之右庶子生式士良士元式職方員外士元國子司業生纂士良江州刺史生謩殿中御史方嶷戶部郎中生安之河南丞禮部侍郎嚴善思亦馮翊人生宙弘憲憲大理卿生慥懍愉愉監察御史燉煌青翟後今無聞吳郡貞元給事中同州刺史嚴說生休復膳部員外郎廣漢稱君平之後唐檢校左僕射嚴震世居梓州鹽亭云本望馮翊生協公貺公弼協晉州刺史公弼率更令震兄霈生公瑾兼御史弟霔司勳郎中生公衡刑部員外震從祖兄侁兼御史中丞震從祖弟礪檢校左僕射山南西道節度使東海唐穆州刺史嚴撰濟北嚴助之後今無聞凡周公第二子凡伯之後為周畿內諸侯見左傳晉陵姓苑云今晉陵有此姓, WYG: ''}
