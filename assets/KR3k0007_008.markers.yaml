  - {type: variant, offset: 964, length: 2, content: 所滅, WYG: 有季高大厯右常侍季廣琛摯風俗通摯疇古諸侯國毛詩周有摯荒按摯荒未見毛詩義䟽京兆長安魏太僕少卿摯模代居京兆生虞晉太常卿光禄勲晉書有傳駟左傳鄭穆公子騑字子駟之後以王父字為姓漢恩澤侯表鄔侯駟鈞齊哀王舅冀左傳冀國今晉州冀氏又晉大夫郤芮食采冀邑亦為冀氏芮生缺唐侍御史冀元珪太原人子仲輔職方郎中案姓氏急就篇仲輔作仲甫祕漢功臣表戴侯祕彭祖傳七代孫西秦録有僕射祕宜案西秦録宜作宣肆風俗通宋大夫肆臣之後漁陽漢有漁陽太守肆敏}
