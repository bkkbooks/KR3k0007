  - {type: variant, offset: 3013, length: 146, content: 方叔無咎羌憲呂氏春秋夏首南人羌憲梁善畏明失氣而卒常壽英賢傳有熊氏之後世本宋大夫景公時有常壽邦長仲見纂要山陽後漢尚書郎仲長統著昌言案仲長統不姓長仲誤代居高平晉太宰參軍長仲穀著山陽先賢傳長盧列子楚賢者長盧子著書九篇𣄸長狄鄋瞞長狄之後複姓長梧莊子有長梧子唐帝堯陶唐氏之後裔封唐侯又周成王封弟叔虞於唐, WYG: 國也}
