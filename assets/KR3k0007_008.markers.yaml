  - {type: variant, offset: 2548, length: 214, content: 理徵此作微孫仲師遭難去王姓里至晉大夫里克惠公所滅克妻司成氏攜少子李連逃居相城因為相里氏李連元孫相里勤見莊子韓子云相里子古賢也著書七篇漢有河隄謁者相里斥案漢有河隄謁者相里平此恐誤侍書御史相里武案唐志本名虎此避唐諱作武濟陰太守相里祉始居河西前趙錄將軍相里覽梁有相里係孫元本仕索虜東平王侍郎大通二年歸化西河隰城相里祉始居焉今汾州相里城是也魏郡冠氏縣祉十一代孫後魏清河太守洛干侯相里僧伽因封始居冠氏縣五代孫諶唐梁卿令潞城公生元亮元將唐棣, WYG: 掦}
