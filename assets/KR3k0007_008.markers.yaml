  - {type: variant, offset: 4717, length: 470, content: 字為氏又乘睢古賢人見世本漢煮棗侯乘昌案漢表煮棗侯革朱孫昌嗣侯則昌為革氏無乘昌名鄫曾子支庶亦為鄫氏案鄫當出姒姓鄫子之後此誤勝本勝屠氏後世避仇改為勝氏稱漢元帝功臣新出侯稱忠陵陽搜神記陵陽子明上宣城陵陽山得仙其後因山為氏陵尹楚大夫陵尹喜陵尹招之後陵終王莽曾孫翁儒與東平陵終氏有惡案莽曾祖翁儒此作孫誤曾夏少康封少子曲烈于鄫春秋時為莒所滅鄫太子巫仕魯去邑為曾氏見世本巫生阜阜生參字子輿案曾子父點字子晳晳生參通志作巫生阜阜生晳父子并為仲尼弟子生元申裔孫偉後漢尚書令盧陵唐亳州治中曾恭狀云曾子後又庫部郎中晉州刺史曾崇潁河東人生叔政隴州刺史滕周文王第十四子滕侯之後滕失國子孫以國為氏吳有滕允晉交州刺史滕含北海吳大司馬滕允世居劇縣晉有黎陽太守滕恪河東開元進士滕雲翼今太學博士滕珦婺州人生邁恆風俗通楚大夫恆思公之後見世本東安漢有東安長恆裴子孫因居之騰本滕氏因避難改為騰氏後漢相騰撫案後漢書滕撫北海劇人傳作滕從水不從馬查廣韻于騰下亦不載人姓萬姓統譜有騰姓亦作滕氏改焉惟梁孝行傳有騰曇恭今姓纂既有騰姓為滕侯之後而不載撫反載撫于騰下謬以滕作騰撫官止左馮翊此作相亦誤弘, WYG: 蒯}
