  - {type: variant, offset: 2294, length: 0, content: '', WYG: 五為確此作堂姪與唐表異唐司議郎清河無知元孫諶漢清河太守因家焉裔孫充西魏開府儀同三司孫進唐右二府統軍進堂弟文博觀州刺史宜陽本居濟隂今已絶任城無知曾孫不害生漢任城太守案此下有脱名因家焉不害孫相漢丞相高平侯裔孫舒晉司徒族詠之宋荆州刺史今絶宋城唐中書令右僕射齊公魏元忠生昇晃昇太僕少卿晃泗州刺史費史記紂幸臣費仲夏禹之後楚有無極漢有費直江夏蜀丞相費禕巴蜀太守費觀禕孫晉巴東令穆之生恬晉江夏相魚復侯恬七代孫宏規唐主客郎中合肥男又居盧費愔晉西中郎將五代孫唐辰州刺史允斌晉費試成都人汝南後漢費長房之後瑯琊費直之後河南官氏志費連氏改為費氏尉鄭有尉止尉翩}
