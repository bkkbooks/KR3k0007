  - {type: variant, offset: 957, length: 1, content: 曹, WYG: 刾鄉用氏焉案左傳鄭大夫郟張郟古洽切今作刾誤也刾俗刺字義風俗通云義伯陽卿也漢有南陽太守義縱河東義縦代居河東封岸頭侯晉有上庸都尉義欽智今有河東智氏漢有零陵太守智嗣戲潁川見姓苑又音僖魏志有戲才譬厯辰代人改為辰氏六至季陸終氏之子季連之後一云魯桓公子季友之後}
