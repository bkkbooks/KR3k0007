  - {type: variant, offset: 465, length: 305, content: 通云匡紹曾孫也居閬中鮮于偃鮮于惠子鮮于且于延陵吳王子季札居延陵因氏焉趙襄子有謀臣延陵正是其後也案韓非子趙襄子時有延陵生延州吳季札封延州來氏焉連尹楚大夫連尹襄老大之後蕭宋微子之後支孫封於蕭蕭叔大心子孫有功因邑命氏焉代居豐沛至不疑為楚申君之客祕笈新書廖風俗通古有廖叔安左傳作飂蓋其後也祕笈新書姚虞舜生於姚墟子孫以姚為氏左傳鄭大夫姚句耳漢有諫議大夫姚平舜後胡公封陳至敬仲仕齊又為田氏至田豐王莽封為代睦侯奉舜後子恢避王莽亂過江居吳郡改媯氏五代孫敷又立姚氏祕笈新書條今冤句有此姓冤句曹州也氏族志椒楚大夫越椒之後銚潁川郯陽後漢衛尉安陽侯銚期朝臣日本國使臣朝臣真人長安中拜司膳卿同正朝臣大父拜率更令同正朝臣姓也包楚大夫申包胥, WYG: 熊}
