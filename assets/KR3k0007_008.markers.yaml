  - {type: variant, offset: 943, length: 0, content: '', WYG: 子孫以國為氏楚有宋義宋昌廣平昌為漢中尉始居西河介休十二代孫晃生恭徙廣平利人侯孫藥師生毓恭弟畿給案唐世系表給作洽恭前燕河南太守毓生良北齊東郡太守良生乾子皓乾生大辯唐卭州司馬大辯生守恭守愼守儉守恭}
