  - {type: variant, offset: 4184, length: 532, content: 生丁公伋支孫以諡為姓祕笈新書泠音零泠淪氏之後音訛為冷氏江都姓苑云江都人有冷壽光前趙錄有徐州刺史冷道字安義貞元兼監察御史冷朝陽吳人陘魯大夫有陘氏之後缻後趙有缻刪青尹楚大夫青尹弗忌宋司城司馬青尹渠青牛魏略初平有青牛先生東山人泠淪黃帝樂官泠淪氏之後氏焉案此與前泠淪氏俱非本字蓋出附會泠州左傳周泠州鳩之後丁若晉遂興令丁若賢字弘固案風俗通齊丁公子懿伯食采于若因氏焉原木作子若當是丁若之訛令狐周文王子畢公高之後有畢萬仕晉孫魏犨武子生顆別封令狐因氏焉生頡漢有令狐邁避王莽亂居燉煌生稱燉煌效穀縣稱曾孫溥後漢蒼梧太守五代孫馨晉諫議大夫八代孫整周御史中正大夫彭陽公賜宇文氏生熙隋吏部尚書武康公生德棻唐禮部侍郎國子祭酒生循己案唐世系表循己作修己生伯陽又後周河州刺史纂狀稱馨後孫文軌生思撫思撫唐地官郎中鄭州刺史思挹萬年令又後周晉昌太守令狐儒狀稱云本燉煌人曾孫智通左羽林將軍生俊左將軍開元有丹陽郡司馬令狐滔云熙後生峴峘𡷛峴刑部員外峘禮部侍郎𡷛和州刺史天寶有鄧州錄事參軍令狐章檢校左僕射滑亳節度霍國公生建運通凌衛康叔支子為周凌人子孫以官為姓吳志有都督凌統晉有凌嵩餘杭凌統世居餘杭二子烈封八代孫嵩晉廣陵太守貞元都官員外凌準杭州人云其後也管城唐魏王文學凌敬云統後世居鄭州乘風俗通楚大夫子乘之後以王, WYG: 謀}
