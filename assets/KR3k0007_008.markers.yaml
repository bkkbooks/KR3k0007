  - {type: variant, offset: 3819, length: 336, content: 臧為生昭伯昭伯從弟臧會會生賓如賓如生臧疇又臧石臧紇之昆弟臧堅紇之族皆見杜預註此須伯誤蒼頡論語楚隱者也其後為氏白象風俗通先生古隱者案此有脫誤蒼頡氏當是黃帝史官之後今馮翊縣人也風俗通曰頡衛古之賢人棠谿左傳吳王闔閭弟夫㮣王奔楚為棠谿氏漢書棠谿惠治公羊又五官中郎將棠谿典桑邱下邳有桑邱氏彭大彭為商諸侯以國為姓蓋陸終第三子彭祖即大彭也祕笈新書京相史記曰殷後京相氏晉惠帝時有京相機榮叔周大夫榮叔之後漢有大夫榮叔遙平陵史記平陵老之後程顓頊重黎之後周程伯休父其後也祕笈新書精縱英賢傳周平王子精別封縱邑因以為氏案此條原本載于屠住氏下今據通志改為精縱氏以通志屠住氏之說別錄為屠住氏晉有平陽從事精縱宣邪嬰齊出𦍋姓楚令尹子重曰公子嬰齊後氏焉成陽周有成陽子修黃老術見釋例成王楚成王之後漢中郎成王弼邢, WYG: ''}
