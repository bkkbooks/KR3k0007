  - {type: variant, offset: 943, length: 0, content: '', krp: 子孫以國為氏楚有宋義宋昌廣平昌為漢中尉始居西河介休十二代孫晃生恭徙廣平利人侯孫藥師生毓恭弟畿給案唐世系表給作洽恭前燕河南太守毓生良北齊東郡太守良生乾子皓乾生大辯唐卭州司馬大辯生守恭守愼守儉守恭}
  - {type: variant, offset: 944, length: 0, content: '', WYG: 安令生楚璧兵部郎中杭州刺史守愼襄陽尉生庭璬庭瑜庭璘庭璬庫部員外庭瑜度支郎中司農少卿庭瑜生顒常州刺史庭璘兵部郎中深州刺史守儉洛州刺史生鼎兵部侍郎案唐世系表鼎兵部郎中荆州長史鼎生悦工部員外郢州刺史悦生稷子皓孫陽元洛陽尉景孫孝玉北平王文學撰關東風俗生俠畿後燕衛將軍司馬生榮國曾孫丹案唐世系表丹作弁後魏吏部尚書生紀紀生欽道欽仁曾孫務本唐藍田令生元撫襄州司户元撫生璟侍郎左丞相廣平文貞公生昇尚渾恕延華}
  - {type: page-break, offset: 944, content: '', id: KR3k0007_WYG_008-3b, image: WYG0890/WYG0890-0688d.png}
  - {type: variant, offset: 944, length: 0, content: '', krp: 安令生楚璧兵部郎中杭州刺史守愼襄陽尉生庭璬庭瑜庭璘庭璬庫部員外庭瑜度支郎中司農少卿庭瑜生顒常州刺史庭璘兵部郎中深州刺史守儉洛州刺史生鼎兵部侍郎案唐世系表鼎兵部郎中荆州長史鼎生悦工部員外郢州刺史悦生稷子皓孫陽元洛陽尉景孫孝玉北平王文學撰關東風俗生俠畿後燕衛將軍司馬生榮國曾孫丹案唐世系表丹作弁後魏吏部尚書生紀紀生欽道欽仁曾孫務本唐藍田令生元撫襄州司户元撫生璟侍郎左丞相廣平文貞公生昇尚渾恕延華}
  - {type: variant, offset: 945, length: 2, content: 曹氏, WYG: 衡昇祠部員外太僕少卿隨州刺史生實渾嘉部郎中御史中丞恕都官郎中生衮太常丞延太原少尹華大理評事生儼佶倚儼蘇州刺史佶河南尉倚虢州刺史衡檢校左常侍生倓榮國七代孫慶孫慶孫大理正給後魏七兵尚書孫謨生欽瓊欽曾孫正文唐秘書郎瓊生仲羡燕渤海太守曾孫延慶生長威季緒長威北齊御史中丞孫正言洛州司馬季緒生本立立生卓然比部員外益州長史燉煌漢有宋諒諒裔孫後漢清水公繇曾孫逰道繇六代孫夀唐同州郃陽縣令宏農狀云昌後自西河徙宏農唐太常丞宋仁回生果毅生之問之望之悌之問户考二員外生昌藻之望改名之遜荆州刺史之悌太原尹益州長史河南劒南節度生若水若思御史中丞若水丹徒令樂陵狀云本望出廣平唐嶲州都督宋君眀生㨗弼㨗固安令生宣逺弼生考玉比部員外君眀堂兄渭河陽令生思敬思敬生詢吏部郎中左常侍詢生晦諌議大夫同州刺史晦生泛泫泛汝州刺史扶風唐秦州長史生元爽元奬爽尚書左丞秋官侍郎揚洛二州長史生述監察御史元奬晉原尉生遥适遥禮户吏侍郎左丞魏汴州刺史适左補闕遥生東里東里生華河南周黄化令宋道狀云本廣平人曾孫義椆栢令生溫璡案此下疑脱溫瑗一人椆栢令亦有誤溫瑾溫璩溫瑾户部侍郎鄭州刺史溫璡太原少尹生寂温瑗侍郎御史生蹇溫璩梓州刺史京兆後漢侍中宋宏之後今無聞晉宋甄宋琨唐都官郎中宋質給事中生撙虢州人殿中御史宋務先洛陽人司農少卿宋遵貴中書舍人宋則並京兆人工部郎中宋元昉江夏安陸人生之順户部員外殿中侍御史貝州刺史宋慶禮邯鄲人殿中御史虔微邯鄲人統見姓苑三用用風俗通古有用國見毛詩漢有高唐令用蚪名士録有高唐用案毛詩有用國未詳高唐用下亦有脱字雍風俗通}
