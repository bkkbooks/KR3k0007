  - {type: variant, offset: 3169, length: 0, content: '', krp: 易州刺史郁孫紹宗北齊僕射武威公生三蔵隋金紫光禄大夫孫知亷侍御史知晦兵部郎中汾州刺史知晦生珣吏部侍郎珣生損渝州刺史三蔵再從孫善行萬年丞條史琚生白􅋯榮案此有脱文慕容五代孫冲仲慕利後魏有吐谷渾主慕利延與慕容氏同祖也慕輿鮮卑慕容氏音訛為慕輿氏庫狄鮮卑段疋磾之後避難改姓庫狄居代北後遷中夏河南後魏上洛太守庫狄陵生保真保真生峙周宣州刺史生嶷徽崧徽生璠益州總管樂}
  - {type: variant, offset: 3171, length: 0, content: '', WYG: 崧生仁志千牛郎中仁志生益利益利生履溫庫部郎中庫成風俗通曰本亦苦城也方言音變為庫成燉煌實録廣平太守庫成防從孫馗素和鮮卑檀石槐之支裔後魏有尚書素和䟦弟毗右將軍素和突後魏書云以本白部故號素和孝文改為和氏河南大厯太子左學士素和顏路洛伯益支孫又以路洛為氏晉路洛賈見史記歩大汗出自塞北遷中土河南周南夏州刺史新興侯歩大汗提生勢勢生威唐蔚州刺史安邑男案北齊書歩大汗薩隨尒朱入洛齊受禪改封義陽郡公庫傉管改為庫氏前燕録岐山公庫傉管泥生律後燕太師安定王又有西河公庫傉管樂大司農庫傉管紇庫六斤改為斤氏大洛稽改為稽氏破六韓其先代人隨魏南徙河南後魏金紫光禄大夫破六韓祥生常北齊司徒平陽導昇北齊儀同林松王生金蔵唐岐州别駕後魏又有莫駕侯利嚴破六韓渾生枝枝生景隋東武公景生蕃唐宋州刺史始興男匡矩案呼厨貌後為潘六奚後又訛為破六韓破六韓常乃孔雀之子此云祥誤破也頭與費也頭同破落那大宛之後改為那氏十二霽惠周惠王支孫以謚為姓戰}
