  - {type: variant, offset: 1464, length: 226, content: 皆作阿跌亦曰訶咥或為𫏅跌此疑誤阿單改為單氏阿邱楚有阿邱子後魏殿中將軍阿邱及敦又列威將軍阿邱寄阿史那夏后氏後居涓兜牟山北人呼為突厥窟歷魏晉十代為君長後屬蠕蠕阿史那最為首領後周末遂滅蠕蠕霸強北土蓋百餘年至處羅蘇尼失等歸化號阿史那開元改為史並具史注長安右衛大將軍寅國阿史那忠節左驍騎大將軍阿史那大節上貞元神策將軍兼御史大夫阿史那思暕並其支族阿史德突厥如善可汗之裔別號阿史德通天司賓卿澣海侯阿史德元𤪙右武衛大將軍阿史德多覽並其後也阿伏干改為阿氏波斯西域國人婆衍, WYG: 意}
