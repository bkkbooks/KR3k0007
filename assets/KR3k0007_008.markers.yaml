  - {type: variant, offset: 3168, length: 0, content: '', WYG: 晉大夫歩揚之先食采于歩因氏焉又有歩昭歩毅本郤氏仲尼弟子歩叔乘齊人臨淮吴丞相臨淮侯歩騭生闡丞相吴志有傳河南官氏志歩鹿氏改為歩氏庫風俗通古守庫大夫因官命氏漢文景時有倉氏庫氏後漢竇融傳有庫輔庫義庫侯河南官氐志庫傉後改為庫氏顧風俗通有上黨都尉顧平度古掌度支之官因以命氏潞國語潞泉潞備皆赤狄隗姓也慕容髙辛少子居東北夷後徙遼西號鮮卑國于昌黎棘城至渉歸為鮮卑單于自云慕二儀之徳繼三光之容或云以冠歩揺歩揺冠音訛改為慕容氏昌黎渉歸生廆廆生皝皝生雋號前燕初都棘城弟垂號後燕都中山弟徳號南燕都廣固徙東郡三燕七主共五十餘年郢子恪前燕太原王生楷騰瑾曾孫恃徳北齊義安王孫孝幹}
  - {type: page-break, offset: 3168, content: '', id: KR3k0007_WYG_008-24a, image: WYG0890/WYG0890-0699a.png}
  - {type: page-break, offset: 3168, content: '', id: KR3k0007_WYG_008-24b, image: WYG0890/WYG0890-0699b.png}
