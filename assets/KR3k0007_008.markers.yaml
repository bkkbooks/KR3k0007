  - {type: variant, offset: 8563, length: 1058, content: 為郡人竟陵魯恭王餘裔孫章帝封為竟陵侯因家焉後漢末益州牧生璋其後無聞范陽漢景帝子長沙定王發傳國七代支庶居本郡後漢有司徒劉壽東萊城陽景王章七代孫文王悝支子別封掖侯因為郡人唐吏部侍郎彤云其後也丹陽蘭陵杼秋沛國屬縣宣城陳留自丹陽以下檢未獲以上劉氏二十六郡並舊望武功唐納言魯公劉文靜濮陽唐濮州刺史劉穎考尉氏唐左僕射樂城公劉仁軌狀稱本望河閒後魏南陽太守樂城公通始居尉氏通即仁軌高祖軌生滔濬濬工部員外生晃昂晃給事中太常少卿昂考功郎中京兆少尹晃孫文鼎侍御史祠部員外濟陰左僕射彭城公劉晏生執經吏部郎中宗經國子祭酒京兆武功隋通州刺史劉猛孫弘基唐右驍衛大將軍太僕卿夔襄公生仁行仁景仁行生彥貞彥方彥貞左金吾將軍彥方邠王長史仁景左金吾將軍司農卿沛公廬陵漢長沙定王後生安成侯倉子孫徙焉梁安成內史劉元偃代居吉州云其後也曾孫紹榮吉州刺史孫行昌左司員外孫淑殿中御史淑生禹錫屯田員外郎南康楚元王交六代孫延壽裔孫璠居南康六代孫惠騫梁同州刺史孫悔陵唐少府監譙郡狀云宋文帝子義陽王昶後貞觀志云勘非寶諸郡劉氏唐司農卿武陵公劉贍今居京兆西魏有東雍州刺史劉亮稱中山人曾孫稱鴻臚卿彭國公秋官侍郎劉知璿上邽人弟如玉右司郎中同州刺史劉同昇洛陽人稱本自沛國徙焉考功郎中劉慶約宣州人孫長卿隋州刺史膳部員外郎劉瓘京兆人生全白湖州刺史戶部郎中劉安都宋州虞城人祠部郎中劉穆之部州沙河人駕部郎中劉師禮陳留封邱人兵部郎中劉孝約洛陽人劉仲邱京兆人虞部郎中劉志遠長安人禮部侍郎劉單岐山人凡平生契舒州刺史刑部侍郎劉太真潤州上元人水部員外郎劉復工部員外劉澄瀾刑部員外劉穎訪未護監察御史劉遵古云東平人平盧節度劉正臣范陽人生溢淮平原節度劉瑁汴州人生涇駙馬光祿少卿陳許節度右僕射劉昌裔東郡其先匈奴貴族漢以公主妻之北俗重漢生因取母姓後漢末右賢王劉去卑即其後也代為部落大人魏有庫仁弟眷生羅辰與穆陸賀婁于奚尉為北人八族羅辰征東將軍永安公七代孫政會生奇吏部侍郎奇生超微同循超河南少尹生全誠微吳郡太守江南採訪生方平同萬年令循金吾將軍會次子元象主客郎元育易州刺史河南代為部落大人魏有河閒公提生豐以司徒封為河閒劉氏孫感唐涇州總管平原公感生孝則孝則曾孫公濟工部尚書豐生孫龍案此有脫誤將作大匠豐曾孫法琮唐右金吾將軍琮從弟尚嶷偉尚嶷右金吾將軍隋梁州總管洛陽公偉曾孫貞眘涇州刺史並代人雕陰唐左武衛大將軍綏州總管義成公大俱晉右賢王豹之後綏州代為酋望東陽贊後並居婺州為郡豪族又宋文帝子竟陵王誕構逆誅貶姓劉氏吳有東海太守劉略姚秦有揚威將軍劉松牛宋微子之後司寇牛父子孫以王父字為氏戰國時趙有牛翦秦有牛缺隴西漢牛邯為護羌校尉居隴西, WYG: 改}
