  - {type: variant, offset: 3376, length: 339, content: 少弘弘元孫和北齊海陵太守生聿道代居滎陽號鄭州皇甫道生萬齡屏度吏部郎中稜七代孫真真元孫椿齡居滎陽號山東皇甫椿齡生瑒瑒五代孫思義思智瑒考功員外生銛工部郎中又軌三從弟況生益興益五代孫元凱商州刺史生德驥蔡州刺史興六代孫公義工部侍郎四從姪思忠卭州刺史壽春稱與無逸同承晉廣魏太守固固子柴徙襄陽後又徙壽春唐黃門侍郎皇甫文房兄子鏡幾鄰幾知常希莊鏡幾生閒案唐世系表閒作恂閒生岳鄰幾洗馬生憬悰惜愉洛州長史案唐世系表洛州長史下有知常二字此脫生懌悟希莊生翼尚書左丞翼生准鎛宰相生煥案鎛乃愉子此系于希莊下誤又鎛子珪字德卿此作生煥誤中書舍人福建觀察使樂陵狀云晉徵士謐後安定徙滄州唐監察御史皇甫德參生宣過宣生伯瓊仲玉主爵郎中玉生侁尚書左丞生政浙東觀察使生教敏徹教工部員外郎徹蜀州刺史皇子莊子有皇子告教臧孫魯孝, WYG: 孔穆}
