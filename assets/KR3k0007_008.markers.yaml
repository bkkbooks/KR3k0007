  - {type: variant, offset: 3166, length: 0, content: '', WYG: 居鹽官徽十代孫越陳黄門侍郎生允唐著作郎撰國史餘杭公生琮尚書左丞天官侍郎平章事生潤俊潤秘書監俊齊安太守宋倉部郎中露訓稱與琮皆周丞相徽後六代孫纘鄆州刺史又吏部尚書露少連著作郎露沉並吴人案唐書無露琮又吴志無露雍或因上路氏家譜牽連及之歩}
