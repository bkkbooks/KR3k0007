  - {type: punctuation, offset: 24, content: 》, id: KR3k0007_CHANT_008-bkkpn5}
  - {type: variant, offset: 24, length: 289, content: 有天根注云人姓名縣風俗通云縣成父孔子門人見史記案孔子弟子縣子成字子祺今家語作子橫又有縣亶父字子象見廣韻注又亶史記索隱作豐家語無父字此作縣成父誤漢甘陵相縣芝吳中書令縣點先穀晉先穀之後氏焉肩吾莊子肩吾古賢者也晉袁弘集有東海太守肩吾氏涓濁呂氏春秋夏首人涓濁梁善畏明失氣而卒案涓濁又作羌憲填潰莊子有赤張滿案此條誤移于此詳二十二昔赤張姓下錢顓頊曾孫陸終生彭祖孫孚周錢上氏因官命氏焉戰國時有隱士錢丹秦有御史大夫錢產子孫居下邳祕笈新書宣魯叔孫宣伯之後案宣氏應劭風俗通為宋宣公之後鮮鮮于氏之後或單姓權楚鬭緡之後為權氏連齊大夫連稱後緜晉大夫食采緜上子孫氏焉偏古有偏軍案下有脫誤鮮于箕子封于朝鮮支子, WYG: 八元}
