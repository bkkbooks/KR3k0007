  - {type: variant, offset: 314, length: 150, content: 食采於于子孫因合鮮于為氏漁陽後漢有京光尹鮮于裒魏志有太尉從事鮮于案劉虞從事有鮮于輔後事漢為度遼將軍此脫名當即輔也後拜度遼將軍北齊有鮮于榮案齊書鮮于世榮此避唐諱闕世字領軍將軍封夷陽王判右僕射後周懷州刺史鮮于緒生明唐蒲州刺史定襄公生匡濟匡紹匡濟左騎將軍匡紹閬同河利四州刺史生建業建宗閬中京兆尹劍南節度鮮于, WYG: 堪}
