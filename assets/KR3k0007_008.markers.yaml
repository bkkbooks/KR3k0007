  - {type: variant, offset: 14367, length: 277, content: 後魏有興皇生雄唐刑部郎中生處信處讓處節處信都官郎中荊州長史孫銛給事中生綏締維紳紳庫部員外處讓都官郎中生澧收南伯莊子有南伯子葵出古賢人傳南史左傳齊有南史氏後因為姓南門見姓苑甘士世本宋司徒華定甘士氏周卿士甘平公為王卿士後氏焉藍尹楚大夫藍尹亹之後三伉宋子姓微子之後風俗通云衛邑也晉公子重耳封舅犯於三伉支孫氏焉漢有少府三伉充宗代郡有陽縣有三伉氏三閭楚屈原為三閭大夫因氏焉三烏姜姓炎帝之後為侯國因氏焉三邱孝子傳有三邱氏三苗蜀志有三苗務三州三州孝子之後亦單姓州三飯三飯繚之後閻周文王之後武王封太伯曾孫仲奕于閻鄉因氏焉一云唐叔虞之後公族有食采于閻邑因氏焉漢末居滎陽後漢, WYG: 快欽治}
