  - {type: variant, offset: 3175, length: 1, content: 今, WYG: 後漢陳球碑城陽炅横被誅有四子守墳墓改姓炅氏一子居徐州郡雲之先也姓昋氏一子居幽州姓桂氏一子居華隂姓炔氏字皆九畫以避難也魏志吕虔傳胡陸有炅母計國語計然為越大夫范蠡師云本䕫邱濮上人姓辛字文子其先晉國公子也風俗通漢計子勲為司空掾薊神僊傳薊子訓不知何許人勵風俗通後漢魏郡太守義陽侯勵温見功臣表吴志以孫秀奔魏改姓勵氏稅盛宏之荆州記云建平信陵縣有税氏昔君王巴蜀案荆州記作蜀王欒君此脱蜀王見廪君兵强結好飲宴以税氏五十人遺廪君羿左傳有窮后羿簒夏后相之位杕王莽大司馬杕並見姓苑第五出自齊諸田之後田氏漢初徙奉園陵者故多以次第為氏京兆長陵後漢司空第五倫字伯魚生頡將作大監匠倫曾孫穜兗州刺史又䕶羌校尉第五訪亦京兆人上元黄門侍郎平章事第五琦生峯平申峯台州刺史平京兆兵曹申兼御史中丞第八陳留風俗通亦齊諸田後田廣弟英為第八門因氏焉王莽時講學大夫第八矯荔菲西羌種類也隋有荔菲雄涇州人誅}
