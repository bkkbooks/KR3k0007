  - {type: variant, offset: 1371, length: 498, content: 衛將軍芉雄曾孫端唐金吾將軍技也西部大人代為酋帥後魏初各依舊號為技也氏後魏護軍將軍臨江伯技也鍮石生說詖內部尚書孫爾歸生平右衛將軍生恭長文義北齊侍中隋信州總管新寧公文義生旻唐鳴水令恭隋丹州別駕生寶倫唐興國別將尒朱其先契胡部落大人代為酋帥居尒朱川因以為氏後魏有羽健秀容三百里封之以為世業尒緜魏蠕蠕渠帥緜他拔尒緜來降改為緜氏是婁南燕有徐州刺史是婁盧是賁改為兒氏是云改為高氏是奴改為封氏芉尹楚大夫芉尹申無宇之後履見姓苑娝方幾反見纂要文云人姓壘後趙錄有壘澄本姓裴改焉水邱吳興人史周太史史佚之後以女弟為戾太子良娣生史皇孫進進生宣帝恭子高元建康史氏今隸酒泉郡史丹裔孫後漢歸義侯苞之後至晉永嘉亂避地河西因居建康苞裔孫寧後周安政公生祥隋城陽公祥弟雲期雲生令卿唐祠部郎中杭州刺史宣城丹孫均均子崇自杜陵受封溧陽侯遂為郡人崇裔孫宋樂鄉令瓌瓌九代孫務滋唐納言溧陽子孫翽御史大夫又江州刺史史元道亦云崇之後也高密史丹之後有史曇曇曾孫節唐禮部侍郎京兆丹裔孫㼅留長安隋左領大將軍萬歲狀稱㼅十二代孫寶唐鄜州都督原國公陳留考城今隸曹州後漢京兆尹敞生弼今無聞河南本姓阿史那突厥科羅次汗子生蘇尼失入隋封康國公懷德郡王生大柰子仁表駙馬生忠左驍, WYG: 武}
