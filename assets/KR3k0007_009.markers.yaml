  - {type: variant, offset: 11517, length: 1, content: 解, WYG: 鉉即中書令張柬之之甥也㬥㬥公周卿士見毛詩應劭風俗通云㬥辛周諸侯也漢書御史大夫㬥勝之字公子河東人浩音告今隰州刺史浩聿状云郜氏因避難改為浩氏聿子虚舟漕漢書㳺俠傳漕仲叔西河人少子㳺亦以俠聞嫪郎到切秦荘襄太后有嬖人嫪毐到楚令尹屈到之後以王父字為氏好大報反見纂要文三十八箇賀姜姓齊公族慶父之後慶克生慶封以罪奔吳漢末徙㑹稽山隂後漢慶儀為汝隂令慶普之後也曽孫純避漢安帝父諱始改賀氏孫齊吳大将軍齊孫中書令劭劭生晋太子太傅修修十二代唐太子中書舍人徳仁徳仁姪孫彭州刺史黙徳仁姪曾孫太子賔客知章生曽河南官氏志賀蘭氏賀頼氏並改姓賀賀㧞與後魏同出陰山代為酋長北人謂地為㧞謂其總有其地時人相賀因氏焉河南洛陽後魏有賀㧞爾頭自武州為河南人生紱紱生允勝岳允後魏大尉燕郡王尚書令勝太師琅琊公岳雍州刺史關西岳水公岳曾孫儼唐右監門將軍孫延嗣度支郎中右金吾將軍爾頭少子生仁後魏太宰安定王孫賀㧞云一給事中元正司門郎中長慶中進士賀㧞葱案賀㧞惎與白敏中友善見唐摭言此作葱疑誤賀蘭代居元朔隨魏南遷河洛魏以}
