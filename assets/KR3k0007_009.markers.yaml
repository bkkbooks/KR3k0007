  - {type: variant, offset: 8126, length: 2295, content: 漢文苑傳篤曾孫畿河東太守生恕弘農太守生元凱晉荊州刺史征南大將軍當陽侯長子錫曾孫悊生楚秀秀元孫果後周尹興太守當陽侯次子尹尹六代孫顒西魏安平公始平公攢後魏度支尚書生士峻士琳士峻孫瓌之比部郎中楚州刺史士琳孫延福生元𨑓元道元逞元𨑓房州刺史生行成有鄰行成生春宋昌春吉州刺史右庶子有鄰侍御史贊善大夫元道將作少監生昆吾仲連昆吾坊州刺史仲連太原令元逞左庶子須王傳攢弟勝孫周則周夏官上士生利仁超利仁兵部郎中超左司郎中義興公果隋兵部尚書兄曄隋懷州刺史生吒淹吒隋昌州司馬生如晦楚客案唐書如晦傳祖果此作果兄曄之後與史不合如晦吏部尚書左僕射侍中蔡國公生構荷構慈州刺史荷駙馬尚衣奉御襄陽公楚客工部尚書蒲州刺史淹御史大夫知政事吏部尚書安吉郡公生敬同愛同敬同中書舍人東陽公生從則工部侍郎從則生自遠昌遠志遠自遠生佐大理正案唐世系表自遠生繁繁生佐與此不同佐生元穎元絳元穎協律郎平章事西川都督案唐書元穎傳元穎以學士承旨同平章事此協律郎三字疑有脫誤生審禮京兆少尹元絳生審權平章事浙江節度生讓能彥林弘徽讓能太尉弘徽吏部尚書彥林中書舍人生用礪昌遠生倚左衛將軍志遠生倬儋愛同兵部員外易州刺史安平公顒雍州刺史贈太尉生景秀景仲景恭景仲生孝彝孝獎孝弇案唐世系表景仲生整整生孝彝等與此不合孝彝曾孫惟慎案唐世系表曾孫作孫監察御史孝獎撫州刺史孝弇生元琰左金吾將軍景秀後周渭州刺史生懿隋禮部侍郎殿內監甘棠公懿生乾福乾右乾祚乾福生崇允嗣及崇允成州刺史生正儀正心正儀生望之溱州刺史正心生昇南榮案唐世系表正心生齊之齊之生南昇南榮與此不合昇京兆功曹南榮長安主簿嗣及青州刺史乾祐生續主客郎中續生知讓知謙知讓生慮忠慮生隋果州刺史忠生濟給事中京兆尹知謙天官員外邢州刺史乾祚曾孫操案唐世系表曾孫作孫殿中御史生隒隒生行敏常州刺史荊益二長史南陽襄公生崇懿恆崇懿宮尹丞判左司員外生希望太僕卿隴右節度恆分判刺史生位佋佑任供巨卿位考功郎中湖州刺史生液佋詹事司直任河南兵曹參軍佑左僕射平章事司徒岐公太保致仕生師損式方從都師損工部郎中司農少卿式方昭應令生悰駙馬平章事須公案唐書悰傳悰封邠國公此須字誤淮南西川節度悰生裔休儒林從都駕部員外生牧顗牧中書舍人生承澤晦辭德祥晦辭左補闕德祥御史中丞禮部侍郎顗淮南節度判官供洪州長史巨卿兼監察御史顒少子景恭廓州刺史慶成公生德祐案唐世系表顒少子景恭生悳德裕與此不合殿中少監安眾公生敬則敬則生元同元志元振元同萬年尉生彥先率更令元志考功郎中杭州刺史生逢時緯孝輔參謨嶠逢時生伯卿緯殿中御史生繼信刑部員外杭州刺史孝輔大理丞生虔興賢應鸞清虔大理司直清檢校員外生師仁師義師禮師仁吉州刺史生湘參謨陝州司倉生寅倫寅京兆法曹倫水部郎中澧州刺史嶠監察御史元振生諒誠長廣公整承漢文學篤十二代孫闢渭州刺史整隋左衛將軍生揩揩生元義元逸元景元義侍御史元逸司門郎中元景密州刺史整姪德致眉州刺史漢陽公敦延年之後至後魏耒陽太守登孫良周熊州刺史生敦隋鄭州刺史敦生弘弘生爽駕部郎中爽生進當陽侯少子躋新平太守生冑苻秦太尉生嶷秦祕書監嶷生銓後魏中書侍郎襄陽當陽侯元凱少子耽晉涼州刺史生顧西海太守生遜過江隨元帝南遷居襄陽遜官至魏興太守生靈啟乾元靈啟生懷瑀懷珤懷瑀六代孫文範唐中書舍人御史中丞懷珤蔡州刺史生岑嶷巖嵸岸崱幼安嵸梁西荊州刺史岸梁州刺史崱江州刺史崱生中規孝友友孫行紀行繹行紀曾孫某河南尉荊州刺史巖梁州刺史兄弟父伯並梁州有傳孫懿宗唐吏部員外乾光孫叔毗周峽州刺史生廉卿憑石安石魚石黃石憑石生依德蓬州咸安令生易簡考功員外安石生賢倉部郎中魚石生依藝鞏縣令依藝生審言膳部員外審言生閑武功尉奉天令閑生甫檢校工部員外甫生宗武宗武生嗣業貧無以給葬收拾乞丐云甫歿四十年啟子美柩祔于偃師惇六代孫恆隋水部郎中生安期唐亳州刺史安期生利賓雍州司法中山與京兆同承魏僕射杜畿後家中山裔孫弼北齊徐州刺史生蕤隋治中御史生公瞻臺卿公瞻隋著作郎生之松之亮之元之松唐許州刺史之亮司勳員外生休纂延昌休纂淄州刺史延昌孫朗太子洗馬臺卿北齊黃門侍郎濮陽狀稱與京兆同承杜赫之子威世居濮陽陳留太守杜亮生保保生伽伽生義博案唐世系表亮生伽伽生保保生義博與此不合義寬義博生端人案唐世系表端人作仁端端人生元揆天官員外生希彥右補闕太子洗馬生華萬檢校郎中義寬滕王諮議生無忝慎言承志無忝生兼授兼極案唐世系表兼授作兼愛兼極作兼拯孫順休兼殿中御史兼極少子鎮起居郎荊州長史建平侯案唐世系表載荊州長史慎行又據元載作杜鴻漸碑文亦云大父慎行為荊州長史此下應有慎行二字生鵬舉安州都督生鴻漸中書侍郎平章事衛國公生收威封鼎收戶部郎中廬州刺史生翁慶鼎丹王長史承志天官員外生暹昱暹黃門侍郎平章事禮部尚書生孝友孝孫孝恭孝友御史中丞殿中監昱給事中孝恭孝孫並無位案唐世系表孝孫無官孝恭殿中侍御史洹水狀稱與京兆同承延年後石趙時從事中郎杜曼始家鄴後徙洹水七代孫君賜隋樂陵令生正