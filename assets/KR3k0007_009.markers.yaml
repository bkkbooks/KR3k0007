  - {type: variant, offset: 11508, length: 3, content: 徙家魏, WYG: 生摯説摯監察御史生中和説吏部侍郎生渾滄少少昊氏之後一云少典之後禮記少連善居䘮東夷之子召召公奭之後或作召齊召忽漢功臣廣侯召歐又南陽太守召信臣生馴孫休案通志休作材邵皓世本恵公族羌子孫憲為邵皓氏召伯左傳召伯奐之後少室國語少室周趙簡子右也三十六效校出自周官校人之後以官為姓天寳河南士曹校傑孝齊孝公支孫以謚為姓三十七号郜國名在濟隂以國為姓安定唐殿中御史陜}
