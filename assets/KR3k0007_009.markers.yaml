  - {type: variant, offset: 202, length: 452, content: 海陵縣令弘農隋有隨州司馬董泚生慶慶生感感生敬元倉部郎中幽州刺史生庭琰河東狀云仲舒之後唐右僕射平章事董晉生全道谿全素澥全道殿中少監谿倉部郎中全素太子中書舍人案唐世系表澥太常寺太祝范陽京兆尹董叔經右史董思恭范陽人檢校司空平章事秦亦范陽人大曆賜姓李氏改名忠臣從朱泚反伏誅孔孔姓殷王帝乙長子微子啟受封于宋弟微仲衍曾孫愍公生弗父何何生宋父周周生世父勝勝生正考父正考父生孔父嘉子孫以王父字為氏孔父生子木金父木金父生睪夷父睪夷父生防叔仕魯為大夫生相夏夏生鄒叔梁紇紇生丘仲尼三歲父卒十九歲娶宋𠦅官氏一歲生鯉字伯魚孔子為魯司寇攝相事居鄒昌平鄉闕里魯哀公十六年卒年七十二伯魚年五十先仲尼卒伯魚生伋字子思子思為魯穆公師作中庸及子思子四十七篇以祖業授弟子孟軻等伋生子上白白生子家求求元孫允為魏相生鮒為陳涉博士五代孫吉封宋公吉八代孫潛潛生竺吳南昌太守允次子騰騰生襄襄生忠忠生武安國案唐世系表武生延季大將軍太傅延季生霸武孫霸生漢丞相博山侯光會稽山陰後漢末潛避地會稽遂為郡人潛子竺生恬愉晉僕射餘不亭侯生誾安國誾生晉尚書令靖靖五代孫奐陳, WYG: ''}
