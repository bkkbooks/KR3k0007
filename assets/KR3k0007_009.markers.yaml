  - {type: variant, offset: 3651, length: 1726, content: 式次子邁晉東海太守號北祖曾孫彥後魏侍中相州刺史孫安中書侍郎生恂惇恂曾孫本行唐給事中遜生文宗案遜字上有脫文文宗下應有智玉文通文宗生正言唐監察御史智玉生知禮殿中御史文通生向蔥監察御史惇字季良北齊左右僕射生文紀汝南平輿縣後漢功曹許邵居召陵縣漢太尉祭酒許慎今並無聞安陸狀稱詢五代孫君明梁楚州刺史入周徵不起法光案唐世系表君明生弘周宏周生法光與此不符岳州刺史生紹唐陝州刺史譙公生善伯裔智仁圉師善隋宣城郡主簿生力士洛州長史案唐世系表長史作刺史生欽寂欽明欽淡欽寂夔州長史生輔德輔乾輔乾右金吾大將軍光祿卿生諫論詵諷諫河南丞論監察御史詵歸州刺史諷監察御史輔德宕州刺史欽明涼州都督安西大都護生戒言戒非戒惑都官郎中鴻臚少卿生子房季常子端季常萬年丞子端岳州刺史戒言太僕卿右武衛大將軍生子餘壽州刺史欽淡深州刺史生叔冀淄青陳留節度兼御史大夫生孝常亳州刺史淡姪孫仲容鄧州刺史生志倫志雍志雍兼監察御史智仁右屯田將軍懷州刺史許昌公圉師黃門侍郎同三品平恩公左丞戶部尚書生自持案唐世系表自持作自牧自遂自正自正澤州刺史會稽陽羨稱高陽同祖後漢諫議大夫許武武孫馘太尉今無聞晉陵漢徐州刺史聖卿皇太子洗馬許叔牙其後也生子儒唐天官侍郎生臨謙鳴謙臨謙右卿相將軍曹州刺史撫州刺史鳴謙本高陽人也詢之後又家陳留生孟客仲輿季同孟容兵部侍郎京兆河南尹仲輿國子司業季同金部郎中中山狀云許北之後居中山北齊武川鎮將許彪生康康生緒洛仁緒太府少卿蔡州刺史左常侍孫義均生景先中書舍人工部侍郎景林司講郎洛仁左監門將軍太原狀云許邵之後因官居太原唐太僕少卿貝州刺史太寶生謨刑部郎中許自新祠部員外許偉褚子姓殷後宋若公子石為褚師因氏焉漢相褚大案通志褚大漢梁相此有脫字元成閒褚先生少孫並以儒學稱焉河南陽翟後漢褚重始居河南晉褚䂮安東將軍襃兗州刺史贈太傅女為晉康帝后生穆帝曾孫秀之晉侍中生湛之法顯湛之左僕射生彥回齊司徒彥回生蓁蓁度支尚書法顯生炫齊侍中吏部尚書曾孫玠御史中丞生亮唐左散騎常侍陽翟侯亮生遂賢遂良遂功遂年遂賢邠王友生兼藝永州司功兼藝生璆琇珣璆吏部郎中琇給事中常州刺史珣京兆士曹生元方大理評事遂良中書令河南文忠公生彥甫彥沖彥季彥甫祕書郎生僑休彥沖城門郎生倫儼彥季千牛將軍生如松司農少卿遂年生鳴謙錢塘與河內同祖漢末褚盛為鹽官因居由拳生泰仕吳封錢塘臨平侯又居焉裔孫義宗尚書沈叔安外孫也生無彊國子祭酒管國公生廷訓廷詢廷誨廷詢駕部郎中廷誨給事中無量五從姪思光虞部郎中生鉟長孺司勳員外呂炎帝姜姓之後虞夏之際封呂今南陽宛縣西呂亭是也至周失國子孫氏焉太公號呂望周有呂侯秦呂不韋單父人呂公女為漢高祖皇后封臨淄侯東平呂侯之後魏呂處居任城官至徐州刺史七代孫述後燕尚書左丞皇安承慶述七代孫也生炯焯炯膳部郎中諫議大夫左庶子焯左補闕後魏東平太守呂行均亦云虔之後六代孫雄黃左十四監生崇粹粹兵部郎中諫議大夫生詔進士案唐世系表詔作詒京兆後魏定州刺史范陽公呂祥狀云本出東平生真周趙州刺史房子公曾孫武生整右衛將軍滿州刺史生懷人馮翊狀云本望東平後居馮翊蒲城北齊虞州刺史東平公呂晟生和岐州刺史和生紹宗唐領軍大將軍涼州都督紹宗生休璟休琳休璟左領軍將軍北庭都護休琳生廣太子舍人廣生洞太常博士河東黃門侍郎平章事呂諲生仁本春卿冬卿春卿尚書奉御諲兄子季重歙州刺史中書舍人呂太一趙州刺史呂延之生謂勣謂潭州刺史湖南觀察生溫宗禮溫戶部郎中衡州刺史侍御史呂守素監察御史呂霈生長輕右衛兵曹長輕生亢膺右司郎中諫議大夫新豐尉呂令問丕監察御史呂暕生崇質崇賁崇質殿中少監生逵建建防州刺史崇賁劍南河南成都河中節度鄆國公生遐超暕弟賜右武衛將軍諸郡呂氏右翊郎將呂元播臨汝人又家緱氏生彬渭輔弼彬生牧庫部郎中澤州刺史牧生吳穎鎛榮渭輔生敞監察御史起居郎司更大夫呂才博州清平人著隋紀二十卷刪陰陽書五十三卷一子方毅右拾遺呂因汝州人生皆著作佐郎虢州司馬侍御史呂元嗣陝州人清池令呂處真絳郡人又家京兆生元晤元智元㻮元晤陳王傅光祿卿生同正鄆鄜州刺史同正生逖造崇訓女適將軍高力士崇訓太子家令生回京兆倉曹櫟陽令生遙元㻮博州刺史生遇元智恆王傅生進旅漢高帝功臣有昌平侯旅卿案漢表作昌圉侯傳封六代又共侯旅罷師傳封四代又共通云周大夫子旅之後汝尚書有汝鳩汝方左傳晉大夫汝寬汝齊漢長水校尉汝隨潁川後漢書孝子傳有汝郁處漢書云藝文志趙有辯士處子著書, WYG: 頓}
