  - {type: variant, offset: 11517, length: 1, content: 解, krp: 鉉即中書令張柬之之甥也㬥㬥公周卿士見毛詩應劭風俗通云㬥辛周諸侯也漢書御史大夫㬥勝之字公子河東人浩音告今隰州刺史浩聿状云郜氏因避難改為浩氏聿子虚舟漕漢書㳺俠傳漕仲叔西河人少子㳺亦以俠聞嫪郎到切秦荘襄太后有嬖人嫪毐到楚令尹屈到之後以王父字為氏好大報反見纂要文三十八箇賀姜姓齊公族慶父之後慶克生慶封以罪奔吳漢末徙㑹稽山隂後漢慶儀為汝隂令慶普之後也曽孫純避漢安帝父諱始改賀氏孫齊吳大将軍齊孫中書令劭劭生晋太子太傅修修十二代唐太子中書舍人徳仁徳仁姪孫彭州刺史黙徳仁姪曾孫太子賔客知章生曽河南官氏志賀蘭氏賀頼氏並改姓賀賀㧞與後魏同出陰山代為酋長北人謂地為㧞謂其總有其地時人相賀因氏焉河南洛陽後魏有賀㧞爾頭自武州為河南人生紱紱生允勝岳允後魏大尉燕郡王尚書令勝太師琅琊公岳雍州刺史關西岳水公岳曾孫儼唐右監門將軍孫延嗣度支郎中右金吾將軍爾頭少子生仁後魏太宰安定王孫賀㧞云一給事中元正司門郎中長慶中進士賀㧞葱案賀㧞惎與白敏中友善見唐摭言此作葱疑誤賀蘭代居元朔隨魏南遷河洛魏以}
  - {type: variant, offset: 11519, length: 1, content: 順, WYG: 貞為賀蘭因命以氏孝文時代人咸改單姓唯賀蘭氏不改逺祖達羅安樂王河南洛陽達羅統生敦誼周金州總管武都公生崇弼東崇孫儼湖州刺史弼隋揚州總管宋公生懷廓懐黙懐武懐廓唐禮部郎中懐黙􅥃州刺史杞公東周榮公生孝義唐尚書左丞生景約景慎景約杞王司馬生惲愔惲生庭芝愔生誕誕生察給事中察生公遂景慎兵部郎中生誼隋靈州刺史海陵公賀婁代人本居漠北以國為氏孝文改為樓氏河南後魏鎮西大将軍廣陵王賀婁伏連生大㧞蒙曽孫行本唐鳳州刺史梁公泉武安公寳後魏太子太傅廣平伯生景賢陽平公景賢生詮詮子幹隋鉅鹿公生積唐太子舎人賀遂本居元朔随魏南徙孝文改房氏河南唐引仁府統軍賀遂豐生封渭源縣公貫盩厔按姓氏辨証屋引條云唐雲麾将軍屋引宏生統軍豐豐生渭南郡公封疑此有誤賀恱賀遂氏音訛為賀悦今闗西有此姓焉後周柱國太尉李弼賜姓賀悦氏賀術魏初賀術祁居質安山因以為氏焉三十九過播風俗通播鼗武殷末之賢人按古今人表注曰自師摰以下八人皆殷末人四十榪華宋戴公子考父説食采於華因氏焉華元華宣華亥並為宋卿漢功臣表華毋害傳封四代又華成華嬰平原髙堂華嬰𤣥孫魏司徒博平侯華歆生表表生廙嶠廙生垣又華譚為祕書監齊華寳隋孝義傳汲郡華秋沛國譙縣魏志華佗謝姜姓炎帝之允申伯以周宣王舅受封於謝今汝南謝城是也後失爵以國為姓焉射三輔决録云後漢末鴻臚射服天子以服為将軍出征姓射名服不祥也改姓謝名咸子登授登蜀郡太守授中郎将柘楚大夫以地為氏急就章漢有柘温舒􅰤風俗通云新鄭人楊􅰤村在縣西二十五里舍見姓苑晋音亞見纂要舍利北蕃酋帥有吐宻支頡利後姓執矢氏生思力唐右驍衛大将軍定㐮州都督駙馬都尉尚髙祖女九江公主生紹徳紹宗師仁歸真也謝邱風俗通周宣王支子食采謝邱因氏焉漢書古今人表魯有謝邱章下軍左傳晋将欒黶為下軍大夫子孫氏焉亞飯殷末賢人亞飯干之後四十一漾向宋桓公子向父肹肹孫戍為左師子孫氏焉向為人向寕鄭向宜並其後後漢有向長字子平河内山陽後漢侍中向栩五代孫秀黄門侍郎後漢又有向韶生雄琰雄晋河南尹琰生秀黄門侍郎宋有向彌並河内人按琰生秀因上文脫誤汲郡唐户部尚書向衡子振緫向長之後暢陳留風俗傳有暢悦河東人状云本望魏郡瓘子當悦子偃又詩人暢諸汝州人許昌尉諒後漢諒輔為洛陽令廣漢人上尹左傳楚上尹壽之後禮記楚上尹商陽案左傳工尹禮記亦作工尹此誤上成後漢書宻縣上成公白日昇天上梁荘子有上梁倚尚方傅餘頠􅃨姓録有尚方氏匠麗鄭穆公時匠麗冦之後著書八篇唱盆改為温氏四十二宕伉音抗晉有漢中大夫伉嘉四十三映孟魯桓公子慶父之後號曰孟孫因以為氏又衛襄公長子孟縶之後亦曰孟氏齊孟軻字子展秦有孟説平昌安邱縣孟敬子生縢伯伯生廖廖生軻居髙宻置平昌郡因為郡人漢孟觀二十二代孫説説生倕刑部郎中孫簡常州刺史觀孫珩又居相州珩十一代孫唐禮部尚書温子晧曉晅曍晧奉天令生遂曉左補闕晅生迢河隂令曍右丞京兆尹生遹述逢通迪逑逢司農少卿迪大理少卿按孟子非齊人字子展亦未詳所自東海漢孟卿以學顯名鉅鹿後漢孟敏武威後梁孟禕江夏武昌吳侍中孟宗晋孟嘉弟陋晋書孟陋孟宗之曽孫宋孟昶封臨淮公弟顗兄弟為僕射敬陳厲公子敬仲之後以謚為氏姓苑云黄帝孫敬康之後秦有敬丕子教為平陽太守平陽敬教子孫因官家焉裔孫歆漢末為揚州刺史六代孫頻後魏北平太守曽孫顯携北齊僕射永安公弟法朗法延曽孫人綱生彦琮山松仙客彦琮唐愛州刺史山松澄城令生暉晈暉右丞侍中平陽王生譲誠詢諲譲尚舍奉御誠魯郡太守右威武大将軍詢比部員外郎仙客蔚州刺史法朗曽孫君宏右衛将軍黔昌公孫昭道河東状稱望平陽南凉抱罕太守敬歸七代孫播唐給事中監國使生非虞部員外播三從孫昭道監察御史生羽侍御史三從兄弟昶許州司馬生令則臨汾令令則生徳􅀈徳秘書郎生揖擢括撫揖太子家令生寰㝢括字叔弓兵部侍郎御史大夫生騫宻寛寛京兆尹生昕晦皥煦騫逮州刺史生性安大理評事撫太子舍人􅀈給事中生挺廣平敬歆後今無聞慶姓苑慶父之後慶克慶封慶封奔吳子孫徙下邳漢東平太守普治禮按陸徳明釋文序目慶普治禮記漢東平太傅作太守誤又陳卿慶餘按左傳陳有慶虎慶寅慶餘未詳晋慶鄭漢末慶氏自下邳又徙㑹稽慶鴻洛陽人慶儀後漢汝隂令孫慶酺子侍中質諱姓賀氏按前賀姓姓纂云賀純避漢安帝諱改賀氏此云質與前不合竟見姓苑有竟氏慶師見姓苑四十五勁鄭周厲王少子支封於鄭是為桓公在畿内今華州鄭縣是也威公生武公與晋文公夾輔平王東遷於洛鄭徙溱渭之間謂之新鄭傳封十三代至幽公為韓所滅子孫播於陳宋以國為氏幽公六代孫榮號鄭君生當時漢大司農滎陽開封當時六代孫穉漢末自陳徙河南開封晋置滎陽郡開封𨽻焉遂為郡人穉生興興生衆後漢大司農曽孫熈生秦渾渾魏少府生崇晋荆州刺史曽孫略前趙侍中生豁楚楚生温燕太子詹事生三子曄恬蘭曄號北祖恬號中祖蘭號南祖曄七子白麟小白叔夜洞林歸藏連山㓜麟因號七房鄭氏盛周同姓國也為齊所滅穆天子傳盛姫姓之國也公羊傳云成降於齊師成者盛也諱滅同姓故言成也廣陵吳有盛冲晋有盛彦事母孝仕至中書侍郎又錢唐令疑唐左驍衛将軍滄州揔管盛彦師聖見姓苑正令其先周官儀㒒掌貳車正令因氏焉家語有正令赤秦人孫子弟子案家語無此名孫子弟子亦有脱誤四十六徑寗衛康叔之後至武公生季亹食采於寗弟頃叔生跪跪孫速速生武子俞俞生殖殖生悼子喜九世卿族按左傳魯荘公六年放寗跪於秦魯哀公四年衛寗跪救范氏春秋有両寗跪杜預皆未詳其系又成公二年衛侯使寗相侵齊杜預註寗相寗俞子又成公十四年衛侯饗苦成叔寗惠子相即寗殖也杜預不注其系然則寗相乃寗俞之子未聞生殖也又㐮公二十五年傳曰九世之卿族一朝而滅之杜預注寗氏出衛武公至喜九世姓纂止有七世皆参差不合齊有寗戚周有寗越安平魏京兆太守寗康洛陽晋寗欽華隂状云昶後唐吏部侍郎寗允忠河東漢太僕寗成代居河東又餘杭令武欽州梁有爱州刺史寗逵居欽州寗頃曽孫師表師宗師表唐領軍大将軍沈國公師宗孫愷諫議大夫撰國史四十七證乗馬漢書溝洫志有諌議大夫乗馬延年又張掖有乗馬敷四十八嶝鄧曼姓殷時侯國也春秋時鄧侯吾離朝魯後為楚文王所滅子孫以國為氏鄭有鄧祁按左傳鄧析此作祁誤南陽後漢太傅髙宻侯鄧禹其先居南陽子震嗣次子訓女和帝皇后襲封昌安侯少子珍封夷安侯晋永嘉亂居丹陽陳亡入長安禹裔孫乾南陽城大守乾曽孫暠唐}
