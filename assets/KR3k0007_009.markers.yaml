  - {type: variant, offset: 11500, length: 0, content: '', WYG: 生孝機中書舍人孝叡洛州刺史生庭瑜機生粹徴粹化州刺史徴殿前侍御史綸工部尚書駙馬都尉紀國公生孝爽文振四從姪子榮周潤州刺史孫髙唐盧州刺史諸郡段氏左金吾大将軍鄜坊節度段竒京兆人生岌嵩㟧汾原節度檢校兵部尚書祐雲南状云魏末段延没蠻代為渠師裔孫慿入朝拜雲南刺史孫左領大将軍生子光子游子英子光試太僕卿長川王生秀試大常卿子英率府遂郡王神營州兵馬使灌風俗通斟灌氏夏諸侯也子孫以國氏焉漢丞相潁隂侯灌嬰嬰孫賢汝隂侯案漢書賢封臨汝侯神仙傳灌叔本漢太僕卿灌夫父張孟嘗為嬰舍人易姓灌氏列僊傳有灌光爨後漢河南尹爨肅見謝承後漢書蜀志交阯刺史爨琛按廣韻琛作深建寕大姓也又寕州刺史爨頠華陽國志爨習官至領軍昌寕大姓也冠姓苑云有此姓云冠髙帝之後冠軍漢霍去病封冠軍侯支孫因氏焉襄陽漢有太𫝊東海王㕘軍冠軍夷按句有脫誤三十諌諫周禮有司諌子孫以官為氏晏左傳晏桓子名弱齊公族漢司𨽻校尉晏南漢書御史晏忠見風俗通南燕有晏漢豢龍古飂叔安裔子三十一襇蕳亡莧切姓苑云人姓三十二霰燃女見反見纂要今同州有此姓練見姓苑云人姓見見姓苑云人姓薦見姓苑云人姓縣潘衛大夫有縣潘氏三十三線卞出自姬姓曹叔振鐸之後支庶食采於卞因以氏焉魯有卞荘子楚卞和}
