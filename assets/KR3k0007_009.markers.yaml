  - {type: variant, offset: 11501, length: 0, content: '', WYG: 隂寃句人按晋書卞壼之父曰粹壼之子眕盱瞻眈眕盱殉父難一贈散騎侍郎一贈奉車都尉瞻位至廣州刾史眈尚書郎姓纂既失引忠貞又紊其世次至濟隂寃句為忠孝之里而綴之卞和之下尤穿鑿不經魏卞揖生統為晋琅琊内史生粹中書令子眕盱瞻又桓元長史卞範之宋卞彬賤風俗通漢左北平太守賤瓊單可單氏改為單氏眷代北茙眷氏改為眷氏變見姓苑云人姓戰後漢初戰兢為諫議大夫三十五笑邵邵公奭周同姓受封於燕傳國四十餘代其支庶為卿士邵穆公武公邵廖邵昭公並其後也秦有邵不疑汝}
