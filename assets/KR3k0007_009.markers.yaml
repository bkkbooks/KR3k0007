  - {type: variant, offset: 2037, length: 1135, content: 郎中給事中判御史中丞生黃石黃石生經戶部郎中經生謙咸及荊州刺史生處訥地官侍郎太府卿平章事侍中千乘伯士帝堯之裔杜柏之子隰叔為晉士師至士蒍生伯成缺缺生會會子孫氏焉後漢末交阯太守士燮河南隋刑部侍郎案此下脫名士燮後生義總唐戶部郎中𣏌姒姓夏禹之後周武王封東樓公于𣏌後為楚所滅子孫氏焉齊郡齊有𣏌殖字梁今齊州有𣏌氏俟風俗通俟子著書六國時人河南後魏獻帝以次子為俟亥後改為俟氏官氏志俟奴氏改為俟氏子帝嚳之後殷湯姓子風俗通云左傳有子鉏商案左傳叔孫氏之車子鉏商杜注車子微者鉏商名此文附會不合鄭大夫子人九里本理氏春秋時改焉晉有里克魯有里華鄭有里析後居襄城者又為里相理咎繇為堯理官子孫遂為理氏殷宋有理徵恃齊有恃乙管仲誅之子玉衛大夫子玉霄之後秦穆公時大夫有子玉房子桑魯大夫子桑伯子之後見論語秦公孫枝字子桑其後氏焉莊子有子桑樗子我曹叔孫成子生申為子我氏衛大夫有子我羽人子叔世本魯文公生惠伯叔肸叔肸生聲伯嬰齊嬰齊生叔老子叔子叔生叔弓叔弓生仲南文楚及伯張穆伯定伯為子叔氏子夏陳宣公生子夏其娣生御叔己師己師生子南徵舒徵舒生惠子晉晉生定子御寇為子夏氏子有魯有若字子有之後見禮記宋有子有恭叔子雅齊惠公孫子雅之後見英賢傳又魯季桓子生武叔竈亦為子雅氏霄為齊上卿子囊左傳齊大夫子囊帶之後子家魯公族子家氏魯大夫子家霸懿伯子革世本宋司城子革之後又曰季平子支孫為子革氏子州莊子堯以天下讓子州支父舜以天下讓子州支伯子孟魯公子孟之後見英賢傳齊簡公時子孟卿為大夫子建楚平王太子建之後頃襄王時有子建叔子為大夫子伯左傳衛大夫子伯季之後魏有子伯先子夏門人居西河子庭芉姓楚公子午字子庭後又子庭氏魯大夫以字為氏子尚世本陳僖子生廩邱子尚意茲因氏焉國語鄭大夫子尚伯父子彊衛公族昭子郢之後案此疑亦採自世本子郢世本衛公族昭子郢之後子寤陳僖子生宣子其後為子寤氏子輿陳桓子生子石難為子輿氏子干魯季平子干叔彭便之後案古今姓氏辨證云此條姓纂有氏無解此句係後子成氏之文誤擊於此今子成氏條亦遺失子季楚公族也子羽晉公族子羽後為楚邑大夫子陽魯公有子陽者其後以王父字為氏子尾齊惠公生子高祁祁生子尾蠆因氏焉子重楚公子重字嬰齊子重之後子午世本楚公子午之後齊大夫子午明子旗齊惠公孫欒施字子旗子孫以王父字為氏子獻世本陳桓公孫子獻之後風俗通云齊大夫子獻之後楚文王時子獻遼為大夫子乘楚屈蕩生子乘因氏焉子華莊子韓有子華子因氏焉子言季平子生昭伯寤之後也子齊衛公族子齊氏子蕩世本宋威公生子蕩因氏焉子枋陳僖子生穆子安為子枋氏子宋陳宣公生子楚其後為子宋氏子扁莊子有子扁子子工世本齊頃公子子工之後子鞅陳僖子子生簡子齒為子鞅氏子揚世本季桓子生穆叔其後為子揚氏子芒世本陳僖子生子芒盈因氏焉士孫漢書平陵士孫張為博士揚州牧明梁邱易生仲徹長安令左馮翊生苞苞生充曾孫奮為郡五官掾六代孫眭後漢弘農太守生瑞, WYG: ''}
