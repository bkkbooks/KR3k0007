  - {type: variant, offset: 10797, length: 627, content: 堵俞彌堵汝父又音者魏志張燕本姓堵普官氏志後魏獻帝次兄為普氏改為周氏苦晉郤犨亦號苦成叔子孫氏焉風俗通苦成越大夫漢苦均為會稽太守苦音庫鼓左傳鼓子鳶鞮之後以國為姓又見姓苑浦晉起居注有尚書令浦選補見姓苑五鳩世本云楚鳩氏國語楚昭王時有五鳩蹇五里其先齊諸田漢武帝徙之諸田以門秩次第為族田廣田孫田登為第二代人案此下疑有脫誤五鹿左傳云少昊氏因官氏焉案左傳無其文五鹿衛地趙有將軍五鹿盧吐萬代人代為部落酋帥河南周郢州刺史通生緒永壽公弟纘右武侯將通已見萬氏注吐奚後魏古弼代人本姓吐奚名華後為司徒賜姓古名弼吐賀後魏吐賀氏吐突代人令中官右監大將軍吐突承璀吐難改為難氏古成風俗通即古咸之後隨音改焉漢有廣漢都尉古成雲姚興給事中黃門侍郎古成說右將軍古成知晉袁弘集有南海太守古成彣開元中雲陽尉古成古野山東古野氏赤狄別種其後氏焉古孫姬姓王孫賈之後亦隨音改為古孫氏據氏族略增改苦成晉卿郤犨食采苦成因氏焉潛夫論苦成城名在監池東北苦久後燕步兵校尉苦久和案後燕錄作若久和此非苦久和仵城晉州稽胡晉初賜姓呼延居西州後魏正始年呼延勒為定州刺史於定陽賜姓仵城因住南汾州仵城縣音訛轉又為賀悅魯陽妘姓國也在魯陽為魯所滅子孫氏焉潛夫論𦍋姓楚公族有魯陽氏祖南風俗通與社南皆齊倡也漢高惕娶扶風祖南氏補祿英賢傳補祿子著書一篇言法家事吐谷渾魏晉之際鮮卑慕容廆兄吐谷渾率部落止青海之西國號吐谷渾或歸中國因氏焉古口引改為侯氏普六茹周書楊忠姓普六茹疑與普陋茹同禮左傳衛大夫禮孔禮至漢新市長禮長平原後漢禮震受尚書于歐陽歙啟夏后啟, WYG: 段}
