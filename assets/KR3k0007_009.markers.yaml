  - {type: variant, offset: 11682, length: 371, content: 生懷儼懷敏案北史道元子名長舉襲父爵此誤道元魏臣云北齊亦誤隗春秋時翟國隗姓子孫因氏焉天水成紀漢末隗義弟崔崔兄子囂更始御史大夫鄧禹承制以為西州大將軍專制涼州朔方事光武征隗會卒王元立其子純明年降汝陰晉有隗紹善易海見姓苑采黃帝封其子于右北平采亭因氏焉北平漢渡遼將軍采皓見英賢傅晉東莞太守采耿至隋漁陽郡主簿采強狀云耿之後也生宣明公敏宣明給事中刑部侍郎生懷敬懷敬吏部郎中宗正少卿生庭芝蘭芝公敏黃門侍郎生泰眷右金吾將軍相州刺史宰周大夫宰周公孔之後以官為姓仲尼弟子宰予字子我魯人也漢有司空掾宰直宰氏范蠡傳云陶朱公師計然姓宰氏案徐廣注計然姓辛氏名鈃其先晉國之公子也此作姓宰誤為複姓又誤字文子葵邱濮上人宰父仲尼弟子有宰父黑倍利斛律部別帥倍俟利代人後封孟都公案倍俟利即斛律金之高祖蓋後又分為斛律氏軫左傅軫國在楚之東南楚屈瑕將盟貳軫注云二國也尹少昊之子封于尹城因氏焉, WYG: 五十九鑑監}
