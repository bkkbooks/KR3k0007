  - {type: indent, offset: 5406, content: 　, id: KR3k0007_CHANT_009-bkkind38}
  - {type: variant, offset: 5406, length: 244, content: 晉有周馥母沛國處氏所風俗通宋大夫華所事之後漢有諫議大夫所忠武帝時人平原後漢有所輔平原人小吏父奉郎中楚風俗通𦍋姓鬻熊封楚以國為姓左傳魯有楚尹楚邱趙襄子家臣楚隆莒伯益之後封莒為楚所滅以國為姓呂管英賢傳漢呂管都尉呂管次祖中山人呂相秦相呂不韋本陽翟賈人子孫因以氏焉楚季世本楚若敖生楚季因氏焉陳大夫有楚季融楚邱新序楚邱先生孟嘗君時人也莒子春秋時莒子失國子孫氏焉武周平王少子生而有文在手曰武遂以為氏漢初武臣為趙王又有武涉功臣表梁鄒侯武彪傳封六代後居沛國漢又有祭酒武忠望出太原據氏族志增沛國武彪裔孫周魏, WYG: 今}
