  - {type: variant, offset: 3188, length: 412, content: 穎士蒍隰叔生士蒍為晉士官案士官當是司空字誤支孫因為氏士思古今人表晉有士思癸鄭有士思卜秦將軍士思穆士丐晉大夫士丐之後士吉晉大夫士蒍生吉為士吉氏士成莊子有士成綺也士弱晉士莊子弱為獄官晉人謂之士弱氏士華齊隱者士華太公誅之史葉韓例云衛頃侯之後公子史食采于葉因氏焉左傳作史華案韓例未詳史晁世本衛史晁之後似和貞觀左屯衛穀州刺史似和泥熟亦北蕃歸化也案通志泥熟乃蘇農氏此作似和誤又開元中有左威衛大將軍赤水軍副使武威公似和舒市南楚有市南熊宜僚後以為氏巳氏宋大夫司馬巳氏之後俟呂鄰改為呂氏尾曾尾生或云即微生高也尾勺後漢尚書郎尾勺攜吳志云尾勺子張昭師也許姜姓炎帝四嶽祕笈新書四嶽作炎帝之後周武王封其裔孫文叔於許後為楚所滅子孫分散以國為氏晉有許偃楚有許伯鄭有許瑕高陽北新城縣今入博陵郡漢大司農許據生允魏中領軍允孫式式長子皈案唐世系表皈作販生晉徵君詢詢元孫懋有傳懋孫善心隋黃門侍郎生唐中書令高陽公敬宗敬宗生昂昇昱杲景昂皮化令生彥伯韶伯彥伯太子舍人生望, WYG: ''}
