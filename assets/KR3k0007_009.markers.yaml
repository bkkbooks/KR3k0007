  - {type: variant, offset: 12201, length: 212, content: 備左武侯郎將河閒稱尹敏之後魏趙州刺史尹虛曾孫軌隋貝州刺史上蒙公生勢唐嘉州刺史生仁弘仁德仁弘潞州司馬長樂公生元叔元貞元凱元貞生日昇鄭州刺史光祿少卿元凱左史鳳閣舍人仁德吳王戶曹生元繹元超元徽子羽子產子羽洛陽丞宣州別駕子產灃州刺史元徽比部郎中楚州刺史後魏太子洗馬尹翼六代孫朗生正理左拾遺商州司馬正義度支郎中宋州刺史樂城後魏太學博士尹珍孫式隋長寧王長史生文憲中書舍人給事中生奭祠部郎中給事中又禮部員外尹知章絳州翼城人尹格之後又有古尹, WYG: 和}
