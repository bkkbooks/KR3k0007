  - {type: variant, offset: 10577, length: 219, content: 道隋兵部侍郎案古道子傳父起魏大中大夫道子仕齊歷官檢校御史司空田曹參軍此以起為北齊中散大夫起子道隋兵部侍郎俱誤河南官氏志吐奚氏改為古氏祖子姓殷後殷王祖甲祖乙祖丁支庶因氏焉殷有祖已祖伊漢有祖所治家涿郡范陽祖太沂裔孫訥祖逖生約並見晉書後漢太常邈十三代孫詢禕詢元扈夏時姒姓國也漢有扈輒又上郡太守扈育廣陵太守扈商京兆魏有扈累晉有射聲校尉扈懷河南官氏志扈地干氏改為扈氏南昌唐扈臧之後元昌倉部員外五本伍氏避仇去人氏焉蜀五梁晉始興太守五允堵左傳鄭有堵寇堵, WYG: 共}
