  - {type: variant, offset: 11542, length: 9, content: 可足渾前燕錄慕容雋, WYG: 晝風俗通齊大夫食采晝邑因氏焉右晋屠擊将右行因氏焉授見姓苑富父魯富父終甥之後見左傳魯又有大夫富父槐廐尹楚大夫廐尹然之後五十候竇姒姓夏少康之後帝相遭有窮之難其妃后緍方娠逃出自竇而生少康支孫以竇為氏至周世為大夫竇犨為晋大夫仕趙簡子裔孫漢丞相嬰扶風竇嬰之先本居清河觀津後徙扶風平陵漢章武侯竇廣徳女為文帝}
