  - {type: variant, offset: 11557, length: 0, content: '', WYG: 史傳無聞河南洛陽状稱本扶風人竇武被誅後人鴈門太守統北奔鮮卑拓㧞部為没鹿回部大人賜姓紇豆陵氏魏孝文改為竇氏女為元帝后六代孫漏頭蓬東王按唐世系表竇巖從魏孝武徙洛陽生三子那敦略略字六頭生五子興㧞岳善熾}
  - {type: variant, offset: 11557, length: 0, content: '', krp: 史傳無聞河南洛陽状稱本扶風人竇武被誅後人鴈門太守統北奔鮮卑拓㧞部為没鹿回部大人賜姓紇豆陵氏魏孝文改為竇氏女為元帝后六代孫漏頭蓬東王按唐世系表竇巖從魏孝武徙洛陽生三子那敦略略字六頭生五子興㧞岳善熾}
  - {type: variant, offset: 11558, length: 0, content: '', WYG: 竇巖兄竇拓封遼東王蓬當是遼字誤并有脱文孫略生岳處毅岳處後周大司馬把公女髙祖太穆皇后生太宗毅生昭昭生彦彦生徳明按疑脱徳素一人冲徳元徳洽徳明常州刺史徳素工部郎中冲陜州刺史生義節虢州刺史生戒盈戒言戒言生萱蘭案唐世系表萱蘭作庭萱庭蘭蘭國子司業萱衛尉少卿戒盈青州刺史生庭芝庭華庭芝陜州刺史庭華中書舍人生叔展申昱叔展右拾遺申給事中昱左司員外徳元户部尚書左相鉅鹿侯生懐恪懐質懐譲懐譲徳州刺史生思仁金吾将軍懐恪湖州刺史懐質左僕射中山公姪崇嘉考功郎中徳洽工部郎中毅少子招賢隋遷州刺史神武公孫徳藏生虛運虚奨虚運生恂華州刺史虚奨右屯田将軍生善西魏華州刺史永富公善生榮定隋兾州刺史陳公榮定生抗慶璡抗納言陳公生衍靖誕幹師綸師武師仁衍左武候将軍生孝儉孝威孝忠孝儉生畢太僕少卿孝忠蘭州刺史靖户部尚書封信都公生逵遜䆳逵駙馬生松夀殿中少監遜兵部郎中䆳蔡州刺史誕刑部尚書莘公生孝慈孝立孝冲孝臻孝誠孝果孝諶孝禮孝慈工部郎中徳州刺史生希玠希璬敬賔希玠禮部尚書少傅莘公生錫鋭錫驍右衛将軍希璬蓬州刺史生銓滑州刺史銓生賔兵部郎中河南少尹孝立孫鎮左武衛将軍生顥項項洋州刺史孝臻夷州刺史生瑾瑾生審言聞喜尉審言生畿權參權著作郎參中書侍郎平章事吏部尚書生景伯兼監察御史孝誠溪州刺史孝果生維銑金水部郎中孝諶潤州刺史贈太尉女睿宗昭成皇后生元宗孝諶生希瑊希球希􅞓按疑脱希琬一人希瑊太子少傅豳公生錬鋼錬司農卿鋼将作監同正希球太子賔客兾靖公生鑑鑑生榮虞部郎中希􅞓開府太子少傅畢公生鍔濬沔鍔駙馬秘書監同正生克恭濬涇王傅沔濟王傅生克良克温克良駙馬希琬衛尉少卿生鋒太僕少卿鋒生昱旵昱隋州刺史旵鳯州刺史孝禮涇原令生瑋璉良賔瑗瑋遂州刺史璉京兆少尹生紹宗繹績縯級紹給事中荆州長史生寓繹駙馬衛尉卿績奉先令良賔生林司封郎中瑗光禄卿生兟兟生乂太府卿同正師綸太府少卿生尚義尚烈尚義生瓉道州刺史尚烈生進右庶子進生蒙泉按唐世系表泉作鼎蒙太原令泉都官郎中師武生孝道孝約孝綽孝綽生景景生履廷履信履廷梓州刺史生暄履信鴻臚卿慶生智純智宏智圓按世系表智仁蒲州刺史脫名蒲州刺史智宏生懐玉懐昶懐玉婺州刺史懐昶生從之從光從昭從之左司郎光生靚覦覦户部侍郎揚府長史智圓開州刺史璡禮部尚書鄧公生普行左監門将軍長史饒州刺史普行生總汾州刺史總生宏儼屯田員外竇熾周太保鄧公生恭州刺史軌曽孫克順将作少監恭少子琮晉州刺史生孝謙洛州刺史竇覽孫孝仁案唐世系表孝仁作孝永濟州刺史孝鼎司勲郎中竇深生襲右武衛将軍襲生文表文表生季爽季安季安湖州刺史曽孫至柔爽開州刺史竇嶷孫徳宗播州刺史竇誼孫有意案唐世系表誼生有意此作誼孫不合熊州刺史生元誨諌議大夫竇威内史令延安公生惲金部侍郎岐州刺史惲生炅炅生栩案唐世系表炅作旻栩作詡棣王傅觀津公栩生顒撫州刺史唐左衛将軍竇善衡云扶風鞏水部員外牟洛陽令羣御史中丞今開州刺史庠潼州刺史叔向從父弟彧廬州刺史生易直從直敬直興公易直兵部郎中御史中丞從直兼殿中御史彧堂兄子端房州刺史竇藥師云略後㓂蘓忿生為司㓂子孫以官氏焉又云衛康叔為周司㓂支孫以官為氏秦滅衛君甫家于上谷八代孫恂上谷昌平恂漢執金吾雍奴侯曽孫榮榮生孟魏馮翊太守徙家馮翊元孫循之生讃讃生臻後魏七兵尚書汝南生儁西魏司空賜姓口引氏案魏書㓂讃傳讃子臻官至宏農太守臻次子祖禮官廷尉尚書贈七兵尚書昌平男祖禮弟儁始賜姓若口引氏此以臻為七兵尚書悮汝南二字亦有脱口引氏脱若字儁曽孫宏唐户部侍郎武林公馮翊蘓忿生之後以官為氏魏}
