body:
  text: 十一模盧姜姓齊太公之後至文公子高高孫傒食采于盧因姓盧氏秦有博士盧敖漢有燕王綰沛人范陽涿縣後漢尚書慎案漢有中郎盧植范陽人此慎字疑即植字之誤敖之後珽晉侍中生志中書監生謀司空從事中郎四世有傅生諶二子勗偃案後漢盧植之子毓魏司空毓子欽晉衛將軍欽子浮祕書監欽弟珽衛尉卿珽子志軍諮祭酒志子諶依劉偃為從事中郎姓纂云謀諶字誤也又諶之外有謀諶之子勗偃晉書皆未見勗號南祖偃號北祖勗曾孫元生遷按唐世系表元生度世字子遷此作遷疑避唐諱生四子陽烏敏昶尚之又號四房偃中子昭昭元孫辯景裕景先兄弟三人為魏周齊三國帝師濮陽狀云祕書監盧浮後魏許昌太守盧曾自陳晉徙濮陽又從孝武入關曾生怡周譙州刺史生士諡士獻士良晉絳二州刺史生師直司僕少卿士弘度支郎中趙州刺史龍門唐左常侍盧虔狀云偃子闡後又徙晉州子從史弋陽光山縣唐瀛州刺史祖尚自云本范陽人本姓雷氏後周初以雷盧聲相近改姓盧氏三原倉部郎中盧雲本姓閭氏𡋕蜀州司馬上元中準制改姓盧氏胡帝舜之後胡公封陳子孫以諡為姓安定漢有胡建始居焉後漢有太尉胡廣魏胡質荊州刺史生威清州刺史平春侯又居淮南文案文疑晉字之誤晉胡奮安定臨涇人官至左僕射左僕射胡奮石季龍入關與梁皇甫韋杜牛辛皆以華胄不在戍役之限奮裔孫國珍後魏司空女為宣武帝皇后生孝文帝珍兄真曾孫延北齊太宰安平王女為武成帝皇后生後主緯長安隴東王長懷長穆長洪長咸長興並封王洪子文同武帝皇后生孝文帝珍兄真案武帝至兄真十一字衍唐緜州萬安令新蔡胡奮之後今無聞已上舊望弋陽定城唐刑部郎中胡元禮義陽中州唐鳳閣侍郎胡元範洛陽祕書少監胡皓稱洛陽人鄠縣刑部侍郎胡演樂陵兵部員外胡曼倩今大理口少卿胡𡋕恆山代州總管定襄郡王胡大恩賜姓李氏河東開元中胡瑜弟瑱並舉進士瑜生諤瑱生諒大理評事諤右司郎中生溵濦洵湘潘潘生裳吉河南官氏志獻帝與鄰以兄紇骨氏改為胡氏吳周太王子太伯仲雍封吳後為越所滅子孫以國為氏季札之允居魯齊閒濮陽鄄城漢有長沙吳王芮後漢有廣平侯吳漢南陽宛人也桓帝時吳遵遵孫質質六代孫隱之晉廣州刺史其先祖自濮陽過江居丹陽歷仕江左七代孫景達唐尚藥奉御曾孫令珪贈太尉女即章敬皇太后也珪子漵澄湊漵左金吾大將軍太子詹事生士則士明士鄰士矩士則伊闕令士矩京兆司錄澄駙馬殿中監生士彥駙馬衛尉卿士彥生同正湊京兆尹右金吾大將軍檢校刑部尚書生及大理評事果州刺史吳敬仲亦云隱之後孫訴侍御史訴孫損震諫議大夫和蕃使渤海芮後齊道州別駕安誕居鄴縣五世孫道師唐吏部侍郎孫納安州刺史又考功員外郎安慶亦稱渤海人陳留狀稱後漢河閒相吳祐後隋有吳響生子臧見劉氏行年記臧曾孫兢左庶子恆王傅蘇顓頊祝融之後陸終生昆吾封蘇鄴西蘇城是也蘇忿生後至建生武嘉十二代孫則則次子遁八代孫綽周度支尚書邳公生威隋左僕射房公生夔季案唐世系表季作季子夔隋鴻臚少卿生勗亶勗駙馬吏部侍郎秦府學士生均幹均虔州刺史生儁幹工部尚書生獻駕部郎中勗生昱濟州刺史亶臺州刺史生瓌琛瓌侍中左僕射許文貞公生頲冰詵又穎顏頲中書侍郎平章事許文憲公生善善生易相易黃州刺史生繫滁州刺史繫生贊贊生虔冰虞部郎中國子司業案唐世系表冰無所生震乃虔之子此句疑衍生震吏部侍郎河南尹震生敦發教徹皦政儼詵給事中徐州刺史又京兆尹生復妙妙泉州刺史穎生盈炎盈嘉王傅顏淮安太守左武衛將軍生寬琛廣州刺史生炯韙韙瑯琊太守又驍騎將軍季生澄沁州刺史澄生綰䋔綰工部郎中荊南府司馬則長子愉愉七代孫彤生雅振振生世長唐秦府學士諫議大夫生良嗣右僕射溫公生踐言踐竣踐義踐節踐言生務寂務昇竣生彥伯駙馬案脫都尉二字下駙馬亦脫都尉二字兄子震駙馬義孫廉節曾孫坦太府卿長從弟宣司農少卿襄陽則曾孫佐晉末自扶風徙焉十二代孫權唐左驍衛將軍藍田稱自武功徙焉刑部尚書蘇洵生晉瞻瞻駕部郎中生端平寧昶端比部郎中四代入省生弘趙郡狀稱蘇章之後因官趙州唐鳳閣侍郎味道生佃份倜倇佃膳部員外倇職方郎中味道弟味元膳部員外生偡偡生汭湯郴州刺史又工部侍郎蘇弁狀云與良嗣同房弁兄袞冕冕生持滌持生循楨滌兵部尚書襄州節度生粹沖冕撰會要三十卷武昌冀州前燕有期彤侯青後魏鎮軍將軍五代孫克忠越州長史又武衛大將軍荊國公宣方生慶節洛陽蘇秦之後今無聞河南後魏官氏志拔略氏改為蘇氏後魏恆州刺史蘇強孫武安袁州刺史生順孝慈順周眉州刺史朝彤公生沙羅隋昂州刺史沙羅生康唐右武衛將軍襄城男康生守忠守儉守忠駕部郎中孝慈隋兵部尚書平公生會昌比部郎中蒲風俗通有詹事蒲昌又有蒲遵晉書苻洪傳云其先居池上生蒲皆長三丈因號蒲家遂以為氏後改為苻也烏齊有烏餘烏枝鳴莒有烏存秦有烏獲鄱陽姓苑云今鄱陽有此姓河南代北人烏石蘭改姓烏兼御史大夫烏洽案韓愈集及唐書俱作承洽此脫承字洽從父弟玭案唐書烏承玭官檢校殿中監此亦脫去玭生重允今為河陽節度案韓愈集烏氏家廟碑承洽與重允與此不合狐周同姓居於戎太伯生突生毛及偃毛生溱偃生射姑世為晉卿蜀有狐篤屠左傳晉大夫屠蒯禮記作杜蒯又屠羊說楚人晉有屠岸賈風俗通漢末有屠景先河東人蘆河南後魏官氏志莫蘆氏改為蘆或亦為蘆氏壺衛有壺黯漢諫議大夫壺遂列仙傳有壺公吾夏諸侯昆吾之後漢有廣陵令吾扈晉交州刺史吾彥吳人辜今泉州晉安有此姓不詳所出氏族略軤纂要云人姓苸姓苑云沛人胡母齊宣王母弟封母鄉遠本胡公因曰胡母氏漢有太史胡母敬泰山漢景時博士胡母子都居齊治公羊春秋後漢執金吾胡母班晉河南令生輔之字彥國陳留太守湘州刺史揚武將軍生謙之也胡非陳胡公後有公子非後子孫為胡非氏戰國有胡非子著書胡掖禿髮思復鞬娶胡掖氏生烏孤呼延匈奴四族有呼衍氏入中國改為呼延氏河南前趙大司空雁門公呼延冀女為劉元海后七代孫叔歸上谷太守孫族潞州刺史曾孫呼延黃河內令生昉昭曦晧呼毋漢武帝時匈奴王呼毋盧降封容城傳封三代呼衍後漢書匈奴四族有呼衍氏見匈奴傳蘇農西蕃突騎施酋也神龍右驍衛大將軍金滿州都督張掖公蘇農金山開元左羽衛大將軍永壽郡王蘇農輔國左金吾大將軍酒泉公蘇農盡忠案此皆沙陀氏之人此俱改為蘇農氏考貞觀中有蘇農泥熱左屯衛大將軍穀州刺史亦北番歸化者蒲盧姜姓有蒲盧胥齊人善弋射蒲姑左傳蒲姑殷諸侯居齊也蒲圃魯大夫以地為姓屠羊韓詩內傳楚大夫屠羊說屠住英賢傳芉姓楚公子屠食采於住鄉因氏焉盧蒲左傳齊有盧蒲就又有盧蒲癸盧蒲嫳吾邱呂氏春秋中山有力者吾邱象趙郡漢書吾邱壽王見上壺邱列子師壺邱子林鄖人漢書壺邱子著書五篇下邳今下邳有壺邱氏徒人左傳齊有徒人費又國語齊有徒人回孤邱晉大夫孤邱林之後見世本英賢傳出自孤邱封人之後姑布趙簡子時姑布子卿善相見史記相襄子者烏蘭改為烏氏烏石蘭改為石氏烏那羅北齊有烏那羅受九代案此下當有脫文烏洛蘭改為闌氏齊炎帝姜姓之後太公望子牙封營邱為齊國因氏焉又衛大夫齊惡齊豹亦為齊氏戰國時齊明周人也漢有光祿大夫晉功臣表平敬侯齊受傳封四代晉有齊恭注漢書又有齊萬年前涼有後將軍齊肅前奏左僕射齊難高陽狀稱齊受之後世居高陽晉有武邑侯齊琰次子健健裔孫處中唐中書舍人生珣中山深澤縣稱琰少子粹居中山元孫虔唐光州刺史生知元知元生令令生澣澣吏部侍郎左龍武兵曹生抗中書侍郎平章事抗生餗戶部郎中生摠衢州刺史案唐世系表澣生翧及珝翧左龍武倉曹參軍生抗抗生餗珝官吏部郎中生揔衢州刺史此本左龍武兵曹上脫生翧二字戶部郎中上脫珝一字權德輿集有抗碑亦同成都狀云齊受之後唐黃門侍郎璿生景曹左丞刑部侍郎河閒狀稱琰中子澄自高陽居河閒六代孫肅暕唐虞部郎中生說檢校員外郎說生倚暢給事中平章事江西觀察使齊映狀云代居瀛州兄昭皎弟皞照煦昭兼殿中侍御史生孝若大理正皎澤州刺史皞京兆司錄照倉部郎中池州刺史清河唐冀州總管齊若行狀云齊受之後黎周時侯國風俗通云九黎之後尚書西伯戡黎亦見毛詩左傳齊大夫黎彌且字亦作犂宋城唐右拾遺犂昕洛陽尉黎迥愛州人京兆尹黎幹生烑炬常燧煟熉煟生植右常侍也河南官氏志業黎氏改為黎氏稽黃帝臣太山稽之後風俗通云稽黃秦賢人嵇夏少康封少子季杵於會稽遂為會稽氏據祕笈新書增漢初徙譙嵇山改為嵇氏譙郡銍縣後漢太子舍人嵇蕃子茂齊生含廣州刺史武昌生康魏中散大夫生紹晉侍中案晉書嵇康本傳其先姓奚會稽上虞人以避怨徙譙有嵇山家於其側因而命氏又嵇含傳祖喜徐州刺史父蕃太子舍人又文選註嵇紹集曰從兄太子舍人蕃字茂齊然則蕃於康乃其群從非祖孫也又嵇康詩母兄鞠育有慈無威則康乃少孤為其兄公穆所育文選註引嵇氏譜亦不詳康公武昌生康疑有脫誤亦不知何據河南後魏官氏志紇奚氏改為嵇氏奚夏車正奚仲之後漢功臣表魯侯奚涓北海奚涓之後吳有臨海太守奚熙廣陵奚涓之後唐滁州刺史奚淩澤生千柏柏生陟吏部侍郎鞮風俗通云晉銅鞮伯華之後氏焉遆今同州澄城縣多此姓自云銅鞮氏避仇改焉亦單姓蹄案廣韻無此字惟字典音提註云姓也今附入齊韻兒郳郳犂來之後亦為兒氏兒良六國時人見呂氏春秋千乘漢有御史大夫兒寬倪邾武公封次子於郳是為小邾後失國子孫為邾氏避仇改為倪案世本云邾顏居邾肥徙郳宋仲子注云邾顏別封小子肥於郳為小邾子則顏是邾君肥始封郳杜譜云小邾邾俠之後也夷父顏有功於周其子友別封為附庸居郳曾孫犂來始見春秋附從齊桓以尊周室命為小邾子穆公之孫惠公以下春秋後六世而楚滅之世本言肥杜譜言友當是一人姓纂前以郳犂來為兒氏之祖而以邾武公之卿為郳氏之祖同一卿也強為分別武公之號於傳無徵疑即公羊傳所稱顏公者郳城在東海據祕笈新書增漢有揚州刺史倪彥中山唐刑部侍郎倪若水中山藁城人也西姓苑云西門豹之後改為西氏犀史記秦有犀首鮭中山後漢有鮭陽鴻為少府傳孟氏易南陽淯陽後漢大鴻臚鮭丹𦋅見纂要毒見纂要𡸔見纂要云人姓案集韻生姓也一曰蜀闖梁四公子名或作𡸔毒齊季齊襄公子季奔楚因氏焉魯有大夫齊季窺見世本西方見姓苑云少昊金天氏位主西方今因氏焉北平前燕慕容廆以西方武為股肱又西方罔以文章知名西門鄭大夫居西門因氏焉列子有西門子魏文侯時西門豹為鄴令漢王莽時有道士西門思洞仙傳有西門惠案漢書王莽傳道士西門君惠無名思者此又分思惠為兩人唐宦官有西門思恭西乞秦將軍百里術字西乞其孫以王父字為氏西鉏左傳宋大夫西鉏吾漢有御史西鉏吾見英賢傳西申瑞應圖周成王時西申國獻鳳留中因氏焉西陵世本春秋時有大夫西陵羔西周周末分為東西二周各以為氏西宮人姓未詳淮夷周有淮夷小國後世氏焉氏族略作淮夷小國入周因氏焉其地今淮甸梅殷後紂時有梅伯以國為氏汝南漢將軍梅鋗六代孫嘉始居汝南祕笈新書雷方雷氏之後女為黃帝妃生元囂蓋古諸侯國也後漢有雷義蜀有將軍雷同吳陸抗傳有宜都太守雷譚晉有豐城令雷煥祕笈新書崔姜姓齊太公生丁公伋生叔乙讓國居崔邑因氏焉自穆伯至沃杼成良代為卿大夫良十五代孫意如秦東萊侯生二子伯基仲牟伯基居清河東武城仲牟居博陵安平並為著姓見姓氏英賢傳祕笈新書裴嬴姓伯益之後秦非子支孫封𨛬鄉侯因氏焉今聞喜𨛬城是也六代孫陵周僖王封𨛬邑君及除邑從衣河東聞喜陵裔孫蓋漢侍中九代孫遵始自雲中從漢光武平隴蜀徒居河東安邑安順之際又徙聞喜元孫茂侍中尚書生三子輯號東眷徽號子明子孫又號中眷徽與子遐號八裴祕笈新書真風俗通云漢有太尉長史真俗陳媯姓亦州名本太昊之墟畫八卦之所周武王封舜後胡公滿於陳後為楚所滅以國為氏出潁川汝南下邳廣陵東海河南六望據祕笈新書增秦有陳涉陳嬰漢丞相曲逆侯陳平也長城諶曾孫準晉太尉廣陵公陳武帝稱準後孫達晉長城令因居之九代孫文瓚瓚生茂先茂先梁右衛率生文帝頊案陳本紀文帝諱曇宣帝諱頊文應作宣頊生後主叔寶四帝三十四年為隋所滅武帝霸先生衡陽王昌昌生德會梁州刺史文帝生伯山伯固伯仁伯義伯謀宣帝生叔寶叔英叔卿叔明叔堅叔武叔寶生允深莊蕃蕃唐忠州刺史豫章王叔英生弘徽弘曾孫履華州夔州刺史案唐世系表履華夏州刺史此作履華州夔州刺史不合徽生元凱申州刺史建安王叔卿孫正循王傅宜都王叔明孫繹弘繹侍御史弘荊州案唐世系表荊州作邢州刺史義陽王叔達唐侍郎禮部尚書江忠公生政德元德賢德紹德政德曾孫義少府少監元德生仲方潁州刺史賢德水部郎中汾州刺史紹德曾孫盩厔縣令案唐世系表紹德孫復盩厔令此作紹德曾孫盩厔令而無名曾字衍孫字下脫復字叔武光祿少卿廣陵胡公之後漢末魯相失名無子以外孫劉矯為嗣魏司徒東鄉侯生騫晉太尉汝南胡公之後漢太傅尚書令陳蕃下邳淮浦人後漢太尉陳球球弟子珪沛國相生登東海胡公之後晉有衛武貞侯陳壽京兆胡公之後唐揚州長史陳敬之狀稱大邱長仲弓裔孫默徙長安即敬之高祖也生思齊主客員外婺州刺史敬之從父弟騫之湖州刺史生崇禮九言崇禮水部員外嘉州刺史九言右司員外河東桑泉後魏征南將軍許昌公琬元孫述生元盛毓藝元盛孫正觀潞襄二州刺史藝生義方禮部侍郎知吏部選毓字大德職方郎中荔州刺史新安後周熊州刺史許昌公琬之後曾孫義感唐右司郎中虢州刺史馮翊狀稱陳宣帝子沅陵王叔興之後唐倉部郎中惠滿生伾刑部郎中廬江襄安人隋廣陵太守陳稜孫崇業唐御史大夫生琨琨生熊熊生審明州刺史武當狀云太邱之後開元左太子太師希烈世居均州右司郎中鴻臚大卿汭少府少監潤戶部郎中洳祕書少監希烈兄振鷺司封郎中國子司業生泉明州刺史廣漢射洪左拾遺子昂生光祠部員外臨淮右補闕陳兼生當萇京歸當贊善大夫萇京兆法曹京給事中歸考功員外會稽太常博士陳齊卿堂弟景津生允叔允眾允初允叔侍御史允初殿中侍御史趙郡檢校司徒平章事陳少游稱宣帝後生正儀廣宗後魏瀛州刺史陳肅六代孫處政唐岳州刺史洛陽夏官郎中冀州刺史璲生鉞鍵萬年隋利州總管陳永貴本姓白隋初改姓陳氏叡隋驃騎將軍生貴貴次子諧諧孫令哲令英令哲唐洮州刺史令英右衛將軍岐州刺史諸郡陳氏司農卿陳思門左豹韜將軍陳集原右鷹揚將軍陳元光河中少尹兼御史中丞陳雄河東人鳳州司馬陳懷古安陽人尚藥奉御陳行修江陵人禮部員外郎陳讜言京兆人太常博士陳章甫江陵人殿中侍御史陳憎河內人京兆功曹陳仲雍河內人河南官氏志侯莫陳氏改為陳後魏汾州刺史長蛇公陳紹生弘唐泉州刺史龍川公陳賀略端州首領也秦顓頊嬴姓秦後伯益裔孫非子周孝王封之秦隴西秦亭是也至始皇滅六國子嬰降漢子孫以國為氏又魯有秦堇父生丕茲及秦並秦祖人秦商楚人據祕笈新書增疑有脫誤秦冉秦非並仲尼弟子漢有潁川太守秦彭太原狀稱晉太常博士秦秀之後裔孫生行其行師行其渭川刺史曾孫守庫部郎中同州刺史生昌舜行師右監門大將軍生無害桂州都督安南公也齊郡狀稱秦彭之後裔孫瑤之曾孫景通通子曄並太子洗馬崇賢學士鄜州洛川縣唐瓜州刺史秦孝言狀云彭後生懷洛相如懷洛兵部郎中相如吏部郎中河內武德狀云彭後唐金部郎中叔恂生善丕都官員外郎辛姒姓夏后啟別封支子於莘莘辛相近祕笈新書引作子孫去艸為辛遂為辛氏左傳周太史辛甲案劉向別錄云辛甲故殷之臣事紂去至周文王以為公卿而封其長子漢藝文志道家有辛甲二十九篇又左傳有辛甲為太史命百官箴王闕者是也辛伯辛俞美為昭王友秦有將軍辛騰家中山苦陘曾孫蒲漢有辛武賢隴西狄道辛蒲以名家漢初徙隴西至破羌將軍武賢生慶忌左將軍光祿大夫常樂公五代縣孟興二子恩殷恩生子焉子焉生寅裕元孫顏生猷懿猷孫巨明後魏侍中生顯崇雍州刺史顯崇生元忠慶之元忠青州刺史平陽伯生迪隋隴州刺史迪生德本唐黃州刺史平桑公慶之周度支尚書祕書監曾孫源案唐世系表源作道源監察御史生思禮邵州刺史風元孫義感駕部郎中懿生宗宗生安國季超安國曾孫愨北齊都官尚書生文粲鳳州刺史季超孫豁生昂政寬昂周潼州總管繁昌公政生肇肇生茂將右丞侍中茂將生希業駕部郎中寬生諝中書舍人寅孫晏次子遷六代孫彥隋禮部尚書任城公孫處儉處仁處元處儉中允處仁生曜卿侍御史處元屯田郎中裕五代孫晁生敬宗闡季恭敬宗