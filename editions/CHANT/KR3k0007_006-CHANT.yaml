大夫云敞河南官氏志牒云妘氏改為云氏軍冠軍侯之後因以為姓薰姓苑云人姓聞人風俗通云少正卯魯之聞人其後遂以聞人為氏漢有太守聞人通沛人治后氏禮沛國蘄縣後漢書聞人敬伯沛人太僕聞人生普河東太守普生襲再為太尉梁有聞人舊詩入玉臺集軍車代北複姓
