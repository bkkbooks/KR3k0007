body:
  text: 十八隊背古鄁國在今衛州或作背以國為姓內史風俗通周內史叔興之後因官氏焉周又有內史過代代君翟國也在常山之北今代州是也趙襄子所滅其遺族以代為姓史記趙有代舉漢有京兆代武能姓苑云長廣人狀云楚熊摯之後避難改為能氏京兆唐京兆少尹能延休鄠縣人上元中真州刺史檢校刑部尚書河北招討使能元皓生昱炅炅太僕少卿佴晉山公集有佴湛戴宋戴公之後以諡為姓宋大夫戴惡漢有信都太守戴德九江太守戴聖後漢有司徒戴就晉有戴逵宋有戴法興齊有戴僧靜濟北戴涉之後譙國戴逵之後逵弟邈大司農廣信侯吳興長城晉有戴洋入方術傳魏郡斥邱狀云戴德之後裔孫景珍後魏司州從事景珍生胄唐吏部尚書參知政事生道國公仲孫不仕仲孫生至德右僕射道國公生良紹河東桑泉狀云涉後唐司勳員外郎戴林琁生頎水部員外載左傳有載國漢有載戴晉周武王第三子叔虞封唐唐有晉水因改為晉傳國二十代為韓趙魏所滅子孫以國為姓魏有晉鄙漢有晉寶為樂安相平陽三輔決錄魏有晉文經漢有晉馮晉有尚書郎晉灼註漢書其先居平陽十代孫魏瓜州刺史廣至公暉居馮翊平東隋內史侍郎建平公暉孫昶後周兵部尚書魏公衍元孫揆合州刺史案衍字之上有脫文藺韓厥元孫康仕趙食采於藺因氏焉裔孫相如為趙上卿子孫仕秦隨司馬錯伐蜀因家成都華陰鄭縣魏末自蜀歸關中因居鄭縣裔孫維晉泰山太守維八代孫衡子仁志殿中監生嗣忠戶部員外謨左武侯大將軍楊國公古𠫤字案上脫一字纂要文云人姓進後漢有進延為小黃門令見華嶠後漢書遴風俗通遴到云韓大夫著遴子三十篇晉有東陽太守遴條允寅去聲風俗通允夏時侯國子孫氏焉信都風俗通云張敖尚魯元公主於信都因氏焉一云本申屠氏古信申音同故為信都氏北齊有信都芳河閒信都芳明算術為丞相倉曹貞元初李納將信都承慶為青州刺史奮畢奮之後一云芮伯奮之後以王父字為氏孟軻門人奮章扶風後漢二十八將右將軍槐里侯奮修吳志丞相奮式前涼有奮寬開元有奮齊融案所引人姓名皆以萬為奮河南官氏志吐萬氏改為奮氏隋有穀成公奮緒弟纘唐右武衛將軍運見姓苑靳風俗通楚大夫靳歙案靳尚見史記楚懷王時人靳歙見漢書漢高祖時人應劭不應錯謬至此疑當作楚大夫靳尚漢有信武侯靳歙又汾陽侯靳強傳寫脫落其文耳又汾陽侯靳強後漢末范令靳先後燕錄有太史令鴈門靳安唐金紫光祿大夫靳孝謨武功人吏部郎中靳恆館陶人又居汝南蔓左傳楚有鬬成然食采於蔓後為蔓氏獻風俗通云晉獻公之後戰國有獻淵建風俗通云楚太子建之後漢有建公見元后傳憲周之憲官司寇之屬也急就章有憲義渠氏族略曼邱尸子有曼邱氏齊有曼邱不擇論吐蕃大姓東祿讚生論欽陵論欽陵生贊婆贊婆生弓仁唐右武衛大將軍弓仁生成節成節生惟貞惟明惟賢惟貞右金吾大將軍生慘偕伾惟明檢校工部尚書鄜坊節度惟賢右羽林大將軍頓風俗通頓子國今南頓是也後為楚所滅子孫以國為氏漢有頓肅幹見姓苑幹獻晉大夫范臯夷食采幹獻因氏焉段鄭武公子共叔段之後以王父字為氏戰國韓相段規三輔決錄云段氏李老君之自出段干木之子隱如入關去干為段氏案段干氏羅泌謂初邑段後邑干因邑為氏魏世家有段干子田世家有段干朋風俗通以為姓段名干木蓋以呂氏春秋干木富於義魏都賦干木之德自解紛之言誤之唐表遂謂封段為干木大夫疎矣又木子名同為趙相無隱如名此云入關為段氏亦屬傅會且春秋時以段名者如鄭印段公孫段宋褚師段或其後以名為氏亦未可知未必定為共叔後也文帝時段卬為北地都尉曾孫招生會宗貞會宗金城太守貞武威太守子孫始居武威九代至熲武威西涼建康太守段信稱太尉熲七代孫也信生連連生榮後魏定秦二州刺史生孝先名詔案北齊書紹作韶北齊大宰左丞相平原忠武王婁大張掖公案韶傅封爵無張掖公字且韶三子懿深亮亦無寶積元名當有脫誤生寶積元尚書左丞刑部侍郎大理少卿生嗣元嗣道嗣基嗣元地官侍郎鄭州刺史生崇謙嗣基東光令生崇簡右衛將軍鄭州刺史崇簡生憕協怡憕少府監協太子舍人生孟嘗信陵嗣道司僕少卿裔州刺史德操右監門大將軍案德操上有脫文平原公五代孫楹大理司直隋朔二州刺史段嚴狀云信次子後魏平東將軍基後生達隋吏部尚書東京留守達生瑋唐殷州刺史瑋生懷節右武將軍曾孫成象生平仲尚書左丞昶齊郡鄒平縣卬十九代孫紛案唐世系表十九代作十四代後魏晉興太守五代孫偃師唐太子家令今貫河南偃師生志元左驍衛大將軍生懷古懷藝懷簡案唐世系表志元生瓚瓘珪瓚生懷簡此作志元生懷簡中缺一代懷藝坊州刺史少詹事瓘符璽郎朝邑令生懷昶懷晏懷皎懷昶德州參軍生文昌案唐世系表懷昶生諤諤生文昌此作懷昶生文昌中缺一代左補闕長慶太和中書侍郎西川淮南京東三節度生成式珪成式宣州長史生懷本洛州太守禮部郎中蘇州刺史同居滎陽中牟狀云滎陽少子孝方之後汧陽司農卿贈太尉忠烈公段秀實本武威嶷右驍衛將軍郇坊州刺史遼西鮮卑檀石槐之後晉有段陸眷孫務勿座居遼西令支生匹磾受欲廆段案晉書段匹磾之父務勿座勿座死子疾陸眷嗣匹磾為晉假撫軍大將軍死石勒之難惟末波存及末波死子牙立牙死其後從祖就陸眷之孫遼立此陸眷之孫務勿座云云舛錯殊甚八代孫文振隋兵部尚書北平侯又原北海斯原生確綸確唐御史大夫生孝機中書舍人孝叡洛州刺史生庭瑜機生粹徵粹化州刺史徵殿前侍御史綸工部尚書駙馬都尉紀國公生孝爽文振四從姪子榮周潤州刺史孫高唐廬州刺史諸郡段氏左金吾大將軍鄜坊節度段奇京兆人生岌嵩㠋汾原節度檢校兵部尚書祜雲南狀云魏末段延沒蠻代為渠帥裔孫憑入朝拜雲南刺史孫左領大將軍生子光子遊子英子光試太僕卿長川王生秀試太常卿子英率府遂郡王神營州兵馬使貫戰國策齊有貫殊漢有貫高儒林傳貫公長卿後漢居延都尉貫友後趙貫志姓氏急就章灌風俗通斟灌氏夏諸侯也子孫以國氏焉漢丞相潁陰侯灌嬰嬰孫賢汝陰侯案漢書賢封臨汝侯神仙傳灌叔本漢太僕卿灌夫父張孟常為嬰舍人易姓灌氏列仙傳有灌光爨後漢河南戶爨肅見謝承後漢書蜀志交阯刺史爨琛案廣韻琛作深建寧大姓也又寧州刺史爨頠華陽國志爨習官至領軍昌寧大姓也冠姓苑云有此姓云冠高帝之後冠軍漢霍去病封冠軍侯支孫因氏焉襄陽漢有太傅東海王參軍冠軍夷案句有脫誤諫周禮有司諫子系以官為氏晏左傳晏桓子名弱齊公族生嬰字平仲晏父戎晏父釐並其族也據祕笈新書增漢司隸校尉晏南漢書御史晏忠見風俗通南燕有晏漢豢龍古飂叔安裔子蕑姓苑云人姓燃見纂要今同州有此姓練見姓苑云人姓見見姓苑云人姓薦見姓苑云人姓縣潘衛大夫有縣潘氏卞出自姬姓曹叔振鐸之後支庶食采於卞因以氏焉魯有卞莊子楚卞和濟陰冤句人案晉書卞壺之父曰粹壺之子眕盱瞻眈眕盱殉父難一贈散騎侍郎一贈奉車都尉瞻位至廣州刺史眈尚書郎姓纂既缺引忠貞又紊其世次至濟陰冤句為忠孝之里而綴之卞和之下尤穿鑿不經魏卞揖生統為晉瑯琊內史生粹中書令子眕盱眈瞻又桓元長史卞範之宋卞彬賤風俗通漢左北平太守賤瓊單可單氏改為單氏眷代北茙眷氏改為眷氏變見姓苑云人姓戰後漢初戰兢為諫議大夫邵邵公奭周同姓受封於燕傳國四十餘代其支庶為卿士邵穆公武公邵廖邵昭公並其後也秦有邵不疑汝南漢汝南太守邵安唐都官郎中邵昇自安陽徙汝南弟炅考功員外安陽狀云稱信臣之後青州刺史邵休其先避事加邑為邵氏晉邵奇壽春太守五代孫知新唐刑部郎中又殿中御史邵瓊之相州安陽人生摯說摯監察御史生中和說吏部侍郎生潬滄少少昊氏之後一云少典之後禮記少連善居喪東夷之子召召公奭之後或作召齊召忽漢功臣廣侯召歐又南陽太守召信臣生馴孫休案通志休作材邵皓世本惠公族羌子孫憲為邵皓氏左傳召伯奐氏族略作奭之後少室國語少室周趙簡子右也校出自周官校人之後以官為姓天寶河南士曹校傑孝齊孝公支孫以諡為姓淖楚將淖齒氏族略郜國名在濟陰以國為姓定安唐殿中御史陝州刺史郜弘基生貞𨥺虞部員外郎𨥺即中書令張柬之之甥也暴暴公周卿士見毛詩應劭風俗通云暴辛周諸侯也漢書御史大夫暴勝之字公子河東人浩今隰州刺史浩聿狀云郜氏因避難改為浩氏聿子下闕漕漢書游俠傳漕仲叔西河人少子游亦以俠聞嫪秦莊襄太后有嬖人嫪毒到楚令尹屈到之後以王父字為氏好見纂要文賀姜姓齊公族慶父之後慶克生慶封以罪奔吳漢末徙會稽山陰後漢慶儀為汝陰令慶普之後也曾孫純避漢安帝父諱始改賀氏孫齊吳大將軍齊孫中書令劭劭生晉太子太傅修修十二代唐太子中書舍人德仁德仁姪孫彭州刺史默德仁姪曾孫太子賓客知章生曾河南官氏志賀蘭氏賀賴氏並改姓賀賀拔與後魏同出陰山代為酋長北人謂地為拔謂其總有其地時人相賀因氏焉河南洛陽後魏有賀拔爾頭自武州為河南人生拔拔生允勝岳允後魏太尉燕郡王尚書令勝太師瑯琊公岳雍州刺史關西清水公岳曾孫儼唐右監門將軍孫延嗣度支郎中右金吾將軍爾頭少子生仁後魏太宰安定王孫賀拔一云給事中元正司門郎中長慶中進士賀拔蔥案賀拔其心與白敏中友善見唐摭言此作蔥疑誤賀蘭代居元朔隨魏南遷河洛魏以忠貞為賀蘭因命以氏孝文時代人咸改單姓唯賀蘭氏不改遠祖達羅安樂王河南洛陽達羅統生敦誼周金州總管武都公生崇弼東崇孫儼湖州刺史弼隋陽州總管宋公生懷廓懷默懷武懷廓唐禮部郎中懷默穀州刺史杞公東周榮公生孝義唐尚書左丞生景約景慎景約杞王司馬生惲愔惲生庭芝愔生誕誕生察給事中察生公遂景慎兵部郎中生誼隋靈州刺史海陵公賀婁代人本居漢北以國為氏孝文改為樓氏河南後魏鎮西大將軍廣陵王賀婁伏蓮生大拔蒙曾孫行本唐鳳州刺史梁公泉武安公寶後魏太子太傅廣平伯生景賢陽平公景賢生詮詮子幹隋鉅鹿公生積唐太子舍人賀遂本居元翔隨魏南徙孝文改房氏河南唐引仁府統軍賀遂豐生封渭源縣公貫盩厔案姓氏辯証屋引條云唐雲麾將軍屋引弘生統軍豐豐生渭南郡公封從此有誤賀悅賀遂氏音訛為賀悅今關西有此姓焉後周柱國太尉李弼賜姓賀悅氏賀術魏初賀術祁居質安山因以為氏焉賀谷今關中有此姓氏族略播風俗通播鼗武殷末之賢人案古今人表注曰自師摯以下八人皆殷末人華宋戴公子考父說食采於華因氏焉華督據祕笈新書增華元華宣華亥並為宋卿漢功臣表華毋害傳封四代又華成華嬰平源高堂華嬰元孫魏司徒博平侯華歆生表表生廙嶠廙生垣又華譚為祕書監齊華寶隋孝義傳汲郡華秋沛國譙縣魏志華佗謝姜姓炎帝之允申伯以周宣王舅受封於謝今汝南謝城是也後失爵以國為氏焉魯有謝息據祕笈新書增射三輔決錄云後漢末鴻臚射服天子以服為將軍出征姓射名服不祥也改姓謝名咸子登授登蜀郡太守授中郎將柘楚大夫以地為氏急就章漢有柘溫舒𦔯風俗通云新鄭人楊𦔯村在縣西二十五里舍見姓苑𣇩見纂要舍利北蕃酋帥有吐密支頡利後姓