闗令尹喜之後一云出自夏大夫闗龍逄之後漢長水校尉闗陽蜀前將軍漢夀亭侯闗羽字雲長河東闗羽代居觧縣羽子興侍中河東狀稱闗羽之後唐中書侍郎平章事右僕射致仕闗播顔顓頊之後陸終苐五子曰安為曺姓裔孫挾周武王封邾至武公字顔公羊謂之顔公子孫因以為氏出圏稱陳留風俗傳及葛洪要字又王儉譜云出自魯侯伯禽支庶食采顔邑因氏焉真卿尚書譜云未驗何所憑案真卿語作未知儉何所憑此誤今依圏葛二家及舊譜為定仲尼弟子達者八人路回僕噲何祖辛也案朱彛尊孔子弟子考顔氏弟子達者八人路回之僕子何噲幸子相髙八人也此缺髙一人又幸或作辛通典作栁咸淳臨安志作韋子相史記作祖見書傳顔叔子顔丁顔鶵顔髙顔息譜魯人顔子涿聚齊大夫子晋顔芝河間人生貞秦末藏孝經者也漢大司農顔異濟南人也顔駟江都人後漢袁紹将顔良琅邪江都後漢臨沂人魏徐州刺史顔盛始自魯瑯邪曾孫舍西平靖侯晋永嘉過江居丹陽生髦約髦生綝暢暢孫師伯宋侍中左僕射約孫延年光禄勲延年生竣測奐竣吏部尚書奐五兵尚書綝五代孫協生之儀之推之善之儀後周御史大夫平陽公五代孫温之司門郎中之推北齊黄門侍郎生思魯愍楚㳺秦思魯記室生師古相時勤禮為侍郎秘書監按此處脱名生趍庭職方郎中曾孫迢元孫庻相時秦府學士禮部侍郎生益期期曾孫交勤禮生顯甫顯甫生元孫惟貞元孫滁州刺史生杲卿常山太守贈太保司徒忠節公孫証右庶子生縱覧惟貞生允南真卿允臧允南司封郎中真卿工部尚書太保贈司徒魯文忠公允臧生熲楚州刺史育徳元孫防同州刺史㳺秦鄆州刺史生元勝右補闕之善孫有意沔州刺史真卿生䪻頵南昌狀云與師古同承綝唐虞部貟外謨有生昭粹班芈姓楚若敖生鬭伯比伯比生令尹子文為獸所乳謂獸有文班因氏焉秦有班壹避地楼煩生孺孺生長長生回回生况况生稚稚生彪扶風平陵况女為成帝媫妤徙平陵彪生固固生顓顓生澄陳祠部郎中班投始居汲郡狀稱十三代孫也挺元孫思簡唐春官員外生景倩吏部侍郎祕書監生鈞杭懸渙宏映榮宏户部尚書生肅肅生震震䕫州刺史環楚有環列之尹子孫氏焉楚有環泉案環泉夲環淵避唐諱作泉漢有太守環饒晉環濟撰要畧菅魯大夫食采于菅因氏焉趙郡趙州菅襲趙郡李氏譜云李叡娶晉郎中令同郡菅襲女唐乾元河東節度使菅崇嗣案唐書作管崇嗣此作菅字與史不合馯邱姦反漢書馯臂吳人治易闗龍夏桀時忠臣闗龍逄之後顔成莊子有顔成子㳺二十八山山周山師之官掌山林以官為氏風俗通云烈山氏之後漢武都太守山昱河南懐縣山昱之後漢宣元時臨潁侯山君真生儒始自潁川徙陳留五代孫若公後漢鉅鹿太守徙河内八代孫輝魏宛句令生濤字巨源晉吏部尚書司徒新杏侯按晉書濤贈新沓伯此悮生簡左僕射生遐東陽太守河南官氏志吐難氏改為山氏後魏中書令河東伯山偉生子深子渾渾生顒唐左武衛將軍間見姓苑元和姓纂卷四
