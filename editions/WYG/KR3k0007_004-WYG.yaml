body:
  text: 元和姓纂卷四上平聲殷韻至山韻唐林寳撰二十一殷殷子姓成湯國號也二十四代三十四王六百二十九年為周所滅子孫以國為姓秦末居河内野王漢初遷汝南陳郡長平縣漢北地太守殷續始居長平魏有褒生昱昱生敞過江六代孫髙明生不害不占不侫不害孫開山唐吏部尚書鄖節公開山姪元嗣文州刺史開山堂姪祚刑部尚書堂姪日用宣歙州觀察御史中丞不占孫聞禮太子中書舍人生令名令徳令言令威令名金部郎中國子司業生容冬官郎中容生丞業宗正少卿令徳曾孫嘉紹工書嘉紹再從弟佐明倉部郎中令言孫踐猷生寅永寧尉寅生亮給事中杭州刺史駕部郎中不侫生芊唐東宫學士孫躋融生浩師師生仲堪堪元孫鈞梁五兵尚書有傳曾孫藹唐蜀王文學二十二元元左傳衛大夫元咺之後其先食采于元因氏焉今元城是也其後子孫無聞河南洛陽縣後魏書官氏志曰拓㧞氏改為元氏自云黄帝子昌意之後居北土代為鮮卑君長宋書云李陵之後昌意三十九代至昭成帝什翼犍始號代王都雲中道武改號魏即尊號孝文帝都洛陽改為元氏十一代十五帝一百六十一年為後周所滅獻明帝生寔夀鳩紇根翰力真閼婆常山王夀鳩生遵遵生素連素連生羽隣忠倍斤尉貨敦菩薩淑羽隣曾孫文遥北齊左僕射生行恭行恕行恭隋主爵侍郎行恕隋毛州司馬生務整務真務整唐兵部郎中生知敬知黙知敬吏部郎中知黙主客員外務真工部侍郎生知讓虞部郎中太府少卿讓生昭晊暕曉暧晊侍御史暕尚書右丞右常侍生宰寛寔曖生寓忠寓忠生盛夀興盛生懋左僕射北地王孫煥隋工部侍郎煥生公㺿公㺿生大士唐吏部中書二侍郎大士生逖􅃉逵遜遜司門郎中生季良比部郎中仙州刺史季良生縯縯生撥兼殿中御史逵生子恭潭州司倉恭生澥全柔澥生敦義潮州刺史全柔御史中丞黔中觀察兼御史大夫曾孫虚受朗州刺史生野順濮陽王野順生雄雄生胄右衛大將軍朗陵公胄生仁惠懐簡懐節懐景懐簡吏部員外懐節孫􅀈煒懐景尚書右丞武陵公生彦將暉令暉令生子柔子求彦將給事中陳留太守採訪使生子上子哲子長子長夀興公孫詮生祐禮臣祐曾孫孝綽梓州刺史禮臣汾州刺史懐節孫待聘生琇户部侍郎右丞生佑工部貟外郎夀興少子最司徒樂平王生亶亶生文豪太僕少卿生思齊思哲思元思齊鄭州刺史思哲舒州刺史思元右領軍思元生直南州刺史倍斤生昭昭生元綱元曽孫邕江州刺史無汦榮州刺史綱生經經生宏嗣宏則宏嗣隋黄門侍郎生仁人觀觀易州刺史右武衛將軍生博古述古述古孫晧宏嗣姪孫希古都官貟外孫祥生子端子建子端生善慶師奬善慶孫慈不仕生行冲兵部郎中國子祭酒左常侍中山獻公生允殖允脩允殖和州刺史生軾貨敦元孫徳整生寳藏寳林寳藏魏州總管武陽公生神霽青州刺史寳林生威洛州總管生守真守真生澄湛澄遂州刺史湛生誼饒州刺史誼生申右武衛將軍申生諸兵部貟外諸生從質質生谷菩薩趙郡王孫裕生武榮武幹武榮唐汾州刺史蘄春公曾孫湛試太府卿兼河南尹衡州刺史武幹生大簡陕州長史女為讓帝妃贈少師淑生季海振季海馮翊王司空振六代孫光謙考功郎中給事中紇根生虔陳留王孫建生琛永夀琛孫暉隋兵部尚書暉生仁器永夀生景安北齊太保賜姓髙周復夲姓孫慈政唐卭州刺史生善應司賔卿同州刺史翰秦王生儀􅒀儀七代孫公瞻駕部貟外郎􅒀十一代孫撝謙兼御史三從兄杭少府少監力真生意烈勃意烈生伏千廣川王元孫公濟濟孫福果福果生江乗江乗生攸勃元孫植生巖成巖隋兵部尚書平昌公生琳琳生義恭義端義恭生孝節工部貟外黄州刺史生通理希聲通理給事中生從脩右司貟外郎夀州刺史從脩生至河南少尹希聲中書舍人吏部侍郎生寄夀州刺史義端魏州刺史生延夀延福延景延祚延夀睦州刺史生愷通州刺史延福生怡怡生偕伾偉偕歸州刺史偉三原尉延景生俳南頓丞俳生寛霄寛比部郎中生拒稹監察御史霄侍御史延祚司議郎生平叔綿州長史生挹撝持揖吏部貟外生注洪錫錫生繇銑洪饒州刺史生晦撝太常博士持都官郎中太武帝生景穆帝嗣王生天賜子推新成雲休楨胡兒天賜汝隂王殿侍中生尚書循義按魏書循義作修義右僕射安昌王均孝則孝矩孝方孝整孝則周少師生按此處脱名隋太府卿孝矩隋洛州總管洵陽公生端竭孝方順陽公生韶震韶唐沙州刺史震鄭州刺史京兆王子推生恒芝中書監生昇暹昇江夏王孫孝直渝州刺史暹生澤唐梁州都督新安王生禮誠大智誠生懐式撫州刺史大智生萬頃光賔觀賓萬頃鳳閣侍郎光賔生詢倩倩生正兼監察御史正生義方季方義方鄜防觀察兼御史中丞季方兵部侍郎觀賓少府少監陽平王新成生衍安匡衍廬陵王生叔暢祠部尚書元孫仁虔疊州刺史仁虔生思忠思忠生權廬州刺史權生涉潮泚液液懐州刺史生銅銛銛生宗簡叔暢六代孫邱比部貟外任城王雲生淑紀淑左僕射紀黄門侍郎曾孫旻左武衛大將軍安定王休生爕孫景山唐安州總管宋安公生成夀青州刺史南安王楨孫曄東海王梁武帝立之號建安王曾孫武夀左武衛將軍樂陵王胡兒以天賜子永全繼永全曾孫斌生文儼文俊文儼生利貞鄜州刺史文俊辰州刺史道武帝生淮南王熈熈曾孫繼江陽王生乂羅乂侍中尚書郎羅曾孫靈遵通州别駕明元帝晃案魏書明元帝名嗣晃乃太武帝之太子景穆帝此作明元帝晃與魏書不合生範樂安王生良良生法益滕忻法益梁侍中生願達梁州刺史願達生神力神儼按此下疑脱善㣲一人神威律師神力蒲州總管神儼右衛郎將善㣲右領軍將軍神威杭州刺史律師左驍衛大將軍滕安樂王吏部尚書生榮榮生康慎慎生端端生欽志儉欽荆州刺史元孫彦英藇志儉蘓州刺史成安公慎生禕均禕六代孫時中均曾孫思温鄜州刺史平隂公生若拙徳秀若拙江夏令生亘宣楚等州刺史將作監徳秀魯山令均少子爽隴州刺史忻孫通隋魏州刺史生雄純雄生元敬襄州刺史純卭州刺史太武帝燾生臨淮王太尉譚譚生提建提生祐孚祐孫義遐光禄少卿生仁昉工部貟外孚生子端仲仁子端周納言元孫將茂主客郎中仲仁生將旦莒州刺史建七代孫思莊侍御史獻文帝宏生禧幹雍羽勰咸陽王禧趙郡王幹元孫元景左衛率髙陽王雍生斌端廣陵王羽生欣周上柱國孫巖隋龍涸公羽少子恭憫帝彭城王勰生懿七代孫鼎思州刺史攸孝莊帝生安樂王長樂長樂生詮五代孫師奬鄯州刺史孝文帝宏生廣平王懐五代孫寳琳綏州刺史韓公生顧道明堂令文帝鬱律生烏孤平陽王樂真五代孫孝政隋衡州刺史生仲文季良仲文唐右領軍將軍河南公季良隋雍州司馬生懐唐恒州别駕懐生令表令夲令表工部侍郎司賓卿生欽俗匡欽俗都官郎中京兆少尹令夲生欽㣲樂真次子陵孫按此處脱名莘山王贄大司馬孫徳瑜生干禄鍾離縣令太原唐都官郎中元善禕稱昭成帝後南宮故事云代居太原著姓禕曾孫谷神扶州刺史堂姪俯宋州刺史元孫結容府經略兼中丞生友直為京兆少府紇骨元後魏獻帝與淑長元匹麟為紇骨氏十七代孫紹右司貟外天授中詔改姓元氏是云元隋内史令元夀狀稱景帝後任城王澄子孫避尒朱榮亂投匿是云家因從其姓至隋改姓元氏夀孫元哲開州刺史元質水部郎中生兆殷暢暢生韶河陽節度中丞扶風大厯中書侍郎平章事潁川公元載自云景穆後父景升同敬同按唐書載夲寒㣲母携載適景昇冐姓元氏此脱並不仕代居扶風岐山夲姓景氏或云孫姐氏垂拱初曹王明妃元氏粉田在扶風令昇董其農殖著勞遂改姓元氏生伯和秘書丞仲武祠部貟外季能校書郎袁媯姓舜胡公滿之後字或作爰轅其實一也按左傳晉作爰田外傳作轅田又説文爰籀文以為車轅字古字通也轅頗十一代孫袁生陳郡夏陽縣袁生元孫幹封貴卿侯居陳郡為著姓八代孫良生昌按唐世系表良二子昌璋此脱璋一人昌生安安生京敞京生陽案唐世系表陽作湯陽生逢隗四代五公盛扵東漢璋生滂司徒滂生渙渙生侃侃六代孫宏准曽孫質生宏豹宏元孫翻翻生叔徳豹生洵濯淑濯生棨洵生顗顗生昻昻生君政敬君政生樞憲樞生朗唐給事中憲曾孫續駕部郎中敬孫利貞貟外郎袁氏自後漢魏晋至梁陳正傳世二十八人三公令僕一十七人汝南安後又居汝南至紹術絶矣彭城袁生之後今無聞樂陵東光縣狀稱紹中子熈之後裔孫令喜唐同州治中生異宏異式異宏瀘府参軍生恕已中書令南陽王誨已潞州刺史恕已生建康淮南太守生髙給事中髙生徳師度支職方郎中太府少卿異式户部郎中異式姪曽孫倜偁案唐世系表倜偁皆異式孫無姪曾字倜工部貟外郎生師儉京兆狀云渙之後唐舒州刺史處宏生公瑜公玘玘生暉中書舍人公瑜刑部侍郎生忠臣仲将忠臣左羽林將軍潁州刺史公瑜孫守一監察御史華隂隋左衛將軍袁温案唐世系表袁温作袁子温稱渙之後因官居華隂生士政唐南州刺史曾孫曄丹州咸寧令生滋中書侍郎鄭滑節度生都郊河東唐秋官尚書同三品太原侯袁智宏狀云夲陳郡人孫澣兼御史中丞襄陽狀云袁術敗後子孫分散因居襄陽唐尚書左丞袁仁敬又秘書少監致仕袁歆膳部郎中同直左拾遺袁瓘宋州人樊周太王子虞仲支孫為周卿士食采于樊因命氏今河内陽樊是也周有樊穆仲字山甫樊仲皮樊齊並其後又殷十七族有樊氏仲尼弟子遲魯人盖其後南陽胡陽縣樊齊之後漢有舞陽侯樊噲曾孫嘉為南陽太守因家焉後漢有樊重子宏封夀張侯重迺光武外祖也一宗五侯晉永嘉南遷樊氏居淮南裔孫南齊廣平太守道理生方興梁同州刺史魚復侯方興生文熾新蔡侯文熾生靖猛毅毅陳䕶軍逍遥公猛陳荆州刺史冨順侯生逵􅃉迪􅃉生慶徳唐左司郎中千牛將軍逵孫文司衛少卿文孫晃兵部員外潤州刺史宏裔孫詠制舉及弟今止河東生澤檢校右僕射襄陽節度生宗師宗易左監門中郎樊思賢稱達後今止江陵生沇沇遂州别駕生紬左補闕廬江樊宏之後晉有樊僧逺始居廬江裔孫道則梁越州刺史生儒北齊仁州刺史儒生子車隋户部尚書齊國公孫思孝唐亳州刺史生忱㤾忱户部尚書生禀萬年丞㤾屬州刺史沛國樊噲之後今無聞諸郡諫議大夫樊系潤州人吏部貟外樊元表監察御史樊衡並相州安陽人屯田郎中樊朏洛陽人原周文王第十六子原伯之後封在河内子孫氏焉周有原莊公原伯魯畿内諸侯也魯人原壤陳有原仲晉原軫亦為原氏魯郡兖州今有原氏仲尼弟子憲之後南陽漢有漢陽太守原陽南陽太守原季自陽翟徙茂陵生渉天水太守𦵏父南陽子孫因居之源後魏同出代北其先聖武帝詰汾長子匹孤七代孫秃髪傉檀生賀歸後魏至太尉隴西王魏太武帝曰卿與朕同源因賜姓源氏賀生懐尚書令隴西王生子邕西平樂都官縣案北史源子邕官樂平縣公北討都督此脱悮周隋之際居鄴郡安陽懐後子邕子恭生師並有傳師生崑玉直心誠心崑玉比部郎中生翁歸翁歸生循業少府少監生光裕光垂光賔光譽光裕左丞刑户二侍郎光垂同州刺史光譽户部侍郎京兆尹光裕生洧給事中江陵節度採訪留後使譽生休直心尚書左丞司刑太常伯生乾珍乾曜乾曜侍中左丞相安陽公自師三代左丞四子復弼㓗清復兵部郎中華州刺史弼工部郎中潔河南令清駙馬誠心洛州司馬生禕匡賛乾珍生匡度黄州刺史臨漳公匡度生安都太原少尹禕吏部員外匡賛