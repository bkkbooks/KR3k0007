將軍廉褒生丹大司馬丹孫昭為後漢廣漢太守蜀郡太守㢘范字叔度丹後河東狀云廉范之後唐瀛州刺史方實刑部員外郎廉瓘海州人詹楚詹尹之後有詹何善釣占陳子占之後以王父字為氏潜見姓苑臨川姓苑云今臨川有潜氏黔禮記齊有黔敖又黔婁先生隠者鍼左傳魯大夫鍼巫鍼季箝耳西羌人狀云周王季之後為䖍仁氏音訛為箝耳氏姓氏英賢譜本胡姓天監初有箝耳期凌自河南歸化父同祖光並仕魏為三品也馮翊後魏馮翊太守箝耳静孫康買周御伯大夫聘梁使生文舉周寧州刺史生宗幹宗唐兵部侍郎幹湯隂侯大業中以王后兄弟並改姓王氏已附王氏注文舉弟文固生愉駕部員外後魏伏波將軍箝耳進進生通同周南兖州刺史賜大理稽遂氏隋初復本姓孫恪唐右衛郎中翟道男後魏又有華山太守箝耳德曽孫文衡河州刺史邯鄲男生茂實唐庫部員外生靈丹靈心瞻葛漢張騫使西域從百餘人唯瞻葛氏人得還占尹齊有占尹德又有占尹應堅二十五添兼風俗通衛太子兼之後二十六咸咸邱齊有隠士咸邱蒙見孟子函輿晉范臯夷食采函輿因氏焉二十八嚴嚴芈姓楚莊王支孫以謚為姓楚有莊周漢武強侯莊不識孫青翟為丞相㑹稽莊忌夫子生助後漢莊光避明帝諱並改為嚴氏馮翊稱青翟之後代居馮翊魏郃陽侯嚴稜又徙華隂五代孫君恊唐洮州都督生方約方嶷方約利州司功生挹之損之挺之挹之生丹江陵令生紳綬紳光禄少卿生簡綬檢校司空右僕射挺之中書侍郎生武吏部尚書鄭公武生楚卿越卿鄭卿損之右庶子生式士良士元式職方員外士元國子司業生纂士良江州刺史生謩殿中御史方嶷户部郎中生安之河南丞禮部侍郎嚴善思亦馮翊人生宙宏憲憲大理卿生慥懔愉愉監察御史燉煌青翟後今無聞吳郡貞元給事中同州刺史嚴説生休復膳部員外郎廣漢稱君平之後唐檢校左僕射嚴震世居梓州鹽亭云本望馮翊生恊公貺公弼恊晉州刺史公弼率更令震兄霈生公瑾兼御史弟霔司勲郎中生公衡刑部員外震從祖兄侁兼御史中丞震從祖弟礪檢校左僕射山南西道節度使東海唐穆州刺史嚴撰濟北嚴助之後今無聞二十九凡凡周公第二子凡伯之後為周畿内諸侯見左傳晉陵姓苑云今晉陵有此姓元和姓纂卷五
