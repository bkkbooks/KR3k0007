body:
  text: 元和姓纂卷五下平聲先韻至凡韻唐林寳撰一先燕宏農燕氏廣念燕氏皆漢以來自范陽徙居者天莊子有天根注云人姓名縣風俗通云縣成父孔子門人見史記案孔子弟子縣子成字子祺今家語作子横又有縣亶父字子象見廣韻注又亶史記索隱作豐家語無父字此作縣成父悮漢甘陵相縣芝吳中書令縣㸃先縠晉先縠之後氏焉肩吾莊子肩吾古賢者也晉袁宏集有東海太守肩吾氏㳙濁呂氏春秋夏首人㳙濁梁善畏明失氣而卒按㳙濁又作羌憲填潰莊子有赤張滿按此條誤移於此詳二十二昔赤張姓下二仙宣魯叔孫宣伯之後案宣氏應劭風俗通為宋宣公之後鮮鮮于氏之後或單姓權楚闘緡之後為權氏連齊大夫連稱後綿晉大夫食采綿上子孫氏焉偏古有偏軍按下有脫文鮮于箕子封於朝鮮支子仲食采於于子孫因合鮮于為氏漁陽後漢有京兆尹鮮于裒魏志有太尉從事鮮于案劉虞從事有鮮于輔後事漢為度遼將軍此脱名當即輔也後拜度遼將軍北齊有鮮于榮案齊書鮮于世榮此避唐諱闕世字領軍將軍封夷陽王判右僕射後周懐州刺史鮮于緒生明唐蒲州刺史定㐮公生匡濟匡紹匡濟左騎將軍匡紹閬同何利四州刺史生建業建宗閬中京兆尹劔南節度鮮于仲通云匡紹曽孫也居閬中鮮于偃鮮于惠子鮮于且于延陵吳王子季札居延陵因氏焉趙襄子有謀臣延陵正是其後也案韓非子趙㐮子時有延陵生延州吳季札封延州來氏焉連尹楚大夫連尹襄老之後四宵椒楚大夫越椒之後銚潁川郯陽後漢衛尉安陽侯銚期朝臣日本國使臣朝臣真人長安中拜司膳卿同正朝臣大父拜率更令同正朝臣姓也五肴匏盤匏之後案髙辛氏時有槃瓠此作盤匏未詳所自茅夷邾大夫茅夷鴻之後見左傳六豪臯望出廣陵髙陵秦昭王弟封髙陵因氏焉漢有陳大夫髙陵顯髙堂風俗通齊卿髙敬仲食采於堂因氏焉髙車即九姓回鶻種類也入中國者號髙車氏後魏有髙車觧如陶叔周司徒陶叔之後晉有陶叔真為原大夫文公時陶叔孤漢有陶叔卷為青州主薄平原今平原有此姓陶邱帝堯子居陶邱因氏焉臯落漢武帝時臯落閔通天文地理及厯數案此疑即因落下閎譌以落下為臯落巴郡閬中神仙傳有臯落案此下脫名曹邱漢季布傳有曹邱生毛渾祝融子毛渾之後七歌羅羅氏有齊郡襄陽河東三族哥舒突騎施本號西突厥首領有哥舒部氏焉唐有清道率哥舒沮代居安西生道元安西副都尉生翰天寳右僕射平章事西平王東討先鋒兵馬副元帥生曜晃曄曄尚書東郡汝州節度使案唐書曜官尚書汝州節度使此作􅁮悞􅁮官慶州刺史御史大夫生峘大理主簿峘生皓試案唐書皓試太常卿兼御史中丞蓋皓初試為此官試非名也阿蹊九姓阿蹊部為雞田州都督今單于都䕶振武節度兼御史大夫阿蹊光進元和二年詔賜姓李氏名光顔陳許節度弟光嗣洛州刺史案阿蹊唐書及通志皆作阿跌亦曰訶咥或為􅎤跌此疑悞阿單改為單氏何邱楚有何邱子後魏殿中將軍何邱及敦又列威將軍何邱寄阿史那夏后氏後居㳙兠牟山北人呼為突厥窟歴魏晉十代為君長後屬蠕蠕阿史那最為首領後周末遂滅蠕蠕霸強北土蓋百餘年至處羅蘇尼失等歸化號阿史那開元改為史並具史注長安右衛大將軍寅國阿史那忠節左驍騎大將軍阿史那大節上貞元神策將軍兼御史大夫阿史那思暕並其支族阿史徳突厥如善可汗之裔别號阿史德通天司賔卿澣海侯阿史德元珎右武衛大將軍阿史德多覧並其後也阿伏干改為阿氏八戈波斯西域國人婆衍見姓苑九麻諸越大夫諸稽郢之後余今洪州有余氏沙吒北蕃酋帥舍利部大人因氏焉龍朔中右威衛大將軍沙吒阿傳曾孫葛旃兼御史大夫賜姓李氏名奉國從兄弟澄武衛大將軍沙陀北蕃酋帥也神龍驍衛大將軍郕國公沙陀忠儀案通志作沙吒義蛇邱見英賢傳濟北後漢河内太守蛇邱惑生重濟北太守女適羊續迦葉西域天竺人貞元涇原大將試太常卿迦葉濟𤓰田王莽時臨淮𤓰田儀為盜賊十陽強苻秦録強永強帛姚秦強起斌西陽侯強京並略陽人也扶風唐兵部郎中強寳質孫脩御史中丞户部侍郎其先略陽人也商衛鞅封商君子孫氏焉陽邱楚大夫食邑陽邱以為氏王孫周有王孫滿衛有王孫賈楚有王孫由于漢貨殖王孫大卿陳留耆舊有王孫骨治三禮為博士秦有夏大夫王孫氏始皇時王孫謀王子周大夫王子狐王子城父之後漢有王子中同治尚書王叔周有王叔陳生楚恭王時大夫王叔學鄭穆公時王叔明王官晉有王官無地楚有王官子羽為沄邑大夫將匠風俗通漢官有將匠少府因為氏吳中散大夫將匠或曲陽令將匠熈晉侍御史將匠進梁太史令將匠道秀將閭漢書藝文志云將閭子名莬著書見莊子將鉅漢藝文志云六國時將鉅彰著子書五篇漢章帝時謁者將鉅彌相里咎繇之後為理氏殷末理㣲案里氏之先有理徴此作㣲孫仲師遭難去王姓里至晉大夫里克惠公所㓕克妻司成氏携少子季連逃居相城因為相里氏季連元孫相里勤見莊子韓子云相里子古賢也著書七篇漢有河隄謁者相里斥案漢有河隄謁者相里平此恐悮侍書御史相里武案通志本名虎此避唐諱作武濟隂太守相里祉始居河西前趙録將軍相里覧梁有相里係孫元本仕索虜東平王侍郎大通二年歸化西河隰城相里祉始居焉今汾州相里城是也魏郡冠氏縣祉十一代孫後魏清河太守洛干侯相里僧伽因封始居冠氏縣五代孫諶唐梁卿令潞城公生元亮元將唐逮州刺史曽孫造唐河南少尹生友宏友諒友諒廣陵博士造弟迴太子中允生友略試校書郎梁邱齊大夫食采梁邱因氏焉景公時有梁邱㨿琅邪諸縣漢少府梁邱賀王莽時有梁邱賜梁餘晉下軍御梁餘子養之後衛人也亦作梁于氏梁成漢昭帝時梁成恢善天文梁其魯大夫梁其踁之後英賢傳云魯公伯禽庶子梁其之裔梁由晉有梁由靡漢有將軍梁由先安帝時人梁可後魏上谷公梁可頭又代郡太守梁可浪強梁世本衛將軍文子生真子㑹㑹生強梁因氏焉秦有左庶長校尉強梁臯強牟衛大夫王孫強牟之後見史記商邱衛大夫食邑商邱因氏焉漢有御史大夫秺商邱成髙邑列仙傳有商邱子胥商宻楚大夫以地為氏方叔皷方叔之後見世本漢功臣新夀侯方叔無咎羌憲呂氏春秋夏首南人羌憲梁善畏明失氣而卒常夀英賢傳有熊氏之後世本宋大夫景公時有常夀邦長仲見纂要山陽後漢尚書郎仲長統著昌言案仲長統不姓長仲誤代居髙平晉太宰參軍長仲穀著山陽先賢傳長盧列子楚賢者長盧子著書九篇長狄鄋瞞長狄之後複姓長梧莊子有長梧子十一唐杭後漢有杭徐丹陽太山都尉杭徐代居丹陽琅齊有琅過䘮無定望唐相帝堯之允在周為唐相氏因以為姓焉皇甫子姓宋戴公之子充石字皇父子孫以王父字為氏漢興改父為甫後漢安定都尉皇甫携生稜始居安定稜子彪有八子號八祖皇甫氏為著姓安定朝那縣彪七代孫䡄五代孫璠生誕誕生無逸唐户部尚書滑國公生􅪟􅪟溈州刺史生忠殿中監逸三從弟彬郎中祕書少監䡄子少宏宏元孫和北齊海陵太守生聿道代居滎陽號鄭州皇甫道生萬齡屛度吏部郎中稜七代孫真真元孫椿齡居滎陽號山東皇甫椿齡生瑒瑒五代孫思義思智瑒考功貟外生銛工部郎中又䡄三從弟沉生益興益五代孫元凱商州刺史生德驥蔡州刺史興六代孫公義工部侍郎四從姪思忠卭州刺史夀春稱與無逸同承晉廣魏太守固固子柴徙㐮陽後又徙夀春唐黄門侍郎皇甫文房兄子鏡幾鄰幾知常希莊鏡幾生間案唐世系表間作恂間生岳鄰幾洗馬生憬悰愔愉洛州長史案唐世系表洛州長史下有知常二字此脱生懌悟希莊生翼尚書左丞翼生准鎛宰相生煥案鎛乃愉子此係于希莊下悮又鎛子珪字徳卿此作生煥悮中書舍人福建觀察使樂陵狀云晉徴士謐後安定徙滄州唐監察御史皇甫德參生宣過宣生伯瓊仲玉主爵郎中玉生侁侁尚書左丞生政浙東觀察使生教敏徹教工部員外郎徹蜀州刺史皇子莊子有皇子告敖臧孫魯孝公子彄食采於臧因氏焉僖伯彄彄生哀伯達達生文仲辰辰生宣叔達達生武仲紇為臧孫氏案世本孝公生僖伯彄彄生哀伯達達生伯氏瓶瓶生文仲辰辰生宣叔許許生武仲紇此脱悮臧文魯大夫臧文仲後氏焉臧㑹魯大夫臧須伯㑹之後别為臧㑹氏案左傳臧為生昭伯昭伯從弟臧㑹㑹生賔如賔如生臧石又臧疇臧紇之昆弟臧堅紇之族皆見杜預註此湏伯誤蒼頡論語楚隠者也其後為氏白象風俗通先生古隠者案此有脱悮蒼頡氏當是黄帝史官之後風俗通曰頡衛古之賢人棠谿左傳吳王闔閭弟夫槩王奔楚為棠谿氏漢書棠谿惠治公羊又五官中郎將棠谿典桑邱下邳有桑邱氏十二庚京相史記曰殷後京相氏晉惠帝時有京相機榮叔周大夫榮叔之後漢有大夫榮叔遥平陵史記平陵老之後十四清精縱英賢傳周平王子精别封縱邑因以為氏案此條原本載於屠住氏下今㨿通志改為精縱氏以通志屠住氏之説别録為屠住氏晉有平陽從事精縱宣邪嬰齊出芊姓楚令尹子重曰公子嬰齊後氏焉成陽周有成陽子修黄老術見釋例成王楚成王之後漢中郎成王弼十五青泠音零泠淪氏之後音訛為冷氏江都姓苑云江都人有泠夀光前趙録有徐州刺史冷道字安義貞元兼監察御史冷朝陽吳人陘魯大夫有陘氏之後缻後趙有缻刪青尹楚大夫青尹弗忌宋司城司馬青尹渠青牛魏略初平有青牛先生東山人泠淪黄官樂官泠淪氏之後氏焉按此與前泠淪氏俱非本字蓋出附㑹泠州左傳周泠州鳩之後丁若晉遂興令丁若賢字宏固案風俗通齊丁公子懿伯食采於若因氏焉原本作子苦當是丁若之訛令狐周文王子畢公髙之後有畢萬仕晉孫魏犨武子生顆别封令狐因氏焉生頡漢有令狐邁辟王莽亂居燉煌生稱燉煌效穀縣稱曽孫溥後漢蒼梧太守五代孫馨晋諫議大夫八代孫整周御史正中大夫彭陽公賜宇文氏生熙隋吏部尚書武康公生德棻唐禮部侍郎國子祭酒生循己案唐世系表循己作修己生伯陽又後周河州刺史纂狀稱馨後孫文䡄生思撫思撫唐地官郎中鄭州刺史思挹萬年令又後周晋昌太守令狐儒狀稱云本燉煌人曽孫智通左羽林將軍生俊左將軍開元有丹陽郡司馬令狐滔云熙後生峴峘􅦾峴刑部員外峘禮部侍郎􅦾和州刺史天寳有鄧州録事叅軍令狐章檢校左僕射滑亳莭度霍國公生建運通十六蒸凌衛康叔支子為周凌人子孫以官為姓吳志有都督凌統晉有凌嵩餘杭凌統世居餘杭二子烈封八代孫嵩晉廣陵太守貞元都官員外凌準杭州人云其後也管城唐魏王文學凌敬云統後世居鄭州乘風俗通楚大夫子乘之後以王父字為姓又乘睢古賢人見世本漢煑􅀥侯乘昌案漢表煑棗侯革朱孫昌嗣侯則昌為革氏無乘昌名鄫曽子支庶亦為鄫氏案鄫當出姒姓鄫子之後此悮勝本勝屠氏後世避仇改為勝氏稱漢元帝功臣新山侯稱忠陵陽捜神記陵陽子明上宣城陵陽山得仙其後因山為氏陵尹楚大夫陵尹喜陵尹招之後陵終王莽曽孫翁孺與東平陵終氏有惡案莽曽祖翁孺此作孫悮十七登曽夏少康封少子曲烈于鄫春秋時為莒所滅鄫太子巫仕魯去邑為曽氏見世本巫生阜阜生參字子輿案曽子父㸃字子晳晳生參通志作巫生阜阜生晳父子并為仲尼弟子生元申裔孫偉後漢尚書令廬陵唐亳州治中曽恭狀云曽子後又庫部郎中晉州刺史曽崇頴河東人生叔政隴州刺史滕周文王第十四子