元子名長舉襲父爵此誤道元魏臣云北齊亦誤十四賄隗春秋時翟國隗姓子孫因氏焉天水成紀漢末隗義弟崔崔兄子囂更始御史大夫鄧禹承制以為西州大將軍專制凉州朔方事光武征隗㑹卒王元立其子純明年降汝隂晉有隗紹善易十五海海見姓苑采黄帝封其子於右北平采亭因氏焉北平漢渡遼將軍采皓見英賢傳晉東莞太守采耿至隋漁陽郡主簿采强狀云耿之後也生宣明公敏宣明給事中刑部侍郎生懐敬懐敬吏部郎中宗正少卿生庭芝蘭芝公敏黄門侍郎生泰眷右金吾將軍相州刺史宰周大夫宰周公孔之後以官為姓仲尼弟子宰予字子我魯人也漢有司空掾宰直宰氏范蠡傳云陶朱公師計然姓宰氏案徐廣注計然姓辛氏名銒其先晉國之公子也此作姓宰悮為複姓又悮字文子葵邱濮上人宰父仲尼弟子有宰父黑倍利斛律部别帥倍俟利代人後封孟都公案倍俟利即斛律金之髙祖盖後又分為斛律氏十六軫軫左傳軫國在楚之東南楚屈瑕將盟貳軫注云二國也十七凖尹少昊之子封於尹城因氏焉風俗通云師尹三公官也以官為姓漢尹咸尹賞尹齊後漢尹敏晉尹奉天水姚秦謨謀主尹緯又西海太守尹玖生猛晉昌太守又居京兆六代孫恵唐寧州司馬生恩貞刑戶二部侍郎御史大夫戶部尚書天水公生中和中庸中言中和庫部郎中國子司業中庸平原安定等三郡太守信王傅司正中言京兆府司録後魏燕郡太守尹思曽孫景同浙州刺史生徹隋梓州長史生元備左武候郎將河間稱尹敏之後魏趙州刺史尹虛曽孫䡄隋貝州刺史上蒙公生勢唐嘉州刺史生仁宏仁徳仁宏潞州司馬長樂公生元叔元貞元凱元貞生日昇鄭州刺史光禄少卿元凱左史鳯閣舎人仁徳吳王戶曹生元繹元超元徽子羽子産子羽洛陽丞宣州别駕子産澧州刺史元徽比部郎中楚州刺史後魏太子洗馬尹翼六代孫朗生正理左拾遺商州司馬正義度支郎中宋州刺史樂城後魏太學博士尹珍孫式隋長寧王長史生文憲中書舎人給事中生奭祠部郎中給事中又禮部員外尹知章絳州翼城人尹格之後又有古尹姓之戎居𤓰州按古今人表有堯師尹夀又左傳作允姓之戎允允格之後尹午楚大夫􅅝尹午之後又楚大夫尹午子叔二十阮阮殷有阮國在岐渭之間周文王侵阮徂恭見毛詩子孫以國為姓偃少昊孫咎繇生於曲阜是為偃姓國語云舒庸舒鳩並偃姓也圈風俗通云楚鬻熊之後一云本姓􅃃氏鄭穆公之後秦末為博士避難改為圈氏陳留後漢末有圈稱字㓜舉撰陳留風俗傳又有圈宣明郭林宗傳有陳人圈文卷琅邪陳留風俗傳云陳留太守琅邪卷焉本姓圈氏因避仇改去口娩古萬字人姓見纂要文偃師出自媯姓陳悼太子偃師為公子招所殺裔孫以王父字為氏元和姓纂卷六
