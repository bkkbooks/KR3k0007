body:
  text: 元和姓纂􅃃六上聲董韻至阮韻唐林寳撰一董董黄帝之後已姓國有叔安生董父舜賜姓董氏晉有董安于漢有董仲舒清河廣川人後漢有犍為人案通志後漢有董宣董鈞宣陳留人鈞犍為人此蓋脱名晉有董京董養隴西漢江都相董仲舒少子安子孫自廣川徙隴西裔孫繇生昭昭七代孫徳林北齊匡城令又居匡城曽孫寳亮安西都䕶隴州刺史天水公生元質元珎元質右門監將軍生憬忱愼恒惲憬軍器監生珣琬瑜琬度支郎中晉陵太守江南東道採訪使慎右常侍生璿恒通州刺史隋驍騎將軍順政公董純純孫恭訓唐海陵縣令宏農隋有隨州司馬董泚生慶慶生感感生敬元倉部郎中幽州刺史生庭琰河東狀云仲舒之後唐右僕射平章事董晉生全道溪全素澥全道殿中少監溪倉部郎中全素太子中書舎人按唐世系表澥太常寺太祝范陽京兆尹董叔經右史董思恭范陽人檢校司空平章事秦亦范陽人大厯賜姓李氏改名忠臣從朱泚反伏誅孔孔姓殷王帝乙長子微子啓受封於宋弟微仲衍曽孫愍公生弗父何何生宋父周周生世父勝勝生正考父正考父生孔父嘉子孫以王父字為氏孔父生子木金父木金父生睪夷父睪夷父生防叔仕魯為大夫生相夏夏生鄒叔梁紇紇生邱仲尼三歳父卒十九歳娶宋亓官氏一嵗生鯉字伯魚孔子為魯司㓂攝相事居鄒邑平鄉闕里魯哀公十六年卒年七十二伯魚年五十先仲尼卒伯魚生伋字子思子思為魯繆公師作中庸及子思子四十七篇以祖業授弟子孟軻等伋生子上白白生子家求求元孫允為魏相生鮒為陳渉博士五代孫吉封宋公吉八代孫潜潜生竺吳南昌太守允次子騰騰生襄襄生忠忠生武安國按唐世系表武生延季大將軍太傅延季生覇武孫覇生漢丞相博山侯光㑹稽山隂後漢末潜避地㑹稽遂為郡人潜子竺生恬愉晉僕射餘不亭侯生誾安國誾生晉尚書令靖靖五代孫奐陳吏部尚書生紹安唐中書舎人生搆搆生若思禮部侍郎仲思給事中若思生至著作郎搆弟禎禮部員外安國晉左僕射五代孫範陳都官尚書範從祖弟徳仁仁孫唐端州刺史竺次子冲七代孫梁都官尚書休源源曽孫徳紹徳紹生唐膳部郎中昌太子賔客述睿述睿生敏行魯國武孫覇覇曽孫均漢封裒聖侯晉封奉聖侯魏封崇聖侯隋汴侯唐朝裒聖並奉孔子祀武徳時均十六代孫褒聖侯徳倫徳倫曽孫褒聖侯齊卿仲尼三十八代孫下博狀云本出魯國十七祖漢下博侯陽因居冀州下博裔孫唐國子祭酒曲阜子穎逹生志元志約志亮志元國子司業生恵元國子司業後拜春官侍郎生立言眘言立言祠部郎中眘言黄州刺史志約禮部郎中生琮洪州都督志亮中書舎人生珪頴逹族元孫巢父給事中御史大夫兄子戣戡戢戣給事中戡殿中御史戢庫部員外常山處州刺史孔令斌代居恒州生垂寳河内尉南陽本梁人云仲尼之後孔愉從弟羣官至御史中丞生沈沈孫琳春秋衛卿孔圉生悝鄭穆公公子嘉字子孔子孫亦為孔氏孫張並不詳其後孔父宋大司馬孔父嘉亦為孔氏按此係雙姓誤為郡望二腫鞏左傳周卿士鞏簡公晉鞏朔漢侍中鞏攸陽翟唐户部郎中鞏宏武陽翟人三講項左傳云滅項公羊傳曰為齊桓公所滅子孫以國為氏項槖八嵗服孔子項燕下相人為楚將子梁梁兄子籍號西楚覇王項他項伯項襄並籍之族也漢初並封侯賜姓劉氏隴西金城後周有項亶周武帝賜姓辛氏孫義周唐屯田郎中四紙紙左傳楚左紙相之後按左傳楚無紙相是吳志云是儀本姓氏孔融嘲儀曰氏字民無上乃改為是因姓是焉仕吳官侍中都亭侯天寳秘書少監是光又改姓齊氏錡左傳殷人六族有錡氏漢書藝文志洛陽錡華後漢荆州刺史錡嵩倚漢四皓隱商山號倚里先生倚相氏後案漢書顔師古注作綺里季此作倚里先生未詳所本骫纂要文云人姓史記夏后氏姓蔿晉士蔿之後以王父字為氏䦱國語有䦱大夫薳左傳楚大夫薳章之後有薳子馮薳掩􅇗楚姓祝融子季連之後漢初楚懐王孫心項羽封為楚懐王後為義帝南郡隋右衛將軍芊雄曽孫端唐金吾將軍技也西部大人代為酋帥後魏初各依舊號為技也氏後魏䕶軍將軍臨江伯技也鍮石生說詖内部尚書孫爾歸生平右衛將軍生恭長文義北齊侍中隋信州捴管新寧公文義生旻唐鳴水令恭隋丹州别駕生寳倫唐興國别將尒朱其先契胡部落大人代為酋帥居尒朱川因以為氏後魏有羽健秀容三百里封之以為世業尒綿魏蠕蠕渠帥綿他㧞尒綿來降改為綿氏是婁南燕有徐州刺史是婁盧是賁改為兒氏是云改為髙氏是奴改為封氏芉尹楚大夫芈尹申無宇之後五旨履見姓苑娝方几反見纂要文云人姓壘後趙録有壘澄本姓裴改焉水邱吳興人六止史周太史史佚之後以女弟為戾太子良娣生史皇孫進進生宣帝恭子髙元建康史氏今𨽻酒泉郡史丹裔孫後漢歸義侯苞之後至晉永嘉亂避地河西因居建康苞裔孫寧後周安政公生祥隋城陽公祥弟雲期雲生令卿唐祠部郎中杭州刺史宣城丹孫均均子崇自杜陵受封溧陽侯遂為郡人崇裔孫宋樂鄉令瓌瓌九代孫務滋唐納言溧陽子孫翽御史大夫又江州刺史史道元亦云崇之後也髙宻史丹之後有史曇曇曽孫節唐禮部侍郎京兆丹裔孫㼅留長安隋左領大將軍萬嵗狀稱㼅十二代孫寳唐鄜州都督原國公陳留考城今𨽻曹州後漢京兆尹敞生弼今無聞河南本姓阿史那突厥科羅次汗子生蘇尼失入隋封康國公懷徳郡王生大柰子仁表駙馬生忠左驍衞大將軍薛國公忠生晡宋州刺史晡生思元右金吾大將軍思元生震晉巽泰震右監門將軍生宏寧寂容寧寂生備容冀王傅巽光禄少卿泰蜀州刺史生寅審審吉州刺史姒官氏志渴侯氏改為姒氏紀姜姓炎帝之後封紀為齊所滅以國為姓漢有紀信弟成子通封襄平侯丹陽秣陵吳有紀隲生瞻晉侍中驃騎大將軍天水上邽隋司農少卿紀和整生士騰隋翼州刺史士騰生儼及儼唐雍州司倉參軍生先知先知生逡吏部郎中給事中判御史中丞生黄石黄石生經户部郎中經生謙咸及荆州刺史生處訥地官侍郎太府卿平章事侍中千乘伯士帝堯之允杜伯之子隰叔為晉士師至士蒍生伯成缺缺生㑹㑹子孫氏焉後漢末交阯太守士爕河南隋刑部侍郎案此脫名士燮後生義總唐户部郎中杞姒姓夏禹之後周武王封東樓公於杞後為楚所滅子孫氏焉齊郡齊有把殖字梁今齊州有杞氏俟風俗通俟子著書六國時人河南後魏獻帝以次子為俟亥後改為俟氏官氏志俟奴氏改為俟氏子帝嚳之允殷湯子姓風俗通云左傳有子鉏商按左傳叔孫氏之車子鉏商杜注車子微者鉏商名此文傅㑹不合鄭大夫子人九里本理氏春秋時改焉晉有里克魯有里革鄭有里析後居襄城者又為里相理咎繇為堯理官子孫遂為理氏殷宋有理徴恃齊有恃乙管仲誅之子玉衛大夫子玉霄之後秦穆公時大夫有子玉房子桑魯大夫子桑伯子之後見論語秦公孫枝字子桑其後氏焉莊子有子桑樗子我曹叔孫成子生申為子我氏衛大夫有子我羽人子叔世本魯文公生恵伯叔肸叔肸生聲伯嬰齊嬰齊生叔老子叔子叔生叔弓叔弓生仲南文楚及伯張穆伯定伯為子叔氏子夏陳宣公生子夏其姨生御叔己師己師生子南徴舒徴舒生恵子晉晉生定子御㓂為子夏氏子有魯有若字子有之後見禮記宋有子有恭叔子雅齊恵公孫子雅之後見英賢傳又魯季桓子生武叔竈亦為子雅氏霄為齊上卿子囊左傳齊大夫子囊帶之後子家魯公族子家氏魯大夫子家羇懿伯子革世本宋司城子革之後又曰季平子支孫為子革氏子州莊子堯以天下讓子州支父舜以天下讓子州支伯子孟魯公子孟之後見英賢傳齊簡公時子孟卿為大夫子建楚平王太子建之後頃襄王時有子建叔子為大夫子伯左傳衛大夫子伯季之後魏有子伯先子夏門人居西河子庭芉姓楚公子午字子庭後又子庭氏魯大夫以字為氏子尚世本陳僖子生廪邱子尚意兹因氏焉國語鄭大夫子尚伯文子彊衛公族昭子郢之後按此疑亦採自世夲子郢世本衛公族昭子郢之後子寤陳僖子生宣子其後為子寤氏子輿陳桓子生子石難為子輿氏子干魯季平子干叔彭侯之後案古今姓氏辨證云此條姓纂有氏無觧此句係後子成氏之文誤繫於此今子成氏條亦遺失子季楚公族也子羽晉公族子羽後為楚邑大夫子陽魯公族有子陽者其後以王父字為氏子尾齊恵公生子髙祁祁生子尾蠆因氏焉子重楚公子重字嬰齊子重之後子午世本楚公子午之後齊大夫子午明子旗齊恵公孫欒施字子旗子孫以王父字為氏子獻世本陳桓公孫子獻之後風俗通云齊大夫子獻之後楚文王時子獻遼為大夫子乗楚屈蕩生子乘因氏焉子華莊子韓有子華子因氏焉子言季平子生昭伯窹之後也子齊衛公族子齊氏子蕩世本宋威公生子蕩因氏焉子枋陳僖子生穆子安為子枋氏子宋陳宣公生子楚其後為子宋氏子扁莊子有子扁子子工世本齊頃公子子工之後子鞅陳僖公子生簡子齒為子鞅氏子揚世本季桓子生穆叔其後為子揚氏子芒世本陳僖子生子芒盈因氏焉士孫漢書平陵士孫張為博士揚州牧明梁邱易生仲徹長安令左馮翊生苞苞生充曽孫奮為郡五官掾六代孫眭後漢宏農太守生瑞尚書令瑞生萌字文始儀郎灌津侯生賢頴士蒍隰叔生士蒍為晉士官案士官當是司空字誤支孫因為氏士思古今人物表晉有士思癸鄭有士思卜秦將軍士思穆士丐晉大夫士丐之後士吉晉大夫士蒍生吉為士吉氏士成莊子有士成綺也士弱晉士莊子弱為獄官晉人謂之士弱氏士華齊隱者士華太公誅之案太公誅華士非士華亦非姓史葉韓例云衛頃侯之後公子史食采於葉因氏焉左傳作史華按韓例未詳史晁世本衞史晁之後似和貞觀左屯衛榖州刺史似和泥熟亦北蕃歸化也案通志泥熟乃蘇農氏此作似和悮又開元中有左威衛大將軍赤水軍副使武威公似和舒市南楚有市南熊宜僚後以為氏己氏宋大夫司馬己氏之後俟吕鄰改為吕氏七尾尾魯尾生或云即微生髙也尾勺後漢尚書郎尾勺携吳志云尾勺子張昭師也八語許姜姓炎帝四嶽之後周武王封其裔孫文叔於許後為楚所滅子孫分散以國為氏晉許偃楚許伯鄭許瑕髙陽北新城縣今入博陵郡漢大司農許據生允魏中領軍允孫式式長子皈按唐世系表皈作販生晉徴君詢詢元孫懋有傳懋孫善心隋黄門侍郎生唐中書令髙陽公敬宗敬宗生昻昇昱杲景昻虔化令生彦伯韶伯彦伯太子舎人生望右羽林將軍望生逺侍御史睢陽太守逺生峴袁州刺史韶伯左屯衛將軍蘇州刺史平思公昇明堂令景工部郎中判羽林大將軍式次子邁晉東海太守號北祖曽孫彥後魏侍中相州刺史孫安中書侍郎生恂惇恂曽孫本行唐給事中遜生文宗按遜字上有脱文文宗下應有智玉文通文宗生正言唐監察御史智玉生知禮殿中御史文通生向葱監察御史惇字季良北齊左僕射生文紀汝南平輿縣後漢功曹許邵居邵陵縣漢太尉祭酒許慎今並無聞安陸狀稱詢五代孫君明梁楚州刺史入周徴不起法光案唐世系表君明生宏周宏周生法光與此不符岳州刺史生紹唐陜州刺史譙公生善伯裔智仁圉師善隋宣城郡主簿生力士洛州長史案唐世系表長史作刺史生欽寂欽明欽淡欽寂䕫州長史生輔徳輔乾輔乾右金吾大將軍光禄卿生諫論詵諷諫河南丞論監察御史詵歸州刺史諷監察御史輔徳宕州刺史欽明凉州都督安西大都䕶生戒言戒非戒惑都官郎中鴻臚少卿生子房季常子端