body:
  text: 提要元和姓纂十巻類書類臣等謹案元和姓纂十巻唐林寳撰寳濟南人官朝議郎太常博士序稱元和壬辰嵗盖憲宗七年也寳唐書無𫝊其名見於藝文志諸家書目所載並同惟唐㑹要稱王涯撰盖以涯曽作序而訛鄭樵通志又稱李林寳撰則因李吉甫命寳作是書當日二名連書傳冩脱去吉甫字遂併為一人觀樵姓氏畧中譏寳作姓纂而不知林姓所自出則藝文畧中本作林寳可知也焦竑國史經籍志亦因之作李林寳悞之甚矣其論得姓受氏之初多原本於世本風俗通其他如世本族姓記三輔决録以及百家譜英賢𫝊姓源韻譜姓苑諸書不𫝊於今者頼其徵引亦皆班班可見鄭樵作氏族畧全祖其文盖亦服其該博也但寳以二十旬而成書援引間有訛謬但當矜尚門第之時各據其譜牒所陳附㑹攀援均所不免觀白居易集自叙家世以白乙丙為祖而云出自白公勝顛倒時代悖謬顯然其他可知洪邁容齋隨筆稱元和姓纂誕妄最多盖有由也然於唐人世系則詳且核矣書至宋已頗㪚佚故黄伯思東觀餘論稱得富弼家本已闕數巻陳振孫書録觧題亦稱絶無善本僅存七八此本載永樂大典中皆割裂其文分載於明祖御製千家姓下又非其舊第幸原序猶存可以考見其體例今仍依唐韻以四聲二百六部次其後先又以宋鄧名世古今姓氏辨證所引各條補其闕佚仍釐為十卷其字句之訛􅍝則叅校諸書詳加訂正各附案語於下方至原序稱皇族之外各以四聲類集則李姓必居首巻今獨無一字之存殆修永樂大典時已佚其第一冊歟然殘編斷簡究為文獻之所徵也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書元和姓纂目録卷一上平聲一東馮洪弓熊童僮中崇嵩茙躬宫雄肜公酆蒙紅鴻翁通鬷种東里東方東樓東郭東陽東邱東宫公石公士公山公沙公孫公伯公父公成公齊公析公索公祖公休公孟公明公賔公正公之公乗中行中英中野中壘中黄桐里桐門銅鞮戎子終利終古熊率熊相二冬彤宗冬日宗正三鍾鍾封龍雍容松庸重恭龔從共鍾離逢孫逢門封貝封父封人龍邱雍人共叔四江江龎涳雙逄卷二上平聲五支支隨枝皮媯竒羲戲儀驪卑訾斯彌猗馳池眭蕃彌且戲陽差師六脂伊郗祁師資飢尸􅀈麋邳㔻伊婁祁夜師子師祈師宜夷鼔夷門尸遂葵仲七之時怡旗蘄狸菑治蚩慈司馬司徒司城司㓂司功司掲司工綦母綦連期引熙氏釐子茲母八微韋奜非肥賁幾畿歸微生飛亷圍龜九魚魚徐閭舒居渠蘧余餘輿胥疏樗儲如沮魚孫諸葛諸梁閭邱沮渠渠邱渠複於陵於邱舒鮑舒堅舒鳩余邱茹茹樗里徐吾徐盧如嵇十虞虞于須愚禺芻毋巫瞿殳符苻臾俞扶俱朱虞邱巫馬巫咸巫臣無婁無圉無鈎無弋毋將毋終須遂須肑須卜厨人邾婁夫餘卷三上平聲十一模盧胡吳蘇蒲烏狐屠蘆壺吾辜軤苸胡母胡非胡掖呼延呼母呼衍蘇農蒲盧蒲圃屠羊屠住盧蒲吾邱壺邱徒人孤邱姑布烏蘭烏石蘭烏那羅烏洛蘭十二齊齊黎稽嵇奚鞮遆兒倪西犀鮭􅞺毒􅦂齊季西方西門西乞西鉏西申西陵西周西宫十四皆淮夷十七眞眞陳秦辛甄申仁神新堇賔頻邠茵申屠申徒申鮮辛相賔牟十八諄荀郇鈞春淳于十九臻莘二十文文雲員芸云軍薫聞人軍車卷四上平聲二十一殷殷二十二元元袁樊原源垣爰溒園轅軒言原仲二十三魂孫温渾昆尊罇屯盆坤温孤温伯昆吾孫陽盆成奔水門尹屯渾尊盧二十四痕根根水二十五寒寒韓單蘭檀安干但丹姍邗邯鄲韓言韓籍韓嬰韓侯韓獻安期安平安都安是干巳二十六桓桓潘盤莞二十七刪闗顔班環菅馯闗龍顔成二十八山山間卷五下平聲一先燕天縣肩吾先縠㳙濁填潰二仙宣鮮權連綿偏鮮于延陵延州連尹四宵椒銚朝臣五肴匏茅夷六豪臯髙陵髙堂髙車陶叔陶邱臯落曹邱毛渾七歌羅哥舒阿蹊阿單何邱阿史那阿史徳阿伏干八戈波斯婆衍九麻諸佘沙咤沙陀蛇邱迦葉𤓰田十陽强商陽邱王孫王子王叔王官将匠将閭将鉅相里梁邱梁于梁成梁其梁由梁可强梁强牟商邱商宻方叔羌憲常夀長仲長盧長狄長吾十一唐杭琅喪唐相皇甫皇子臧孫臧文臧㑹蒼頡棠谿桑邱十四清精縱嬰齊成陽成王十五青泠陘缻青尹青牛泠淪丁若令狐十六蒸凌乘鄫勝稱陵陽陵尹陵終十七登曾滕恒騰宏滕叔宏農十八尤周劉牛邱游鄒裘仇謀州郵優留攸犨儔疇求􅂒由吾浮邱修氏修魚邱敦鳩摩仇尼周史舟相取慮十九侯侯婁樓僂歐甌緱句歐陽侯史鈎弋羺羊二十一侵侵林岑任陰金琴湛郴箴尋鐔鄩斟霠林閭箴尹沈猶斟戈二十二覃叅南宫南公南郭南伯南史南門甘士藍尹二十三談三伉三閭三烏三邱三苗三州三飯二十四鹽閻㢘詹占濳黔鍼箝耳瞻葛占尹二十五添兼二十六咸咸邱函輿二十八嚴嚴二十九凡凡卷六上聲一董董孔孔父二腫鞏三講項四紙紙是錡倚骩蔿䦱薳芉技也尒朱尒綿是婁是賁是云是奴芉尹五旨履娝壘水邱六止史姒紀士把俟子里理恃子玉子桑子我子叔子夏子有子雅子囊子家子革子州子孟子建子伯子庭子尚子彊子郢子寤子輿子干子季子羽子陽子尾子重子午子旗子獻子乘子華子言子齊子蕩子枋子宋子扁子工子鞅子揚子芒士孫士蒍士思士丐士吉士成士弱士華史葉史晁似和市南巳氏俟吕鄰七尾尾尾勺八語許褚吕旅汝處所楚莒吕管吕相楚季楚邱莒子九麌武庾輔鬴羽禹豎主萭宇文武安武城武彊武仲武羅甫奚豎侯羽弗主父庾采十姥杜魯祖古扈五堵普苦皷浦補五鳩五里五鹿吐萬吐奚吐賀吐突吐難古成古野古孫苦成苦乆仵城魯陽祖南補禄吐谷渾十一薺禮啟十二蟹解解瑟羅可足渾可朱渾十四賄隗十五海海采宰宰氏宰父倍利十六軫軫十七凖尹允尹午二十阮阮偃圏卷娩偃師卷七上聲二十一混本二十三旱罕夷二十四緩管纂琯二十五澘阪上二十六産産棧簡二十七銑典洗二十八獮展蹇雋免善鮮陽二十九篠蓼鳥俗三十小趙矯蟜繞小王小施擾龍趙陽表黎三十一巧鮑絞三十二皓棗老保昊浩星浩生老成老萊老陽老城三十三哿左我左人左史左尹可沓可地三十四果火㧞三十五馬馬賈夏馬師馬適馬矢虵咥夏侯夏父夏后夏里社兆三十六養掌仉鞅賞􅯵長孫上官壤駟三十七蕩党汻廣廣成三十八梗丙景邴秉猛永梗陽邴意三十九耿耿四十静靖井四十四有有栁侴咎灸棸羑酒有扈有偃右歸右尹右史右宰右将九方夀西臼季四十五厚茍口耦郈毋邱四十七寝沈審枕沈尹四十八感昝昝盧坎氏四十九敢啖五十琰冉染奄斂檢􅀢五十三檻撖五十五范范卷八去聲一送仲貢二宋宋統三用雍用四絳絳巷五寘賜刾義智戲譬厯辰六至季摯駟冀祕肆利遂貳翠匱備季孫季連季融季隨季騧季夙季嬰季尹四飯地駱枝七志意侍其寺人事父意如八未魏費尉貴既緯魏强蜚亷九御御恕據鑢茹御龍庶其庶長十遇遇樹附鑄務喻具住樹機樹黎務成趣馬具封十一暮路露歩庫顧度潞慕容慕利慕輿庫狄庫成素和路洛歩大汗庫傉管庫六斤大洛稽破六韓破也頭十二霽惠昋計薊勵税羿杕第五第八荔菲十三祭衛芮彘裔祭北十四泰蔡艾頼大㑹太帶兊太傅太陽太士太師太伯大羅大季大臨蔡仲十五卦解北十六怪祭蒯介十七夬快卷九去聲十八隊背内史十九代代戴能佴載二十一震晉藺進遴允信都二十三問奮運二十四焮靳二十五願蔓獻建曼邱二十六慁論頓二十八翰幹幹獻二十九換叚灌爨冠冠軍三十諫晏諫豢龍三十一襇蕳三十二霰燃練見薦縣潘三十三線卞賤單眷變戰三十五笑邵少召邵皓召伯少室三十六效校孝三十七号郜暴浩漕嫪到好三十八箇賀賀㧞賀蘭賀遂賀悦賀術三十九過播四十禡華謝射柘􅰤舎晉舎利謝邱下軍亞飯四十一漾向暢諒上尹上成四十二宕伉四十三映孟敬慶竟慶師四十五勁鄭盛聖正令四十六徑甯四十七證乗馬四十八嶝鄧鄧陵四十九宥富廖副舊就晝右授富父廐尹五十候竇寇鬭鏤鬭文鬭門鬭班鬭耆豆盧五十二沁禁五十四闞闞五十六㮇念五十八鑑監六十梵汜卷十入聲一屋陸穆麴祝伏鞠鹿叔木肅卜宿谷沐竹服禄竺鬻秃郁玉夙潚牧􅪿屋廬屋南屋引叔孫叔夜叔帶叔向叔敖叔達叔服叔夙叔魚獨孤祝其祝固祝史榖梁濮陽斛律斛斯秃髪夙沙甪里陸終福子牧師宿勤木蘭谷吐渾宿六斤獨孤渾二沃沃督僕褥鵠三燭續束曲粟蓐頊續祈四覺樂卓學朔朴樂正樂王樂尹樂利五質畢吉乙帥郅栗宓漆實帙漆雕室中乙弗乙干疋婁叱奴悉君宻革叱伏列六術術䏘八物屈茀􅞣鬱尉遲屈突屈侯屈南不更不蒙不夷佛圗弗忌勿忸于九迄乞扶十月越闕越椒越勒越質詰十一没兀杌紇干紇骨紇單紇奚没鹿回骨咄禄突黎人紇豆陵十二曷葛逹葛伯達奚逹歩達勃鶡冠褐餘渴單十三末末脱㧞略末那樓十四黠滑察滑伯十六屑齧節鐡伐鐡弗十七薛薛列悦説舌别薛孤揭陽列禦列宗啜刺悦刀渴燭渾十八藥藥約若干矍相十九鐸鐸郭霍郝駱閣索鄂薄莫幕作落絡洛恪鐸遏莫者莫折索盧落下拓王拓䟦諾護莫且婁莫侯婁莫多婁莫胡盧莫多那二十陌栢翟郤格劇伯赫伯成伯比伯昏伯夫伯夏伯宗柏侯白馬白石白狄白鹿白楊堤二十一麥麥獲革麥邱二十二昔石席昔易藉射奭赤夕適釋辟閭石駘石之石伯赤張赤章二十三錫狄酈戚錫㲻糴析析成二十四職稷職力棘息翼食嗇即即利稷邱弋門二十五徳國塞勒北人北宫北鄉北郭北唐北門北髪北殷北野万俟黒齒黒肱二十六緝習汲邑裘二十七合合二十八盍蓋二十九葉聶輙㨗接葉葉陽接輿􅎤跌三十怗莢牒云三十二狎甲甲父三十四乏法元和姓纂原序元和壬辰嵗詔加邉将之封酬屯戍之績朔方之别帥天水閻者有司建苴茅之邑於太原列郡焉主者既行其制閻子上言曰特蒙渙汗恩沾爵土乃九族之榮也而封乖本郡恐非舊典翌日上謂相國趙公有司之誤不可再也宜召通儒碩士辯卿大夫之族姓者綜修姓纂署之省閣始使條其源系考其郡望子孫職位並宜總緝毎加爵邑則令閲視庶無遺謬者矣寳末學淺識首膺相府之命因按據經籍窮究舊史諸家圖牒無不叅詳凡二十旬纂成十卷自皇族之外各依四聲韻類集每韻之内則以大姓為首焉朝議郎行太常博士林寳撰元和中政平刑清聖作賢輔盡雍容揚揄之羙成緝熙愷樂之化相國趙國公式是古訓毗于大君當八方之樞總萬物之㑹嘗以為聖明臨照思盡物宜每與羣公拱承顧問将謂經之於思慮不若著之以文詞著之以文詞不若騐之於圖牒昔漢祖所以知郡國豐耗山川險夷以蕭何得秦圗書可披而按之故也大凡邦國之㑹計可以備應對者著元和國計簿地形之逺近可以知要害者著元和郡邑圗洎百執事所蒞之司士大夫所分之𨽻族無不窮究其本末申明其憲度今之姓纂即其一也趙公嘗創立綱紀區分異同得之於心假之於手以授博聞强識之士濟南林寳實該覽六藝通知百家東漢有紬書之能太常當典禮之職其為述作也去華摭實忘麄得精條貫禀大賢之規網羅盡天下之族雖范宣子稱其世禄司馬遷序其先業若掲日月備於縑緗昭昭然蔑以加此矣以涯嘗學舊史繆官綸閣授簡為序不敢固辭無能發揮承命而已矣元和七年十月中大夫行兵部員外郎知制誥王涯述
