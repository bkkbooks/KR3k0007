body:
  text: 元和姓纂卷三上平聲模韻至文韻唐林寳撰十一模盧姜姓齊太公之後至文公子髙髙孫傒食采於盧因姓盧氏秦有博士盧敖漢有燕王綰沛人范陽涿縣後漢尚書慎案漢有中郎盧植范陽人此慎字疑即植字之訛敖之後珽晉侍中生志中書監生謀司空從事中郎四世有傳生諶二子朂偃按後漢盧植子毓魏司空毓子欽晉衛将軍欽子浮秘書監欽弟珽衛尉卿珽子志軍諮祭酒志子諶依劉琨為從事中郎姓纂云謀諶字誤也又諶之外有謀諶之子朂偃晉書皆未見朂號南祖偃號北祖朂偃曽孫元生遷按唐世系表元生度世字子遷此作遷疑避唐諱生四子陽烏敏昶尚之又號四房偃中子昭昭元孫辯景裕景先兄弟三人為魏周齊三國帝師濮陽状云秘書監盧浮後魏許昌太守盧曽自陳留徙濮陽又從孝武入關曽生怡周譙州刺史生士謐士叡士良晉絳二州刺史生師直司僕少卿士宏度支郎中趙州刺史龍門唐左常侍盧䖍状云偃子闡後又徙晉州子從史弋陽光山縣唐瀛州刺史祖尚自云本范陽人本姓雷氏後周初以雷盧聲相近改姓盧氏三原倉部郎中盧雲本姓閭氏􅨈蜀州司馬上元中准制改姓盧氏胡帝舜之後胡公封陳子孫以謚為姓安定漢有胡建始居焉後漢有太尉胡廣魏胡質荆州刺史生威清州刺史平春侯又居淮南文按文疑晉字之誤晉胡奮安定臨涇人官至左僕射左僕射胡奮石季龍入關與梁皇甫韋杜牛辛皆以華胄不在戍役之限奮裔孫國珍後魏司空女為宣武帝皇后生孝文帝珍兄真曽孫延北齊太宰安平王女為武成帝皇后生後主緯長安隴東王長懷長穆長洪長咸長興並封王洪子文同武帝皇后生孝文帝珍兄真按武帝至兄真十一字衍唐綿州萬安令新蔡胡奮之後今無聞已上舊望弋陽定城唐刑部郎中胡元禮義陽中州唐鳳閣侍郎胡元範洛陽秘書少監胡皓稱洛陽人鄠縣刑部侍郎胡演樂陵兵部員外胡曼倩今大理少卿胡珣恒山代州總管定襄郡王胡大恩賜姓李氏河東開元中胡瑜弟瑱玘並舉進士瑜生諤瑱生諒大理評事諤右司郎中生溵湘洵潘潘生裳吉河南官氏志獻帝與鄰以無紇骨氏改為胡氏按魏書獻帝以兄紇骨氏改為胡氏無字應作兄字吳周太王子太伯仲雍封吳後為越所滅子孫以國為氏季札之允居齊魯間濮陽鄄城漢有長沙吳王芮後漢有廣平侯吳漢南陽宛人也桓帝時吳遵遵孫質質六代孫隱之晉廣州刺史其先祖自濮陽過江居丹陽厯仕江左七代孫景達唐尚藥奉御曽孫令珪贈太尉女即章敬皇太后也珪子漵澄湊漵左金吾大将軍太子詹事生士則士平士隣士矩士則伊闕令士矩京兆司録澄駙馬殿中監生士彦駙馬衛尉卿士彦生同正湊京兆尹右金吾大将軍檢校刑部尚書生及大理評事果州刺史吳敬仲亦云隱之後孫訴侍御史訴孫損震諫議大夫和蕃使渤海芮後齊道州别駕安誕居鄴縣五世孫道師唐吏部侍郎孫納安州刺史又考功員外郎安慶亦稱渤海人陳留状稱後漢河間相吳祐後隋有吳響生子臧見劉氏行年記臧曽孫兢左庻子恒王傅蘇顓頊祝融之後陸終生昆吾封蘇鄴西蘇城是也蘇忿生後至建生武嘉十二代孫則則次子遁八代孫綽周度支尚書邳公生威隋左僕射房公生夔季按唐世系表季作季子夔隋鴻臚少卿生朂亶朂駙馬吏部侍郎秦府學士生均幹均䖍州刺史生儁幹工部尚書生獻駕部郎中朂生昱濟州刺史亶台州刺史生瓌琛瓌侍中左僕射許文真公生頲氷詵乂潁顔頲中書侍郎平章事許文憲公生善善生易相易黄州刺史生繫滁州刺史繫生賛賛生䖍氷虞部郎中國子司業按唐世系表氷無所生震乃虔之子此句應衍生震吏部侍郎河南尹震生敦發教徹皦政儼詵給事中徐州刺史乂京兆尹生復妙妙泉州刺史潁生盈炎盈嘉王傅顔淮安太守左武衛将軍生寛琛廣州刺史生烱韙韙琅琊太守又驍騎将軍季生澄沁州刺史澄生綰䋔綰工部郎中荆南府司馬則長子愉愉七代孫彤生雅振振生世長唐秦府學士諌議大夫生良嗣右僕射温公生踐言踐峻踐義踐節踐言生務寂務昇峻生彦伯駙馬按脱都尉二字下駙馬亦脱都尉二字兄子震駙馬義孫廉節曽孫憻太府卿長從弟宣司農少卿襄陽則曽孫佐晉末自扶風徙焉十二代孫權唐左驍衛将軍藍田稱自武功徙焉刑部尚書蘇洵生晉瞻瞻駕部郎中生端平寧昶端比部郎中四代入省生宏趙郡状稱蘇章之後因官趙州唐鳳閣侍郎味道生佃份倜倇佃膳部員外倇職方郎中味道弟味元膳部員外生偡偡生汭湯郴州刺史又工部侍郎蘇弁状云與良嗣同房弁兄衮冕冕生持滌持生循楨滌兵部尚書襄州節度生粹冲冕撰㑹要三十卷武昌兾州前燕有期彤侯青後魏鎮軍将軍五代孫克忠越州長史又武衛大将軍荆國公宣方生慶節洛陽蘓秦之後今無聞河南蘓氏後魏官氏志㧞畧氏改為蘇氏後魏恒州刺史蘇强孫武安袁州刺史生順孝慈順周眉州刺史朝彤公生沙羅隋卭州刺史沙羅生康唐右武衛将軍襄城男康生守忠守儉守忠駕部郎中孝慈隋兵部尚書安平公生㑹昌比部郎中蒲風俗通有詹事蒲昌又有蒲遵晉書苻洪傳云其先居池上生蒲皆長三丈因號蒲家遂以為氏後改為苻也烏齊有烏餘烏枝鳴莒有烏存秦有烏獲鄱陽姓苑云今鄱陽有此姓河南代北人烏石蘭改姓烏兼御史大夫烏洽案韓愈集及唐書俱作承洽此脱承字洽從父弟玭案唐書烏承玭官檢校殿中監此亦脱去玭生重允今為河陽節度案韓愈集烏氏家廟碑承洽生重允與此不合狐周同姓居於戎太伯生突突生毛及偃毛生溱偃生射姑世為晉卿蜀有狐篤屠左傳晉大夫屠蒯禮記作杜蒯又屠羊説楚人晉将屠岸賈風俗通漢末有屠景先河東人蘆河南後魏官氏志莫蘆氏改為盧或亦為蘆氏壺衛有壺黯漢諌議大夫壺遂列仙傳有壺公吾夏諸侯昆吾之後漢有廣陵令吾扈晉交州刺史吾彦吳人辜今泉州晉安有此姓不詳所出軤纂要云人姓苸姓苑云沛人胡母齊宣王母弟封母鄉逺本胡公因曰胡母氏漢有太史胡母敬泰山漢景徳博士胡母子都居齊治公羊春秋後漢執金吾胡母班晉河南令生輔之字彦國陳留太守湘州刺史揚武将軍生謙之也胡非陳胡公後有公子非後子孫為胡非氏戰國有胡非子著書胡掖秃髪思復鞬娶胡掖氏生烏孤呼延匈奴四族有呼衍氏入中國改為呼延氏河南前趙大司空鴈門公呼延翼女為劉元海后七代孫叔歸上谷太守孫族潞州刺史曽孫呼延黄河内令生昉昭㬢晧呼母漢武帝時匈奴王呼母盧降封容城傳封三代呼衍後漢書匈奴四族有呼衍氏見匈奴傳蘇農西蕃突騎施酋也神龍右驍衛大将軍金滿州都督張掖公蘇農金山開元左羽衛大将軍永夀郡王蘓農輔國左金吾大将軍酒泉公蘓農盡忠按此皆沙陀氏之人此俱改為蘓農氏考貞觀中有蘓農泥孰左屯衛大将軍榖州刺史亦北蕃歸化者蒲盧姜姓有蒲盧胥齊人善弋射蒲姑左傳蒲姑殷諸侯居齊也蒲圃魯大夫以地為姓屠羊韓詩内傳楚大夫屠羊説按此又以屠羊爲複姓與前屠姓註自相矛盾屠住英賢傳芊姓楚公子屠食采於住鄉因氏焉盧蒲左傳齊有盧蒲就又有盧蒲癸盧蒲嫳吾邱吕氏春秋中山有力者吾邱象趙郡漢書吾邱夀王見上壺邱列子師壺邱子林鄭人漢書壺邱子著書五篇下邳今下邳有壺邱氏徒人左傳齊有徒人費又國語齊有徒人回孤邱晉大夫孤邱林之後見世本英賢傳出自孤邱封人之後姑布趙簡子時姑布子卿善相見史記相襄子者烏䦨改為烏氏烏石蘭改為石氏烏那羅北齊有烏那羅受九代案此下當有脫文烏洛蘭改為蘭氏十二齊齊炎帝姜姓之後太公望子牙封營邱為齊國因氏焉又衛大夫齊惡齊豹亦為齊氏戰國時齊明周人也漢有光禄大夫晉功臣表平敬侯齊受傳封四代晉有齊恭注漢書又有齊萬年前凉有後将軍齊肅前秦左僕射齊難髙陽状稱齊受之後世居髙陽晉有武邑侯齊琰次子健健裔孫處中唐中書舍人生珣中山深澤縣稱琰少子粹居中山元孫䖍唐光州刺史生知元知元生令令生澣澣吏部侍郎左龍武兵曹生抗中書侍郎平章事抗生餗户部郎中生揔衢州刺史案唐世系表澣生翧及珝翧官左龍武倉曹叅軍生抗抗生餗珝官吏部郎中生揔衢州刺史此本左龍武兵曹上脱生翧二字户部郎中上脱珝一字權徳輿集有抗碑亦同成都状云齊受之後唐黄門侍郎璿生景胄左丞刑部侍郎河間状稱琰中子澄自髙陽居河間六代孫肅暕唐虞部郎中生説檢校員外郎悦生猗暢給事中平章事江西觀察使齊映状云代居瀛州兄昭晈弟皥照煦昭兼殿中侍御史生孝若大理正晈澤州刺史皥京兆司録照倉部郎中池州刺史清河唐兾州總管齊若行状云齊受之後黎周時侯國風俗通云九黎之後尚書西伯戡黎亦見毛詩左傳齊大夫黎彌且字亦作犂宋城唐右拾遺犂昕洛陽尉黎廻愛州人京兆尹黎幹生烑炬常燧煟熉煟生植右常侍也河南官氏志業黎氏改為黎氏稽黄帝臣大山稽之後風俗通云稽黄秦賢人嵇夏少康封少子季杵於會稽漢初徙譙嵇山改為嵇氏譙郡銍縣後漢太子舍人嵇蕃字茂齊生含廣州刺史武昌生康魏中散大夫生紹晉侍中案晉書嵇康本傳其先姓奚㑹稽上虞人以避怨徙譙有嵇山家於其側因而命氏又嵇含傳祖喜徐州刺史父蕃太子舍人又文選註嵇紹集曰從兄太子舍人蕃字茂齊然則蕃於康乃其羣從非祖孫也又嵇康詩母兄鞫育有慈無威則康乃少孤為其兄公穆所育文選註引嵇氏譜亦不詳康父武昌生康疑有脱悞亦不知何據河南後魏官氏志紇奚氏改為嵇氏奚夏車正奚仲之後漢功臣表魯侯奚涓北海奚涓之後吳有臨海太守奚熈廣陵奚涓之後唐滁州刺史奚淩澤生千栢栢生陟吏部侍郎鞮風俗通云晉銅鞮伯華之後氏焉遆音蹄今同州澄城縣多此姓自云銅鞮氏避仇改焉亦單姓蹄案廣韻無此字惟字典音提註云姓也今附入齊韻兒郳郳黎來之後亦為兒氏兒良六國時人見吕氏春秋千乘漢有御史大夫兒寛倪邾武公封次子於郳是為小邾後失國子孫為邾氏避仇改為倪案世本云邾顔居邾肥徙郳宋仲子註云邾顔别封小子肥於郳為小邾子則顔是邾君肥始封郳杜譜云小邾邾俠之後也夷父顔有功於周其子友别封為附庸居郳曽孫犂來始見春秋附從齊桓以尊周室命為小邾子穆公之孫惠公以下春秋後六世而楚㓕之世本言肥杜譜言友當是一人姓纂前以郳犂來為兒氏之祖而以邾武公之郳為倪氏之祖同一郳也强為分别武公之號於傳無徴疑即公羊傳所稱顔公者漢有揚州刺史倪彦中山唐刑部侍郎倪若水中山藁城人也西姓苑云西門豹之後改為西氏犀史記秦有犀首鮭中山後漢有鮭陽鴻為少府傳孟氏易南陽淯陽後漢大鴻臚鮭丹􅞺下圭反見纂要毒下圭反見纂要􅦂下圭反見纂要云人姓按集韻注姓也一曰蜀闖梁四公子名或作􅦂毒齊季齊襄公子季奔楚因氏焉魯有大夫齊秃窺見世本西方見姓苑云少昊金天氏位主西方今因氏焉北平前燕慕容廆以西方武為股肱又西方㒺以文章知名西門鄭大夫居西門因氏焉列子有西門子魏文侯時西門豹為鄴令漢王莽時有道士西門思洞仙傳有西門惠按漢書王莽傳道士西門君惠無名思者此又分思惠為兩人唐宦官有西門思恭西乞秦将軍百里術字西乞其孫以王父字為氏按術不姓百里西鉏左傳宋大夫西鉏吾漢有御史西鉏語見英賢傳西申瑞應圖周成王時西申國獻鳳留中因氏焉西陵世本春秋時有大夫西陵羔西周周末分為