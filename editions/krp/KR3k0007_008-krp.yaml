保衛瓘生恒恒生玠裔孫隋虞州刺史神泉公盛盛生孝節唐左武衛大將軍安邑後魏歩兵校尉衞卧龍亦稱玠後五代孫知敏唐給事中吏部郎中汝州刺史生固損宏敏三從弟元經蘄州刺史户部郎中衛畿道徙京兆水部員外衛惟良亦安邑人虞部員外巴今陜虢觀察衛次公御史中丞循王傅衛晏子中行今禮部員外國子司業衛密子開元衛偡弟倚生象侍御史並河東安邑人大厯檢校户部尚書荆南節度使衛伯玉三原人芮左傳周司徒芮伯同姓國也芮伯萬之後為晉所滅漢鉅鹿太守芮强吴郡太守芮珍丹陽人今望扶風彘左傳士㑹支子士魴食采於彘邑在平陽北故號恭子裔見姓苑祭北國名也女為舜妃黄帝史官子孫因氏馮翊衙縣人案姓氏辨証引作癸北十四泰蔡周文王第十子蔡叔度生蔡仲胡受封蔡後為趙所滅子孫以國為氏晉有蔡墨秦相蔡澤漢功臣表肥如侯蔡演演元孫義義元孫勲後漢為長安邳長後徴不起勲曾孫擕濟陽考城縣擕生稜質稜生邕質始居陳留分為濟陽因為郡人質元孫克從祖謨晉永嘉同過江克六代孫㸃梁司空安豐公孫秦客唐金部郎中客姪真清鄿州刺史大業後梁左案此下有脱文户尚書生克恭秦府學士太子洗馬質元孫克生晉司徒謨謨元孫興宗吏部尚書生樽樽孫凝凝子君和南陽魏有蔡睦晉有蔡秀秀八代孫麗梁琅琊太守元孫杭唐左武候長史朔方漢末丕為五原太守因居之裔孫招元孫澄唐左衛郎將丹陽狀云質後唐司勲郎中希寂艾晏子春秋齊大夫艾孔之後即左傳裔款也風俗通龐儉母艾氏南燕有牙門艾江又東平太守艾詮北平唐御史大夫艾敬直河南官氏志俟斤去斤並改艾案魏志俟伏斤氏改伏侯伏斤改斤頼左傳頼國為楚所滅以國為氏漢有交阯太守頼先蜀零陵太守頼文唐光禄少卿頼文雅南康唐秘書郎頼棐本汀州人後魏虔州案此下有脱文大風俗通大庭氏之後又大填大山稽黄帝師大頴為顓頊師案古今人表頴作款禮記曰大連東夷之子㑹鄶仲之後避難去邑為㑹氏風俗通云陸終之子乙之後漢武陽令㑹栩太尚書文王四友太顛之後今咸陽有太氏𢃄六國時有𢃄他見姓苑兊見姓苑太傅漢有太子太傅䟱廣曾孫彦則避王莽亂於太原因氏焉太陽風俗通衛大夫太陽速晉有太陽狀為卿按左傳為戲陽速太士太士氏永嘉人建安太守太士靈秀今松陽有此氏太師商有太師摯周有太師疪按玉篇無疪字疑即疵字太伯周古公之子吴太伯之後大羅周禮大羅氏掌鳥獸其後以官為氏秦有將軍大羅洪大季世本鄭穆公生大季子孔志父之後案杜預世譜士子孔生大季士子孔穆公子也此誤大臨衛大夫大臨氏蔡仲蔡仲胡之後趙將有蔡仲其十五卦解北改為解後魏别帥解北莫弗憣豆建十六怪祭左傳周公第五子祭伯子孫以國為氏鄭有祭仲足周有祭公謀父蒯風俗通云晉大夫蒯得之後見左傳禮記漢有蒯徹涿郡范陽縣漢書齊辯士蒯通本名徹與漢武帝同名遂改又有上庸長蒯躬後漢末有蒯越字異度官至光禄勲生宗蘭陵丞宗生恩介左傳有介之推琴操作介子綏神仙傳吴有介琰介象十七夬快漢書齊人快欽治尚書
