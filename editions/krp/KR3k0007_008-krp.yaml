body:
  text: 元和姓纂卷八去聲送韻至夬韻唐林寳撰一送仲髙辛氏才子八元仲堪仲熊之後以王父字為氏一云魯桓公子慶父子孫號仲氏又虺為湯左相子孫氏焉漢有廷尉仲定少景唐司門員外郎仲子陵成都人貢仲尼弟子端木賜子貢之後以王父字為氏漢有御史大夫貢禹仲孫慶父子孫號仲孫氏左傳齊有仲孫湫韓子有仲孫章仲行左傳秦三良仲行之後世本宋有仲行寅晉大夫有仲行氏仲梁魯大夫仲梁懐見左傳後魯有仲梁閔仲顏魯有大夫仲顏莊叔齊有大夫仲顏據仲熊楚公族有仲熊氏洞沐漢有洞沐孟陽治易二宋宋子姓殷王帝乙長子微子啟周武王封於宋傳國三十六世至君偃為楚所滅子孫以國為氏楚有宋義宋昌廣平昌為漢中尉始居西河介休十二代孫晃生恭徙廣平利人侯孫藥師生毓恭弟畿給案唐世系表給作洽恭前燕河南太守毓生良北齊東郡太守良生乾子皓乾生大辯唐卭州司馬大辯生守恭守愼守儉守恭遂安令生楚璧兵部郎中杭州刺史守愼襄陽尉生庭璬庭瑜庭璘庭璬庫部員外庭瑜度支郎中司農少卿庭瑜生顒常州刺史庭璘兵部郎中深州刺史守儉洛州刺史生鼎兵部侍郎案唐世系表鼎兵部郎中荆州長史鼎生悦工部員外郢州刺史悦生稷子皓孫陽元洛陽尉景孫孝玉北平王文學撰關東風俗生俠畿後燕衛將軍司馬生榮國曾孫丹案唐世系表丹作弁後魏吏部尚書生紀紀生欽道欽仁曾孫務本唐藍田令生元撫襄州司户元撫生璟侍郎左丞相廣平文貞公生昇尚渾恕延華復衡昇祠部員外太僕少卿隨州刺史生實渾嘉部郎中御史中丞恕都官郎中生衮太常丞延太原少尹華大理評事生儼佶倚儼蘇州刺史佶河南尉倚虢州刺史衡檢校左常侍生倓榮國七代孫慶孫慶孫大理正給後魏七兵尚書孫謨生欽瓊欽曾孫正文唐秘書郎瓊生仲羡燕渤海太守曾孫延慶生長威季緒長威北齊御史中丞孫正言洛州司馬季緒生本立立生卓然比部員外益州長史燉煌漢有宋諒諒裔孫後漢清水公繇曾孫逰道繇六代孫夀唐同州郃陽縣令宏農狀云昌後自西河徙宏農唐太常丞宋仁回生果毅生之問之望之悌之問户考二員外生昌藻之望改名之遜荆州刺史之悌太原尹益州長史河南劒南節度生若水若思御史中丞若水丹徒令樂陵狀云本望出廣平唐嶲州都督宋君眀生㨗弼㨗固安令生宣逺弼生考玉比部員外君眀堂兄渭河陽令生思敬思敬生詢吏部郎中左常侍詢生晦諌議大夫同州刺史晦生泛泫泛汝州刺史扶風唐秦州長史生元爽元奬爽尚書左丞秋官侍郎揚洛二州長史生述監察御史元奬晉原尉生遥适遥禮户吏侍郎左丞魏汴州刺史适左補闕遥生東里東里生華河南周黄化令宋道狀云本廣平人曾孫義椆栢令生溫璡案此下疑脱溫瑗一人椆栢令亦有誤溫瑾溫璩溫瑾户部侍郎鄭州刺史溫璡太原少尹生寂温瑗侍郎御史生蹇溫璩梓州刺史京兆後漢侍中宋宏之後今無聞晉宋甄宋琨唐都官郎中宋質給事中生撙虢州人殿中御史宋務先洛陽人司農少卿宋遵貴中書舍人宋則並京兆人工部郎中宋元昉江夏安陸人生之順户部員外殿中侍御史貝州刺史宋慶禮邯鄲人殿中御史虔微邯鄲人統見姓苑三用用風俗通古有用國見毛詩漢有高唐令用蚪名士録有高唐用案毛詩有用國未詳高唐用下亦有脱字雍風俗通周文王第十三子雍伯之後以國為姓今或音雍州之雍漢雍齒沛人四絳絳絳縣老人之後巷毛詩周巷伯之後五寘賜仲尼弟子端木賜之後以王父名為氏刾左傳鄭大夫刾張姓苑云其先封刾鄉用氏焉案左傳鄭大夫郟張郟古洽切今作刾誤也刾俗刺字義風俗通云義伯陽卿也漢有南陽太守義縱河東義縦代居河東封岸頭侯晉有上庸都尉義欽智今有河東智氏漢有零陵太守智嗣戲潁川見姓苑又音僖魏志有戲才譬厯辰代人改為辰氏六至季陸終氏之子季連之後一云魯桓公子季友之後亦為季氏漢功臣表戚圉侯季必傳封四代夀春姓苑云今夀春有季氏漢河東太守季布弟心宋有季高大厯右常侍季廣琛摯風俗通摯疇古諸侯國毛詩周有摯荒按摯荒未見毛詩義䟽京兆長安魏太僕少卿摯模代居京兆生虞晉太常卿光禄勲晉書有傳駟左傳鄭穆公子騑字子駟之後以王父字為姓漢恩澤侯表鄔侯駟鈞齊哀王舅冀左傳冀國今晉州冀氏又晉大夫郤芮食采冀邑亦為冀氏芮生缺唐侍御史冀元珪太原人子仲輔職方郎中案姓氏急就篇仲輔作仲甫祕漢功臣表戴侯祕彭祖傳七代孫西秦録有僕射祕宜案西秦録宜作宣肆風俗通宋大夫肆臣之後漁陽漢有漁陽太守肆敏子孫居之利漢有利幾又仙人利眞元漢陽人風俗通云漢有利乾為中山相河南官氏志吒利氏改為利氏遂左傳有遂國齊人殱于遂因氏焉其後並以遂為姓貳左傳楚屈瑕將盟貳軫並小國也今在隋州之南漢東今隋州有二氏翠急就章有翠鴛鴦其先楚景之後避難以其祖名氏焉案顏師古註作景萃之後改翠氏匱見姓苑廬江今廬州有此姓備見姓苑季孫魯桓公子友之後子孫號季孫氏生行父文子文子生宿武子武子生紇悼子公若公鳥紇生平子意如平子生斯桓子季魴侯季寤斯生肥康子季連晉有堂邑大夫季連齊出自陸終第六子季連之後季融世本楚鬭亷生季融子孫氏焉季隨世本周八士季隨之後宋有季隨逄見左傳季騧周八士季騧之後季夙濳夫論晉靖公孫季夙之後季嬰世本晉樓季嬰之後季尹楚有季尹然齊有季尹平四飯四飯缺之後紂賢人地駱枝改為駱氏案官氏志作他駱㧞七志意見姓苑侍其漢廣野君酈食其元孫賜以食其為氏曾孫武平帝時為侍中改為侍其氏焉北海侍其武生元案漢冇侍其元矩疑即此人避王莽亂家北海七代孫裔魏尚書左丞生邕邕生仁實晉廬江太守孫曼宋武昌太守寺人宋寺人惠牆之後事父宋事父氏子姓也意如魯季孫意如之後八未魏周文王第十五子畢公高受封畢裔孫萬仕晉封於魏至犨絳舒代為晉卿後分晉為諸侯稱王至王假為秦所滅子孫以國為氏昭王生公子無忌忌孫無知無知五代孫歆鉅鹿曲陽侯漢鉅鹿太守歆居鉅鹿五代孫慶案唐世系表慶作宣漢封北海公宣孫紞紞長子儔為東祖次子植為西祖也東祖儔孫藪生儵意暨儵曾孫蘭根後魏僕射生少政政生孝機孝該孝液孝機唐水部員外生嵩徳刑部侍郎嵩徳生濬温洵洵祠部郎中睦州刺史孝該元孫瓊京兆功曹孝液孫慤京兆功曹意七代孫宗敏刑部郎中生恒歸州刺史洵堂孫臯改名懿文郡州刺史生中庸暨生荀臺六代孫求已吏部貟外郎中書舍人生嗣萬金部郎中嗣萬生羔羔生鸞景北齊司農鄉鸞景生彥卿彥深彥理彥元彥卿元孫承休夀州刺史彥深隋著作郎孫歸仁一名克己吏部侍郎同州刺史彥理孫寳言生智本光本智本生亮虔州刺史光本生靖庫部郎中秦州都督靖生少賔少㳺少㳺刑部尚書京兆尹生友讓友順友直友恭友信友讓京兆司録友順太常博士友直京兆兵曹彥元生浦刑户二侍郎生正見正動正見庫部郎中生杳太常博士正動生傳弓監察御史西祖植晉御史中丞生虔虔生綏攀綏六代孫惇生彬文將彬生之逷皇州録事叅軍生全恕全恕生禮禮生綽緄緘綽生孟馴叔敖仲犀叔虬季龍孟馴左武將軍叔敖生正臣兼監察御史仲犀比部員外華州刺史江陵長史荆南節度生正雅殿中御史叔虬京兆户曹生宏簡宏逺宏簡户部郎中緄萬年尉生叔驥萬成萬成檢校員外全恕姪欽搆監察御史文將曾孫連城左拾遺攀元孫子建後魏益州刺史生収北齊僕射生人表収姪曾孫保家監察御史生行元長安尉地官尚書兼納言鉅鹿公魏元同稱東祖意之後生廓案唐世系表廓作士廓隋禮部侍郎御史生乂唐濮陽令元同生愔憻恬恊愔著作郎生長裕季隋季邁長裕河南法曹生充霓尤季隋膳部郎中季邁長安尉憻御史主簿生方回方進廣業方回淄州刺史方進左御史大夫生允修案唐世系表允作元修作循允生叔正兼監察御史修郴州刺史廣業生安昇荆州刺史案唐世系表廣業昇州刺史生甫此生安二字疑衍生甫恬給事中鄭州刺史生嶠嶠生黄裳開州刺史元同堂姪確案唐世系表元同五子其五為確此作堂姪與唐表異唐司議郎清河無知元孫諶漢清河太守因家焉裔孫充西魏開府儀同三司孫進唐右二府統軍進堂弟文博觀州刺史宜陽本居濟隂今已絶任城無知曾孫不害生漢任城太守案此下有脱名因家焉不害孫相漢丞相高平侯裔孫舒晉司徒族詠之宋荆州刺史今絶宋城唐中書令右僕射齊公魏元忠生昇晃昇太僕少卿晃泗州刺史費史記紂幸臣費仲夏禹之後楚有無極漢有費直江夏蜀丞相費禕巴蜀太守費觀禕孫晉巴東令穆之生恬晉江夏相魚復侯恬七代孫宏規唐主客郎中合肥男又居盧費愔晉西中郎將五代孫唐辰州刺史允斌晉費試成都人汝南後漢費長房之後瑯琊費直之後河南官氏志費連氏改為費氏尉鄭有尉止尉翩先賢尉繚著書號尉繚子河南官氏志北方尉遲部如中華諸侯也魏孝文改為尉氏尉託竒枝為􅂒汗莫賀弗案魏書無可考疑有脱誤六代孫後周長公侯兠案周書長樂郡公俟兠生迥及綱此長字下脱樂字俟誤作侯生逈綱􅒯太師相州總管蜀國公生寛誼綱後周大司空吴國公生運安允安允安生耆福唐庫部員外貴風俗通云陸終之後漢廬江太守貴遷常山晉武帝才人常山貴氏生東海越王石趙録有司空中郎將貴霸既風俗通云吴夫槩王之後子孫因避仇改為既氏漢有安南長史既凉緯見姓苑魏强魏武子支孫莊子快生强為魏强氏蜚亷史記秦嬴姓有蜚亷氏九御御周禮有御人職因官氏焉左傳御叔漢有御長倩者丞相公孫宏故人恕音慮楚大夫恕金據見姓苑云人姓鑢見姓苑云人姓茹河南官氏志普陋茹氏改為茹氏又蠕蠕入中國亦為茹茹氏音去聲御龍劉累之後漢有侍御史御龍君庶其邾大夫庶其之後今沛人庶長秦爵也因氏焉左傳庶長無地十遇遇風俗通漢有東安太守遇冲東莞姓苑云東莞有遇氏樹河東姓苑云今河東有此姓河南官氏志干氏改為樹案魏書樹洛干氏後改為樹氏此脱二字附後漢段熲將附都唐監察御史附徳意鑄風俗通鑄國也堯後也在濟北虵邱縣左傳臧宣叔娶於鑄後世以國為氏務堯有務成子見易傳列仙傳務光夏時人喻見姓苑亦音樹南昌姓苑云南昌有喻氏東晉有喻歸撰西河記三卷具左傳晉有具丙魏郡後漢宦者中常侍具瑗住見姓苑云人姓樹機西河鮮卑種魏詰汾長子疋孤部落徙河西傳六世樹機能有凉州樹黎後魏有蠕蠕别帥樹黎勿地來降務成吕氏春秋務成子堯師也又新序子夏曰舜學于務成附趣馬英賢傳楚趣馬厥之後後漢有南陽郡功曹趣馬思具封鄭公子具食采開封因氏焉鄭大夫具封狐人十一暮路炎帝之後黄帝封其支子於路春秋時路子嬰兒是也案春秋路子嬰兒之路作潞今上黨路縣漢大中大夫路溫舒平陽漢扶離侯路博徳始居平陽今𨽻貝州裔孫嘉晉安東太守孫藻生纂纂生濤後魏青州刺史生綽神龜綽後魏陽平太守生寄奴恃愛案唐世系表濤生寄奴侍慶據此則寄奴乃濤孫也愛亦作慶思令恃愛安州刺史思令生君儒北齊員外君儒生徳凖案唐世系表徳凖作徳淮唐相州刺史生勵言勵節勵言兵部員外曹州刺史生欽正欽古勵節刑部郎中華州刺史生欽訓鞏令案唐世系表徳淮子勵行鞏令神龜後魏恒州刺史五代孫文逸案唐世系表當作六代唐中司馬案中司馬唐世系表