body:
  text: 元和姓纂卷九去聲隊韻至梵韻唐林寳撰十八隊背古背國在今衛州或作臂以國為姓内史風俗通周内史叔興之後因官氏焉周又有内史過十九代代代君翟國也在常山之北今代州是也趙襄子所㓕其遺族以代為姓史記趙有代舉漢有京兆代武能音耐姓苑云長廣人狀云楚熊摯之後避難改為能氏京兆唐京兆少尹能延休鄠縣人上元中真州刺史檢校刑部尚書河北招討使能元皓生昱炅炅太僕少卿佴如代反晉山公集有佴湛戴宋戴公之後以諡為姓宋大夫戴惡漢有信都太守戴德九江太守戴聖後漢有司徒戴就晉有戴逵宋有戴法興齊有僧靜濟北戴渉之後譙國戴逵之後逵弟邈大司農廣信侯呉興長城晉有戴洋入方術傳魏郡斥丘狀云戴德之後裔孫景珍後魏司州從事景珍生胄唐吏部尚書參知政事生道國公仲孫不仕仲孫生至德右僕射道國公生良紹河東桑泉狀云渉後唐司勲員外郎戴林琁生頎水部員外載左傳有載國漢有載戴二十一震晉周武王第三子叔虞封唐唐有晉水因改為晉傳國二十代為韓魏所滅子孫以國為姓魏有晉鄙漢有晉寳為安樂相平陽三輔决録有晉文經漢有晉馮晉有尚書郎晉灼注漢書其先居平陽十代孫魏𤓰州刺史廣至公暉居馮翊平東隋内史侍郎建平公暉孫昶後周兵部尚書魏公衍元孫揆合州刺史按衍字之上有脫文藺音吝韓厥元孫康仕趙食采於藺因氏焉裔孫相如為趙上卿子孫仕秦隨司馬錯伐蜀因家成都華隂鄭縣魏末自蜀歸關中因居鄭縣裔孫維晉泰山太守維八代孫衡子仁志殿中監生嗣忠户部員外謩左武候大將軍楊國公古吝字按上脫一字不可考纂要文云人姓進後漢有進延為小黄門令見華嶠後漢書遴音吝風俗通遴到云韓大夫著遴子三十篇晉有東陽太守遴條允寅去聲風俗通允夏時侯國子孫氏焉信都風俗通云張敖尚魯元公主於信都因氏焉一云本申屠氏古信申音同故為信都氏北齊有信都芳河間信都芳明算術為丞相倉曹貞元初李納將信都承慶為青州刺史二十三問奮畢奮之後一云苪伯奮之後以王父字為氏孟軻門人奮章扶風後漢二十八將右將軍槐里侯奮修呉志丞相奮式前涼有奮寛開元有奮齊融按所引人姓名皆以萬為奮河南官氏志吐萬氏改為奮氏隋有榖城公奮緒弟纉唐右武衛將軍運見姓苑二十四焮靳風俗通楚大夫靳歙按靳尚見史記楚懐王時人靳歙見漢書漢髙祖時人應劭不應錯繆至此疑當作楚大夫靳尚漢有信武侯靳歙又汾陽侯靳強傳寫脫落其文耳又汾陽侯靳強後漢末范令靳先後燕録有太史令鴈門靳安唐金紫光禄大夫靳孝謨武功人吏部郎中靳恒館陶人又居汝南二十五願蔓左傳楚有鬭成然食采於蔓後為蔓氏獻風俗通云晉獻公之後戰國有獻淵建風俗通云楚太子建之後漢有建公見元后傳曼邱尸子有曼邱氏齊有曼邱不擇二十六慁論吐蕃大姓東禄讃生論欽陵論欽陵生賛婆賛婆生弓仁唐右武衛大將軍弓仁生成節成節生惟貞惟明惟賢惟貞右金吾大將軍生傪偕伾惟明檢校工部尚書鄜坊節度惟賢右羽林大將軍頓風俗通頓子國今南頓是也後為楚所滅子孫以國為氏漢有頓肅二十八翰幹見姓苑幹獻晉大夫范臯夷食采幹獻因氏焉二十九換段鄭武公子共叔段之後以王父字為氏戰國韓相段規三輔决録云段氏李老君之自出段干木之子隱如入闗去干為段氏案段干氏羅泌謂初邑段後邑干因邑為氏魏世家有段干子田世家有段干朋風俗通以為姓段名干木蓋以吕氏春秋干木富於義魏都賦干木之德自解紛之言誤之唐表遂謂封段為干木大夫踈矣又木子名同為趙相無隱如名此云入闗為段氏亦屬傅會且春秋時以段名者如鄭印段公孫段宋禇師段或其後以名為氏亦未可知未必定為共叔後也文帝時段卬為北地都尉曽孫招生會宗貞會宗金城太守貞武威太守子孫始居武威九代至熲武威西凉建康太守段信稱太尉熲七代孫也信生連連生榮後魏定秦二州刺史生孝先名詔案北齊書詔作韶北齊太宰左丞相平原忠武王婁大張掖公案韶傳封爵無張掖公字且韶三子懿深亮亦無寳積元名當有脱悮生寳積元尚書左丞刑部侍郎大理少卿生嗣元嗣道嗣基嗣元地官侍郎鄭州刺史生崇謙嗣基東光令生崇簡右衛将軍鄭州刺史崇簡生憕恊怡憕少府監恊太子舍人生孟嘗信陵嗣道司僕少卿裔州刺史徳操右監門大将軍按徳操上有脱文平原公五代孫㨕大理司直隋朔二州刺史段嚴状云信次子後魏平東将軍基後生逹隋吏部尚書東京留守逹生瑋唐殷州刺史瑋生懐節右武将軍曽孫成象生平仲尚書左丞齊郡鄒平縣卬十九代孫紛案唐世系表十九代作十四代後魏晋興太守五代孫偃師唐太子家令今貫河南偃師生志元左驍衛大将軍生懐古懐藝懐簡案唐世系表志元生瓉瓘珪瓉生懐簡此作志元生懐簡中缺一代懐藝坊州刺史少詹事瓘符璽郎朝邑令生懐昶懐晏懐晈懐昶徳州叅軍生文昌案唐世系表懐昶生諤諤生文昌此作懐昶生文昌中缺一代左補闕長慶太和中書侍郎西川淮南京東三節度生成式珪成式宣州長史生懐本洛州太守禮部郎中蘓州刺史同居滎陽又中牟状云滎陽少子孝方之後汧陽司農卿贈太尉忠烈公段秀實本威武嶷右驍衛将軍郇坊州刺史遼西鮮卑檀石槐之後晋有段陸眷孫務勿座居遼西令友生匹磾受欲廆段案晋書段匹磾之父務勿塵勿塵死子疾陸眷嗣匹磾為晋假撫軍大将軍死石勒之難惟末波存及末波死子牙立牙死其後從祖就陸眷之孫遼立此陸眷之孫務勿座云云舛錯殊甚八代孫文振隋兵部尚書北平侯又居北海斯原生確綸確唐御史大夫生孝機中書舍人孝叡洛州刺史生庭瑜機生粹徴粹化州刺史徴殿前侍御史綸工部尚書駙馬都尉紀國公生孝爽文振四從姪子榮周潤州刺史孫髙唐盧州刺史諸郡段氏左金吾大将軍鄜坊節度段竒京兆人生岌嵩㟧汾原節度檢校兵部尚書祐雲南状云魏末段延没蠻代為渠師裔孫慿入朝拜雲南刺史孫左領大将軍生子光子游子英子光試太僕卿長川王生秀試大常卿子英率府遂郡王神營州兵馬使灌風俗通斟灌氏夏諸侯也子孫以國氏焉漢丞相潁隂侯灌嬰嬰孫賢汝隂侯案漢書賢封臨汝侯神仙傳灌叔本漢太僕卿灌夫父張孟嘗為嬰舍人易姓灌氏列僊傳有灌光爨後漢河南尹爨肅見謝承後漢書蜀志交阯刺史爨琛按廣韻琛作深建寕大姓也又寕州刺史爨頠華陽國志爨習官至領軍昌寕大姓也冠姓苑云有此姓云冠髙帝之後冠軍漢霍去病封冠軍侯支孫因氏焉襄陽漢有太𫝊東海王㕘軍冠軍夷按句有脫誤三十諌諫周禮有司諌子孫以官為氏晏左傳晏桓子名弱齊公族漢司𨽻校尉晏南漢書御史晏忠見風俗通南燕有晏漢豢龍古飂叔安裔子三十一襇蕳亡莧切姓苑云人姓三十二霰燃女見反見纂要今同州有此姓練見姓苑云人姓見見姓苑云人姓薦見姓苑云人姓縣潘衛大夫有縣潘氏三十三線卞出自姬姓曹叔振鐸之後支庶食采於卞因以氏焉魯有卞荘子楚卞和濟隂寃句人按晋書卞壼之父曰粹壼之子眕盱瞻眈眕盱殉父難一贈散騎侍郎一贈奉車都尉瞻位至廣州刾史眈尚書郎姓纂既失引忠貞又紊其世次至濟隂寃句為忠孝之里而綴之卞和之下尤穿鑿不經魏卞揖生統為晋琅琊内史生粹中書令子眕盱瞻又桓元長史卞範之宋卞彬賤風俗通漢左北平太守賤瓊單可單氏改為單氏眷代北茙眷氏改為眷氏變見姓苑云人姓戰後漢初戰兢為諫議大夫三十五笑邵邵公奭周同姓受封於燕傳國四十餘代其支庶為卿士邵穆公武公邵廖邵昭公並其後也秦有邵不疑汝南漢汝南太守邵安唐都官郎中邵昇自安陽徙汝南弟炅考功員外安陽状云稱信臣之後青州刺史邵休其先避事加邑為邵氏晋邵竒壽春太守五代孫知新唐刑部郎中又殿中御史邵瓊之相州安陽人生摯説摯監察御史生中和説吏部侍郎生渾滄少少昊氏之後一云少典之後禮記少連善居䘮東夷之子召召公奭之後或作召齊召忽漢功臣廣侯召歐又南陽太守召信臣生馴孫休案通志休作材邵皓世本恵公族羌子孫憲為邵皓氏召伯左傳召伯奐之後少室國語少室周趙簡子右也三十六效校出自周官校人之後以官為姓天寳河南士曹校傑孝齊孝公支孫以謚為姓三十七号郜國名在濟隂以國為姓安定唐殿中御史陜州刺史郜宏基生貞鉉虞部員外郎鉉即中書令張柬之之甥也㬥㬥公周卿士見毛詩應劭風俗通云㬥辛周諸侯也漢書御史大夫㬥勝之字公子河東人浩音告今隰州刺史浩聿状云郜氏因避難改為浩氏聿子虚舟漕漢書㳺俠傳漕仲叔西河人少子㳺亦以俠聞嫪郎到切秦荘襄太后有嬖人嫪毐到楚令尹屈到之後以王父字為氏好大報反見纂要文三十八箇賀姜姓齊公族慶父之後慶克生慶封以罪奔吳漢末徙㑹稽山隂後漢慶儀為汝隂令慶普之後也曽孫純避漢安帝父諱始改賀氏孫齊吳大将軍齊孫中書令劭劭生晋太子太傅修修十二代唐太子中書舍人徳仁徳仁姪孫彭州刺史黙徳仁姪曾孫太子賔客知章生曽河南官氏志賀蘭氏賀頼氏並改姓賀賀㧞與後魏同出陰山代為酋長北人謂地為㧞謂其總有其地時人相賀因氏焉河南洛陽後魏有賀㧞爾頭自武州為河南人生紱紱生允勝岳允後魏大尉燕郡王尚書令勝太師琅琊公岳雍州刺史關西岳水公岳曾孫儼唐右監門將軍孫延嗣度支郎中右金吾將軍爾頭少子生仁後魏太宰安定王孫賀㧞云一給事中元正司門郎中長慶中進士賀㧞葱案賀㧞惎與白敏中友善見唐摭言此作葱疑誤賀蘭代居元朔隨魏南遷河洛魏以忠貞為賀蘭因命以氏孝文時代人咸改單姓唯賀蘭氏不改逺祖達羅安樂王河南洛陽達羅統生敦誼周金州總管武都公生崇弼東崇孫儼湖州刺史弼隋揚州總管宋公生懷廓懐黙懐武懐廓唐禮部郎中懐黙穀州刺史杞公東周榮公生孝義唐尚書左丞生景約景慎景約杞王司馬生惲愔惲生庭芝愔生誕誕生察給事中察生公遂景慎兵部郎中生誼隋靈州刺史海陵公賀婁代人本居漠北以國為氏孝文改為樓氏河南後魏鎮西大将軍廣陵王賀婁伏連生大㧞蒙曽孫行本唐鳳州刺史梁公泉武安公寳後魏太子太傅廣平伯生景賢陽平公景賢生詮詮子幹隋鉅鹿公生積唐太子舎人賀遂本居元朔随魏南徙孝文改房氏河南唐引仁府統軍賀遂豐生封渭源縣公貫盩厔按姓氏辨証屋引條云唐雲麾将軍屋引宏生統軍豐豐生渭南郡公封疑此有誤賀恱賀遂氏音訛為賀悦今闗西有此姓焉後周柱國太尉李弼賜姓賀悦氏賀術魏初賀術祁居質安山因以為氏焉三十九過播風俗通播鼗武殷末之賢人按古今人表注曰自師摰以下八人皆殷末人四十榪華宋戴公子考父説食采於華因氏焉華元華宣華亥並為宋卿漢功臣表華毋害傳封四代又華成華嬰平原髙堂華嬰𤣥孫魏司徒博平侯華歆生表表生廙嶠廙生垣又華譚為祕書監齊華寳隋孝義傳汲郡華秋沛國譙縣魏志華佗謝姜姓炎帝之允申伯以周宣王舅受封於謝今汝南謝城是也後失爵以國為姓焉射三輔决録云後漢末鴻臚射服天子以服為将軍出征姓射名服不祥也改姓謝名咸子登授登蜀郡太守授中郎将柘楚大夫以地為氏急就章漢有柘温舒􅰤風俗通云新鄭人楊􅰤村在縣西二十五里舍見姓苑晋音亞見纂要舍利北蕃酋帥有吐宻支頡利後姓執矢氏生思力唐右