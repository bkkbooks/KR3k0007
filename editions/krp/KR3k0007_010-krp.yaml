body:
  text: 元和姓纂卷十入聲屋韻至乏韻唐林寳撰一屋陸齊宣王田氏之後宣王封少子通於平原陸卿因氏焉漢太中大夫陸賈子孫過江居吴郡吴縣陸賈裔孫吴丞相遜生丞相抗抗生晏景機雲耽遜弟吴選曹尚書案陸遜弟名瑁此脱生英英生曄玩玩元孫恵曉恵徹自玩至恵曉父子歴晉宋五代侍中恵徹生閑閑生厥完絳襄厥曾孫搢完生邱公雲公令公邱公生瑾琛瑾生孫之逖之逖之都官員外琛生仁公仁公生柬之元之案唐世系表琛生東之元之中間無仁公一世柬之司諫郎中崇文侍書學士生彦逺元之生元方天官鸞臺二侍郎平章事元方生象先景倩景融景獻景裔象先中書工部侍郎平章事生刑部尚書少保衮元貞公衮生泛潨廣偃泛祕書少監潨比部郎中廣沂州刺史偃工部員外景倩監察御史生溥天水太守少府監生康序應庶康檢校郎中庶福建觀察中丞景融吏部侍郎左丞工部尚書父兄三人繼處銓衡左右丞生沛涓沛屯田郎中景獻屯田貟外生包易包工部貟外易司門貟外景裔兵部貟外生滌元方弟彦恭曹州刺史雲公生瓊瓊生從典從典孫鑑有集令公曽孫餘慶尚書左丞太子詹事生珙璪璪汾州刺史兵部郎中生海長源海司門貟外長源檢校尚書汴宋節度生行檢陸氏自漢魏至梁陳正𫝊十五人恵曉生任倕倕字佐公任六代孫去泰去泰起居集賢學士梁給事中陸鎮之續長子稠後恵曉七從子也生晉晉生雍陳豫章王諮議雍生元朗字徳明秦府學士國子博士兼太子中允吴郡男撰經典釋文徳明生敬信敬義敬義蓬州刺史生宣悊遵楷遵楷祕書郎敬信兵部東臺二侍郎左侍御同三品檢校左相嘉興子生郢客邠卿越賓慶叶郢客生大鯤慶州都督邠卿生大訓大盈大鈞大訓右金吾将軍越賓陜州刺史慶叶屯田郎中雍州司馬鈞生湯後周大司馬陸通云玩後晉侍中萬戴為劉義真長史從宋武帝入闗没赫連生僑僑生政即通父也通生長義讓讓隋光禄少卿生善宋駕部郎中徳州刺史通弟逞周太子少保中都元都公陳廬陵太守陸之禮稱後漢潁川太守閎後生寳仁先元士元士虞部員外濟州刺史生貴愛陳永王記室陸慶稱褒後生士秀唐太子博士生謀道周文王學士生元感元感生南金庫部員外齊度支郎中陸匡丞晉太常卿始後元孫敬唐蘇州刺史陸孜兄元孫善敬國子司業生鼎右補闕嘉興開元有陸齊望官至試秘書少監生渭澧澗瀍淮渭侍御史澧殿中御史澗祠部員外瀍侍御史望族弟齊政當平令生侃如溧水令侃如生贄賞賡贄中書侍郎恵陵令陸侍詮並吴人詮生亘太常博士越宣二觀察生墉􅈴墉陜府觀察生鉅􅈴吏部郎中又歙州刺史陸㕘司封貟外陸震大理司直陸羽並吴人元和初進士陸暢生懐姪孫肱湖州刺史長城人河南洛陽出自代北代為郡長大人號歩六孤氏後魏孝文遷洛改為陸氏與穆奚于賀劉婁為北人八族征西大将軍東平王陸俟生麗頽歸騏驥麗司徒平原王生定國叡定國殿中尚書東平郡王生昕之叡尚書令東平郡王生希道希静希質希道生士懋子彰按疑脱士佩一人士懋元孫寳積屯田郎中冀州刺史生昭逵子彰中書監生印駿沓騫彦師兄弟五人相繼為黄門侍郎士佩五代孫伯玉中書舍人晉州刺史希静元孫乾迪巂州刺史都督希質生瓘悉達歸歸太僕卿曽孫騰周大司空生庸定公庸生逸融氷逸孫徹郢州刺史生欽嗣左監門将軍鄆州刺史欽義忠州刺史融隋洛州刺史生立素右庶子立素生爽兵部郎中爽生瞻瞻生景祥雒尉景祥生據司勳貟外據生士佳士修士佳三原令士修殿中御史氷生義方營州司法義方生頌改名慤國子監祭酒右常侍鄭公生璟正卿同正騏孫隋中書舍人生法言正言法言隋承奉郎撰切韻正言孫大同遂州刺史馥後魏太保建安王七代孫堅左右丞相刑部侍郎祕書監生綰綜縯綰贊善大夫生酇綜生邳縯檢校郎中生復禮復禮部尚書禮膳部員外穆宋穆公之後支孫氏焉楚元王友有穆生或作繆音同河南代人本姓邱穆陵氏代為部落大人為北人八族之首後魏以穆陸奚于比漢金張許史孝文遷洛陽改為穆氏以位盡王公勳著當代下司州一同四姓侍中太尉冝都王崇生遂留觀遂留生忸頭比部尚書忸頭生蒲坂虞曹尚書蒲坂生韶冀州刺史韶生遵季北齊東郡太守遵季生伽唐殷州刺史伽生宏逺隋侍御史宏逺生固禮固信固禮綽州刺史生思恭稷州錄事參軍思恭生元休安陽令元休生寧審寧秘書監致仕生贊質員賞贊御史中丞宣歙州觀察質給事中撫州刺史員御史生栖梧泗州刺史兼丞賞太常少卿審監察御史生贄兵部員外贄生詳諶諶改名仁裕宣武莭度檢校兵部尚書生延業諫議大夫固信蘭州刺史生思順思泰思順生子元子元生凖殿中御史汾州司馬思泰生昊周昪昌昌生寂著作佐郎麴漢有麴潭生閟避難湟中因居西平改姓麴氏西平閟居西平十一代孫嘉仕沮渠氏後為土人所歸立為髙昌王後魏授瓜州刺史金城公五代公主案冇脱文其孫麴伯雅附隋唐宇文泰叛貞觀中侯君集平之其主麴智茂歸降拜右金吾大将軍金城公勑改名智勇其弟天山公智諶生崇裕右監門大将軍交河郡王崇裕弟瞻司農卿常樂公後漢末又有麴演麴義金城晉有左僕射麴允祝黄帝祝融之後周武王封黄帝之允于祝因氏焉鄭有祝聃衛有祝鮀或以祝史之後以官為氏案世本祝任姓禮記封帝堯之後於祝惟唐世系表謂出自姬姓黄帝之後若祝聃祝鮀則俱以官為姓非姬姓也中山後漢司徒祝恬中山人長沙祝恬孫廣魏始平大守又家焉始平祝廣居始平九代孫綝唐陜州司馬綝生欽明刑部尚書同三品魯公子茝兄子駰河南官氏志比廬氏改為祝氏伏伏羲之後子孫氏焉與任宿須句顓臾同祖濟南漢有伏生名勝治尚書平昌安邱勝七代孫理髙宻太守生鳳湛湛後漢大司徒鳳五代孫儀生大鴻臚策策曾孫滔晉游擊将軍曽孫曼容齊率更令河南太守伏虔注漢書案伏虔今作服虔宓風俗通宓康公之後以國為氏史記仲尼弟子宓不齊字子賤魯人鞠后稷生不窟生而有文在手曰鞠支孫氏焉裔孫鞠武為燕太子丹傅風俗通漢尚書令譚或為麴氏音訛轉謬平原鞠譚代居平原南燕有司空鞠仲中書侍郎鞠注東莱漢尚書令鞠譚後支孫又居東莱唐有冀州刺史鞠稜女鄭繇祖母也或亦姓麴氏鹿趙大夫食采五鹿因氏焉漢有巴郡太守鹿旗巴郡鹿旗子孫因家焉濟隂後梁有樂郡太守鹿蘊見十六國春秋元孫悉西魏光禄大夫河内公自西平徙濟隂孫善隋長春宮監河内公生愿裕注裕唐司農少卿定陶公注嶲州司功河南後魏官氏志鹿桓阿氏改為鹿氏叔八凱叔達之後或云晉大夫叔向之後東觀漢記将軍叔夀叔牙之後孫叔仲彭生亥案通志公孫兹生得臣彭生得臣為叔孫氏彭生為叔仲氏亥生帶帶生仲叔仲職及寅代為魯大夫木端木賜之後因避仇改姓木氏晉文章志木華字元虚作海賦嘗為太傅楊駿主簿又有木槩著戰國䇿春秋三十卷見七録肅周文王子郕叔之後成肅公以謚為姓案通志曰郕叔武未聞謚此當是周卿士成肅公之後梁吴郡太守西豐侯肅正徳一云古肅慎氏之後歸化中國改為肅氏卜周禮卜人以官為姓仲尼弟子商字子夏魯人河南漢卜式商之後也以田畜為事官至御史大夫開元中卜長福獻續文選三十卷杭州冨陽縣尉宿伏羲氏風姓之後左傳云任宿須句顓臾風姓也又有宿南國在東平無鹽縣以國為姓後漢宿仲談又有宿祥鴈門宿祥一作禕為鴈門太守因家之前趙有宿察河南官氏志有宿氏大姓宿六斤氏為宿氏谷漢衞司馬谷吉世居長安生永大司農後魏谷楷昌黎人魏郡唐晉陽尉谷倚状云谷永之後詩入正聲集與吴少徴冨嘉謩為友沐漢沐寵為東平太守状云端木賜之後避難改為沐氏東平沐寵之後因官居焉河間魏略沐並河間人孫文流為䕶軍石趙僕射沐堅竹孤竹君姜姓殷湯封之遼西至伯夷叔齊子孫以竹為氏東莞後漢竹曽為下邳相又擬陽侯竹晏並東莞人服服羲之後仲尼弟子服不齊字子賤魯人今轉為宓氏亦作伏禄風俗通云殷紂逺裔悉西魏光禄大夫河内公自西平徙濟隂孫善隋長春宫監河内公生愿裕注裕唐司農少卿定陶公注禄州按注嶲州司功此誤風俗通云殷紂子武庚子禄父後以王父字為氏今涇陽有此姓又吐蕃酋長有禄東贊竺本天竺胡人後漢入中國而稱竺氏竺固為漢侍中琅邪莒縣侍中西平侯固之後代居琅邪有竺俊恢銓覽宋竺並云莒人鬻祝融之後周文王師鬻熊受封于楚著書子鬻拳其後建平見姓苑秃國語祝融後八姓已董彭秃妘斟曹芊周滅之矣賈逵云秃彭姓别族郁見姓苑國語魯相郁貢子孫氏焉玉音宿黄帝時公玉帶造合宫明堂見尸子後改為玉氏漢司徒玉光府字文伯夙古夙沙氏之後夙沙衛閹寺之屬潚漢鴈門太守潚河牧黄帝臣力牧之後漢有越嶲太守牧根􅪿於六反見姓苑屋廬晉賢人著書言彭𥅆之法按此脫名屋南代北複姓屋引代人隨魏南徙河南後魏行臺右僕射屋引業生通通生容容生浴浴生永達唐梁王府統軍叔孫魯桓公子叔牙生兹號叔孫亦為氏生得臣得臣生豹豹生婼婼生不敢不敢生舒漢有叔孫通為太子太傅生稷嗣君魯國薛縣叔孫通代居開元大理司直叔孫通元孫觀生興按此有脫誤河南後魏獻帝命叔父之後為乙旃氏後改為叔孫氏道武時有夀光侯叔孫建生俊将軍安城公元孫金毗隋太府少卿曽孫文懷唐瀛州刺史叔夜周八士叔夜之後楚康王時大夫有叔夜子荘見國語叔帶英賢傳趙叔帶之後齊大夫有叔帶子荘為荘公御叔向世本晉羊肸字叔向因氏焉叔敖八愷之後公羊有叔敖段為景王大夫叔達八凱之後公羊有叔達段為景王大夫叔服英賢傳云周太史叔服之後晉武公大夫有叔服之要叔夙世本羊舌職生叔夙為叔夙氏叔魚晉大夫羊舌鮒字叔魚因氏焉獨孤其先本姓劉氏後魏代北三十六部有伏留屯為部大人居雲中和平中以貴人子弟鎮武川因家焉伏留屯之後有俟尼生庫者後魏司空生信大宗伯衛國公第二女唐元貞皇后生髙祖祝其風俗通宋戴公子祝其為司寇因氏焉見世本漢有清河都尉祝其承先祝固左傳晉有祝固氏漢功臣祝其侯祝固舒祝史衛有祝史揮因官姓焉下邳今有此姓榖梁魯有榖梁赤治春秋傳子夏門人也尸子云糓梁俶傳春秋十五卷案顔師古説榖梁名喜濮陽陳留後漢外黄令牛述以濮陽濳為主簿吴長沙太守濮陽逸生興孫休時為衛将軍平章軍國事丞相外黄侯吴書張紘從外黄濮陽闓受詩禮春秋大歴嶺南判官檢校刑部員外濮陽灌大歴進士濮陽守斛律代人代為部落統帥號斛律部因為氏焉河南後魏武川公斛律干孫舉滑州刺史下邳公孝卿隋户部尚書武陽子生宏義禮本禮備禮文禮備唐吏部貟外生觀國禮文蔡州司馬生貽慶庫部郎中少府監後魏又有斛律倍利侯案北齊書作倍俟利朔州刺史勑勒部人率衆内附生那瓌案北齊書倍俟利生幡地斤幡地斤生那瓌此闕一代為第一領人酋長生金北齊大司馬右丞相咸陽王生光羡武都按武都乃光之子詳下文此二字衍光字明月左太尉左丞相咸陽王長子武都太保羡生豐洛州刺史荆王案本傳羡字豐樂荆山郡王五子世達世遷世辨世酋伏䕶此作羡生豐誤斛斯其先居廣漠代襲莫弗大人號斛斯部因氏焉河南後魏比部尚書斛斯延生郭郭生樁尚書令太傅常山文宣公生徴徵周齊州刺史岐國公孫成生道仲道濟道仲唐蘄州刺史秃髮河西鮮卑也與後魏同出聖武帝詰汾長