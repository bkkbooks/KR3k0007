又駕部郎中石仲覽宣州人今居廣陵上黨晉石勒上黨武鄉羯胡也晉元時僭位稱都襄國今荆州也子宏為從兄季龍所殺自立子鑒遵並為冉閔所殺後趙六王三十四年案石趙起晉太興元年終永和七年凡七主共三十三年河南後魏官氏志烏石蘭氏改姓石魏司徒蘭陵公石猛猛生銓銓生真素初平素生萇萇生儁逺詢石㑺生士濟唐原州總管詢生金剛左司衛率初平元孫抱忠天官侍郎今居虢州席本姓籍晉大夫籍談之後也談十三代孫瓌避項羽名改為席氏漢初徙闗東豪族席氏後徙安定臨涇安定臨涇瓌十代孫廣後漢光禄􅈴元孫允魏酒泉太守允元孫保符秦尚書左丞生衡晉建威将軍寓居襄陽仕南朝四代衡孫固歸後魏湖州刺史靖安公元孫君懿唐侍御史懿曽孫建渙異晉建禮部尚書襄陽文公孫咎中書舍人生鴻又席法與裴叔業自南歸後魏拜并州昔按昔姓應在二十二昔之首風俗通周大夫封昔因氏焉漢昔登為烏傷令開元昔安仁生豐大理評事汝州人易左傳齊大夫易牙之後魏雍州刺史易愷魏郡人晉舂陵令易雄長沙人前凉将軍易挺藉晉文侯仇弟陽叔生伯黶司晉典籍為藉氏元孫藉談代為晉大夫晉為趙魏所滅藉氏播遷宋漢有倖臣藉孺又諫議大夫藉禋石趙侍中藉罷唐太常博士知微云其後也射晉大夫虢射之後見左傳漢大鴻臚射咸吴中書侍郎射慈善禮䘮服又音社奭召公奭之後以王父字為氏赤風俗通帝佶師赤松子之後見神仙傳夕後漢巴中渠帥夕氏蜀志尚書令夕斌適見姓苑釋内典云悉達太子成道姓釋氏辟閭衛文公支孫以居楚邱營辟閭里因為辟閭氏漢書儒林傳太子少傅辟閭曽孫失名為昌邑王太傅石駘駘仲之後亦作石駘氏石之齊有石之紛如石伯左傳伯名伯奐之後案左傳有召伯奐此疑誤赤張史記赤張徒父赤張開赤張哆並孔子弟子案荘子有赤張滿稽若孔子弟子史記家語俱無赤張氏惟漆雕徒父漆雕開漆雕哆三人名同疑因此誤赤章韓子赤章蔓枝智伯臣也二十三錫錫吴志漢末交趾太守錫光仙人錫夀之後梁錫休儒為益州刺史狄周成王封少子於狄城因氏焉魯大夫狄虒彌先賢人狄儀仲尼弟子狄黑衛人裔孫漢博士狄山天水狄山子孫代居天水姚秦録狄伯文官至中書令樂平侯将軍狄廣狄建義狄柴狄雄齊伯文裔孫又居太原曽孫孝緒唐尚書左丞右常侍臨潁男生知遜州刺史案知遜官越州刺史此作不合生仁傑納言内史令梁國公文恵公生光嗣光逺景昭光嗣户部郎中孫博通博濟博通生元範光逺袁州司馬景昭職方員外酈黄帝之後支孫食采於酈因氏焉漢有廣野君酈食其沛人弟商為賈後為丞相生寄一名况其子疥封髙梁侯傳封三代後魏酈道元字善長注水經官至御史中尉戚衛大夫食采於戚因氏焉先賢戚子著書漢髙祖戚夫人生趙王如意功臣表臨堅侯戚鰓傳封八代㲻古溺字見纂要糴左傳晉大夫糴茷析左傳齊大夫析歸父衛大夫析朱鉏公子黑其後也後漢析像通京氏易廣漢雒縣人析國為鬰林太守生像入後漢方術傳案後漢書折像乃折字从手此譌為析未詳析成齊大夫析成鮒二十四職職周禮職方氏因官為姓山陽令職洪因官居焉開元有職南金蔡州人明史記稷稷氏后稷之後子孫氏焉見姓苑漢稷嗣君叔孫通支孫亦為稷氏魯郡今兖州有稷氏力黄帝臣力牧之後魯郡漢有魯郡相力題因居焉棘衛大夫棘子成之後見論語文士傳曰棗祗本姓棘避仇改為棗潁州長社人息息媯姓侯國為楚所滅子孫以國為氏今新息縣即其故地也襄陽今襄州案此下似有脱文翼見姓苑河東今蒲州有翼氏晉翼侯居翼城因以氏焉東海下邳漢諫議大夫翼奉食見姓苑河南風俗通漢有博士食子公遼東後燕合浦公食勃東夷人嗇風俗通云古嗇夫子孫因氏焉即風俗通漢單父令即費其先食采即墨因以命氏即利韓子宋戴公時大夫即利渠彌稷邱英賢傳曰漢稷邱子得仙道弋門姓苑云漁陽人二十五徳國左傳齊卿族國氏代為上卿國共伯元孫歸父生綽綽生夏夏生聿及書並其族又鄭穆公子發字子國生輙字子耳生僑字子産以王父字為氏生參樂安漢魏郡太守國泉字子尼晉鎮南将軍王歆騎督國滿討張昌於隋郡案晉書新野王歆遣騎督靳滿討張昌非國氏也國滿未詳塞姓苑云人姓或天竺胡人之釋後即釋種也勒南越有此姓北人英賢傳古有劉河北人因氏焉莊子吴大夫有北人子髙案通志引英賢傳古有劉河者處于北海其後以為氏又云周有吴大夫北海子髙此云莊子悮北人又悮北宫衛公族頃子生去疾孫括生遺遺生貞子喜喜生結及肱左傳有北宫奢漢書有北宫伯子晉有西河太守北宫協前凉有䕶軍北宫萌北鄉左傳齊大夫北鄉啟北鄉子車説苑齊人有北鄉駱與晏子為友案左傳北郭啟北郭子車齊人北郭騷與晏子為友此俱誤北郭莊子舜友北郭無擇晏子云古有北郭無擇清身㓗己疾世之濁自投清泠之淵也案荘子有北人無擇此條當採入北人之下又誤為北郭北唐英賢傳曰晉有髙人越者隠於北唐因氏焉漢有北唐子真治京氏易者北門左傳有北門駟尸子有北門子荘子有北門成北髮漢書燕遣北髮長賂遺公主北殷世本云子姓也北野見姓苑万俟後魏獻帝季弟之後為十姓官氏志稱万俟氏中間失譜河南後魏夏州刺史樂寧公万俟禮生雅周安城公孫元道唐秦府車騎将軍靈公生肅殿中監虢州刺史靈公生齊荘庭玉肅曽孫著元元生遜造案北史有万俟普子洛字受洛干普封河西郡公洛太師大司馬太尉錄尚書尒朱時有万俟醜奴黑齒百濟西部人也唐右衛大将軍燕國公黑齒常之黑肱楚申公黑肱之後二十六緝習風俗通云習國名也漢習響為陳相襄陽晉衡陽太守習鑿齒著漢晉春秋五十四卷左傳齊大夫習明史記齊習虚田成子時人汲風俗通衛宣公太子伋之後居汲因為氏焉濮陽漢淮陽太守汲黯其先七代為衛卿大夫弟汲仁亦至九卿偃諸侯相邑裘衛大夫栁莊卒公與之邑裘氏與縣潘氏故衛有邑裘氏見禮記二十七合合左傳宋大夫合左師之後向戌也二十八盍蓋漢蓋公又司𨽻檢校蓋寛饒後漢二十八将左馮翊安平侯蓋延漁陽蓋延代居漁陽唐國子博士蓋文懿宋州人云其後也秦府學士諫議大夫蓋文達冀州人洛陽後漢蓋勲河南官氏志云蓋樓氏改為蓋氏二十九葉葉風俗通楚尹戌生諸梁字子髙食采於葉因氏焉聶衛大夫食采於聶因氏焉史記軹人聶政殺韓相俠累漢潁川太守聶良䕶羌校尉聶尚又有聶壹吴志将軍聶友石趙梁閔中書舍人聶熊清河人輙風俗通衛出公輙之後以王父字為氏漢有輙終古錢塘史記錢塘輙終古封禦兒侯案史記作轅終古㨗漢書藝文志有㨗子三篇云齊人案漢書藝文志作二卷風俗通云邾公子㨗菑之後以王父字為氏接三輔决錄接子昕著書十篇葉陽秦太后弟葉陽君子孫氏焉漢有諫議大夫葉陽通案史記秦太后弟華陽君通志亦有華陽通此俱誤接輿論語楚狂接輿隠者也其後為氏􅎤跌開元左威衛大将軍赤水軍副使武威公􅎤跌舒三十怗莢音夾韓相俠累之後急就章莢却敵案急就章作俠却敵若莢氏見世本晉有大夫莢成僖子牒云北齊營州刺史漢中山公牒云樂三十二狎甲風俗通太甲之後一云鄭大夫石甲父之後以王父字為氏甲父古諸侯以國為姓周甲父氏見釋例漢有侍御史甲父沮三十四乏法本媯姓田氏之允齊襄王子法章支孫以名為姓扶風郿縣後漢南郡太守法雄雄子真順帝四徵不起號元徳先生真生衍司徒掾衍生正字孝直蜀尚書令郡太守生邈漢陽太守元和姓纂卷十
