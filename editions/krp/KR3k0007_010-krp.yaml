屈楚公族芉姓之後楚武王子瑕食采於屈因氏焉屈重屈建屈到三閭大夫屈平字原屈正並其後也漢有屈燕汝南先賢傳有屈覇苻秦有屈伯産河南人吴尚書僕射屈晃大歴中職方郎中屈無易晉州刺史櫟陽尉屈同僊洛陽人河南官氏志屈六友氏改為屈氏案魏志屈六友氏作屈突氏茀左傳有茀翰胡禮記恤由之䘮哀公使孺悲之孔子學士喪禮案恤由哀公子此入茀姓下當有脱誤􅞣漢有九江太守􅞣修鬱見姓苑尉遲與後魏同起號尉遲部如中華之諸侯至孝文時改為尉遲氏河南洛陽後有托哥拔五代孫乙紇豆生侯兠祐兠樂生逈綱案北周書尉遲侯兠生逈綱北史亦無尉遲兠樂名安允逈周太師大司馬蜀公生寛順安隋鴻臚卿生耆夀綱大司空吴案綱爵吴國公此脱生運運盧國公允生夀庫部貟外案尉遲逈傳有從孫耆福官庫部貟外當即允子安子名夀重出疑誤又司空長樂公尉遲長命生破侯相貴破侯北齊尚書令周汴州刺史黄源公相貴左僕射海昌王又後魏平東将軍尉遲説六代孫孟都生羅伽羅隋代州西鎮将軍生運運生紹宗左屯田将軍油江伯孫瓌卭州刺史迦隋烏程鎮将軍生敬徳唐右武候大将軍同州刺史鄂州忠公生寳林司衛卿右衛将軍生修寂修儼屈突本居元朔徙昌黎孝文改為屈氏西魏復本姓昌黎後魏中書令下蔡子屈突遵生須右僕射須生恒右僕射濟北公曽孫長卿卭州刺史生通唐兵吏二尚書蒋公生夀韓榦詮倫延夀駕部貟外夏州都督生仲翔叔齊季将仲翔豳州都督生漪浩淑潾漪生蔵用淑生鄂凖潾生郇郾郾生鉉錡季将婺相二州刺史倫工部侍郎生琦俊右監門郎中俊生紹先虢州刺史延曽孫陜監察御史通弟葢隋長安令生逵操屈侯風俗通魏賢人屈侯史記漢有郎中屈侯豫屈南屈原裔孫仕後魏魏重複姓以自南来乃加南字或作屈男不更英賢傳秦公子不更之後或云秦大夫爵為不更因氏焉齊簡公時不更苗為執法也濳夫論宋大夫不更氏子姓之氏不蒙音夢西羌人後漢書不蒙娥使内附不夷世本宋不夷甫須之後佛圖晉書佛圖澄天竺髙僧也本姓白氏永嘉中至洛弗忌晉大夫欒弗忌之後勿忸于官氏志云改于氏疑與勿忸于同九迄乞扶改為扶氏十月越夏康之後姒姓越王勾踐裔孫王無疆為楚所滅子孫以國為姓氏河南官氏志越勒氏越疆氏並改姓越闕風俗通云古闕者官為姓王僧孺譜云蕭逺娶下邳闕氏之女越椒楚令尹公子嬰齊子重之後越勒後魏有越勒部因氏焉越質詰後秦錄有北梁州刺史平襄公越質詰歸十一沒兀後魏改安樂王元鑒曰兀氏杌左傳檮杌之後紇干代人孝文帝改為干氏河南貞觀有紇干承基貞元僕寺丞紇干遂其後也生俞渭南縣尉紇骨後魏獻帝兄為紇骨氏居代北河南後魏太府卿義山公紇骨容生預邱公静静生貴紇骨大威唐利州侍中紇單改為紇氏今有日者紇單珤紇奚改為奚氏沒鹿回紇豆陵氏本沒鹿氏代人為沒鹿氏孝文改為竇氏骨咄禄改為禄氏突黎人西域人氏紇豆陵代人孝文改為竇氏吐谷渾案金壺字義吐谷渾音突欲䰟吐谷渾歸化因氏焉河南唐右将軍吐谷渾景順十二曷葛風俗通葛天氏之允子孫氏焉夏時葛伯嬴姓國也亦為葛氏漢有潁川太守葛興後漢有汾葛令襲梁國葛興之後丹陽句容吴有葛奚為鴻臚神仙傳有葛元元從孫洪字稚川晉散騎常侍領大著作著抱朴子一百一十六篇又晉有葛由河南官氏志賀葛氏改為葛達八凱仲達之後以王父字為氏葛伯夏時諸侯為殷所滅以葛伯為氏達奚後魏獻帝第五弟之後為十姓逺祖長寧公革生司空斤亦單姓奚氏與穆陸于婁賀劉尉為北人八族案魏官氏志八姓中有嵇氏非奚氏達奚以獻帝弟始改為氏八姓乃太祖舊􅈴在達奚得氏先當以史為正惟穆陵奚于四姓有之斤元孫武後周太保大冢宰鄭公也達歩周文帝妃達歩氏生齊王憲茹茹人達勃改為裒鶡冠風俗通楚賢人以鶡為冠因氏焉鶡冠子著書褐餘濳夫論云曲沃桓叔之後渴單改為單氏十三末末本姓秣氏避仇改焉今秣陵是其後脫姓苑云人姓拔略後魏官氏志拔略改為蘇氏賀拔勝傳有都督拔畧昶末那樓後燕錄有襄城公末那樓富十四黠滑滑伯周同姓國也為晉所滅以國氏也案僖公十三年經書秦人入滑傳稱滅滑而還成公十三年吕相絶秦云殄滅我費滑則滑為秦所滅甚明此云晉滅誤矣左傳鄭大夫滑羅京兆大歴有萬年尉滑廣察見姓苑滑伯英賢傳曰姬姓因氏焉陳留漢有滑伯堪為齊悼王中尉十六屑齧荘子齧缺堯時賢人學於王倪既通許由師之節周禮掌節上士子孫以官為氏鐵伐赫連勃勃以其本宗支庶非正統者並為鐵伐氏鐵弗改為弗氏十七薛薛黄帝二十五子一為任姓裔孫奚仲居薛至仲虺為湯左相代為侯伯歴三代六十四世周末為楚所滅公子登仕楚懐王賜師邑為大夫以國為氏曽孫卭生薛公鑒案唐世系表卭生倪倪生翁翁生鑒與此世數不合漢初獻滅黥布䇿受封千户孫廣徳御史大夫元孫永漢千乘太守案唐世系表卭元孫漢字公子官千乘太守此作永不合八代子蘭徐州别駕為曹公所害生永遂歸於蜀先主官至蜀郡太守生齊歸晉為光禄大夫齊生懿晉光禄河東太守懿生三子恢一名開號薛苞河東汾隂河東太守懿生三子一名開號北祖雕號南祖興號西祖元孫謹五子又號為五房西祖大房洪祖絶列風俗通古帝王列山氏之後子孫氏焉鄭有隠者列禦寇著書八篇號列子悅後燕錄云左僕射悅真生夀南燕尚書昌黎悅綰鮮卑人清泉侯悦真亦其族也説姓苑云傅說之後以王父字為氏舌左傳越大夫舌庸别姓苑云京兆人薛孤代人隨魏南徙河南北齊恒農王薛孤康生買開府儀同三司新平王孫吴仁唐右金吾将軍朔方公生知素知檢知機